            // "Leave Site" — end the round
            gameRunning = false;
            keypadOpen  = false;
            guessCorrect = (playerGuess !== null && playerGuess === currentGhost.name);
            roundOver   = true;
          }
        }
        // Close button — small X top-right of panel
        if (mx >= 530 && mx <= 550 && my >= 258 && my <= 278) keypadOpen = false;
        return;
      }
      // Threat monitor — close via ✕ (top-right of panel: tx=270, ty=220, tw=260)
      if (dangerTimerOpen) {
        if (mx >= 516 && mx <= 532 && my >= 220 && my <= 238) dangerTimerOpen = false;
        return;
      }
      // Four-panel monitor — close via ✕ (px=50, py=30, pw=700)
      if (fourPanelOpen) {
        if (mx >= 734 && mx <= 752 && my >= 30 && my <= 48) fourPanelOpen = false;
        return;
      }
      // Cork board — close via ✕ (cbx=120, cby=80, cbw=560)
      if (corkBoardOpen) {
        if (mx >= 664 && mx <= 682 && my >= 80 && my <= 98) corkBoardOpen = false;
        return;
      }

      // Desktop world interaction is keyboard-only (E key). No click-to-interact.
    });

    // --- Journal Screen ---
    function drawJournal() {
      // Dim the game behind the journal
      ctx.fillStyle = "rgba(0,0,0,0.72)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // ── Open-book layout constants ──────────────────────────────────────────
      const jy = 52, jh = 496;
      const spineW = 24;
      const lx = 20 + spineW;       // left page x  = 44
      const lw = 358;                // left page width
      const creaseX = lx + lw;      // center crease x = 402
      const rx = creaseX + 4;       // right page x = 406
      const rw = 350;                // right page width  (406+350=756)

      function drawPage(x, w) {
        ctx.fillStyle = "#e8dfc8"; ctx.fillRect(x, jy, w, jh);
        // Aged edges
        const ag = ctx.createLinearGradient(x, jy, x + w, jy + jh);
        ag.addColorStop(0,   "rgba(60,30,5,0.12)");
        ag.addColorStop(0.4, "rgba(0,0,0,0)");
        ag.addColorStop(0.6, "rgba(0,0,0,0)");
        ag.addColorStop(1,   "rgba(40,20,5,0.16)");
        ctx.fillStyle = ag; ctx.fillRect(x, jy, w, jh);
        const tf = ctx.createLinearGradient(x, jy, x, jy + 30);
        tf.addColorStop(0, "rgba(30,15,5,0.20)"); tf.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = tf; ctx.fillRect(x, jy, w, 30);
        const bf = ctx.createLinearGradient(x, jy + jh - 24, x, jy + jh);
        bf.addColorStop(0, "rgba(0,0,0,0)"); bf.addColorStop(1, "rgba(30,15,5,0.20)");
        ctx.fillStyle = bf; ctx.fillRect(x, jy + jh - 24, w, 24);
        // Ruled lines
        ctx.strokeStyle = "rgba(100,130,190,0.20)"; ctx.lineWidth = 1;
        for (let ry = jy + 70; ry < jy + jh - 16; ry += 22) {
          ctx.beginPath(); ctx.moveTo(x + 10, ry); ctx.lineTo(x + w - 10, ry); ctx.stroke();
        }
        // Page border
        ctx.strokeStyle = "rgba(0,0,0,0.30)"; ctx.lineWidth = 1.5;
        ctx.strokeRect(x, jy, w, jh);
      }

      // ── Tabs above left page ──────────────────────────────────────────────
      const tabLabels = ["Evidence", "Ghost Guide", "Options"];
      const tabH = 24, tabY = jy - tabH;
      tabLabels.forEach((label, ti) => {
        const tx = lx + 10 + ti * 130;
        const active = journalTab === ti;
        ctx.fillStyle = active ? "#e8dfc8" : "#b0986a";
        ctx.fillRect(tx, tabY, 118, tabH + (active ? 4 : 0));
        ctx.strokeStyle = active ? "rgba(0,0,0,0.25)" : "rgba(0,0,0,0.45)"; ctx.lineWidth = 1;
        ctx.strokeRect(tx, tabY, 118, tabH + (active ? 4 : 0));
        ctx.fillStyle = active ? "#2a1a08" : "#4a3010";
        ctx.font = active ? "bold 10px Georgia, serif" : "10px Georgia, serif";
        ctx.textAlign = "center";
        ctx.fillText(label, tx + 59, tabY + 15);
      });

      // ── Leather spine (left edge) ──────────────────────────────────────────
      ctx.fillStyle = "#2a1a0a"; ctx.fillRect(20, jy, spineW, jh);
      ctx.fillStyle = "#3e2810"; ctx.fillRect(22, jy + 8, 6, jh - 16);
      ctx.fillStyle = "#1a0e04";
      for (let sy = jy + 20; sy < jy + jh - 16; sy += 16) ctx.fillRect(30, sy, 4, 3);
      ctx.fillStyle = "rgba(0,0,0,0.35)"; ctx.fillRect(40, jy, 4, jh);

      // ── Draw both pages ───────────────────────────────────────────────────
      drawPage(lx, lw);
      drawPage(rx, rw);

      // ── Center crease ─────────────────────────────────────────────────────
      // Shadow on left side of crease
      const creaseL = ctx.createLinearGradient(creaseX - 6, jy, creaseX, jy);
      creaseL.addColorStop(0, "rgba(0,0,0,0)"); creaseL.addColorStop(1, "rgba(0,0,0,0.18)");
      ctx.fillStyle = creaseL; ctx.fillRect(creaseX - 6, jy, 6, jh);
      // Shadow on right side of crease
      const creaseR = ctx.createLinearGradient(rx, jy, rx + 8, jy);

      ctx.fillStyle = creaseR; ctx.fillRect(rx, jy, 8, jh);

      ctx.fillStyle = "#1a1008"; ctx.fillRect(creaseX, jy, 4, jh);

      // ── Dog-ear bottom-right corner ───────────────────────────────────────
      ctx.fillStyle = "#d0c4a4";

      // ── Page titles ───────────────────────────────────────────────────────
      const leftTitle  = journalTab === 0 ? "Evidence" : journalTab === 1 ? "Ghost List"
                       : (isMobile ? "Mobile Setup" : "Settings");
      const rightTitle = journalTab === 0 ? "Suspects" : journalTab === 1 ? playerGuess : "Key Bindings";
      ctx.font = "italic bold 13px Georgia, serif"; ctx.textAlign = "center";
      ctx.fillStyle = "#2a1a08";
      ctx.fillText(leftTitle,  lx + lw / 2, jy + 28);
      ctx.fillText(rightTitle, rx + rw / 2, jy + 28);
      ctx.strokeStyle = "rgba(60,30,10,0.35)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(lx + 20, jy + 34); ctx.lineTo(lx + lw - 20, jy + 34); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rx + 20, jy + 34); ctx.lineTo(rx + rw - 20, jy + 34); ctx.stroke();

      // =====================================================

      if (journalTab === 0) {
        // Left page: evidence types
        ctx.fillStyle = "#5a3a18"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
        ctx.fillText("click to cycle: blank → ✓ confirmed → ✕ ruled out", lx + 14, jy + 48);

        evidenceTypes.forEach((ev, i) => {
          const cbx = lx + 14, cby = jy + 76 + i * 30;

          const confirmed = state === "confirmed";
          const crossed   = state === "crossed";

          // State box
          ctx.fillStyle = confirmed ? "#2a4a2a" : crossed ? "#4a1a1a" : "#d0c4a8";
          ctx.fillRect(cbx, cby, 14, 14);
          ctx.strokeStyle = confirmed ? "#4a8a4a" : crossed ? "#c04040" : "#8a7050"; ctx.lineWidth = 1;
          ctx.strokeRect(cbx, cby, 14, 14);
          ctx.font = "bold 10px monospace"; ctx.textAlign = "left";
          if (confirmed) { ctx.fillStyle = "#80e080"; ctx.fillText("✓", cbx + 2, cby + 11); }
          if (crossed)   { ctx.fillStyle = "#e08080"; ctx.fillText("✕", cbx + 2, cby + 11); }

          // Label
          ctx.fillStyle = crossed ? "#804040" : confirmed ? "#1a3a1a" : "#3a2810";
          ctx.font = confirmed ? "bold 12px Georgia, serif" : "12px Georgia, serif";
          ctx.textAlign = "left";
          ctx.fillText(ev, cbx + 20, cby + 11);
          if (crossed) {
            ctx.strokeStyle = "rgba(180,60,40,0.55)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(cbx + 20, cby + 6); ctx.lineTo(cbx + 20 + ctx.measureText(ev).width, cby + 6); ctx.stroke();
          }
        });

        // Right page: narrowed suspects list
        const confirmedEvs = Object.keys(evidenceStates).filter(ev => evidenceStates[ev] === "confirmed");
        const crossedEvs   = Object.keys(evidenceStates).filter(ev => evidenceStates[ev] === "crossed");
        ctx.fillStyle = "#5a3a18"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
        ctx.fillText("matching your evidence marks:", rx + 14, jy + 48);

        // 2 columns of 12 on right page
        ghosts.forEach((g, i) => {
          const possible = confirmedEvs.every(ev => g.evidence.includes(ev)) &&
                           crossedEvs.every(ev => !g.evidence.includes(ev));
          const colIdx = i < 12 ? 0 : 1;
          const gcol   = rx + 14 + colIdx * 166;
          const gy     = jy + 62 + (i % 12) * 18;

          if (possible) {
            ctx.fillStyle = "rgba(200,170,60,0.20)";
            ctx.fillRect(gcol - 2, gy - 12, 156, 14);
            ctx.fillStyle = "#1a0e04"; ctx.font = "bold 10px Georgia, serif"; ctx.textAlign = "left";

          } else {
            ctx.fillStyle = "#b0a080"; ctx.font = "10px Georgia, serif"; ctx.textAlign = "left";
            ctx.fillText("  " + g.name, gcol, gy);
            ctx.strokeStyle = "rgba(120,60,40,0.45)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(gcol + 10, gy - 3); ctx.lineTo(gcol + 10 + ctx.measureText(g.name).width, gy - 3); ctx.stroke();
          }
        });
      }

      // =====================================================
      // TAB 1 — Left page: Ghost list  |  Right page: Ghost details
      // =====================================================
      if (journalTab === 1) {
        const entryH = 18;
        const evAbbr = {
          "EMF Level 5":"EMF 5", "Spirit Box":"Spirit Box",
          "Freezing Temperatures":"Freezing", "Ultraviolet":"UV",
          "Ghost Writing":"G.Writing", "Ghost Orb":"G.Orb", "D.O.T.S. Projector":"D.O.T.S.",
        };

        // Left page: all ghosts in one column (from GHOST_REGISTRY)
        ctx.fillStyle = "#5a3a18"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
        ctx.fillText("click to cycle: ★ guess → ✕ ruled out → neutral", lx + 14, jy + 48);

        ghosts.forEach((g, i) => {
          const gx = lx + 14, gy = jy + 58 + i * entryH;
          const isGuess   = playerGuess === g.name;
          const isCrossed = ghostStates[g.name] === "crossed";

          // Row background
          ctx.fillStyle = isGuess   ? "rgba(200,160,40,0.22)" :
                          isCrossed ? "rgba(120,20,20,0.14)" :
                          i % 2 === 0 ? "rgba(80,50,10,0.06)" : "rgba(0,0,0,0)";
          ctx.fillRect(gx - 2, gy, lw - 24, entryH);
          if (isGuess)        { ctx.fillStyle = "#c8a020"; ctx.fillRect(gx - 2, gy, 3, entryH); }
          else if (isCrossed) { ctx.fillStyle = "#c04040"; ctx.fillRect(gx - 2, gy, 3, entryH); }

          ctx.fillStyle = isGuess ? "#7a5010" : isCrossed ? "#804040" : "#2a1204";
          ctx.font = "bold 10px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText((isGuess ? "★ " : "  ") + g.name, gx, gy + 12);
          if (isCrossed) {
            ctx.strokeStyle = "rgba(180,60,40,0.55)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(gx + 14, gy + 7); ctx.lineTo(gx + 14 + ctx.measureText(g.name).width, gy + 7); ctx.stroke();
          }
        });

        // Right page: selected ghost details
        const guessGhost = ghosts.find(g => g.name === playerGuess);
        if (guessGhost) {
          const dx = rx + 18;
          // Name
          ctx.fillStyle = "#2a1204"; ctx.font = "bold 14px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText(guessGhost.name, dx, jy + 55);
          ctx.strokeStyle = "rgba(60,30,10,0.4)"; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(dx, jy + 60); ctx.lineTo(rx + rw - 20, jy + 60); ctx.stroke();

          // Evidence pills
          ctx.fillStyle = "#3a2810"; ctx.font = "italic bold 10px Georgia, serif";
          ctx.fillText("Evidence:", dx, jy + 78);
          guessGhost.evidence.forEach((ev, ei) => {
            const ex = dx, ey = jy + 86 + ei * 18;
            ctx.fillStyle = "rgba(40,80,40,0.20)";
            ctx.fillRect(ex, ey, 120, 13);
            ctx.strokeStyle = "rgba(60,100,60,0.4)"; ctx.lineWidth = 1; ctx.strokeRect(ex, ey, 120, 13);
            ctx.fillStyle = "#1a3a1a"; ctx.font = "10px monospace"; ctx.textAlign = "left";
            ctx.fillText(evAbbr[ev] || ev, ex + 4, ey + 10);
          });

          // Notes (word-wrapped at ~32 chars per line)
          ctx.fillStyle = "#3a2810"; ctx.font = "italic bold 10px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText("Notes:", dx, jy + 152);
          ctx.fillStyle = "#4a3820"; ctx.font = "10px Georgia, serif";
          const words = guessGhost.notes.split(" ");
          let line = "", lineY = jy + 165;
          words.forEach(word => {
            const test = line ? line + " " + word : word;
            if (ctx.measureText(test).width > rw - 36) {
              ctx.fillText(line, dx, lineY); line = word; lineY += 14;
            } else { line = test; }
          });
          if (line) ctx.fillText(line, dx, lineY);

          // Clue hint
          ctx.fillStyle = "#3a2810"; ctx.font = "italic bold 10px Georgia, serif";
          ctx.fillText("Behaviour hint:", dx, jy + 320);
          ctx.fillStyle = "#4a3820"; ctx.font = "italic 10px Georgia, serif";
          ctx.fillText(guessGhost.clue, dx, jy + 334);
        }
      }

      // =====================================================
      // TAB 2 — Left page: Settings / Mobile Setup  |  Right page: Key Bindings
      // =====================================================
      if (journalTab === 2) {

        // ── Left page: MOBILE shows draggable control sliders ────────────
        if (isMobile) {
          // Slider draw helper — geometry must match JOURNAL_SLIDER constants exactly.
          // trackX=58 (lx+14), trackW=308 (lw-50), thumbR=13
          // Row track-center Y: 136, 196, 256  (jy+84, jy+144, jy+204)
          function _mobSlider(label, value, minV, maxV, labelY, trackCY) {
            const tX = lx + 14, tW = lw - 50, tR = 13;
            const frac = (value - minV) / (maxV - minV);
            const thumbX = tX + frac * tW;
            // Label (left) and live value (right)
            ctx.textAlign = "left";
            ctx.fillStyle = "#3a2810"; ctx.font = "italic bold 11px Georgia, serif";
            ctx.fillText(label, tX, labelY);
            ctx.textAlign = "right";
            ctx.fillStyle = "#6a4020"; ctx.font = "bold 11px monospace";
            ctx.fillText(value.toFixed(1), tX + tW, labelY);
            // Track background
            ctx.fillStyle = "#d0c4a8";
            ctx.beginPath(); ctx.roundRect(tX, trackCY - 5, tW, 10, 5); ctx.fill();
            ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(tX, trackCY - 5, tW, 10, 5); ctx.stroke();
            // Track fill (filled portion left of thumb)
            ctx.fillStyle = "#8a6a30";
            ctx.beginPath(); ctx.roundRect(tX, trackCY - 5, frac * tW, 10, 5); ctx.fill();
            // Thumb circle
            ctx.fillStyle = "#c8a850";
            ctx.beginPath(); ctx.arc(thumbX, trackCY, tR, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#7a5020"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(thumbX, trackCY, tR, 0, Math.PI * 2); ctx.stroke();
            // Centre dot
            ctx.fillStyle = "#7a5020";
            ctx.beginPath(); ctx.arc(thumbX, trackCY, 3, 0, Math.PI * 2); ctx.fill();
            ctx.textAlign = "left";
          }

          ctx.fillStyle = "#5a3a18"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText("Drag sliders to resize controls", lx + 14, jy + 52);

          // Row positions: labelY = jy+68/jy+128/jy+188  trackCY = jy+84/jy+144/jy+204
          _mobSlider("Joystick Size", mobJoyScale, 0.6, 1.6, jy + 68,  jy + 84);
          _mobSlider("Button Size",   mobBtnScale, 0.6, 1.6, jy + 128, jy + 144);
          _mobSlider("Opacity",       mobOpacity,  0.3, 1.0, jy + 188, jy + 204);

          // Reset mobile defaults button  (y = jy+238)
          const resetMobX = lx + 14, resetMobY = jy + 238;
          ctx.fillStyle = "#c8b890"; ctx.fillRect(resetMobX, resetMobY, 140, 26);
          ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1; ctx.strokeRect(resetMobX, resetMobY, 140, 26);
          ctx.fillStyle = "#3a1808"; ctx.font = "bold 9px Georgia, serif"; ctx.textAlign = "center";
          ctx.fillText("Reset Defaults", resetMobX + 70, resetMobY + 17);
          ctx.textAlign = "left";

          ctx.fillStyle = "#5a4020"; ctx.font = "italic 9px Georgia, serif";
          ctx.fillText("Left side = joystick", lx + 14, jy + 290);
          ctx.fillText("Right side = buttons (E R ⚡ J Q F G)", lx + 14, jy + 304);
          ctx.fillText("Drag anywhere else to rotate facing.", lx + 14, jy + 318);
          ctx.fillText("Two-finger pinch = zoom in/out.", lx + 14, jy + 332);

        } else {
          // ── Left page: DESKTOP shows flashlight sensitivity ───────────────
          ctx.fillStyle = "#3a2810"; ctx.font = "italic bold 11px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText("Flashlight Sensitivity", lx + 14, jy + 74);
          ctx.fillStyle = "#5a4020"; ctx.font = "10px Georgia, serif";
          ctx.fillText("How quickly your flashlight tracks the cursor.", lx + 14, jy + 90);

          const sbx = lx + 70, sby = jy + 106;
          ctx.fillStyle = "#c8b890"; ctx.fillRect(sbx, sby, 22, 22);
          ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1; ctx.strokeRect(sbx, sby, 22, 22);
          ctx.fillStyle = "#2a1a08"; ctx.font = "bold 14px Georgia, serif"; ctx.textAlign = "center";
          ctx.fillText("−", sbx + 11, sby + 16);

          ctx.fillStyle = "#2a1a08"; ctx.font = "bold 13px Georgia, serif";
          ctx.fillText(sensitivity.toFixed(1) + "×", sbx + 42, sby + 15);

          ctx.fillStyle = "#c8b890"; ctx.fillRect(sbx + 80, sby, 22, 22);
          ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1; ctx.strokeRect(sbx + 80, sby, 22, 22);
          ctx.fillStyle = "#2a1a08"; ctx.font = "bold 14px Georgia, serif";
          ctx.fillText("+", sbx + 91, sby + 16);

          const barX = lx + 14, barY = sby + 34, barW = lw - 40, barH = 10;
          ctx.fillStyle = "#d0c4a8"; ctx.fillRect(barX, barY, barW, barH);
          ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, barH);
          const fill = ((sensitivity - 0.5) / 1.5) * barW;
          ctx.fillStyle = "#8a6a30"; ctx.fillRect(barX, barY, fill, barH);
          ctx.fillStyle = "#5a4020"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText("sluggish", barX, barY + 22);
          ctx.textAlign = "right";
          ctx.fillText("instant", barX + barW, barY + 22);

          ctx.fillStyle = "#5a4020"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText("Low = slow, atmospheric tracking.", lx + 14, jy + 190);
          ctx.fillText("High = flashlight snaps to cursor immediately.", lx + 14, jy + 204);
          ctx.fillText("Default: 1.0", lx + 14, jy + 222);

          const resetBtnX = lx + 14, resetBtnY = jy + 260;
          ctx.fillStyle = "#c8b890"; ctx.fillRect(resetBtnX, resetBtnY, 120, 22);
          ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1; ctx.strokeRect(resetBtnX, resetBtnY, 120, 22);
          ctx.fillStyle = "#3a1808"; ctx.font = "bold 9px Georgia, serif"; ctx.textAlign = "center";
          ctx.fillText("Reset to Defaults", resetBtnX + 60, resetBtnY + 14);
          ctx.textAlign = "left";

          ctx.fillStyle = "#5a4020"; ctx.font = "italic 9px Georgia, serif";
          ctx.fillText("Arrow keys always work regardless of rebinding.", lx + 14, jy + 380);
        }

        // ── Right page: keybindings ──
        // Rebindable entries (click to reassign)
        const actionDefs = [
          { key:"up",         label:"Move Up"       },
          { key:"down",       label:"Move Down"     },
          { key:"left",       label:"Move Left"     },
          { key:"right",      label:"Move Right"    },
          { key:"sprint",     label:"Sprint"        },
          { key:"interact",   label:"Interact (E)"  },
          { key:"flashlight", label:"Flashlight"    },
          { key:"journal",    label:"Open Journal"  },
          { key:"drop",       label:"Drop Item"     },
          { key:"place",      label:"Place/Preview" },
          { key:"inventory",  label:"Cycle Item"    },
          { key:"use",        label:"Use / Toggle"  },
        ];
        // Fixed (non-rebindable) entries shown below a divider
        const fixedDefs = [
          { fixedKey: "Q",         label:"Lighter / 4th Slot"  },
          { fixedKey: "+ / -",     label:"Zoom In / Out"       },
          { fixedKey: "N",         label:"Night Vision (cam)"  },
          { fixedKey: "← →",       label:"Cycle CCTV Camera"   },
          { fixedKey: "ESC",       label:"Close Menu / Exit"   },
          { fixedKey: "R (board)", label:"Open Ouija Board"    },
          { fixedKey: "R (doll)",  label:"Open Voodoo Doll"    },

        ctx.fillStyle = "#5a3a18"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
        ctx.fillText("click a row to rebind — then press any key", rx + 14, jy + 48);

        // Clip the list area so rows don't bleed into the bottom hint
        const listTop = jy + 62;
        const listH   = jh - 62 - 22; // leave 22px for bottom hint
        ctx.save();
        ctx.beginPath();
        ctx.rect(rx + 10, listTop, rw - 14, listH);
        ctx.clip();
        ctx.translate(0, -journalKeybindScrollY);

        const ROW_H = 26;
        let rowIdx = 0;

        actionDefs.forEach((a) => {
          const bry = listTop + rowIdx * ROW_H + 4;
          const isRebinding = rebindingAction === a.key;
          ctx.fillStyle = isRebinding ? "rgba(200,160,40,0.25)" : (rowIdx % 2 === 0 ? "rgba(80,50,10,0.07)" : "rgba(0,0,0,0)");
          ctx.fillRect(rx + 14, bry, rw - 28, ROW_H - 2);
          if (isRebinding) { ctx.fillStyle = "#c8a020"; ctx.fillRect(rx + 14, bry, 3, ROW_H - 2); }
          ctx.fillStyle = isRebinding ? "#7a5010" : "#3a2810";
          ctx.font = "11px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText(a.label, rx + 22, bry + 14);
          const keyStr = isRebinding ? "press any key..." : "[" + keybinds[a.key] + "]";
          ctx.fillStyle = isRebinding ? "#c8a020" : "#5a7a5a";
          ctx.font = isRebinding ? "italic 10px Georgia, serif" : "bold 10px monospace";
          ctx.textAlign = "right";
          ctx.fillText(keyStr, rx + rw - 20, bry + 14);
          rowIdx++;
        });

        // Divider before fixed keys
        const divY = listTop + rowIdx * ROW_H + 6;
        ctx.fillStyle = "rgba(80,50,10,0.25)";
        ctx.fillRect(rx + 20, divY, rw - 40, 1);
        ctx.fillStyle = "#8a6a3a"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
        ctx.fillText("fixed keys (not rebindable)", rx + 22, divY + 10);
        rowIdx += 1;

        fixedDefs.forEach((a) => {
          const bry = listTop + rowIdx * ROW_H + 4;
          ctx.fillStyle = rowIdx % 2 === 0 ? "rgba(80,50,10,0.04)" : "rgba(0,0,0,0)";
          ctx.fillRect(rx + 14, bry, rw - 28, ROW_H - 2);
          ctx.fillStyle = "#5a3a18"; ctx.font = "11px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText(a.label, rx + 22, bry + 14);
          ctx.fillStyle = "#7a5a30"; ctx.font = "bold 10px monospace"; ctx.textAlign = "right";
          ctx.fillText("[" + a.fixedKey + "]", rx + rw - 20, bry + 14);
          rowIdx++;
        });

        // Clamp scroll to content
        const totalContentH = rowIdx * ROW_H + 20;
        journalKeybindScrollY = Math.min(journalKeybindScrollY, Math.max(0, totalContentH - listH));

        ctx.restore();

        // Scroll indicator bar (right edge of right page)
        if (totalContentH > listH) {
          const barX = rx + rw - 6, barY = listTop, barH = listH;
          ctx.fillStyle = "rgba(80,50,10,0.15)";
          ctx.fillRect(barX, barY, 4, barH);
          const thumbH = Math.max(20, barH * (listH / totalContentH));
          const thumbY = barY + (journalKeybindScrollY / (totalContentH - listH)) * (barH - thumbH);
          ctx.fillStyle = "rgba(100,70,20,0.5)";
          ctx.beginPath(); ctx.roundRect(barX, thumbY, 4, thumbH, 2); ctx.fill();
        }
      }

      // ── Log Out button (bottom-left of left page, Options tab only) ─────
      _journalLogoutBtnRect = null;
      if (journalTab === 2 && activeProfile) {
        const lbX = lx + 14, lbY = jy + jh - 38, lbW = 100, lbH = 24;
        const lbHov = _titleMx >= lbX && _titleMx <= lbX+lbW && _titleMy >= lbY && _titleMy <= lbY+lbH;
        ctx.fillStyle = lbHov ? "#5a1008" : "#3a0c06";
        ctx.fillRect(lbX, lbY, lbW, lbH);
        ctx.strokeStyle = lbHov ? "#c03020" : "#7a2010"; ctx.lineWidth = 1;
        ctx.strokeRect(lbX+0.5, lbY+0.5, lbW-1, lbH-1);
        ctx.fillStyle = lbHov ? "#f08060" : "#c04030";
        ctx.font = "bold 9px Georgia, serif"; ctx.textAlign = "center";
        ctx.fillText("Log Out", lbX + lbW/2, lbY + 15);
        _journalLogoutBtnRect = { x: lbX, y: lbY, w: lbW, h: lbH };
      }

      // ── Confirm popup (drawn on top of everything) ─────────────────────
      _journalLogoutYesRect = null;
      _journalLogoutNoRect  = null;
      if (_journalLogoutConfirm) {
        const pw = 220, ph = 110;
        const px = canvas.width/2 - pw/2, py = canvas.height/2 - ph/2;
        // Backdrop
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(20, 28, 736, 520);
        // Card
        ctx.fillStyle = "#f0e8d0"; ctx.fillRect(px, py, pw, ph);
        ctx.strokeStyle = "#8a4020"; ctx.lineWidth = 1.5;
        ctx.strokeRect(px+0.5, py+0.5, pw-1, ph-1);
        // Header stripe
        ctx.fillStyle = "#3a0c06"; ctx.fillRect(px, py, pw, 28);
        ctx.fillStyle = "#f08060"; ctx.font = "bold 10px Georgia, serif"; ctx.textAlign = "center";
        ctx.fillText("LOG OUT", px + pw/2, py + 18);
        // Message
        ctx.fillStyle = "#3a2010"; ctx.font = "11px Georgia, serif";
        ctx.fillText("Are you sure you want to log out?", px + pw/2, py + 50);
        ctx.fillStyle = "#7a4020"; ctx.font = "italic 9px Georgia, serif";
        ctx.fillText(activeProfile ? activeProfile.username : "", px + pw/2, py + 64);
        // Buttons
        const btnY = py + ph - 30, btnH = 22;
        const noX  = px + 20,  noW  = 80;
        const yesX = px + pw - 100, yesW = 80;
        // NO
        ctx.fillStyle = "#d8cdb8"; ctx.fillRect(noX, btnY, noW, btnH);
        ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1; ctx.strokeRect(noX+0.5, btnY+0.5, noW-1, btnH-1);
        ctx.fillStyle = "#3a2010"; ctx.font = "bold 9px Georgia, serif";
        ctx.fillText("Cancel", noX + noW/2, btnY + 14);
        _journalLogoutNoRect = { x: noX, y: btnY, w: noW, h: btnH };
        // YES
        ctx.fillStyle = "#8a1a0a"; ctx.fillRect(yesX, btnY, yesW, btnH);
        ctx.strokeStyle = "#c04020"; ctx.lineWidth = 1; ctx.strokeRect(yesX+0.5, btnY+0.5, yesW-1, btnH-1);
        ctx.fillStyle = "#f0b090"; ctx.font = "bold 9px Georgia, serif";
        ctx.fillText("Log Out", yesX + yesW/2, btnY + 14);
        _journalLogoutYesRect = { x: yesX, y: btnY, w: yesW, h: btnH };
        ctx.textAlign = "left";
      }

      // ── Bottom hints ──────────────────────────────────────────────────────
      ctx.textAlign = "center"; ctx.font = "italic 10px Georgia, serif"; ctx.fillStyle = "#8a7050";

    // ── Menu screens ─────────────────────────────────────────────────────────
    // menuPhase "title"     → drawMenuTitle()       haunted identity screen
    // menuPhase "corkboard" → drawMenuCorkboard()   one fullscreen board at a time
    //
    // Clickable rects stored each frame: _titleStartRect, _titleBeginRect,
    // _titleMapRects, _titleNavLeft, _titleNavRight

    function _tsBoard(x, y, w, h, label) {
      // Drop shadow
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(x+5, y+5, w, h);
      // Outer wood frame
      ctx.fillStyle = "#2a1804";
      ctx.fillRect(x, y, w, h);
      // Cork fill
      ctx.fillStyle = "#8c6430";
      ctx.fillRect(x+4, y+4, w-8, h-8);
      // Cork grain (diagonal stripes clipped to board interior)
      ctx.save();
      ctx.beginPath(); ctx.rect(x+4, y+4, w-8, h-8); ctx.clip();
      ctx.strokeStyle = "rgba(90,50,10,0.13)"; ctx.lineWidth = 1;
      for (let gi = -(h); gi < w+h; gi += 9) {
        ctx.beginPath();
        ctx.moveTo(x+4+gi, y+4);
        ctx.lineTo(x+4+gi+h, y+4+h-8);
        ctx.stroke();
      }
      ctx.restore();
      // Label tape strip
      ctx.fillStyle = "#160e04";
      ctx.fillRect(x+4, y+4, w-8, 24);
      ctx.strokeStyle = "#3a2408"; ctx.lineWidth = 1.5;
      ctx.strokeRect(x+4.5, y+28.5, w-9, 1); // label bottom edge
      ctx.fillStyle = "#c8a050";
      ctx.font = "bold 8px monospace";
      ctx.textAlign = "center";
      ctx.fillText(label, x + w/2, y + 19);
      ctx.textAlign = "left";
      // Thin inner bevel
      ctx.strokeStyle = "rgba(200,160,80,0.08)"; ctx.lineWidth = 1;
      ctx.strokeRect(x+4.5, y+4.5, w-9, h-9);
    }

    // Draw a paper note pinned to the corkboard. lines = [{text, bold, size, color}]
    function _tsNote(x, y, w, lines) {
      const lh = 13, pad = 8;
      const h = pad*2 + lines.length * lh;
      // Drop shadow
      ctx.fillStyle = "rgba(0,0,0,0.28)";
      ctx.fillRect(x+2, y+3, w, h);
      // Paper
      ctx.fillStyle = "#ede0c2";
      ctx.fillRect(x, y, w, h);
      // Ruled lines
      ctx.strokeStyle = "rgba(180,150,100,0.22)"; ctx.lineWidth = 0.5;
      for (let li = y + pad + lh; li < y+h-2; li += lh) {
        ctx.beginPath(); ctx.moveTo(x+5, li); ctx.lineTo(x+w-5, li); ctx.stroke();
      }
      // Paper border
      ctx.strokeStyle = "#b09060"; ctx.lineWidth = 0.8;
      ctx.strokeRect(x+0.5, y+0.5, w-1, h-1);
      // Red thumbtack
      ctx.fillStyle = "#c82020";
      ctx.beginPath(); ctx.arc(x+w/2, y-1, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(255,100,100,0.4)";
      ctx.beginPath(); ctx.arc(x+w/2-1, y-2, 2, 0, Math.PI*2); ctx.fill();
      // Text
      ctx.textAlign = "center";
      for (let i = 0; i < lines.length; i++) {
        const ln = lines[i];
        ctx.font = (ln.bold ? "bold " : "") + (ln.size || 9) + "px Georgia, serif";
        ctx.fillStyle = ln.color || "#2a1808";
        ctx.fillText(ln.text, x + w/2, y + pad + i*lh + lh - 3);
      }
      ctx.textAlign = "left";
    }

    const MAP_REGISTRY = [
      { id: 0, name: "1st Roseboosh Street", sub: "12 rooms · Medium", playable: true },
      { id: 1, name: "???",                  sub: "Coming Soon",        playable: false },
      { id: 2, name: "???",                  sub: "Coming Soon",        playable: false },

    function _drawPolaroidThumbnail(px, py, pw, ph, playable) {
      ctx.save();
      ctx.beginPath(); ctx.rect(px, py, pw, ph); ctx.clip();

      if (playable) {
        // ── Front exterior of 1st Roseboosh Street ──

        // Sky: deep night gradient
        const skyGrad = ctx.createLinearGradient(px, py, px, py + ph * 0.62);
        skyGrad.addColorStop(0,   "#06080e");
        skyGrad.addColorStop(0.5, "#0c1020");
        skyGrad.addColorStop(1,   "#14182c");
        ctx.fillStyle = skyGrad; ctx.fillRect(px, py, pw, ph);

        // Stars
        ctx.fillStyle = "rgba(255,255,240,0.7)";
        const stars = [[12,6],[28,11],[45,4],[62,9],[75,5],[88,13],[100,7],[115,3],[125,10],[19,18],[54,15],[82,19],[108,14]];
        for (const [sx, sy] of stars) {
          const rx = px + sx * (pw/132), ry = py + sy * (ph/138);
          if (rx < px+pw && ry < py + ph*0.5) ctx.fillRect(rx, ry, 1, 1);
        }

        // Ground / lawn
        const groundY = py + ph * 0.76;
        const lawnGrad = ctx.createLinearGradient(px, groundY, px, py + ph);
        lawnGrad.addColorStop(0, "#0c1408");
        lawnGrad.addColorStop(1, "#08100a");
        ctx.fillStyle = lawnGrad; ctx.fillRect(px, groundY, pw, ph - (groundY - py));

        // Driveway (left side, converges toward bottom)
        ctx.fillStyle = "#181a18";
        ctx.beginPath();
        ctx.moveTo(px + pw*0.10, groundY);
        ctx.lineTo(px + pw*0.40, groundY);
        ctx.lineTo(px + pw*0.55, py + ph);
        ctx.lineTo(px,           py + ph);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "rgba(80,80,60,0.3)"; ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(px + pw*0.24, groundY + 2);
        ctx.lineTo(px + pw*0.26, py + ph);
        ctx.stroke();

        // House body
        const houseX = px + pw*0.05, houseY = py + ph*0.38;
        const houseW = pw*0.90,      houseH = groundY - houseY;
        ctx.fillStyle = "#2a2420"; ctx.fillRect(houseX, houseY, houseW, houseH);
        // Siding lines
        ctx.strokeStyle = "rgba(255,220,160,0.04)"; ctx.lineWidth = 0.8;
        for (let hy = houseY + 4; hy < groundY; hy += 5) {
          ctx.beginPath(); ctx.moveTo(houseX, hy); ctx.lineTo(houseX + houseW, hy); ctx.stroke();
        }

        // Main roof gable
        const rpX = houseX + houseW*0.42, rpY = py + ph*0.13;
        ctx.fillStyle = "#1c1810";
        ctx.beginPath();
        ctx.moveTo(houseX - pw*0.02, houseY + 1);
        ctx.lineTo(rpX,              rpY);
        ctx.lineTo(houseX + houseW + pw*0.02, houseY + 1);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "#3a3028"; ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(houseX - pw*0.02, houseY + 1); ctx.lineTo(rpX, rpY);
        ctx.lineTo(houseX + houseW + pw*0.02, houseY + 1); ctx.stroke();

        // Garage wing (left, lower)
        const garX = houseX, garY = houseY + houseH*0.22, garW = houseW*0.36, garH = houseH*0.78;
        ctx.fillStyle = "#242018"; ctx.fillRect(garX, garY, garW, garH);
        ctx.fillStyle = "#1a1612";
        ctx.beginPath();
        ctx.moveTo(garX - pw*0.01,    garY);
        ctx.lineTo(garX + garW*0.46,  py + ph*0.23);
        ctx.lineTo(garX + garW + pw*0.01, garY);
        ctx.closePath(); ctx.fill();

        // Garage door panels
        const gdX = garX + garW*0.07, gdY = garY + garH*0.10;
        const gdW = garW*0.86,        gdH = garH*0.76;
        ctx.fillStyle = "#302820"; ctx.fillRect(gdX, gdY, gdW, gdH);
        ctx.strokeStyle = "#4a3828"; ctx.lineWidth = 0.8;
        ctx.strokeRect(gdX+0.5, gdY+0.5, gdW-1, gdH-1);
        ctx.beginPath(); ctx.moveTo(gdX + gdW/2, gdY); ctx.lineTo(gdX + gdW/2, gdY + gdH); ctx.stroke();
        for (let p = 1; p < 4; p++) {
          const gy = gdY + gdH * p/4;
          ctx.beginPath(); ctx.moveTo(gdX, gy); ctx.lineTo(gdX + gdW, gy); ctx.stroke();
        }

        // Front door
        const fdX = houseX + houseW*0.54, fdY = houseY + houseH*0.26;
        const fdW = houseW*0.13,          fdH = houseH*0.74;
        ctx.fillStyle = "#3a2010"; ctx.fillRect(fdX, fdY, fdW, fdH);
        ctx.strokeStyle = "#5a3820"; ctx.lineWidth = 0.8;
        ctx.strokeRect(fdX+0.5, fdY+0.5, fdW-1, fdH-1);
        // Door window
        ctx.fillStyle = "rgba(180,150,60,0.20)"; ctx.fillRect(fdX + fdW*0.18, fdY + fdH*0.08, fdW*0.64, fdH*0.28);
        ctx.strokeStyle = "#6a5030"; ctx.lineWidth = 0.5;
        ctx.strokeRect(fdX + fdW*0.18, fdY + fdH*0.08, fdW*0.64, fdH*0.28);

        // Porch light — warm amber glow above door
        const plX = fdX + fdW/2, plY = fdY - 3;
        const pGlow = ctx.createRadialGradient(plX, plY, 0, plX, plY, pw * 0.24);
        pGlow.addColorStop(0,   "rgba(255,200,80,0.40)");
        pGlow.addColorStop(0.35,"rgba(255,160,40,0.16)");
        pGlow.addColorStop(1,   "rgba(255,100,0,0)");
        ctx.fillStyle = pGlow; ctx.fillRect(px, py, pw, ph);
        ctx.fillStyle = "#ffd060";
        ctx.beginPath(); ctx.arc(plX, plY, 2.5, 0, Math.PI*2); ctx.fill();

        // Windows — flanking the door
        const winH = houseH*0.28, winW = houseW*0.12, winY = houseY + houseH*0.26;
        const winXs = [houseX + houseW*0.08, houseX + houseW*0.25, houseX + houseW*0.72, houseX + houseW*0.84];
        for (let wi = 0; wi < winXs.length; wi++) {
          const wx = winXs[wi];
          if (wx + winW > houseX + houseW) continue;
          const lit = wi < 2; // left windows slightly lit
          ctx.fillStyle = lit ? "rgba(180,140,60,0.20)" : "#181410";
          ctx.fillRect(wx, winY, winW, winH);
          ctx.strokeStyle = "#5a4830"; ctx.lineWidth = 0.8;
          ctx.strokeRect(wx+0.5, winY+0.5, winW-1, winH-1);
          ctx.beginPath(); ctx.moveTo(wx + winW/2, winY); ctx.lineTo(wx + winW/2, winY+winH); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(wx, winY + winH/2); ctx.lineTo(wx+winW, winY + winH/2); ctx.stroke();
        }

        // Vignette
        const vig = ctx.createRadialGradient(px+pw/2, py+ph/2, pw*0.2, px+pw/2, py+ph/2, pw*0.8);
        vig.addColorStop(0, "rgba(0,0,0,0)");
        vig.addColorStop(1, "rgba(0,0,0,0.48)");
        ctx.fillStyle = vig; ctx.fillRect(px, py, pw, ph);

      } else {
        // Coming soon: dark photo with question mark
        ctx.fillStyle = "#181210"; ctx.fillRect(px, py, pw, ph);
        ctx.textAlign = "center";
        ctx.fillStyle = "#3a2818"; ctx.font = "bold 32px Georgia";
        ctx.fillText("?", px + pw/2, py + ph/2 + 10);
        ctx.fillStyle = "#5a3820"; ctx.font = "7px monospace";
        ctx.fillText("COMING SOON", px + pw/2, py + ph - 8);
      }

      ctx.restore();
    }

    function _drawBlueThumbtack(cx, cy) {
      // Pin head
      ctx.fillStyle = "#1050b8";
      ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
      // Highlight
      ctx.fillStyle = "#6090e8";
      ctx.beginPath(); ctx.arc(cx - 2.5, cy - 2.5, 3, 0, Math.PI*2); ctx.fill();
      // Stem
      ctx.strokeStyle = "#0a3080"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(cx, cy + 8); ctx.lineTo(cx, cy + 14); ctx.stroke();
    }

    function _drawPageMap(bx, by, bw, bh) {
      const PAD = 28;
      const cx = bx + PAD, cy = by + PAD, cw = bw - PAD*2;

      _tsNote(cx, cy + 8, 290, [
        { text: "Choose your investigation site.", bold: false, size: 10 },
        { text: "5 locations · 1 available now.", size: 8, color: "#7a6040" },
      ]);

      // Layout area below the pinned note
      const areaX = cx, areaY = cy + 72, areaW = cw, areaH = bh - PAD - 72 - PAD;

      // Polaroid dimensions
      const PW = 148, PH = 180;   // full polaroid size
      const PHOTO_H = PH - 42;    // photo image area height (bottom strip = 42px)

      // 4 corner positions for the map photos
      const corners = [
        { x: areaX + 20,              y: areaY + 20 },               // top-left  → Roseboosh (id 0)
        { x: areaX + areaW - PW - 20, y: areaY + 20 },               // top-right → coming soon (id 1)
        { x: areaX + 20,              y: areaY + areaH - PH - 20 },   // bot-left  → coming soon (id 2)
        { x: areaX + areaW - PW - 20, y: areaY + areaH - PH - 20 },   // bot-right → coming soon (id 3)
      ];

      // Center Random option (slightly smaller, distinct look)
      const RW = 140, RH = 160, RPHOTO_H = RH - 42;
      const randX = areaX + areaW/2 - RW/2;
      const randY = areaY + areaH/2 - RH/2;

      _titleMapRects = [];

      // ── Draw center RANDOM option ──
      const randSel = _selectedMapId === 4;
      const randHov = _titleMx >= randX && _titleMx <= randX+RW && _titleMy >= randY && _titleMy <= randY+RH;
      ctx.fillStyle = "rgba(0,0,0,0.28)"; ctx.fillRect(randX+4, randY+5, RW, RH);
      ctx.fillStyle = randSel ? "#ede5d0" : (randHov ? "#e8e0cc" : "#e0d8c0");
      ctx.fillRect(randX, randY, RW, RH);
      // Photo area
      ctx.fillStyle = "#201808"; ctx.fillRect(randX+8, randY+8, RW-16, RPHOTO_H-8);
      ctx.textAlign = "center";
      ctx.fillStyle = "#5a4020"; ctx.font = "bold 28px Georgia";
      ctx.fillText("?", randX + RW/2, randY + (RPHOTO_H-8)/2 + 10);
      ctx.fillStyle = "#8a6040"; ctx.font = "bold 7px monospace";
      ctx.fillText("RANDOM", randX + RW/2, randY + (RPHOTO_H-8)/2 + 24);
      // Label strip
      ctx.fillStyle = "#2a1808"; ctx.font = "bold 10px monospace";
      ctx.fillText("RANDOM", randX + RW/2, randY + RPHOTO_H + 14);
      ctx.fillStyle = "#9a7850"; ctx.font = "7px monospace";
      ctx.fillText("surprise location", randX + RW/2, randY + RPHOTO_H + 27);
      // Border
      ctx.strokeStyle = randSel ? "#3070c8" : (randHov ? "#b09050" : "#908060");
      ctx.lineWidth = randSel ? 2.5 : 1.5;
      ctx.strokeRect(randX+0.5, randY+0.5, RW-1, RH-1);
      if (randSel) _drawBlueThumbtack(randX + RW/2, randY + 8);
      _titleMapRects.push({ id: 4, x: randX, y: randY, w: RW, h: RH });

      // ── Draw 4 corner polaroids ──
      for (let i = 0; i < MAP_REGISTRY.length; i++) {
        const map = MAP_REGISTRY[i];
        const px = corners[i].x, py = corners[i].y;
        const isSel = _selectedMapId === map.id;
        const isHov = !map.playable ? false : (_titleMx >= px && _titleMx <= px+PW && _titleMy >= py && _titleMy <= py+PH);

        // Drop shadow
        ctx.fillStyle = "rgba(0,0,0,0.35)"; ctx.fillRect(px+4, py+5, PW, PH);
        // Polaroid body
        ctx.fillStyle = isSel ? "#f5f0e0" : (isHov ? "#f0ead8" : (map.playable ? "#eee8d4" : "#ddd5be"));
        ctx.fillRect(px, py, PW, PH);

        // Photo area
        _drawPolaroidThumbnail(px+8, py+8, PW-16, PHOTO_H-8, map.playable);

        // Label strip (bottom of polaroid)
        ctx.textAlign = "center";
        if (!map.playable) {
          ctx.fillStyle = "#9a8060"; ctx.font = "bold 9px monospace";
          ctx.fillText("???", px + PW/2, py + PHOTO_H + 14);
          ctx.fillStyle = "#b09070"; ctx.font = "7px monospace";
          ctx.fillText("coming soon", px + PW/2, py + PHOTO_H + 28);
        } else {
          ctx.fillStyle = "#2a1808"; ctx.font = "bold 9px monospace";
          // Wrap long name across 2 lines if needed
          const words = map.name.split(" ");
          const mid = Math.ceil(words.length / 2);
          const line1 = words.slice(0, mid).join(" ");
          const line2 = words.slice(mid).join(" ");
          if (line2) {
            ctx.fillText(line1, px + PW/2, py + PHOTO_H + 11);
            ctx.fillText(line2, px + PW/2, py + PHOTO_H + 22);
            ctx.fillStyle = "#7a6040"; ctx.font = "7px monospace";
            ctx.fillText(map.sub, px + PW/2, py + PHOTO_H + 34);
          } else {
            ctx.fillText(map.name, px + PW/2, py + PHOTO_H + 14);
            ctx.fillStyle = "#7a6040"; ctx.font = "7px monospace";
            ctx.fillText(map.sub, px + PW/2, py + PHOTO_H + 27);
          }
        }

        // Border — blue tint if selected, muted if locked
        ctx.strokeStyle = isSel ? "#3070c8" : (isHov ? "#c09040" : (map.playable ? "#a09060" : "#6a5040"));
        ctx.lineWidth = isSel ? 2.5 : 1.5;
        ctx.strokeRect(px+0.5, py+0.5, PW-1, PH-1);

        // Blue thumbtack on selected
        if (isSel) _drawBlueThumbtack(px + PW/2, py + 8);

        // Only playable maps are clickable
        if (map.playable) _titleMapRects.push({ id: map.id, x: px, y: py, w: PW, h: PH });
      }

      ctx.textAlign = "left";
    }

        function _drawPageShop(bx, by, bw, bh) {
      // ── Truck loadout monitor ──────────────────────────────────────────────
      const MX = bx, MY = by, MW = bw, MH = bh;

      // ── Bezel ──
      ctx.fillStyle = "#111214";
      ctx.fillRect(MX, MY, MW, MH);
      ctx.strokeStyle = "#252830"; ctx.lineWidth = 2;
      ctx.strokeRect(MX + 1, MY + 1, MW - 2, MH - 2);
      ctx.strokeStyle = "#2e3240"; ctx.lineWidth = 1;
      ctx.strokeRect(MX + 6, MY + 6, MW - 12, MH - 12);

      // ── Screen area ──
      const SX = MX + 8, SY = MY + 8, SW = MW - 16, SH = MH - 16;
      const screenBg = ctx.createLinearGradient(SX, SY, SX, SY + SH);
      screenBg.addColorStop(0, "#080c10"); screenBg.addColorStop(0.5, "#090e12"); screenBg.addColorStop(1, "#070b0e");
      ctx.fillStyle = screenBg; ctx.fillRect(SX, SY, SW, SH);

      ctx.save();
      ctx.beginPath(); ctx.rect(SX, SY, SW, SH); ctx.clip();
      ctx.strokeStyle = "rgba(0,200,255,0.018)"; ctx.lineWidth = 1;
      for (let sl = SY; sl < SY + SH; sl += 4) { ctx.beginPath(); ctx.moveTo(SX, sl); ctx.lineTo(SX + SW, sl); ctx.stroke(); }
      const vigGrad = ctx.createRadialGradient(SX+SW/2, SY+SH/2, SW*0.3, SX+SW/2, SY+SH/2, SW*0.75);
      vigGrad.addColorStop(0, "rgba(0,0,0,0)"); vigGrad.addColorStop(1, "rgba(0,0,0,0.30)");
      ctx.fillStyle = vigGrad; ctx.fillRect(SX, SY, SW, SH);
      ctx.restore();

      // ── Header bar ──
      const HDR_H = 32;
      ctx.fillStyle = "#0c1218"; ctx.fillRect(SX, SY, SW, HDR_H);
      ctx.strokeStyle = "#1e6080"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(SX, SY + HDR_H); ctx.lineTo(SX + SW, SY + HDR_H); ctx.stroke();
      ctx.fillStyle = "#1e8ab0"; ctx.fillRect(SX, SY, 3, HDR_H);
      ctx.textAlign = "left";
      ctx.fillStyle = "#a8d8f0"; ctx.font = "bold 11px monospace";
      ctx.fillText("PHANTOM RESPONSE UNIT", SX + 14, SY + 13);
      ctx.fillStyle = "#3a7090"; ctx.font = "9px monospace";

      ctx.textAlign = "right";
      ctx.fillStyle = "#2a6080"; ctx.font = "8px monospace";
      ctx.fillText("UNIT #001", SX + SW - 10, SY + 20);

      // ── Layout ──
      const NAV_W  = 100;

      const NAV_TABS = [
        { tab: "shop",      label: "SHOP"      },

          ctx.fillStyle = act ? "#90d0f0" : "#2a5060";

          const nameY = PANEL_Y + 8 + ICON_SZ + 13;

        } else {

      } else if (_truckTab === "truck") {
        // ── TRUCK TAB — list LEFT, preview RIGHT ─────────────────────────────

      } else if (_truckTab === "layout") {

        const PREV_W  = Math.floor(CONT_W * 0.42);
        const LIST_W  = CONT_W - PREV_W - 1;
        const LIST_X  = CONT_X;
        const PREV_X  = CONT_X + LIST_W + 1;
        const MAX_QTY = 4;
        const curPreset  = _layoutPresets[_layoutSlot];

            ctx.font = (isAct ? "bold " : "") + "8px monospace"; ctx.textAlign = "center";

            _layoutRowRects.push({ idx: ci, type: "lvl", lvl: li + 1, x: lx, y: ry + 5, w: lvlSlotW - 1, h: ROW_H - 10 });
          }
        }
        ctx.restore();

        if (TRUCK_CATALOG.length > TVIS) {
          const sbH    = BODY_H - THDR;
          const thumbH = Math.max(16, sbH * TVIS / TRUCK_CATALOG.length);
          const thumbY = TROW_Y0 + (_truckListScroll / (TRUCK_CATALOG.length - TVIS)) * (sbH - thumbH);
          ctx.fillStyle = "#0e0804"; ctx.fillRect(LIST_X + LIST_W - 5, TROW_Y0, 5, sbH);
          ctx.fillStyle = "#4a2808"; ctx.fillRect(LIST_X + LIST_W - 4, thumbY, 3, thumbH);
        }

        // Vertical divider
        ctx.strokeStyle = "#3a2010"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(PREV_X, BODY_Y); ctx.lineTo(PREV_X, BODY_Y + BODY_H); ctx.stroke();

        // ── RIGHT: preset slot selector + action buttons ───────────────────
        const PX = PREV_X + 1;
        const PW = PREV_W - 1;
        _layoutSlotRects     = [];
        _layoutSaveBtnRect   = null;
        _layoutActiveBtnRect = null;

        ctx.fillStyle = "#0e0a04"; ctx.fillRect(PX, BODY_Y, PW, THDR);
        ctx.fillStyle = "#4a2808"; ctx.font = "bold 8px monospace"; ctx.textAlign = "left";
        ctx.fillText("PRESET SLOTS", PX + 8, BODY_Y + 14);
        ctx.strokeStyle = "#3a2010"; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(PX, BODY_Y + THDR); ctx.lineTo(PX + PW, BODY_Y + THDR); ctx.stroke();

        // A / B / C slot buttons
        const SLOT_Y     = BODY_Y + THDR + 8;
        const SLOT_BTN_W = Math.floor((PW - 24) / 3);
        const SLOT_BTN_H = 32;
        for (let si = 0; si < 3; si++) {
          const sx    = PX + 8 + si * (SLOT_BTN_W + 4);
          const isAct = si === _layoutSlot;
          ctx.fillStyle = isAct ? "#2a1804" : "#100a04";
          ctx.fillRect(sx, SLOT_Y, SLOT_BTN_W, SLOT_BTN_H);
          ctx.strokeStyle = isAct ? "#c87820" : "#3a1a08"; ctx.lineWidth = isAct ? 1 : 0.5;
          ctx.strokeRect(sx + 0.5, SLOT_Y + 0.5, SLOT_BTN_W - 1, SLOT_BTN_H - 1);
          ctx.textAlign = "center";
          ctx.fillStyle = isAct ? L_BRIGHT : "#5a3010";
          ctx.font = "bold 14px monospace";
          ctx.fillText(["A","B","C"][si], sx + SLOT_BTN_W / 2, SLOT_Y + 20);
          if (si === _layoutActive) {
            ctx.fillStyle = "#70c020";
            ctx.beginPath(); ctx.arc(sx + SLOT_BTN_W - 6, SLOT_Y + 6, 3, 0, Math.PI*2); ctx.fill();
          }
          const p = _layoutPresets[si];
          ctx.fillStyle = p ? "#7a5020" : "#2a1408"; ctx.font = "6px monospace";
          ctx.fillText(p ? p.length + " items" : "empty", sx + SLOT_BTN_W / 2, SLOT_Y + SLOT_BTN_H - 5);
          _layoutSlotRects.push({ slot: si, x: sx, y: SLOT_Y, w: SLOT_BTN_W, h: SLOT_BTN_H });
        }

        // SAVE button
        const saveY = SLOT_Y + SLOT_BTN_H + 10;
        const savW  = PW - 16;
        ctx.fillStyle = "#1a1206"; ctx.fillRect(PX + 8, saveY, savW, 24);
        ctx.strokeStyle = "#6a3a10"; ctx.lineWidth = 0.5;
        ctx.strokeRect(PX + 8.5, saveY + 0.5, savW - 1, 23);
        ctx.fillStyle = "#b06020"; ctx.font = "bold 8px monospace"; ctx.textAlign = "center";
        ctx.fillText("SAVE LOADOUT \u2192 PRESET " + slotLabel, PX + 8 + savW / 2, saveY + 15);
        _layoutSaveBtnRect = { x: PX + 8, y: saveY, w: savW, h: 24 };

        // LOAD AS ACTIVE button
        const actY            = saveY + 30;
        const isLoadedActive  = _layoutActive === _layoutSlot && curPreset !== null;
        ctx.fillStyle = isLoadedActive ? "#0a1a06" : "#080e06";
        ctx.fillRect(PX + 8, actY, savW, 24);
        ctx.strokeStyle = isLoadedActive ? "#4a8010" : "#2a3808"; ctx.lineWidth = 0.5;
        ctx.strokeRect(PX + 8.5, actY + 0.5, savW - 1, 23);
        ctx.fillStyle = isLoadedActive ? "#90c040" : (curPreset ? "#3a6010" : "#2a1408");
        ctx.font = "bold 8px monospace"; ctx.textAlign = "center";
        ctx.fillText(isLoadedActive ? "\u2713 ACTIVE LOADOUT" : (curPreset ? "LOAD AS ACTIVE" : "SLOT EMPTY"), PX + 8 + savW / 2, actY + 15);
        _layoutActiveBtnRect = { x: PX + 8, y: actY, w: savW, h: 24 };

        // Active indicator line
        const indY = actY + 32;
        ctx.textAlign = "left"; ctx.fillStyle = "#2a1808"; ctx.font = "7px monospace";
        if (_layoutActive >= 0 && _layoutPresets[_layoutActive]) {
          ctx.fillText("Active: Preset " + ["A","B","C"][_layoutActive] + " (" + _layoutPresets[_layoutActive].length + " items)", PX + 8, indY);
        } else {
          ctx.fillText("Active: Default loadout", PX + 8, indY);
        }

        // Hint lines
        ctx.fillStyle = "#2a1406"; ctx.font = "7px monospace";
        const hintLines = ["Build a loadout for this slot,", "then LOAD it to use it when", "the round starts."];
        let hintY = indY + 18;
        for (const hl of hintLines) { ctx.fillText(hl, PX + 8, hintY); hintY += 11; }
      } else {
        // ── CHARACTER tab ──
        const cy2 = BODY_Y + BODY_H / 2;
        ctx.textAlign = "center";
        ctx.fillStyle = "#2a5060"; ctx.font = "bold 13px monospace";
        ctx.fillText("COMING SOON", CONT_X + CONT_W/2, cy2);
        ctx.strokeStyle = "#1a3a50"; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(CONT_X + CP*3, cy2 + 10); ctx.lineTo(CONT_X + CONT_W - CP*3, cy2 + 10); ctx.stroke();
        ctx.fillStyle = "#1a3040"; ctx.font = "8px monospace";
        ctx.fillText("Character customization and perks.", CONT_X + CONT_W/2, cy2 + 26);
      }
      ctx.restore();

      // ── Footer bar ──
      ctx.fillStyle = "#080c10"; ctx.fillRect(SX, FOO_Y, SW, 26);
      ctx.strokeStyle = "#1a3a50"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(SX, FOO_Y); ctx.lineTo(SX + SW, FOO_Y); ctx.stroke();
      ctx.textAlign = "center";
      ctx.fillStyle = "#1e4860"; ctx.font = "8px monospace";
      ctx.fillText("SHOP UNLOCKS WITH PROGRESSION  \u00b7  CURRENT LOADOUT: DEFAULT", SX + SW/2, FOO_Y + 16);

      // Screen inner border
      ctx.strokeStyle = "#1a2a38"; ctx.lineWidth = 1;
      ctx.strokeRect(SX + 0.5, SY + 0.5, SW - 1, SH - 1);

      ctx.textAlign = "left";
    }


    // ── Board content: XP / PROFILE / START (fullscreen) ───────────────────
    function _drawPageProfile(bx, by, bw, bh) {
      // Layout constants
      const PAD     = 20;
      const RIGHT_W = Math.floor(bw * 0.35);   // right column — item list
      const LEFT_W  = bw - RIGHT_W - PAD * 2;  // left area — polaroid + id card + button
      const SPLIT_X = bx + LEFT_W + PAD;

      // ── MAP DISPLAY — top-left area ────────────────────────────────────────
      const selectedMap = MAP_REGISTRY.find(m => m.id === _selectedMapId) || MAP_REGISTRY[0];
      const PW = 162, PH = 190;  // polaroid — noticeably larger
      const polX = bx + PAD, polY = by + PAD + 4;

      // Polaroid frame
      ctx.fillStyle = "rgba(0,0,0,0.30)";
      ctx.fillRect(polX + 4, polY + 5, PW, PH);
      ctx.fillStyle = "#f5f0e0";
      ctx.fillRect(polX, polY, PW, PH);
      const IMG_H = PH - 38;
      _drawPolaroidThumbnail(polX + 6, polY + 6, PW - 12, IMG_H, selectedMap.playable);
      ctx.fillStyle = "#e8dfc8";
      ctx.fillRect(polX + 6, polY + 6 + IMG_H, PW - 12, PH - IMG_H - 12);
      ctx.fillStyle = "#3a2810"; ctx.font = "bold 10px Georgia, serif"; ctx.textAlign = "center";
      ctx.fillText(selectedMap.name, polX + PW/2, polY + PH - 10);
      ctx.textAlign = "left";
      _drawBlueThumbtack(polX + PW/2, polY - 2);

      // Map name large text to the right of polaroid
      const mapNameX = polX + PW + 20;
      const mapNameY = polY + 36;
      ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.font = "bold 28px Georgia, serif";
      ctx.fillText(selectedMap.name, mapNameX + 1, mapNameY + 1);
      ctx.fillStyle = "#2a1808"; ctx.font = "bold 28px Georgia, serif";
      ctx.fillText(selectedMap.name, mapNameX, mapNameY);
      ctx.fillStyle = "#7a5830"; ctx.font = "13px Georgia, serif";
      ctx.fillText(selectedMap.sub, mapNameX, mapNameY + 22);
      ctx.strokeStyle = "#b09060"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(mapNameX, mapNameY + 30); ctx.lineTo(mapNameX + LEFT_W - PW - 36, mapNameY + 30); ctx.stroke();

      // ── ID CARD — below polaroid ───────────────────────────────────────────
      const CARD_X = bx + PAD;
      const CARD_Y = polY + PH + 28;
      const CARD_W = Math.min(LEFT_W - PAD * 2, 380);
      const CARD_H = 160;

      ctx.fillStyle = "rgba(0,0,0,0.32)";
      ctx.fillRect(CARD_X + 3, CARD_Y + 4, CARD_W, CARD_H);
      const cardBg = ctx.createLinearGradient(CARD_X, CARD_Y, CARD_X, CARD_Y + CARD_H);
      cardBg.addColorStop(0, "#e8dfc8"); cardBg.addColorStop(1, "#d8cc9a");
      ctx.fillStyle = cardBg; ctx.fillRect(CARD_X, CARD_Y, CARD_W, CARD_H);
      ctx.strokeStyle = "#9a7a40"; ctx.lineWidth = 1;
      ctx.strokeRect(CARD_X + 0.5, CARD_Y + 0.5, CARD_W - 1, CARD_H - 1);
      // Red header bar
      ctx.fillStyle = "#8a1010"; ctx.fillRect(CARD_X, CARD_Y, CARD_W, 22);
      ctx.fillStyle = "#f0d0c0"; ctx.font = "bold 10px monospace"; ctx.textAlign = "center";
      ctx.fillText("PHANTOM RESPONSE UNIT  —  AGENT ID", CARD_X + CARD_W/2, CARD_Y + 15);
      ctx.textAlign = "left";

      // Photo box — clickable portrait selector
      const PHOTO_SZ = 96;
      const photoX = CARD_X + 14, photoY = CARD_Y + 30;
      _photoRect = { x: photoX, y: photoY, w: PHOTO_SZ, h: PHOTO_SZ };

      // ── 6 portrait definitions ─────────────────────────────────────────────
      // Order: white male, black male, asian male, white female, black female, asian female
      // hairStyle: "short"|"long"|"afro"|"bob"|"ponytail"
      // gender: "m"|"f"  (f = narrower shoulders)
      // shirt: hex color of the t-shirt
      const PORTRAITS = [
        // 0 — White male, short brown hair, hazel eyes, grey shirt
        { skin:"#e8c8a0", hair:"#7a4820", hairStyle:"short",    eyeColor:"#6a5030", shirt:"#787870", bgTop:"#607078", bgBot:"#404858", gender:"m" },
        // 1 — Black male, short black hair, dark brown eyes, navy shirt
        { skin:"#6a3818", hair:"#180e08", hairStyle:"short",    eyeColor:"#2a1408", shirt:"#283040", bgTop:"#485060", bgBot:"#283040", gender:"m" },
        // 2 — Asian male, short black hair, dark eyes, olive shirt
        { skin:"#d4a060", hair:"#181010", hairStyle:"short",    eyeColor:"#281808", shirt:"#505840", bgTop:"#586070", bgBot:"#383848", gender:"m" },
        // 3 — White female, long brown hair, green eyes, dusty rose shirt
        { skin:"#f0d0a8", hair:"#8a4820", hairStyle:"long",     eyeColor:"#486040", shirt:"#906878", bgTop:"#607880", bgBot:"#405060", gender:"f" },
        // 4 — Black female, afro, dark brown eyes, teal shirt
        { skin:"#5a2e10", hair:"#100808", hairStyle:"afro",     eyeColor:"#2a1008", shirt:"#306860", bgTop:"#485870", bgBot:"#283848", gender:"f" },
        // 5 — Asian female, bob, dark eyes, lavender shirt
        { skin:"#d8b080", hair:"#181010", hairStyle:"bob",      eyeColor:"#282018", shirt:"#786888", bgTop:"#586878", bgBot:"#384858", gender:"f" },
      ];

      const _drawPortrait = (px, py, sz, p) => {
        const isFem = p.gender === "f";
        // Female head sits a touch higher to give hair more room
        const pcx = px + sz/2;
        const hY  = py + Math.floor(sz * (isFem ? 0.31 : 0.34));

        // Background
        const pbg = ctx.createLinearGradient(px, py, px, py + sz);
        pbg.addColorStop(0, p.bgTop); pbg.addColorStop(1, p.bgBot);
        ctx.fillStyle = pbg; ctx.fillRect(px, py, sz, sz);
        const pvig = ctx.createRadialGradient(pcx, py+sz*0.6, sz*0.1, pcx, py+sz*0.6, sz*0.72);
        pvig.addColorStop(0,"rgba(0,0,0,0)"); pvig.addColorStop(1,"rgba(0,0,0,0.3)");
        ctx.fillStyle = pvig; ctx.fillRect(px, py, sz, sz);

        // T-shirt body + shoulders (female narrower, neck higher)
        const sw  = isFem ? 24 : 32;
        const neckW = isFem ? 6 : 7;
        ctx.fillStyle = p.shirt;
        ctx.beginPath();
        ctx.moveTo(px, py+sz);
        ctx.lineTo(px, py+sz-8);
        ctx.quadraticCurveTo(pcx-sw-4, py+sz-22, pcx-sw, hY+30);
        ctx.quadraticCurveTo(pcx-sw+2, hY+22, pcx-12, hY+28);
        ctx.lineTo(pcx-neckW, hY+20);
        ctx.quadraticCurveTo(pcx, hY+24, pcx+neckW, hY+20);
        ctx.lineTo(pcx+12, hY+28);
        ctx.quadraticCurveTo(pcx+sw-2, hY+22, pcx+sw, hY+30);
        ctx.quadraticCurveTo(pcx+sw+4, py+sz-22, px+sz, py+sz-8);
        ctx.lineTo(px+sz, py+sz);
        ctx.closePath(); ctx.fill();

        // Neck — slimmer for female
        ctx.fillStyle = p.skin;
        ctx.beginPath(); ctx.roundRect(pcx-neckW, hY+15, neckW*2, 14, 2); ctx.fill();

        // Head — female slightly narrower/more oval
        const hw = p.hairStyle==="afro" ? 20 : (isFem ? 19 : 21);
        const hh = isFem ? 22 : 24;
        ctx.fillStyle = p.skin;
        ctx.beginPath(); ctx.ellipse(pcx, hY, hw, hh, 0, 0, Math.PI*2); ctx.fill();

        // Ears — smaller on female
        const earW = isFem ? 3.5 : 4, earH = isFem ? 5 : 6;
        ctx.beginPath(); ctx.ellipse(pcx-hw, hY+2, earW, earH, -0.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(pcx+hw, hY+2, earW, earH,  0.2, 0, Math.PI*2); ctx.fill();

        // ── Hair ──
        ctx.fillStyle = p.hair;
        if (p.hairStyle === "short") {
          // Male short
          ctx.beginPath(); ctx.ellipse(pcx, hY-12, 21, 14, 0, Math.PI, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(pcx-18,hY-4,6,10,-0.5,Math.PI*0.8,Math.PI*1.6); ctx.fill();
          ctx.beginPath(); ctx.ellipse(pcx+18,hY-4,6,10, 0.5,Math.PI*1.4,Math.PI*2.2); ctx.fill();
        } else if (p.hairStyle === "afro") {
          // Larger, rounder afro for female
          ctx.beginPath(); ctx.ellipse(pcx, hY-14, isFem?28:26, isFem?26:22, 0, 0, Math.PI*2); ctx.fill();
          // Cover ears for fullness
          ctx.beginPath(); ctx.ellipse(pcx-22,hY+2,8,14,0,0,Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(pcx+22,hY+2,8,14,0,0,Math.PI*2); ctx.fill();
        } else if (p.hairStyle === "bob") {
          // Clean chin-length bob: top cap + smooth side curtains
          ctx.beginPath(); ctx.ellipse(pcx, hY-11, 20, 14, 0, Math.PI, Math.PI*2); ctx.fill();
          // Left curtain — smooth ellipse angled slightly forward
          ctx.beginPath(); ctx.ellipse(pcx-19, hY+6, 5, 17, -0.15, 0, Math.PI*2); ctx.fill();
          // Right curtain
          ctx.beginPath(); ctx.ellipse(pcx+19, hY+6, 5, 17,  0.15, 0, Math.PI*2); ctx.fill();
          // Bottom fill to connect curtains cleanly
          ctx.beginPath(); ctx.ellipse(pcx, hY+20, 18, 5, 0, 0, Math.PI*2); ctx.fill();
        } else if (p.hairStyle === "long") {
          // Top cap
          ctx.beginPath(); ctx.ellipse(pcx, hY-12, 20, 14, 0, Math.PI, Math.PI*2); ctx.fill();
          // Side flow — wider, more tapered ellipses
          ctx.beginPath(); ctx.ellipse(pcx-21, hY+14, 6, 26, -0.1, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(pcx+21, hY+14, 6, 26,  0.1, 0, Math.PI*2); ctx.fill();
          // Bottom wave — curved bottom instead of hard rect
          ctx.beginPath();
          ctx.moveTo(pcx-22, hY+36);
          ctx.quadraticCurveTo(pcx-10, hY+42, pcx, hY+40);
          ctx.quadraticCurveTo(pcx+10, hY+38, pcx+22, hY+42);
          ctx.lineTo(pcx+22, hY+28); ctx.lineTo(pcx-22, hY+28);
          ctx.closePath(); ctx.fill();
        }

        // ── Eyebrows — thinner/arched for female ──
        ctx.strokeStyle = p.hair; ctx.lineCap = "round";
        if (isFem) {
          ctx.lineWidth = 1.2;
          // Arched: start lower, peak in middle, end lower
          ctx.beginPath(); ctx.moveTo(pcx-13,hY-7); ctx.quadraticCurveTo(pcx-9,hY-11,pcx-5,hY-8); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(pcx+5, hY-8); ctx.quadraticCurveTo(pcx+9, hY-11,pcx+13,hY-7); ctx.stroke();
        } else {
          ctx.lineWidth = 1.8;
          ctx.beginPath(); ctx.moveTo(pcx-14,hY-8); ctx.lineTo(pcx-6,hY-10); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(pcx+6,hY-10); ctx.lineTo(pcx+14,hY-8); ctx.stroke();
        }

        // ── Eyes — slightly larger/more open for female ──
        const eyeW = isFem ? 5.5 : 5;
        const eyeH = isFem ? 4.0 : 3.5;
        ctx.fillStyle = "#f0ece0";
        ctx.beginPath(); ctx.ellipse(pcx-9,hY-3,eyeW,eyeH,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(pcx+9,hY-3,eyeW,eyeH,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = p.eyeColor;
        ctx.beginPath(); ctx.arc(pcx-9,hY-3,2.8,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(pcx+9,hY-3,2.8,0,Math.PI*2); ctx.fill();
        // Eyelashes hint (top arc, female only)
        if (isFem) {
          ctx.strokeStyle = p.hair; ctx.lineWidth = 1; ctx.lineCap = "round";
          ctx.beginPath(); ctx.ellipse(pcx-9,hY-3,eyeW,eyeH,0,Math.PI,Math.PI*2); ctx.stroke();
          ctx.beginPath(); ctx.ellipse(pcx+9,hY-3,eyeW,eyeH,0,Math.PI,Math.PI*2); ctx.stroke();
        }
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.beginPath(); ctx.arc(pcx-8,hY-4,1,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(pcx+10,hY-4,1,0,Math.PI*2); ctx.fill();

        // ── Nose — smaller, softer for female ──
        const noseTone = p.skin.replace(/[0-9a-f]{2}$/i, m => Math.max(0,parseInt(m,16)-28).toString(16).padStart(2,"0"));
        ctx.strokeStyle = noseTone; ctx.lineCap = "round";
        if (isFem) {
          ctx.lineWidth = 0.9;
          ctx.beginPath(); ctx.moveTo(pcx,hY+1); ctx.lineTo(pcx-2,hY+6); ctx.lineTo(pcx+2,hY+6); ctx.stroke();
        } else {
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(pcx,hY-1); ctx.lineTo(pcx-3,hY+6); ctx.lineTo(pcx+3,hY+6); ctx.stroke();
        }

        // ── Mouth — fuller/defined lips for female ──
        if (isFem) {
          const lipTone = p.skin.replace(/[0-9a-f]{2}$/i, m => Math.max(0,parseInt(m,16)-50).toString(16).padStart(2,"0"));
          // Upper lip bow
          ctx.strokeStyle = lipTone; ctx.lineWidth = 1.2; ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(pcx-6, hY+12);
          ctx.quadraticCurveTo(pcx-3, hY+10, pcx, hY+11);
          ctx.quadraticCurveTo(pcx+3, hY+10, pcx+6, hY+12);
          ctx.stroke();
          // Lower lip fuller curve
          ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(pcx-6,hY+12); ctx.quadraticCurveTo(pcx,hY+16,pcx+6,hY+12); ctx.stroke();
        } else {
          ctx.strokeStyle = p.skin.replace(/[0-9a-f]{2}$/i, m => Math.max(0,parseInt(m,16)-40).toString(16).padStart(2,"0"));
          ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(pcx-7,hY+12); ctx.quadraticCurveTo(pcx,hY+14,pcx+7,hY+12); ctx.stroke();
        }

        // Border
        ctx.strokeStyle = "#9a7a40"; ctx.lineWidth = 0.5;
        ctx.strokeRect(px+0.5, py+0.5, sz-1, sz-1);

        // "click to change" hint
        ctx.fillStyle = "rgba(255,255,255,0.38)"; ctx.font = "7px monospace"; ctx.textAlign = "center";
        ctx.fillText("click to change", pcx, py+sz-4);
        ctx.textAlign = "left";
      };

      _drawPortrait(photoX, photoY, PHOTO_SZ, PORTRAITS[_agentPortrait]);

      // Agent info right of photo
      const infoX = photoX + PHOTO_SZ + 16, infoY = CARD_Y + 36;
      ctx.fillStyle = "#2a1808"; ctx.font = "bold 14px Georgia, serif";
      ctx.fillText("AGENT  #0001", infoX, infoY);
      ctx.fillStyle = "#5a3820"; ctx.font = "11px Georgia, serif";
      ctx.fillText("Rank:  Rookie", infoX, infoY + 18);
      ctx.fillStyle = "#7a5830"; ctx.font = "10px Georgia, serif";
      ctx.fillText("Investigations:  0", infoX, infoY + 34);

      // XP bar
      const barX = infoX, barY = infoY + 54;
      const barW = CARD_W - (PHOTO_SZ + 44);
      const xpPct = playerXPNext > 0 ? Math.min(playerXP / playerXPNext, 1) : 0;
      ctx.fillStyle = "#3a2010"; ctx.font = "bold 10px monospace"; ctx.textAlign = "left";
      ctx.fillText("Level " + playerLevel, barX, barY - 4);

    // ════════════════════════════════════════════════════════════════════
    // LOCAL PROFILE SYSTEM — localStorage, djb2 hash, multi-profile
    // ════════════════════════════════════════════════════════════════════
    const PRU_PROFILES_KEY  = "pru_profiles_v1";
    const PRU_LASTUSER_KEY  = "pru_last_user";
    const PRU_SESSION_KEY   = "pru_active_session"; // auto-login: stores logged-in username key

    function _profHashPass(s) {
      let h = 5381;
      for (let i = 0; i < s.length; i++) h = Math.imul((h << 5) + h, 1) + s.charCodeAt(i) | 0;
      return (h >>> 0).toString(16).padStart(8, "0");
    }
    function _profLoadAll() {
      try { return JSON.parse(localStorage.getItem(PRU_PROFILES_KEY) || "{}"); } catch { return {}; }
    }
    function _profSaveAll(p) {
      try { localStorage.setItem(PRU_PROFILES_KEY, JSON.stringify(p)); } catch {}
    }
    function _profDefaultData(username) {
      return { username, passwordHash: "", level: 1, xp: 0, xpNext: 500,
               money: 0, investigations: 0, truckLoadout: [],
               layoutPresets: [null, null, null], layoutSlot: 0, layoutActive: -1,
               createdAt: Date.now() };
    }
    function _profApply(data) {
      activeProfile = data;
      playerLevel  = data.level  ?? 1;
      playerXP     = data.xp     ?? 0;
      playerXPNext = data.xpNext ?? 500;
      playerMoney  = data.money  ?? 0;
      // Restore layout presets for this profile
      _layoutPresets = (data.layoutPresets ?? [null, null, null]).map(p => p ? p.map(e => ({ ...e })) : null);
      _layoutSlot    = data.layoutSlot   ?? 0;
      _layoutActive  = data.layoutActive ?? -1;
    }

    // Persist layout state back to the active profile in localStorage
    function _profSaveLayout() {
      if (!activeProfile) return;
      activeProfile.layoutPresets = _layoutPresets.map(p => p ? p.map(e => ({ ...e })) : null);
      activeProfile.layoutSlot    = _layoutSlot;
      activeProfile.layoutActive  = _layoutActive;
      const all = _profLoadAll();
      const key = activeProfile.username.toLowerCase();
      if (all[key]) { all[key] = { ...all[key], ...activeProfile }; _profSaveAll(all); }
    }
    function _profLogin(username, password) {
      if (!username.trim()) return "Username cannot be empty.";
      if (!password)         return "Password cannot be empty.";
      const all = _profLoadAll(), key = username.trim().toLowerCase();
      if (!all[key]) return "No profile found for that username.";
      if (all[key].passwordHash !== _profHashPass(password)) return "Incorrect password.";
      _profApply(all[key]);
      try { localStorage.setItem(PRU_LASTUSER_KEY, key); } catch {}
      try { localStorage.setItem(PRU_SESSION_KEY,  key); } catch {}
      return null;
    }
    function _profCreate(username, password, confirm) {
      const name = username.trim();
      // ── Username validation ────────────────────────────────────────────
      if (!name)                          return "Username cannot be empty.";
      if (name.length < 3)                return "Username must be at least 3 characters.";
      if (name.length > 16)               return "Username must be 16 characters or fewer.";
      if (!/^[A-Za-z0-9_]+$/.test(name)) return "Only letters, numbers, and _ are allowed.";
      // ── Password validation ────────────────────────────────────────────
      if (!password)            return "Password cannot be empty.";
      if (password.length < 4) return "Password must be at least 4 characters.";
      if (password !== confirm) return "Passwords do not match.";
      const all = _profLoadAll(), key = name.toLowerCase();
      if (all[key]) return "That username is already taken.";
      const data = _profDefaultData(name);
      data.passwordHash = _profHashPass(password);
      all[key] = data;
      _profSaveAll(all);
      _profApply(data);
      try { localStorage.setItem(PRU_LASTUSER_KEY, key); } catch {}
      try { localStorage.setItem(PRU_SESSION_KEY,  key); } catch {}
      return null;
    }
    function _profSubmit() {
      _profError = "";
      const err = _profPhase === "login"
        ? _profLogin(_profUser, _profPass)
        : _profCreate(_profUser, _profPass, _profConfirm);
      if (err) { _profError = err; return; }
      menuPhase = "corkboard"; titleScreenActive = true;
    }

      const vig = ctx.createRadialGradient(W/2,H/2,H*0.1,W/2,H/2,H*0.78);
      vig.addColorStop(0,"rgba(0,0,0,0)"); vig.addColorStop(1,"rgba(0,0,0,0.72)");

      // Info lines below emblem
      const infoLines = [
        { text: "LOCAL PROFILE SYSTEM",       bold: true,  color: "#8a6030", size: 12 },
        { text: "Create or log in to your",   bold: false, color: "#5a3820", size: 11 },

      ];
      let infoLY = BODY_Y + 184;
      for (const ln of infoLines) {

      ctx.fillStyle = "#3a2010"; ctx.font = "8px monospace"; ctx.textAlign = "center";
      ctx.fillText("LOCAL SAVE · MULTI-PROFILE", LC_X+LC_W/2, BODY_Y+BODY_H-14);

      // ── RIGHT COLUMN: form ────────────────────────────────────────────────
      const RC_X = COL_DIV + R_PAD, RC_W = CX + CW - COL_DIV - R_PAD - 20;
      _profBtnRects = [];

      // Tab switcher
      const TW = Math.floor(RC_W/2) - 5, TH = 40, TY = BODY_Y + 22;

    // ── drawMenuTitle: haunted identity / start screen ────────────────────────
    function drawIntro() {
      const W = canvas.width, H = canvas.height;

      // Advance phase timer
      _introT += 1 / 60; // ~60fps assumption; good enough for a simple fade
      const dur = INTRO_DUR[_introPhase] || 0.6;

      // Compute alpha for current phase
      if (_introPhase === 0) {           // "Haunted" fade-in
        _introAlpha = Math.min(1, _introT / dur);
      } else if (_introPhase === 1) {    // hold at full opacity
        _introAlpha = 1;
      } else if (_introPhase === 2) {    // "Haunted" fade-out
        _introAlpha = Math.max(0, 1 - _introT / dur);
      } else if (_introPhase === 3) {    // "Ryan's" fade-in
        _introAlpha = Math.min(1, _introT / dur);
      } else if (_introPhase === 4) {    // hold
        _introAlpha = 1;
      } else if (_introPhase === 5) {    // "Ryan's" fade-out
        _introAlpha = Math.max(0, 1 - _introT / dur);
      }

      // Advance to next phase when timer expires
      if (_introT >= dur) {
        _introT = 0;
        _introPhase++;
        if (_introPhase >= 6) {
          // Intro done — route based on auth state determined at startup
          menuPhase = _introPostAuth || "profile";
          titleScreenActive = (menuPhase !== "profile");
          return;
        }
      }

      // Draw
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      ctx.globalAlpha = _introAlpha;
      ctx.textAlign = "center";

      if (_introPhase < 3) {
        // ── "Haunted" full title card (no start button) ─────────────────
        // Scan-line grain
        ctx.strokeStyle = `rgba(140,80,20,${0.045 * _introAlpha})`; ctx.lineWidth = 1;
        for (let gy = 0; gy < H; gy += 9) {
          ctx.beginPath();
          ctx.moveTo(0, gy + Math.sin(gy*0.14)*1.5);
          ctx.lineTo(W, gy + Math.sin(gy*0.14+1.6)*1.5);
          ctx.stroke();
        }
        // Radial vignette
        const vig = ctx.createRadialGradient(W/2, H/2, H*0.18, W/2, H/2, H*0.85);
        vig.addColorStop(0, "rgba(0,0,0,0)");
        vig.addColorStop(1, `rgba(0,0,0,${0.82 * _introAlpha})`);
        ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

        // Decorative rules
        ctx.strokeStyle = `rgba(180,130,40,${0.18 * _introAlpha})`; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(60, 130); ctx.lineTo(W-60, 130); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(60, 420); ctx.lineTo(W-60, 420); ctx.stroke();

        // Case file line
        ctx.fillStyle = `rgba(106,88,40,${_introAlpha})`;
        ctx.font = "9px monospace"; ctx.textAlign = "center";
        ctx.fillText("CASE FILE  #0001  ·  PARANORMAL INVESTIGATION UNIT", W/2, 116);

        // Production credit
        ctx.fillStyle = `rgba(120,100,60,${0.55 * _introAlpha})`;
        ctx.font = "8px monospace";
        ctx.fillText("A  RYAN  GAME  CO.  PRODUCTION", W/2, 96);

        // Main title glow
        ctx.shadowColor = `rgba(232,201,80,${0.6 * _introAlpha})`; ctx.shadowBlur = 36;
        ctx.fillStyle = `rgba(240,216,112,${_introAlpha})`;
        ctx.font = "bold 72px Georgia, serif";
        ctx.fillText("HAUNTED", W/2, 224);

        const teeth = 14, toothH = 11, toothW = 0.16;
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        for (let i = 0; i < teeth; i++) {
          const a0 = (i / teeth) * Math.PI * 2 - Math.PI / 2;
          const a1 = a0 + toothW;
          const a2 = a0 + Math.PI / teeth - toothW;
          const a3 = a0 + Math.PI / teeth;
          ctx.arc(cx, cy, R - toothH, a0, a1);
          ctx.lineTo(cx + Math.cos(a1) * R, cy + Math.sin(a1) * R);
          ctx.lineTo(cx + Math.cos(a2) * R, cy + Math.sin(a2) * R);
          ctx.arc(cx, cy, R - toothH, a2, a3);
        }
        ctx.closePath(); ctx.fill();

        // Clock face — dark fill + double ring
        const IR = R - toothH - 3;
        ctx.fillStyle = "#111";

        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(cx, cy, IR, 0, Math.PI * 2); ctx.stroke();
        ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.arc(cx, cy, IR - 6, 0, Math.PI * 2); ctx.stroke();

        // Hour tick marks
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5;
        for (let t = 0; t < 12; t++) {
          const ta = (t / 12) * Math.PI * 2 - Math.PI / 2;
          const isTick = (t % 3 === 0);
          const r1 = IR - 8, r2 = IR - (isTick ? 18 : 12);
          ctx.lineWidth = isTick ? 2 : 1.2;
          ctx.beginPath();
          ctx.moveTo(cx + Math.cos(ta) * r1, cy + Math.sin(ta) * r1);
          ctx.lineTo(cx + Math.cos(ta) * r2, cy + Math.sin(ta) * r2);
          ctx.stroke();
        }

        // Hour hand (~10 o'clock)
        const hAngle = -Math.PI * 0.6;
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 4; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(hAngle) * (IR * 0.52), cy + Math.sin(hAngle) * (IR * 0.52));
        ctx.stroke();

        // Minute hand (~2 o'clock)
        const mAngle = Math.PI * 0.18;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(mAngle) * (IR * 0.72), cy + Math.sin(mAngle) * (IR * 0.72));
        ctx.stroke();
        ctx.lineCap = "butt";

        // Center dot
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();

        // ── "KAIRO" text ──
        ctx.fillStyle = "#fff";
        ctx.font = "bold 58px Georgia, serif";
        ctx.fillText("KAIRO", W / 2, cy + R + 32);

        ctx.letterSpacing = "0px";

    }
