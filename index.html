        "Ghost Orb",
        "Ghost Writing",
      ],
      notes: "DEBUG GHOST — triggers all evidence, spawns in Foyer, never roams. Set DEBUG_GHOST=false to remove.",
    };

    // --- Ghost system helpers ---

    // Developer-only debug log (only fires when DEBUG_GHOST is true)
    function ghostLog(...args) {
      if (DEBUG_GHOST) console.log("[GHOST]", ...args);
    }

    // Per-round special state (Mimic current form, Thaye age, Twins anchors, etc.)
    let ghostSpecialState = {};

    function setupGhostSpecialState(ghost) {
      ghostSpecialState = {};
      if (!ghost || !ghost.specialRules) return;
      const rules = ghost.specialRules;

      if (rules.includes("copy_random_ghost")) {
        // Mimic: pick a random ghost from the registry (not itself) to copy
        const pool = GHOST_REGISTRY.filter(g => g.name !== ghost.name);
        ghostSpecialState.mimicTarget = pool[Math.floor(Math.random() * pool.length)];
        ghostLog("Mimic is copying:", ghostSpecialState.mimicTarget.name);
      }
      if (rules.includes("ages_over_time")) {
        // Thaye: age 0 = most aggressive; 10 = most passive
        ghostSpecialState.thayeAge = 0;
        ghostSpecialState.thayeAgeTimer = 0;
        ghostLog("Thaye starts at age 0 (most aggressive)");
      }
      if (rules.includes("dual_presence")) {
        // Twins: decoy anchor + hunt anchor (positions assigned at round start, set after spawn)
        ghostSpecialState.twinsReady = false;
        ghostLog("Twins: dual anchor mode pending room assignment");
      }
    }

    // Build a ghost's effective behavior by merging defaults + per-ghost overrides
    function getGhostBehavior(ghost) {
      return Object.assign({}, GHOST_BEHAVIOR_DEFAULTS, ghost.behavior || {});
    }

    // Select the ghost for this round — respects GHOST_CONFIG flags
    function selectGhostForRound() {
      // forceUltimateGhost wins over everything
      if (GHOST_CONFIG.forceUltimateGhost) {
        ghostLog("Config: forceUltimateGhost=true — using Ultimate Ghost");
        return ultimateGhost;
      }
      // Normal roster disabled — fall back to Ultimate Ghost (safe default)
      if (!GHOST_CONFIG.enableNormalGhostRoster) {
        ghostLog("Config: enableNormalGhostRoster=false — defaulting to Ultimate Ghost");
        return ultimateGhost;
      }
      // Normal roster is live — pick from registry
      const pool = GHOST_CONFIG.removeUltimateGhostFromLiveRounds
        ? GHOST_REGISTRY
        : [...GHOST_REGISTRY, ultimateGhost];
      const chosen = pool[Math.floor(Math.random() * pool.length)];
      ghostLog("Round ghost selected:", chosen.name, "| evidence:", chosen.evidence.join(", "));
      return chosen;
    }

    function pickGhost() {
      currentGhost = selectGhostForRound();
      ghostLog("pickGhost() assigned:", currentGhost.name);

      const interior = rooms.filter(r => r.w >= 80 && r.h >= 80 && r.w < 400 && r.h < 400);
      ghostFavRoom = interior[Math.floor(Math.random() * interior.length)] || rooms[0];

      ghostX = ghostFavRoom.x + ghostFavRoom.w / 2;
      ghostY = ghostFavRoom.y + ghostFavRoom.h / 2;
      ghostTargetX = ghostX; ghostTargetY = ghostY;
      ghostMoveAngle = Math.PI / 2;
      ghostPauseTimer = 1.5;
      ghostWalkCycle  = 0;
      ghostEventTimer = 10 + Math.random() * 8;

      // Ghost Orbs — spawn inside the ghost's favorite room if the ghost has this evidence.
      // Ultimate Ghost always has Ghost Orb, so orbs are always present during debug testing.
      ghostOrbs = [];
      const hasOrb = currentGhost.evidence.includes("Ghost Orb") || currentGhost.mimicFakeOrb;
      if (hasOrb && ghostFavRoom) {
        const orbCount = 4;
        // Bias spawn toward the center of the room so orbs start in a clearly visible area
        const cx = ghostFavRoom.x + ghostFavRoom.w / 2;
        const cy = ghostFavRoom.y + ghostFavRoom.h / 2;
        const spread = Math.min(ghostFavRoom.w, ghostFavRoom.h) * 0.25; // 25% of smaller dim
        for (let i = 0; i < orbCount; i++) {
          ghostOrbs.push({
            x: cx + (Math.random() - 0.5) * spread * 2,
            y: cy + (Math.random() - 0.5) * spread * 2,
            vx: (Math.random() - 0.5) * 0.15,
            vy: (Math.random() - 0.5) * 0.15,
            flicker: 0.9,            // start fully bright
            flickerTarget: 0.9,      // initialise target so lerp works from frame 1
            flickerTimer: 0.5 + Math.random() * 1.5,
          });
        }
        console.log(`[ORBS] Spawned ${orbCount} orbs in ${ghostFavRoom.label || "room"} at (${Math.round(cx)},${Math.round(cy)})`);
      } else {
        console.log(`[ORBS] No orbs — hasOrb=${hasOrb}, ghostFavRoom=${!!ghostFavRoom}, evidence=${currentGhost.evidence.join(",")}`);
      }

      setupGhostSpecialState(currentGhost);
    }

    // --- Notebook ---

    // --- Input ---
    const keys = {};
    document.addEventListener("keydown", e => {
      const moveKeys = ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight", keybinds.up, keybinds.down, keybinds.left, keybinds.right];
      if (moveKeys.includes(e.key)) e.preventDefault(); // stop page scroll/default
      keys[e.key] = true;
      keys[e.key.toLowerCase()] = true; // lowercase alias so "Shift" → keys["shift"]
    });
    document.addEventListener("keyup", e => {
      keys[e.key] = false;
      keys[e.key.toLowerCase()] = false;
      // G released while Video Camera preview active — commit or cancel
      if (e.key.toLowerCase() === keybinds.drop && placementPreview.active) {
        if (placementPreview.valid && inventory[selectedSlot] === "Video Camera") {
          const snap = placementPreview.snapTarget;
          if (snap && snap.type === "tripod") {
            // Attach to tripod — no new worldItem; update tripod's mountedCamera slot
            snap.ref.mountedCamera       = "Video Camera";
            snap.ref.cameraFacing        = placementPreview.angle;
          } else {
            // Place on furniture surface — centered on the surface
            const newItem = { name: "Video Camera",
                              x: placementPreview.x - 6, y: placementPreview.y - 6,
                              facing: placementPreview.angle, active: false,
                              placedOn: "furniture" };
            worldItems.push(newItem);
          }
          inventory.splice(selectedSlot, 1);
          if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
          heldItemOn = false; heldItemUsing = false;
        }
        placementPreview.active    = false;
        placementPreview.snapTarget = null;
      }
    });
    canvas.addEventListener("mousemove", e => {
      const rect = canvas.getBoundingClientRect();
      // Divide by CSS scale so coordinates stay in the 800×600 logical space
      mouseX = (e.clientX - rect.left) * (canvas.width  / rect.width);
      mouseY = (e.clientY - rect.top)  * (canvas.height / rect.height);
    });

    // ── Mobile touch handlers ────────────────────────────────────────────────
    // These map touch gestures onto the same game actions as keyboard/mouse.
    // Desktop keyboard/mouse paths are NOT modified — both run side-by-side.
    if (isMobile) {
      // Convert a Touch to logical 800×600 canvas coordinates
      function _tc(touch) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (touch.clientX - rect.left) * (canvas.width  / rect.width),
          y: (touch.clientY - rect.top)  * (canvas.height / rect.height),
        };
      }

      // Hit-test uses the same scale as draw so tap targets match visuals
      function _hitBtn(tx, ty, btn) { return Math.hypot(tx - btn.cx, ty - btn.cy) <= btn.r * mobBtnScale; }
      // Rect hit-test (no scaling needed — these are fixed overlay elements)
      function _hitRect(tx, ty, r) { return tx >= r.x && tx <= r.x + r.w && ty >= r.y && ty <= r.y + r.h; }

      // Dispatch a real keydown+keyup so all existing keyboard logic runs unchanged
      function _fireKey(key) {
        document.dispatchEvent(new KeyboardEvent('keydown', { key, bubbles: true }));
        setTimeout(() => document.dispatchEvent(new KeyboardEvent('keyup', { key, bubbles: true })), 60);
      }

      // Pixels a look-drag must move before we start rotating (prevents touchdown jitter)
      const LOOK_THRESHOLD = 6;

      // ── CCTV button rects (screen-fixed, drawn + hit-tested during cameraViewMode) ──
      const MOB_CCTV = {
        exit:    { x: 748, y:   8, w: 44, h: 26 },
        prevCam: { x:   8, y: 558, w: 88, h: 30 },
        nextCam: { x: 104, y: 558, w: 88, h: 30 },
        nv:      { x: 632, y: 558, w: 120, h: 30 },
      };

      // ── Pegboard swipe state (tracks horizontal drag inside the pegboard panel) ──
      const mobPegSwipe = { active: false, id: null, startX: 0, startScrollX: 0, moved: false };
      function _resetPegSwipe() { mobPegSwipe.active = false; mobPegSwipe.id = null; mobPegSwipe.moved = false; }

      // ── Journal slider drag state ────────────────────────────────────────────
      // Geometry constants must exactly match the drawJournal mobile tab-2 layout.
      //   jy=52, lx=44, lw=358  →  trackX=58, trackW=308
      //   Row track-center Y values (absolute):  136, 196, 256
      const JOURNAL_SLIDER = {
        trackX: 58, trackW: 308, thumbR: 13,
        rows: [
          { cy:136, min:0.6, max:1.6,
            get: ()=> mobJoyScale,
            set: v => { mobJoyScale = +Math.max(0.6,Math.min(1.6,v)).toFixed(2); saveMobileSettings(); } },
          { cy:196, min:0.6, max:1.6,
            get: ()=> mobBtnScale,
            set: v => { mobBtnScale = +Math.max(0.6,Math.min(1.6,v)).toFixed(2); saveMobileSettings(); } },
          { cy:256, min:0.3, max:1.0,
            get: ()=> mobOpacity,
            set: v => { mobOpacity  = +Math.max(0.3,Math.min(1.0,v)).toFixed(2); saveMobileSettings(); } },
        ],
      };
      let mobSliderDrag = null; // { id, row } while a slider is being dragged
      function _resetSliderDrag() { mobSliderDrag = null; }

      // ── Overlay panel bounds used for tap-outside-to-close ──
      // These match the constants in each drawX() function exactly.
      const MOB_PANELS = {
        equipment:   { x:  60, y:  35, w: 680, h: 530 },
        keypad:      { x: 270, y: 250, w: 260, h: 140 },
        dangerTimer: { x: 270, y: 220, w: 260, h: 170 },
        fourPanel:   { x:  50, y:  30, w: 700, h: 540 },
        corkBoard:   { x: 120, y:  80, w: 560, h: 440 },
        // Journal spans x:20–756, y:28–548 (includes tab strip above pages)
        journal:     { x:  20, y:  28, w: 736, h: 520 },
      };

      function _resetLook() {
        mobileLook.active  = false; mobileLook.id = null;
        mobileLook.started = false;
      }
      function _resetJoy() {
        mobileJoy.active    = false; mobileJoy.id = null;
        mobileJoy.magnitude = 0;
      }
      function _resetPinch() {
        mobilePinch.active = false; mobilePinch.id0 = null; mobilePinch.id1 = null;
      }

      canvas.addEventListener("touchstart", e => {
        e.preventDefault();

        // ── Two-finger pinch: takes over from any active single-touch gestures ──
        if (e.touches.length >= 2) {
          _resetJoy(); _resetLook();
          const c0 = _tc(e.touches[0]);
          const c1 = _tc(e.touches[1]);
          const dist = Math.hypot(c1.x - c0.x, c1.y - c0.y);
          mobilePinch.active   = true;
          mobilePinch.lastDist = dist;
          mobilePinch.id0      = e.touches[0].identifier;
          mobilePinch.id1      = e.touches[1].identifier;
          return; // do not process individual new touches as buttons/joy/look
        }

        for (const t of e.changedTouches) {
          const { x, y } = _tc(t);

          // ── CCTV view mode — button-driven controls ──
          if (cameraViewMode) {
            if (_hitRect(x, y, MOB_CCTV.exit))    { cameraViewMode = false; continue; }
            if (_hitRect(x, y, MOB_CCTV.nv))      { cameraNightVision = !cameraNightVision; continue; }
            const _cams = getPlacedCameras();
            if (_hitRect(x, y, MOB_CCTV.prevCam) && _cams.length > 1) {
              cameraViewIndex = (cameraViewIndex - 1 + _cams.length) % _cams.length; continue;
            }
            if (_hitRect(x, y, MOB_CCTV.nextCam) && _cams.length > 1) {
              cameraViewIndex = (cameraViewIndex + 1) % _cams.length; continue;
            }
            // Tap anywhere else in CCTV view → no action (avoids accidental exits)
            continue;
          }

          // ── Popup open ──
          if (journalOpen || equipmentOpen || keypadOpen || dangerTimerOpen || fourPanelOpen || corkBoardOpen) {
            // Determine which panel is active and get its bounds
            const panel = journalOpen     ? MOB_PANELS.journal
                        : equipmentOpen   ? MOB_PANELS.equipment
                        : keypadOpen      ? MOB_PANELS.keypad
                        : dangerTimerOpen ? MOB_PANELS.dangerTimer
                        : fourPanelOpen   ? MOB_PANELS.fourPanel
                        :                   MOB_PANELS.corkBoard;

            // Tap OUTSIDE panel → close it immediately
            if (!_hitRect(x, y, panel)) {
              journalOpen     = journalOpen     && false; // only the active one closes
              equipmentOpen   = equipmentOpen   && !equipmentOpen;
              keypadOpen      = keypadOpen      && !keypadOpen;
              dangerTimerOpen = dangerTimerOpen && !dangerTimerOpen;
              fourPanelOpen   = fourPanelOpen   && !fourPanelOpen;
              corkBoardOpen   = corkBoardOpen   && !corkBoardOpen;
              if (journalOpen     && panel === MOB_PANELS.journal)     journalOpen     = false;
              if (equipmentOpen   && panel === MOB_PANELS.equipment)   equipmentOpen   = false;
              if (keypadOpen      && panel === MOB_PANELS.keypad)      keypadOpen      = false;
              if (dangerTimerOpen && panel === MOB_PANELS.dangerTimer) dangerTimerOpen = false;
              if (fourPanelOpen   && panel === MOB_PANELS.fourPanel)   fourPanelOpen   = false;
              if (corkBoardOpen   && panel === MOB_PANELS.corkBoard)   corkBoardOpen   = false;
              // Simpler: just close whatever is open
              journalOpen = false; equipmentOpen = false; keypadOpen = false;
              dangerTimerOpen = false; fourPanelOpen = false; corkBoardOpen = false;
              continue;
            }

            // Tap INSIDE pegboard panel — distinguish swipe from tap
            if (equipmentOpen) {
              const bx = 68, by = 88, bw = 664, bh = 440;
              if (x >= bx && x <= bx + bw && y >= by && y <= by + bh && !mobPegSwipe.active) {
                // Start tracking a potential swipe over the board area
                mobPegSwipe.active      = true;
                mobPegSwipe.id          = t.identifier;
                mobPegSwipe.startX      = x;
                mobPegSwipe.startScrollX = pegScrollX;
                mobPegSwipe.moved       = false;
                continue; // don't fire click yet — wait for touchend to decide tap vs swipe
              }
            }

            // Journal mobile sliders (tab 2): intercept track touches before synthetic click
            if (journalOpen && journalTab === 2) {
              const { trackX, trackW, thumbR, rows } = JOURNAL_SLIDER;
              let hitSlider = false;
              for (const row of rows) {
                if (y >= row.cy - thumbR - 6 && y <= row.cy + thumbR + 6 &&
                    x >= trackX - thumbR      && x <= trackX + trackW + thumbR) {
                  // Start drag and apply value immediately at tap position
                  mobSliderDrag = { id: t.identifier, row };
                  const frac = Math.max(0, Math.min(1, (x - trackX) / trackW));
                  row.set(row.min + frac * (row.max - row.min));
                  hitSlider = true;
                  break;
                }
              }
              if (hitSlider) continue; // slider consumed touch — skip synthetic click
            }

            // Tap inside any other panel → route as synthetic click for existing handlers
            canvas.dispatchEvent(new MouseEvent('click', {
              bubbles: true, cancelable: true,
              clientX: t.clientX, clientY: t.clientY,
            }));
            continue;
          }

          // ── Action buttons ──
          if (_hitBtn(x, y, MOB.interact))    { _fireKey(keybinds.interact);  continue; }
          if (_hitBtn(x, y, MOB.use))         { _fireKey(keybinds.use);       continue; }
          if (_hitBtn(x, y, MOB.journal))     { _fireKey(keybinds.journal);   continue; }
          if (_hitBtn(x, y, MOB.cycleItem))   { _fireKey(keybinds.inventory); continue; }
          if (_hitBtn(x, y, MOB.flashlight))  { _fireKey(keybinds.flashlight);continue; }
          if (_hitBtn(x, y, MOB.drop))        { _fireKey(keybinds.drop);      continue; }

          // ── Sprint button (hold) ──
          if (_hitBtn(x, y, MOB.sprint)) {
            mobileSprinting = true; mobileSprintId = t.identifier; continue;
          }

          // ── Joystick (left half, lower) — capture zone scales with mobJoyScale ──
          if (x < 350 && y > 280 && !mobileJoy.active) {
            mobileJoy.active    = true;
            mobileJoy.id        = t.identifier;
            mobileJoy.baseX     = x; mobileJoy.baseY = y;
            mobileJoy.curX      = x; mobileJoy.curY  = y;
            mobileJoy.magnitude = 0;
            continue;
          }

          // ── Look drag (right side / upper area — gated behind threshold) ──
          if (!mobileLook.active) {
            mobileLook.active  = true;
            mobileLook.id      = t.identifier;
            mobileLook.startX  = x; mobileLook.startY = y;
            mobileLook.lastX   = x; mobileLook.lastY  = y;
            mobileLook.started = false; // rotation blocked until threshold crossed
          }
        }
      }, { passive: false });

      canvas.addEventListener("touchmove", e => {
        e.preventDefault();

        // ── Pinch zoom ──
        if (mobilePinch.active && e.touches.length >= 2) {
          const t0 = Array.from(e.touches).find(t => t.identifier === mobilePinch.id0);
          const t1 = Array.from(e.touches).find(t => t.identifier === mobilePinch.id1);
          if (t0 && t1) {
            const c0 = _tc(t0), c1 = _tc(t1);
            const newDist = Math.hypot(c1.x - c0.x, c1.y - c0.y);
            if (mobilePinch.lastDist > 0) {
              const ratio = newDist / mobilePinch.lastDist;
              // Apply zoom — same 0.8–3.0 range as keyboard +/-
              gameZoom = Math.max(0.8, Math.min(3.0, gameZoom * ratio));
            }
            mobilePinch.lastDist = newDist;
          }
          return;
        }

        for (const t of e.changedTouches) {
          const { x, y } = _tc(t);

          // ── Journal slider drag ──
          if (mobSliderDrag && t.identifier === mobSliderDrag.id) {
            const { trackX, trackW } = JOURNAL_SLIDER;
            const { row } = mobSliderDrag;
            const frac = Math.max(0, Math.min(1, (x - trackX) / trackW));
            row.set(row.min + frac * (row.max - row.min));
            continue; // consumed
          }

          // ── Pegboard swipe (only active when equipmentOpen) ──
          if (t.identifier === mobPegSwipe.id && mobPegSwipe.active) {
            const dx = mobPegSwipe.startX - x; // drag left = scroll right (positive pegScrollX)
            if (Math.abs(dx) > 8) mobPegSwipe.moved = true;
            const virtualW = Math.ceil(equipmentList.length / 3) * 200 + 60;
            const maxScroll = Math.max(0, virtualW - 664); // bw=664
            pegScrollX = Math.max(0, Math.min(maxScroll, mobPegSwipe.startScrollX + dx));
          }

          // Update joystick knob position
          if (t.identifier === mobileJoy.id) {
            mobileJoy.curX = x; mobileJoy.curY = y;
          }

          // Update look drag — only apply rotation after threshold to prevent jitter
          if (t.identifier === mobileLook.id) {
            if (!mobileLook.started) {
              const totalDrag = Math.hypot(x - mobileLook.startX, y - mobileLook.startY);
              if (totalDrag >= LOOK_THRESHOLD) {
                mobileLook.started = true;
                mobileLook.lastX = x; mobileLook.lastY = y;
              }
            } else {
              const ddx = x - mobileLook.lastX;
              mobileLook.lastX = x; mobileLook.lastY = y;
              playerAngle += ddx * 0.007;
            }
          }
        }
      }, { passive: false });

      // ── Tap-to-interact helpers ──────────────────────────────────────────────
      // World-space radius (px) around an interactable that counts as "tapped on it".
      // At default zoom 1.8, TAP_R=60 world px ≈ 108 screen px — generous but not accidental.
      const TAP_R = 60;

      // Returns true when the tapped world point (wx,wy) is near any interactable
      // that the player is currently close enough to use.
      // All nearX() calls are the same proximity gates the keyboard E handler uses —
      // so the same distance restrictions apply. No fake logic, just a world-space tap check.
      function _tapNearInteractable(wx, wy) {
        // Doors
        const nd = nearDoor();
        if (nd && Math.hypot(wx - (nd.x + nd.w / 2), wy - (nd.y + nd.h / 2)) < TAP_R) return true;
        // World items on the floor (pick-up / toggle placed tool)
        const pcx = player.x + 8, pcy = player.y + 8;
        const nearWI = worldItems.find(it => Math.hypot((it.x + 6) - pcx, (it.y + 6) - pcy) < 30);
        if (nearWI && Math.hypot(wx - (nearWI.x + 6), wy - (nearWI.y + 6)) < TAP_R) return true;
        // Van rear door
        if (nearVanDoor()     && Math.hypot(wx - 360, wy - 926) < TAP_R) return true;
        // Van devices (world centres match nearX() target coordinates)
        if (nearKeypad()      && Math.hypot(wx - 347, wy - 900) < TAP_R) return true;
        if (nearPegboard()    && Math.hypot(wx - 270, wy - 950) < TAP_R) return true;
        if (nearCCTV()        && Math.hypot(wx - 196, wy - 926) < TAP_R) return true;
        if (nearDangerTimer() && Math.hypot(wx - 210, wy - 900) < TAP_R) return true;
        if (nearFourPanel()   && Math.hypot(wx - 306, wy - 900) < TAP_R) return true;
        if (nearCorkBoard()   && Math.hypot(wx - 255, wy - 898) < TAP_R) return true;
        // Light switches
        const swIdx = nearSwitch();
        if (swIdx >= 0) {
          const sw = roomLights[swIdx];
          if (Math.hypot(wx - sw.x, wy - sw.y) < TAP_R) return true;
        }
        return false;
      }

      function _touchEnd(e) {
        e.preventDefault();
        for (const t of e.changedTouches) {
          if (t.identifier === mobileJoy.id) _resetJoy();

          if (t.identifier === mobileLook.id) {
            // Tap: look touch ended with barely any movement = intentional tap.
            if (!mobileLook.started && gameRunning) {
              const sx = mobileLook.startX, sy = mobileLook.startY;

              // ── Close open panel/overlay if tap landed outside its content rect ──
              // Checks run in priority order; after closing we skip world interaction.
              const _out = (x,y, x1,y1,x2,y2) => x < x1 || x > x2 || y < y1 || y > y2;
              if (cameraViewMode)                               { cameraViewMode   = false; _resetLook(); continue; }
              if (journalOpen     && _out(sx,sy, 20,28,756,548))  { journalOpen     = false; _resetLook(); continue; }
              if (equipmentOpen   && _out(sx,sy, 60,35,740,565))  { equipmentOpen   = false; _resetLook(); continue; }
              if (keypadOpen      && _out(sx,sy,270,250,530,390)) { keypadOpen      = false; _resetLook(); continue; }
              if (dangerTimerOpen && _out(sx,sy,270,220,530,390)) { dangerTimerOpen = false; _resetLook(); continue; }
              if (fourPanelOpen   && _out(sx,sy, 50, 30,750,570)) { fourPanelOpen   = false; _resetLook(); continue; }
              if (corkBoardOpen   && _out(sx,sy,120, 80,680,520)) { corkBoardOpen   = false; _resetLook(); continue; }

              // ── World interact: no panel open, tap must be near the object ──
              if (!journalOpen && !equipmentOpen && !keypadOpen &&
                  !dangerTimerOpen && !fourPanelOpen && !corkBoardOpen && !cameraViewMode) {
                const camX = player.x + 8, camY = player.y + 8;
                const wx = (sx - canvas.width  / 2) / gameZoom + camX;
                const wy = (sy - canvas.height / 2) / gameZoom + camY;
                doInteractAt(wx, wy); // pointer-targeted: selects by tap position, not player-nearest
              }
            }
            _resetLook();
          }

          if (mobSliderDrag && t.identifier === mobSliderDrag.id) {
            _resetSliderDrag();
          }

          if (t.identifier === mobPegSwipe.id) {
            if (!mobPegSwipe.moved && equipmentOpen) {
              // Was a tap, not a scroll — fire synthetic click so item selection still works
              const { clientX, clientY } = t;
              canvas.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true, clientX, clientY }));
            }
            _resetPegSwipe();
          }

          if (t.identifier === mobileSprintId)  { mobileSprinting = false; mobileSprintId = null; }
          if (t.identifier === mobilePinch.id0 ||
              t.identifier === mobilePinch.id1)   _resetPinch();
        }
      }
      canvas.addEventListener("touchend",    _touchEnd, { passive: false });
      canvas.addEventListener("touchcancel", e => {
        _resetJoy(); _resetLook(); _resetPinch(); _resetSliderDrag(); _resetPegSwipe();
        mobileSprinting = false; mobileSprintId = null;
      }, { passive: false });

      // ── Out-of-canvas tap-to-close ─────────────────────────────────────────
      // When letterbox bars exist (black area around the canvas) a touch there
      // hits the document body, never reaching the canvas touchstart handler.
      // This catches those touches and closes any open overlay panel.
      document.addEventListener("touchstart", e => {
        if (e.target === canvas) return; // canvas handles its own panel logic
        if (!gameRunning) return;
        if (journalOpen || equipmentOpen || keypadOpen ||
            dangerTimerOpen || fourPanelOpen || corkBoardOpen) {
          journalOpen = false; equipmentOpen = false; keypadOpen = false;
          dangerTimerOpen = false; fourPanelOpen = false; corkBoardOpen = false;
        }
      }, { passive: true });

    } // end if (isMobile)

    // --- Update ---
    function update() {
      // Timer
      const now = performance.now();
      const delta = (now - lastTime) / 1000;
      lastTime = now;
      if (!safeTimeOver) {
        safeTime -= delta;
        if (safeTime <= 0) {
          safeTime     = 0;
          safeTimeOver = true;
        }
      }


      let dx = 0, dy = 0;

      // --- Ghost evidence interactions (after safe time; debug ghost skips safe-time wait) ---
      if (safeTimeOver && currentGhost) {
        // Decay EMF sources; derive emfLevel from nearest source within 100px of player
        for (let i = emfSources.length - 1; i >= 0; i--) {
          emfSources[i].timer -= delta;
          if (emfSources[i].timer <= 0) emfSources.splice(i, 1);
        }
        {
          const px = player.x + 8, py = player.y + 8;
          const holdingEMF = inventory[selectedSlot] === "EMF Reader";
          let best = 0;
          if (holdingEMF) {
            for (const src of emfSources) {
              if (Math.hypot(px - src.x, py - src.y) < 100 && src.level > best) best = src.level;
            }
          }
          emfLevel = best;
        }
        if (dotsDisturbTimer > 0) dotsDisturbTimer -= delta;
        if (spiritBoxTimer   > 0) spiritBoxTimer   -= delta;
        for (const it of worldItems) {
          if (it.name === "Ghost Book" && it.writeAnimTimer > 0) it.writeAnimTimer -= delta;
        }

        // Thermometer — distance-based target; slow mercury-style lerp
        {
          const hasFreezing = currentGhost.evidence.includes("Freezing Temperatures");
          const coldFloor   = hasFreezing ? -2 : 5;  // coldest possible
          const NEAR = 60, FAR = 320;                // distance range (px)
          const dist = Math.hypot(player.x + 8 - ghostX, player.y + 8 - ghostY);
          const t    = Math.max(0, Math.min(1, (dist - NEAR) / (FAR - NEAR))); // 0=close, 1=far
          const target = coldFloor + t * (20 - coldFloor); // lerp coldFloor→20 across distance
          const lerpRate = 1.2; // °C/s — slow mercury movement
          if (thermometerReading > target) {
            thermometerReading = Math.max(target, thermometerReading - lerpRate * delta);
          } else {
            thermometerReading = Math.min(target, thermometerReading + lerpRate * delta);
          }
        }

        // Ghost movement — smooth waypoint walking with collision + optional room confinement
        // Ghost behavior pulled from current ghost type + defaults
        const beh = getGhostBehavior(currentGhost);
        const GHOST_SPEED = beh.huntSpeedBase; // default 1.4; ghosts with overrides differ
        // Goryo (no_room_migration) stays in its favorite room; others roam freely
        const ghostConfine = currentGhost?.specialRules?.includes("no_room_migration") ? ghostFavRoom : null;

        // Helper: pick a new walkable waypoint inside the room
        function pickGhostTarget() {
          const margin = GHOST_SIZE; // keep well clear of walls
          ghostTargetX = ghostFavRoom.x + margin + Math.random() * (ghostFavRoom.w - margin * 2);
          ghostTargetY = ghostFavRoom.y + margin + Math.random() * (ghostFavRoom.h - margin * 2);
          // If the picked spot is itself invalid, fall back to room center
          if (!canGhostMoveTo(ghostTargetX, ghostTargetY, ghostConfine)) {
            ghostTargetX = ghostFavRoom.x + ghostFavRoom.w / 2;
            ghostTargetY = ghostFavRoom.y + ghostFavRoom.h / 2;
          }
        }

        if (ghostPauseTimer > 0) {
          ghostPauseTimer -= delta; // standing still at waypoint
        } else {
          const dx = ghostTargetX - ghostX;
          const dy = ghostTargetY - ghostY;
          const dist = Math.hypot(dx, dy);
          if (dist < 3) {
            // Reached waypoint — pause then pick next target
            ghostPauseTimer = 0.6 + Math.random() * 1.6;
            pickGhostTarget();
          } else {
            // Step toward target with wall-sliding (same pattern as player movement)
            const step = Math.min(GHOST_SPEED, dist);
            const nx = ghostX + (dx / dist) * step;
            const ny = ghostY + (dy / dist) * step;
            ghostMoveAngle = Math.atan2(dy, dx); // face direction of travel
            if      (canGhostMoveTo(nx,     ny,     ghostConfine)) { ghostX = nx; ghostY = ny; }
            else if (canGhostMoveTo(nx,     ghostY, ghostConfine)) { ghostX = nx; }
            else if (canGhostMoveTo(ghostX, ny,     ghostConfine)) { ghostY = ny; }
            else {
              // Fully blocked — give up on this target and pick a new one
              ghostPauseTimer = 0.3;
              pickGhostTarget();
            }
            ghostWalkCycle += 0.12;
          }
        }

        // Periodic interaction check
        ghostEventTimer -= delta;
        if (ghostEventTimer <= 0) {
          // Debug ghost: fire every 2s with 100% success; normal: 7–16s at 70%/25%
          // activityRate > 1.0 means more frequent events (e.g. Demon 1.5); < 1.0 means rarer
          ghostEventTimer = (7 + Math.random() * 9) / beh.activityRate;
          const inFav = (ghostX > ghostFavRoom.x && ghostX < ghostFavRoom.x + ghostFavRoom.w &&
                         ghostY > ghostFavRoom.y && ghostY < ghostFavRoom.y + ghostFavRoom.h);
          // roamTendency < 1.0 means ghost is less likely to fire events when outside its room
          if (Math.random() < (inFav ? 0.70 : 0.25 * beh.roamTendency)) {
            const ev = currentGhost.evidence;

            // EMF — ghost interaction leaves a located source near ghost position
            // Any ghost can trigger EMF 2–4; EMF Level 5 evidence adds a chance of level 5
            {
              const hasEmf5 = ev.includes("EMF Level 5");
              const roll = Math.random();
              const lvl = hasEmf5 && roll < 0.30 ? 5 : (2 + Math.floor(Math.random() * 3)); // 2,3,4
              const jitter = 20;
              emfSources.push({
                x: ghostX + (Math.random() - 0.5) * jitter,
                y: ghostY + (Math.random() - 0.5) * jitter,
                level: lvl,
                timer: 8 + Math.random() * 6  // lasts 8–14s
              });
              // cap total sources so old events clean up if ghost fires fast
              if (emfSources.length > 6) emfSources.shift();
            }

            // D.O.T.S. Projector — needs an active placed projector within 150px of ghost
            if (ev.includes("D.O.T.S. Projector")) {
              const nearDots = worldItems.find(it =>
                it.name === "D.O.T.S. Projector" && it.active &&
                Math.hypot(it.x + 6 - ghostX, it.y + 6 - ghostY) < 150
              );
              if (nearDots) dotsDisturbTimer = 5;
            }

            // Ultraviolet — ghost leaves fingerprint smudge on a door near its position
            // Targets: any door within 80px of ghost; cap at 8 total marks per round
            if (ev.includes("Ultraviolet") && uvMarks.length < 8) {
              const nearDoor = doors.find(d =>
                Math.hypot((d.x + d.w / 2) - ghostX, (d.y + d.h / 2) - ghostY) < 80
              );
              if (nearDoor) {
                // Place mark at the knob side of the door (where a hand would touch)
                const horiz = nearDoor.w > nearDoor.h;
                const mx = horiz ? nearDoor.x + nearDoor.w - 6 : nearDoor.x + 3;
                const my = horiz ? nearDoor.y + 3             : nearDoor.y + nearDoor.h - 6;
                // Only add if not already very close to an existing mark (no duplicates)
                const alreadyThere = uvMarks.some(m => Math.hypot(m.x - mx, m.y - my) < 12);
                if (!alreadyThere) uvMarks.push({ x: mx, y: my });
              }
            }

            // Ghost Writing — active unwritten Ghost Book within 120px of ghost gets written
            if (ev.includes("Ghost Writing")) {
              const book = worldItems.find(it =>
                it.name === "Ghost Book" && it.active && !it.written &&
                Math.hypot(it.x + 6 - ghostX, it.y + 6 - ghostY) < 120
              );
              if (book) {
                book.written = true;
                book.writeAnimTimer = 1.8; // scribble animation lasts 1.8s
                // EMF event at book location (writing is a ghost interaction)
                emfSources.push({ x: book.x + 6, y: book.y + 6, level: 2 + Math.floor(Math.random() * 2), timer: 10 });
                if (emfSources.length > 6) emfSources.shift();
              }
            }
          }
        }
      }

      // Spirit Box — active listen window (started by R key)
      if (spiritBoxListenTimer > 0 && currentGhost) {
        spiritBoxListenTimer -= delta;
        if (spiritBoxListenTimer <= 0) {
          // Listen window ended — evaluate conditions for a response
          heldItemOn = false;
          const holdingBox   = inventory[selectedSlot] === "Spirit Box";
          const hasEvidence  = currentGhost.evidence.includes("Spirit Box");
          const dist         = Math.hypot(player.x + 8 - ghostX, player.y + 8 - ghostY);
          const withinRange  = dist < 180;
          const { curRoom }  = getVisibilityData();
          const ghostRoom    = curRoom && (ghostX > curRoom.x && ghostX < curRoom.x + curRoom.w &&
                                           ghostY > curRoom.y && ghostY < curRoom.y + curRoom.h);
          const roomIdx      = curRoom ? rooms.indexOf(curRoom) : -1;
          const lightsOff    = roomIdx < 0 || !roomLights[roomIdx]?.on;
          // DEBUG: bypass lights check only; room and range still apply so position matters
          const conditionsMet = holdingBox && hasEvidence && withinRange && ghostRoom && lightsOff;
          const responseChance = 0.65;
          if (conditionsMet && Math.random() < responseChance) {
            spiritBoxTimer      = 3.5;
            spiritBoxNoResponse = false;
          } else {
            spiritBoxNoResponse = true;
            setTimeout(() => { spiritBoxNoResponse = false; }, 2000);
          }
        }
      }

      // Ghost Orbs — drift, soft bounce inside ghost's room, independent flicker
      if (ghostOrbs.length > 0 && ghostFavRoom) {
        const room = ghostFavRoom;
        ghostOrbs.forEach(orb => {
          // Smooth drift
          orb.x += orb.vx;
          orb.y += orb.vy;
          // Soft bounce off room walls (inset 8px so orbs don't sit on the edge)
          if (orb.x < room.x + 8)            { orb.x = room.x + 8;            orb.vx =  Math.abs(orb.vx); }
          if (orb.x > room.x + room.w - 8)   { orb.x = room.x + room.w - 8;   orb.vx = -Math.abs(orb.vx); }
          if (orb.y < room.y + 8)            { orb.y = room.y + 8;            orb.vy =  Math.abs(orb.vy); }
          if (orb.y > room.y + room.h - 8)   { orb.y = room.y + room.h - 8;   orb.vy = -Math.abs(orb.vy); }
          // Cap speed so they stay slow after repeated bounces
          const maxSpd = 0.22;
          orb.vx = Math.max(-maxSpd, Math.min(maxSpd, orb.vx));
          orb.vy = Math.max(-maxSpd, Math.min(maxSpd, orb.vy));
          // Add tiny random drift nudge so they don't travel in straight lines forever
          orb.vx += (Math.random() - 0.5) * 0.02;
          orb.vy += (Math.random() - 0.5) * 0.02;
          // Flicker — lerp alpha toward a target, pick new target when timer expires
          orb.flickerTimer -= delta;
          if (orb.flickerTimer <= 0) {
            orb.flickerTarget = 0.3 + Math.random() * 0.7; // new alpha target 0.3–1.0
            orb.flickerTimer  = 0.4 + Math.random() * 1.2; // 0.4–1.6s until next change
          }
          if (orb.flickerTarget !== undefined) {
            orb.flicker += (orb.flickerTarget - orb.flicker) * Math.min(1, delta * 2);
          }
        });
      }

      // Camera placement preview — snap position to surface, angle set by mouse
      if (placementPreview.active) {
        const cx = player.x + 8, cy = player.y + 8;
        const probeX = cx + Math.cos(placementPreview.lockedPlayerAngle) * 30;
        const probeY = cy + Math.sin(placementPreview.lockedPlayerAngle) * 30;

        // Check furniture surfaces — snap to center of matched rect
        const hitFurniture = furniture.find(f =>
          probeX >= f.x && probeX <= f.x + f.w &&
          probeY >= f.y && probeY <= f.y + f.h
        );
        // Check tripod mounts — tripod without a camera already
        const hitTripod = worldItems.find(it =>
          it.name === "Tripod" && !it.mountedCamera &&
          Math.hypot(probeX - (it.x + 6), probeY - (it.y + 6)) < 18
        );

        if (hitFurniture) {
          // Use the probe's actual position clamped to the furniture surface (not center-snap)
          // Inset by 4px on sides so the camera body doesn't hang off the edge
          placementPreview.x          = Math.max(hitFurniture.x + 4, Math.min(hitFurniture.x + hitFurniture.w - 4, probeX));
          placementPreview.y          = Math.max(hitFurniture.y + 2, Math.min(hitFurniture.y + hitFurniture.h - 2, probeY));
          placementPreview.valid      = true;
          placementPreview.snapTarget = { type: "furniture", ref: hitFurniture };
        } else if (hitTripod) {
          // Snap to tripod mount head center
          placementPreview.x          = hitTripod.x + 6;
          placementPreview.y          = hitTripod.y + 6;
          placementPreview.valid      = true;
          placementPreview.snapTarget = { type: "tripod", ref: hitTripod };
        } else {
          placementPreview.x          = probeX;
          placementPreview.y          = probeY;
          placementPreview.valid      = false;
          placementPreview.snapTarget = null;
        }
        // angle updated by the mouse-tracking block above (placementPreview.angle = targetAngle)
      }

      // Hold-to-use: R held while Sound Recorder is on = actively recording
      if (inventory[selectedSlot] === "Sound Recorder" && heldItemOn) {
        heldItemUsing = !!(keys[keybinds.use]);
      } else if (!heldItemOn) {
        heldItemUsing = false;
      }

      const wantsSprint = keys[keybinds.sprint] || mobileSprinting;
      const isSprinting = wantsSprint && stamina > 0.01;
      if (isSprinting) {
        stamina = Math.max(0, stamina - STAMINA_DRAIN_RATE * delta);
        staminaRestTimer = 0;
      } else {
        staminaRestTimer += delta;
        if (staminaRestTimer >= STAMINA_RECHARGE_DELAY) {
          stamina = Math.min(STAMINA_MAX, stamina + STAMINA_RECHARGE_RATE * delta);
        }
      }
      const spd = player.speed * (isSprinting ? 1.3 : 1.0);
      if (keys[keybinds.left]  || keys["ArrowLeft"])  dx = -spd;
      if (keys[keybinds.right] || keys["ArrowRight"]) dx =  spd;
      if (keys[keybinds.up]    || keys["ArrowUp"])    dy = -spd;
      if (keys[keybinds.down]  || keys["ArrowDown"])  dy =  spd;

      // Mobile joystick: face joystick direction + walk forward in that direction.
      // Angle and magnitude are computed here so they're available for the facing update below.
      if (isMobile && mobileJoy.active) {
        const jdx = mobileJoy.curX - mobileJoy.baseX;
        const jdy = mobileJoy.curY - mobileJoy.baseY;
        const jLen = Math.hypot(jdx, jdy);
        const deadR = MOB.joy.deadR * mobJoyScale, maxR = MOB.joy.maxR * mobJoyScale;
        if (jLen > deadR) {
          mobileJoy.angle     = Math.atan2(jdy, jdx);
          mobileJoy.magnitude = Math.min((jLen - deadR) / (maxR - deadR), 1.0);
          // Smoothly rotate player to face joystick direction (25% per frame ≈ ~10 frames to full turn)
          let jAngleDiff = mobileJoy.angle - playerAngle;
          while (jAngleDiff >  Math.PI) jAngleDiff -= Math.PI * 2;
          while (jAngleDiff < -Math.PI) jAngleDiff += Math.PI * 2;
          playerAngle += jAngleDiff * 0.25;
          // Walk forward in the (now updated) facing direction
          dx = Math.cos(playerAngle) * spd * mobileJoy.magnitude;
          dy = Math.sin(playerAngle) * spd * mobileJoy.magnitude;
        } else {
          mobileJoy.magnitude = 0; // inside dead zone — no movement, no turn
        }
      }

      // ── Facing direction ──────────────────────────────────────────────────
      // Desktop: lerp toward mouse cursor each frame.
      // Mobile:  joystick block above handles facing when moving; look-drag handles it when
      //          standing still (via direct playerAngle += in touchmove). No mouse lerp on mobile
      //          — mouseX/mouseY are never updated on touch devices, which caused the spin-to-east bug.
      if (placementPreview.active) {
        const targetAngle = Math.atan2(mouseY - canvas.height / 2, mouseX - canvas.width / 2);
        playerAngle            = placementPreview.lockedPlayerAngle;
        placementPreview.angle = targetAngle;
      } else if (!isMobile) {
        const targetAngle = Math.atan2(mouseY - canvas.height / 2, mouseX - canvas.width / 2);
        let angleDiff = targetAngle - playerAngle;
        while (angleDiff >  Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        playerAngle += angleDiff * Math.min(1.0, sensitivity * 0.3);
      }

      // Move player — check walkable rects, allow wall sliding
      const nx = player.x + dx;
      const ny = player.y + dy;
      if      (canMoveTo(nx, ny))         { player.x = nx; player.y = ny; }
      else if (canMoveTo(nx, player.y))   { player.x = nx; }
      else if (canMoveTo(player.x, ny))   { player.y = ny; }
      isMoving = (dx !== 0 || dy !== 0);
      if (isMoving) walkCycle = (walkCycle + 0.12) % (Math.PI * 2);

      // Update rain particles (scroll down + slight right drift; wrap around)
      if (ENV[envModes[envModeIdx]].rain) {
        const camX2 = player.x - canvas.width  / 2;
        const camY2 = player.y - canvas.height / 2;
        rainDrops.forEach(d => {
          d.x += 1;
          d.y += d.speed;
          if (d.y - camY2 > canvas.height + 20) { d.y = camY2 - 10; d.x = camX2 + Math.random() * canvas.width; }
          if (d.x - camX2 > canvas.width  + 20) { d.x = camX2 - 10; }
        });
      }

      // (Round ends via van keypad "Leave Site" button — not the exit zone)
    }

    // --- Draw ---
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Background (walls/void) — color depends on environment mode
      const mode = envModes[envModeIdx];
      const env  = ENV[mode];
      ctx.fillStyle = env.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Camera: offset so the player appears centered on screen
      const camX = player.x - canvas.width  / 2;
      const camY = player.y - canvas.height / 2;
      const ZOOM = gameZoom; // gameplay zoom — controlled by +/- keys

      // Everything between save/restore is drawn in world coordinates (with zoom)
      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.scale(ZOOM, ZOOM);
      ctx.translate(-(player.x + 8), -(player.y + 8));

      // Walls — drawn under rooms; mark interior wall positions
      ctx.fillStyle = "#2a1f14"; // warm charcoal-brown walls
      walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

      // Room floors
      rooms.forEach(r => {
        ctx.fillStyle = r.color;
        ctx.fillRect(r.x, r.y, r.w, r.h);
      });

      // Room light overlay — darken rooms whose light is off
      roomLights.forEach((light, i) => {
        if (!light.on) {
          ctx.fillStyle = "rgba(0,0,0,0.80)";
          ctx.fillRect(rooms[i].x, rooms[i].y, rooms[i].w, rooms[i].h);
        }
      });

      // Light switch indicators — slim flush-mount plate, wall-tone, with tiny toggle nub
      roomLights.forEach(light => {
        // Mounting plate: narrow, low-contrast against wall, slightly inset shadow
        ctx.fillStyle = "#252018";          // dark warm-grey, close to wall tone
        ctx.fillRect(light.x, light.y, 5, 9);
        // Subtle raised-edge highlight (top-left edge only — reads as slight depth)
        ctx.fillStyle = "#3a3228";
        ctx.fillRect(light.x, light.y, 5, 1); // top edge
        ctx.fillRect(light.x, light.y, 1, 9); // left edge
        // Toggle nub — 2×3px, centered on plate
        ctx.fillStyle = light.on ? "#8ab820" : "#3a1a1a"; // muted green / dark red
        ctx.fillRect(light.x + 1, light.y + 3, 2, 3);
      });


      // Doors — wood panel when closed, small swung stub when open
      doors.forEach(d => {
        const horiz = d.w > d.h; // horizontal wall door (wide rect) vs vertical wall door (tall rect)
        if (!d.open) {
          // Closed: full door panel in warm wood
          ctx.fillStyle = "#5a3a1a";
          ctx.fillRect(d.x, d.y, d.w, d.h);
          // Door knob hint
          ctx.fillStyle = "#8a6030";
          if (horiz) ctx.fillRect(d.x + d.w - 8, d.y + 2, 4, 4);
          else       ctx.fillRect(d.x + 2, d.y + d.h - 8, 4, 4);
        } else {
          // Open: thin panel stub swung against the wall on one side
          ctx.fillStyle = "#4a3018";
          if (horiz) ctx.fillRect(d.x, d.y - 8, 8, 10); // panel swung up
          else       ctx.fillRect(d.x - 8, d.y, 10, 8); // panel swung left
        }
      });

      // --- UV marks — fingerprint smudges; only visible when UV light overlaps them ---
      for (const m of uvMarks) {
        if (!markInUVCone(m.x, m.y)) continue;
        ctx.save();
        ctx.translate(m.x, m.y);
        // Outer glow
        const uvGlow = ctx.createRadialGradient(0, 0, 1, 0, 0, 9);
        uvGlow.addColorStop(0,   "rgba(180,80,255,0.55)");
        uvGlow.addColorStop(0.5, "rgba(140,40,220,0.25)");
        uvGlow.addColorStop(1,   "rgba(100,0,180,0)");
        ctx.fillStyle = uvGlow;
        ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI * 2); ctx.fill();
        // Fingerprint ridges (3 short arcs)
        ctx.strokeStyle = "rgba(200,120,255,0.80)";
        ctx.lineWidth = 0.8;
        for (let r = 1.5; r <= 3.5; r += 1) {
          ctx.beginPath(); ctx.arc(0, 0, r, -Math.PI * 0.6, Math.PI * 0.6); ctx.stroke();
        }
        // Palm smudge blobs
        ctx.fillStyle = "rgba(160,60,255,0.35)";
        ctx.beginPath(); ctx.ellipse(-1, 1, 2.5, 1.5, 0.4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse( 1,-1, 2.0, 1.2, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      // --- Floor textures (subtle, per room type) ---

      // Living room — faint horizontal wood strips
      ctx.fillStyle = "rgba(255,220,160,0.025)";
      for (let fy = 84; fy < 456; fy += 8) ctx.fillRect(364, fy, 192, 3);

      // Kitchen — small tile grid
      ctx.fillStyle = "rgba(180,220,200,0.04)";
      for (let fy = 244; fy < 396; fy += 10) ctx.fillRect(564, fy, 172, 1);
      for (let fx = 564; fx < 736; fx += 10) ctx.fillRect(fx, 244, 1, 152);

      // Bathrooms — tile grid (main bath + master bath)
      ctx.fillStyle = "rgba(160,200,220,0.05)";
      for (let fy = 284; fy < 376; fy += 8) ctx.fillRect(84, fy, 152, 1);
      for (let fx = 84; fx < 236; fx += 8) ctx.fillRect(fx, 284, 1, 92);
      for (let fy = 604; fy < 716; fy += 8) ctx.fillRect(84, fy, 152, 1);
      for (let fx = 84; fx < 236; fx += 8) ctx.fillRect(fx, 604, 1, 112);

      // Hallway — subtle lengthwise strips

        ctx.strokeStyle = rim; ctx.lineWidth = 1.5;
        ctx.strokeRect(-8, -5, 24, 10);
        // Lens ring
        ctx.beginPath(); ctx.arc(15, 0, 3.5, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
        // Direction arrow (world-space, points forward from preview)
        ctx.strokeStyle = placementPreview.valid ? "rgba(100,200,255,0.7)" : "rgba(255,100,100,0.6)";
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px + Math.cos(f) * 18, py + Math.sin(f) * 18);
        ctx.stroke();
        ctx.setLineDash([]);
        // "PLACE" / "NO SURFACE" label above preview (screen-stable — draw after restore)
      }

      // Held UV beam — world-space cone identical to placed UV Flashlight beam
      if (uvFlashlightOn && inventory[selectedSlot] === "UV Flashlight") {
        const cx = player.x + 8, cy = player.y + 8;
        const f = playerAngle;
        const coneLen = 100, halfA = Math.PI / 9;
        ctx.fillStyle = "rgba(160,60,255,0.18)";
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, coneLen, f - halfA, f + halfA);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = "rgba(200,100,255,0.45)";
        ctx.beginPath(); ctx.arc(cx + Math.cos(f)*8, cy + Math.sin(f)*8, 3, 0, Math.PI*2); ctx.fill();
      }

      // Player — top-down person sprite with walk animation
      const pcx = player.x + player.width  / 2;
      const pcy = player.y + player.height / 2;
      const legSwing  = isMoving ? Math.sin(walkCycle) * 4 : 0;
      const armSwing  = isMoving ? -Math.sin(walkCycle) * 3 : 0; // opposite legs

      ctx.save();
      ctx.translate(pcx, pcy);
      ctx.rotate(playerAngle - Math.PI / 2);

      // Shadow
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.beginPath(); ctx.ellipse(1, 2, 9, 5, 0, 0, Math.PI*2); ctx.fill();

      // Legs
      ctx.fillStyle = "#3a2818"; // trousers
      ctx.fillRect(-4, 3 + legSwing, 3, 6);
      ctx.fillRect( 1, 3 - legSwing, 3, 6);
      ctx.fillStyle = "#1a1008"; // shoes
      ctx.fillRect(-4, 8 + legSwing, 3, 2);
      ctx.fillRect( 1, 8 - legSwing, 3, 2);

      // Arms — right arm stiffens when holding an item
      const heldName = inventory[selectedSlot];
      const holdingItem = !!(heldName || hasLighter);
      const rightSwing = holdingItem ? 0 : armSwing;
      ctx.fillStyle = "#2e4060"; // jacket sleeves
      ctx.fillRect(-8, -1 + armSwing,  3, 6);
      ctx.fillRect( 5, -2 + rightSwing, 3, 6);
      ctx.fillStyle = "#d4a574"; // hands
      ctx.fillRect(-8, 4 + armSwing,   3, 2);
      ctx.fillRect( 5, 3 + rightSwing, 3, 2);

      // Body (jacket)
      ctx.fillStyle = "#2e4060";
      ctx.fillRect(-5, -5, 10, 9);
      ctx.fillStyle = "#3a5278"; ctx.fillRect(-5, -5, 10, 3); // shoulder highlight
      ctx.fillStyle = "#253450"; ctx.fillRect(-1, -5,  2, 9); // zipper stripe

      // Head
      ctx.fillStyle = "#d4a574";
      ctx.beginPath(); ctx.ellipse(0, -8, 4.5, 4, 0, 0, Math.PI*2); ctx.fill();
      // Hair (dark arc over top half of head)
      ctx.fillStyle = "#2a1808";
      ctx.beginPath(); ctx.ellipse(0, -10, 4.5, 2.5, 0, Math.PI, 0); ctx.fill();
      // Ears
      ctx.fillStyle = "#c49060";
      ctx.fillRect(-6, -9, 2, 3);
      ctx.fillRect( 4, -9, 2, 3);
      // Eyes
      ctx.fillStyle = "#1a0e06";
      ctx.fillRect(-2,   -9, 1.5, 1.5);
      ctx.fillRect( 0.5, -9, 1.5, 1.5);

      // Held item — drawn at right-hand position, scaled up for readability
      if (heldName) {
        ctx.save();
        ctx.translate(7, -3); // right hand position
        ctx.scale(0.65, 0.65); // in-world hand item ~half player size

        if (heldName === "Flashlight") {
          // Off: dark lens.  On: bright glowing lens + warm halo
          ctx.fillStyle = "#6a5008"; ctx.fillRect(-1.5, -5, 3, 8);   // grip
          ctx.fillStyle = "#c8a820"; ctx.fillRect(-2.5, -9, 5, 5);   // head (wider)
          ctx.fillStyle = "#5a4008"; ctx.fillRect(-1,-5,1,8); ctx.fillRect(0.5,-5,1,8); // grip ridges
          ctx.fillStyle = flashlightOn ? "#ffffa0" : "#4a3808";
          ctx.beginPath(); ctx.arc(0, -10.5, 2.5, 0, Math.PI*2); ctx.fill();          // lens
          if (flashlightOn) {
            ctx.fillStyle = "rgba(255,255,160,0.55)";
            ctx.beginPath(); ctx.arc(0, -10.5, 5, 0, Math.PI*2); ctx.fill();           // glow halo
            ctx.fillStyle = "rgba(255,255,200,0.25)";
            ctx.beginPath(); ctx.arc(0, -10.5, 8, 0, Math.PI*2); ctx.fill();           // outer glow
          }

        } else if (heldName === "UV Flashlight") {
          // Off: dim purple lens.  On: bright violet lens + purple glow
          ctx.fillStyle = "#3a1060"; ctx.fillRect(-1.5, -5, 3, 8);
          ctx.fillStyle = "#7030b0"; ctx.fillRect(-2.5, -9, 5, 5);
          ctx.fillStyle = uvFlashlightOn ? "#e0a0ff" : "#3a1860";
          ctx.beginPath(); ctx.arc(0, -10.5, 2.5, 0, Math.PI*2); ctx.fill();
          if (uvFlashlightOn) {
            ctx.fillStyle = "rgba(160,60,255,0.45)";
            ctx.beginPath(); ctx.arc(0, -10.5, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "rgba(140,40,255,0.18)";
            ctx.beginPath(); ctx.arc(0, -10.5, 8, 0, Math.PI*2); ctx.fill();
          }

        } else if (heldName === "Video Camera") {
          // Off: dark lens.  On (TODO: wire to held-state): blue lens + red REC dot
          const camOn = heldItemOn; // placeholder — full video camera logic TBD
          ctx.fillStyle = "#1a1a1a"; ctx.fillRect(-3.5, -3, 8, 9);   // body
          ctx.fillStyle = "#252525"; ctx.fillRect(-2.5, -8, 6, 6);   // lens section
          ctx.fillStyle = "#303030"; ctx.fillRect(-1, -9, 3, 2);     // viewfinder bump
          ctx.strokeStyle = "#606060"; ctx.lineWidth = 0.8;
          ctx.beginPath(); ctx.arc(0.5, -6, 3.5, 0, Math.PI*2); ctx.stroke();          // lens ring
          ctx.fillStyle = camOn ? "#60a0ff" : "#18256a";
          ctx.beginPath(); ctx.arc(0.5, -6, 2.5, 0, Math.PI*2); ctx.fill();
          if (camOn) { ctx.fillStyle="#ff2020"; ctx.beginPath(); ctx.arc(-2.5,3,2,0,Math.PI*2); ctx.fill(); }

        } else if (heldName === "EMF Reader") {
          ctx.fillStyle = "#2a5a80"; ctx.fillRect(-2, -9, 4, 13);    // body
          ctx.fillStyle = "#4a8ab0"; ctx.fillRect(-1.5,-8, 3, 10);   // face
          ctx.fillStyle = "#6aaad0"; ctx.fillRect(-0.5,-14, 1, 6);   // antenna
          ctx.fillStyle = "#e84040"; ctx.fillRect(-1.5,-5, 2, 2);    // power LED
          // EMF level bars — flash red at level 5
          for (let b = 0; b < 5; b++) {
            const lit = emfLevel > b;
            ctx.fillStyle = (lit && emfLevel === 5) ? "#ff2020" : lit ? "#40e840" : "#1a2a1a";
            ctx.fillRect(-1.5 + b * 0.8, 1 - b * 0.3, 0.7, 1.5 + b * 0.3);
          }

        } else if (heldName === "Spirit Box") {
          const sbListening = spiritBoxListenTimer > 0;
          const sbPulse = sbListening && Math.floor(Date.now() / 180) % 2 === 0;
          ctx.fillStyle = sbListening ? "#4a3a18" : "#3a3020"; ctx.fillRect(-5,-5,10,10);
          ctx.fillStyle = sbListening ? "#5a4a28" : "#4a4030"; ctx.fillRect(-4,-4,8,8);
          ctx.fillStyle = "#1a1410";
          for (let gr=-1;gr<=1;gr++) for(let gc=-1;gc<=1;gc++) ctx.fillRect(gc*2.5-1,gr*2.5-1,2,2);
          ctx.fillStyle = "#6a5030"; ctx.beginPath(); ctx.arc(-3,-3,3,0,Math.PI*2); ctx.fill();
          // tuner dial: cyan when listening, idle when not
          ctx.fillStyle = sbPulse ? "#80ffff" : sbListening ? "#40c0c0" : "#1a6060";
          ctx.beginPath(); ctx.arc(-3,-3,1.5,0,Math.PI*2); ctx.fill();

        } else if (heldName === "Sound Recorder") {
          // Off: dark mic.  On (TODO): green mic + red REC dot blinking
          const recOn = heldItemOn;     // on = device running
          const recActive = heldItemUsing; // true while R is held = actively recording
          // Body — red tint when actively recording
          ctx.fillStyle = recActive ? "#3a1010" : "#2a2a2a"; ctx.fillRect(-3,-7,7,12);
          ctx.fillStyle = recActive ? "#4a2020" : "#383838"; ctx.fillRect(-2,-6,5,10);
          ctx.fillStyle = "#1a1a1a"; ctx.fillRect(-2,-6,5,4);        // mic grille area
          // Mic dots: off=dark, on=green, recording=bright green
          ctx.fillStyle = recActive ? "#80ff80" : recOn ? "#50e050" : "#2a3a2a";
          for(let dm=-1;dm<=1;dm++){ctx.beginPath();ctx.arc(0.5,dm*2-4,1.2,0,Math.PI*2);ctx.fill();}
          // REC button: off=dark, on=dim red, recording=bright red
          ctx.fillStyle = recActive ? "#ff4040" : recOn ? "#c01010" : "#3a1818";
          ctx.beginPath(); ctx.arc(-0.5, 3, 2, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#1a1a50"; ctx.fillRect(-2, 1, 3, 2);      // playback bar

        } else if (heldName === "D.O.T.S. Projector") {
          // Off: dim LEDs.  On (TODO): magenta dot grid
          const dotsOn = heldItemOn;
          ctx.fillStyle = "#1a1a2a"; ctx.fillRect(-5,-4,11,8);
          ctx.fillStyle = "#2a2a3a"; ctx.fillRect(-4,-3,9,6);
          ctx.fillStyle = "#0a0a18"; ctx.fillRect(-6,-1,3,2);        // cable nub
          ctx.fillStyle = dotsOn ? "#202040" : "#14121e"; ctx.fillRect(3,-3,3,6);
          ctx.fillStyle = dotsOn ? "#e840e8" : "#3a1a3a";
          for(let dr=-1;dr<=1;dr++){ctx.beginPath();ctx.arc(4.5,dr*2,1.2,0,Math.PI*2);ctx.fill();}

        } else if (heldName === "Thermometer") {
          // Probe + live temp display
          const _rc = getVisibilityData().curRoom;
          const _ri = _rc ? rooms.indexOf(_rc) : -1;
          const _t  = thermometerReading;
          const _fr = _t <= 0;
          ctx.fillStyle = "#909090"; ctx.fillRect(-1,-12,3,14);      // probe shaft
          ctx.fillStyle = "#c0c0c0"; ctx.fillRect(-0.5,-11,2,12);
          ctx.fillStyle = _fr ? "#80ffff" : "#e0e0e0";
          ctx.beginPath(); ctx.arc(0.5,-12,2,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = _fr ? "#0a2030" : "#40e8e0"; ctx.fillRect(-1, 1,3,4);
          ctx.fillStyle = _fr ? "#80ffff" : "#40ffff"; ctx.font="2.5px monospace"; ctx.textAlign="center";
          ctx.fillText((_t>=0?"+":"")+_t.toFixed(0),0.5,3); ctx.textAlign="left";

        } else if (heldName === "Ghost Book") {
          // Open book in hand
          ctx.fillStyle = "#e8e0c8"; ctx.fillRect(-6,-6,6,11);       // left page
          ctx.fillStyle = "#f0e8d0"; ctx.fillRect(0,-6,6,11);        // right page
          ctx.fillStyle = "#8a6840"; ctx.fillRect(-1,-6,2,11);       // spine
          ctx.strokeStyle = "rgba(100,130,200,0.4)"; ctx.lineWidth=0.5;
          for(let rl=-4;rl<=4;rl+=2){
            ctx.beginPath();ctx.moveTo(-5,rl);ctx.lineTo(-1,rl);ctx.stroke();
            ctx.beginPath();ctx.moveTo(1,rl);ctx.lineTo(5,rl);ctx.stroke();
          }

        } else if (heldName === "Incense") {
          // Unlit: bare sticks.  Burning (TODO): ember tips + smoke
          const incenseOn = heldItemOn;
          ctx.fillStyle = "#6a4820"; ctx.fillRect(-3,2,7,5);         // holder base
          ctx.strokeStyle = "#c89040"; ctx.lineWidth=1.2;
          ctx.beginPath();ctx.moveTo(0,4);ctx.lineTo(-2,-8);ctx.stroke();
          ctx.beginPath();ctx.moveTo(1.5,4);ctx.lineTo(1.5,-8);ctx.stroke();
          ctx.beginPath();ctx.moveTo(3,4);ctx.lineTo(4.5,-8);ctx.stroke();
          if (incenseOn) {
            ctx.fillStyle="#e84000";
            ctx.beginPath();ctx.arc(-2,-8,2,0,Math.PI*2);ctx.fill();
            ctx.beginPath();ctx.arc(1.5,-8,2,0,Math.PI*2);ctx.fill();
            ctx.beginPath();ctx.arc(4.5,-8,2,0,Math.PI*2);ctx.fill();
          } else {
            ctx.fillStyle="#5a3818";ctx.fillRect(-2.5,-9,2,2);       // unlit tip marks
            ctx.fillRect(1,-9,2,2);ctx.fillRect(3.5,-9,2,2);
          }

        } else if (heldName === "Tripod") {
          // Folded tripod carried upright — taller than most items
          ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(-4,-14,9,20);
          // Center column (vertical)
          ctx.fillStyle = "#808070"; ctx.fillRect(-2,-13,5,14);
          ctx.fillStyle = "#a0a090"; ctx.fillRect(-1,-12,3,12);
          // Folded legs (crossed at bottom, slightly spread)
          ctx.strokeStyle = "#606050"; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(0,1); ctx.lineTo(-5,7); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(0,1); ctx.lineTo( 5,7); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(0,1); ctx.lineTo( 0,8); ctx.stroke();
          // Head mount (top)
          ctx.fillStyle = "#686858"; ctx.fillRect(-3,-14,7,4);
          ctx.fillStyle = "#909080"; ctx.fillRect(-2,-13,5,3);

        } else if (heldName === "Crucifix") {
          // Gold cross — no game state yet
          ctx.fillStyle = "#c89830"; ctx.fillRect(-2,-9,5,18);       // vertical bar
          ctx.fillStyle = "#e8b840"; ctx.fillRect(-1,-8,3,16);
          ctx.fillStyle = "#c89830"; ctx.fillRect(-8,-2,17,6);       // horizontal bar
          ctx.fillStyle = "#e8b840"; ctx.fillRect(-7,-1,15,4);
          ctx.fillStyle = "#fff0a0"; ctx.beginPath(); ctx.arc(0,0,2.5,0,Math.PI*2); ctx.fill();

        } else if (heldName === "Sanity Meds") {
          // Pill bottle — no consumed state yet
          ctx.fillStyle = "#e8e8e0"; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = "#d0d0c8"; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = "#e84020"; ctx.beginPath(); ctx.arc(0,-4,4,Math.PI,0); ctx.fill();  // cap
          ctx.fillStyle = "#c0c0b8"; ctx.fillRect(-5,-1,10,4);       // label band
          ctx.fillStyle = "#404040"; ctx.font="4px monospace"; ctx.textAlign="center";
          ctx.fillText("Rx",0,2.5); ctx.textAlign="left";

        } else {
          ctx.fillStyle = itemColors[heldName] || "#aaa"; ctx.fillRect(-3,-9,5,10);
        }
        ctx.restore();

      } else if (hasLighter) {
        ctx.save();
        ctx.translate(7, -3);
        ctx.scale(0.65, 0.65);
        ctx.fillStyle = "#c8a820"; ctx.fillRect(-2.5,-4,6,8);        // body
        ctx.fillStyle = "#e0c040"; ctx.fillRect(-1.5,-3,4,6);        // face sheen
        ctx.fillStyle = "#8a7010"; ctx.fillRect(-1,-6,4,2);          // flint wheel
        ctx.fillStyle = "#5a4808"; ctx.fillRect(0,-5,2,1);           // striker detail
        if (lighterLit) {
          ctx.fillStyle = "rgba(255,160,0,0.95)";
          ctx.beginPath(); ctx.arc(0.5,-9,3.5,0,Math.PI*2); ctx.fill();     // flame body
          ctx.fillStyle = "rgba(255,255,80,0.9)";
          ctx.beginPath(); ctx.arc(0.5,-11,1.8,0,Math.PI*2); ctx.fill();    // flame tip
          ctx.fillStyle = "rgba(255,200,40,0.3)";
          ctx.beginPath(); ctx.arc(0.5,-9,6,0,Math.PI*2); ctx.fill();       // glow halo
        }
        ctx.restore();
      }

      ctx.restore();

      // --- Held lighter glow: small warm orange radius around player ---
      if (hasLighter && selectedSlot >= inventory.length && lighterLit) {
        const lg = ctx.createRadialGradient(pcx, pcy, 0, pcx, pcy, 55);
        lg.addColorStop(0,   "rgba(255,130,0,0.22)");
        lg.addColorStop(0.5, "rgba(255,80,0,0.09)");
        lg.addColorStop(1,   "rgba(255,50,0,0)");
        ctx.fillStyle = lg;
        ctx.beginPath(); ctx.arc(pcx, pcy, 55, 0, Math.PI*2); ctx.fill();
      }

      // --- Ghost visibility: D.O.T.S. form only ---
      // Ghost is invisible by default. It becomes visible only when:
      //   1. dotsDisturbTimer > 0  (ghost is in a D.O.T.S. interaction state)
      //   2. ghost is inside the field cone of an active D.O.T.S. projector
      // The fog canvas still handles wall/room occlusion automatically.
      // When hunting is added later, add a second visibility path here.
      if (currentGhost && dotsDisturbTimer > 0) {
        const dotsProjector = getDotsProjectorAtGhost();
        // dots_camera_only (Goryo): ghost only appears through a held camera viewfinder, not directly.
        // Check: player must hold the Video Camera AND ghost must be within the 60° camera cone.
        const cameraOnly = currentGhost.specialRules?.includes("dots_camera_only");
        let dotsVisibleHere = true;
        if (cameraOnly) {
          const holdingCam = inventory[selectedSlot] === "Video Camera";
          const gdx = ghostX - (player.x + 8), gdy = ghostY - (player.y + 8);
          const gDiff = ((Math.atan2(gdy, gdx) - playerAngle) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
          dotsVisibleHere = holdingCam && Math.hypot(gdx, gdy) < 300 && Math.abs(gDiff) <= Math.PI / 6;
        }
        if (dotsProjector && dotsVisibleHere) {
          // Fade out in the last 1.5 seconds of the disturb window
          const alpha = Math.min(1, dotsDisturbTimer / 1.5);
          // Leg/arm swing — ghost keeps moving while visible
          const gLeg = (ghostPauseTimer <= 0) ? Math.sin(ghostWalkCycle * 1.8) * 4 : 0;
          const gArm = (ghostPauseTimer <= 0) ? -Math.sin(ghostWalkCycle * 1.8) * 3 : 0;
          // Flicker on the torso — quick green pulse driven by time
          const flicker = 0.5 + 0.5 * Math.sin(Date.now() / 80);

          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(ghostX, ghostY);
          ctx.rotate(ghostMoveAngle - Math.PI / 2);

          // Shadow
          ctx.fillStyle = "rgba(0,30,0,0.20)";
          ctx.beginPath(); ctx.ellipse(1, 2, 9, 5, 0, 0, Math.PI*2); ctx.fill();

          // Legs — green-black rotted cloth
          ctx.fillStyle = "#0a1808";
          ctx.fillRect(-4, 3 + gLeg, 3, 6);
          ctx.fillRect( 1, 3 - gLeg, 3, 6);
          ctx.fillStyle = "#2a4828"; // feet
          ctx.fillRect(-4, 8 + gLeg, 3, 2);
          ctx.fillRect( 1, 8 - gLeg, 3, 2);

          // Arms — dark forest green jacket sleeves
          ctx.fillStyle = "#0a2818";
          ctx.fillRect(-8, -1 + gArm, 3, 6);
          ctx.fillRect( 5, -2 - gArm, 3, 6);
          ctx.fillStyle = "#4a7850"; // hands — muted green-grey
          ctx.fillRect(-8, 4 + gArm, 3, 2);
          ctx.fillRect( 5, 3 - gArm, 3, 2);

          // Body — dark green jacket, same shape as normal ghost
          ctx.fillStyle = "#0a2818";
          ctx.fillRect(-5, -5, 10, 9);
          ctx.fillStyle = "#071410"; ctx.fillRect(-5, -5, 10, 3); // shoulders
          ctx.fillStyle = "#040e0a"; ctx.fillRect(-1, -5,  2, 9); // stripe
          // Green pulse dot instead of rot stain — flickers with the projector
          ctx.fillStyle = `rgba(40,255,80,${flicker * 0.45})`;
          ctx.beginPath(); ctx.arc(-1, -1, 2, 0, Math.PI*2); ctx.fill();

          // Head — green-tinted corpse pallor
          ctx.fillStyle = "#7ab888";
          ctx.beginPath(); ctx.ellipse(0, -8, 4.5, 4, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#0a0c04"; // hair
          ctx.beginPath(); ctx.ellipse(0, -10, 4.5, 2.5, 0, Math.PI, 0); ctx.fill();
          ctx.fillStyle = "#5a8868"; // ears
          ctx.fillRect(-6, -9, 2, 3);
          ctx.fillRect( 4, -9, 2, 3);

          // Eye sockets — same dark hollows, but green iris glow instead of grey-white
          ctx.fillStyle = "#020808";
          ctx.beginPath(); ctx.ellipse(-1.5, -8.5, 2.0, 1.5, 0, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse( 1.5, -8.5, 2.0, 1.5, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "rgba(40,255,80,0.85)"; // bright green — the D.O.T.S. tell
          ctx.beginPath(); ctx.arc(-1.5, -8.5, 0.7, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc( 1.5, -8.5, 0.7, 0, Math.PI*2); ctx.fill();

          // Sunken cheeks + forehead mark — greenish
          ctx.fillStyle = "rgba(5,20,5,0.55)";
          ctx.fillRect(-4, -7, 2, 2);
          ctx.fillRect( 2, -7, 2, 2);
          ctx.fillStyle = "#081a08";
          ctx.fillRect(-1, -11, 2, 1);

          // D.O.T.S. scan-line shimmer — thin horizontal green lines over the body
          ctx.fillStyle = "rgba(40,255,80,0.18)";
          for (let sy = -12; sy <= 10; sy += 3) {
            ctx.fillRect(-9, sy, 18, 1);
          }

          ctx.restore();
        }
      }

      // DEBUG: draw walkable rects and player collision rect
      if (DEBUG_COLLISION) {
        ctx.lineWidth = 2;

        // Room walkable rects — bright green outline (3px inset from drawn room)
        ctx.strokeStyle = "#00ff00";
        rooms.forEach(r => ctx.strokeRect(r.x+3, r.y+3, r.w-6, r.h-6));

        // Connector walkable rects — bright cyan, semi-filled so they stand out
        ctx.fillStyle = "rgba(0,255,255,0.25)";
        ctx.strokeStyle = "#00ffff";
        doorways.forEach(d => {
          ctx.fillRect(d.x, d.y, d.w, d.h);
          ctx.strokeRect(d.x, d.y, d.w, d.h);
        });

        // Player collision rect — thick bright red outline
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = "#ff2222";
        ctx.strokeRect(player.x, player.y, player.width, player.height);

        // Legend — top left (screen-fixed: drawn after restore)
      }

      // Ghost Orbs — drawn in world space BEFORE restore and BEFORE fog stamp.
      // The fog stamp handles occlusion (closed doors, dark rooms).
      // A cone clip restricts orbs to the camera FOV triangle (no orbs outside the viewfinder).
      if (gameRunning && inventory[selectedSlot] === "Video Camera" && ghostOrbs.length > 0) {
        const camHalf  = Math.PI / 6; // 30° = 60° total cone
        const camRange = 300;         // world pixels, same as camera fog system
        const cpx = player.x + 8, cpy = player.y + 8;
        ctx.save();
        // Clip 1: camera cone
        ctx.beginPath();
        ctx.moveTo(cpx, cpy);
        ctx.arc(cpx, cpy, camRange, playerAngle - camHalf, playerAngle + camHalf);
        ctx.closePath();
        ctx.clip();
        // Clip 2: visible rooms only (cone ∩ visible rooms) — respects closed doors
        const { curRoom: orbCurRoom, wedges: orbWedges } = getVisibilityData();
        if (orbCurRoom || orbWedges.length > 0) {
          ctx.beginPath();
          if (orbCurRoom) ctx.rect(orbCurRoom.x, orbCurRoom.y, orbCurRoom.w, orbCurRoom.h);
          orbWedges.forEach(({ room: wr }) => ctx.rect(wr.x, wr.y, wr.w, wr.h));
          ctx.clip();
        }
        // Draw each orb (already in world-space transform from outer ctx.save)
        ghostOrbs.forEach(orb => {
          const alpha = orb.flicker;
          const grd = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, 5);
          grd.addColorStop(0,   `rgba(200,220,255,${alpha})`);
          grd.addColorStop(0.5, `rgba(160,180,255,${alpha * 0.4})`);
          grd.addColorStop(1,   "rgba(120,140,255,0)");
          ctx.fillStyle = grd;
          ctx.beginPath(); ctx.arc(orb.x, orb.y, 5, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = "#ddeeff";
          ctx.beginPath(); ctx.arc(orb.x, orb.y, 1.5, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        });
        ctx.restore();
      }

      ctx.restore(); // end world transform — HUD below is screen-fixed

      const holdingCamera = gameRunning && inventory[selectedSlot] === "Video Camera";

      // --- Fog of war (always runs — camera overlay draws on top afterwards) ---
      // Fill fog canvas with darkness
      fogCtx.clearRect(0, 0, fogCanvas.width, fogCanvas.height);
      fogCtx.fillStyle = env.fogColor;
      fogCtx.fillRect(0, 0, fogCanvas.width, fogCanvas.height);

      // Switch to destination-out: drawing here ERASES the darkness (punches holes)
      fogCtx.globalCompositeOperation = "destination-out";
      fogCtx.fillStyle = "rgba(0,0,0,1)";
      fogCtx.save();
      fogCtx.translate(canvas.width / 2, canvas.height / 2);
      fogCtx.scale(ZOOM, ZOOM);
      fogCtx.translate(-(player.x + 8), -(player.y + 8)); // work in world coordinates

      const { curRoom, wedges } = getVisibilityData();
      const px = player.x + 8, py = player.y + 8;

      // Helper: erase flashlight cone clipped to a given room rect (regular flashlight only when held)
      const flashlightHeld = inventory[selectedSlot] === "Flashlight";
      function drawFlashlightInRoom(room) {
        if (!flashlightOn || !flashlightHeld) return;
        const halfAngle = Math.PI / 9; // 20° each side = 40° total
        fogCtx.save();
        fogCtx.beginPath();
        fogCtx.rect(room.x, room.y, room.w, room.h);
        fogCtx.clip();
        fogCtx.beginPath();
        fogCtx.moveTo(px, py);
        fogCtx.arc(px, py, 300, playerAngle - halfAngle, playerAngle + halfAngle);
        fogCtx.closePath();
        fogCtx.fill();
        fogCtx.restore();
      }

      // Helper: UV flashlight — weaker (range 180, partial erasure at 60% alpha) only when held
      const uvFlashlightHeld = inventory[selectedSlot] === "UV Flashlight";
      function drawUVFlashlightInRoom(room) {
        if (!uvFlashlightOn || !uvFlashlightHeld) return;
        const halfAngle = Math.PI / 9;
        fogCtx.save();
        fogCtx.beginPath();
        fogCtx.rect(room.x, room.y, room.w, room.h);
        fogCtx.clip();
        fogCtx.fillStyle = "rgba(0,0,0,0.55)"; // partial erasure — dimmer reveal than regular flashlight
        fogCtx.beginPath();
        fogCtx.moveTo(px, py);
        fogCtx.arc(px, py, 180, playerAngle - halfAngle, playerAngle + halfAngle);
        fogCtx.closePath();
        fogCtx.fill();
        fogCtx.fillStyle = "rgba(0,0,0,1)"; // restore full opacity for other draws
        fogCtx.restore();
      }

      // Helper: lighter held + lit — small warm radial clear (r=65) only when lighter is selected
      const lighterHeldAndLit = hasLighter && (selectedSlot >= inventory.length) && lighterLit;
      if (lighterHeldAndLit) {
        const lg = fogCtx.createRadialGradient(px, py, 0, px, py, 65);
        lg.addColorStop(0,   "rgba(0,0,0,0.80)"); // clear center
        lg.addColorStop(0.55,"rgba(0,0,0,0.40)"); // soft mid
        lg.addColorStop(1,   "rgba(0,0,0,0)");    // no clear at edge
        fogCtx.fillStyle = lg;
        fogCtx.beginPath(); fogCtx.arc(px, py, 65, 0, Math.PI*2); fogCtx.fill();
        fogCtx.fillStyle = "rgba(0,0,0,1)"; // restore
      }

      // Current room — fully visible if lit; flashlight only if dark
      if (curRoom) {
        const litIdx = rooms.indexOf(curRoom);
        const curLit = litIdx < roomLights.length ? roomLights[litIdx].on : true;
        if (curLit) fogCtx.fillRect(curRoom.x, curRoom.y, curRoom.w, curRoom.h);
        drawFlashlightInRoom(curRoom);   // regular flashlight cone in current room
        drawUVFlashlightInRoom(curRoom); // UV flashlight (weaker) in current room
      }

      // Open doorway wedges — geometric cone; skip if adjacent room is unlit (dark room)
      wedges.forEach(({ room, e1, e2 }) => {
        const adjIdx = rooms.indexOf(room);
        const adjLit = adjIdx < roomLights.length ? roomLights[adjIdx].on : true;

        if (adjLit) {
          // Room is lit — show full geometric wedge
          fogCtx.save();
          fogCtx.beginPath();
          fogCtx.rect(room.x, room.y, room.w, room.h);
          fogCtx.clip();
          const dist = 2000;
          const d1 = Math.hypot(e1.x - px, e1.y - py) || 1;
          const d2 = Math.hypot(e2.x - px, e2.y - py) || 1;
          fogCtx.beginPath();
          fogCtx.moveTo(px, py);
          fogCtx.lineTo(px + (e1.x-px)/d1*dist, py + (e1.y-py)/d1*dist);
          fogCtx.lineTo(px + (e2.x-px)/d2*dist, py + (e2.y-py)/d2*dist);
          fogCtx.closePath();
          fogCtx.fill();
          fogCtx.restore();
        }

        // Flashlights shine into adjacent room through doorway regardless of its light state
        drawFlashlightInRoom(room);
        drawUVFlashlightInRoom(room);
      });

      // Outside roof-reveal: soft fade circle matching the sight falloff style
      // Only when front door is CLOSED (open door shows interior through wedge instead)
      const frontDoor = doors.find(d => d.label === "Front Door");
      if (playerOutside && frontDoor && !frontDoor.open) {
        // Radial gradient: fully clear at center → transparent at edge (same feel as sight range)
        const roofGrad = fogCtx.createRadialGradient(px, py, 60, px, py, 200);
        roofGrad.addColorStop(0,   "rgba(0,0,0,1)");   // full clear at center
        roofGrad.addColorStop(0.6, "rgba(0,0,0,0.6)"); // partial fade
        roofGrad.addColorStop(1,   "rgba(0,0,0,0)");   // no clear at edge
        fogCtx.fillStyle = roofGrad;
        fogCtx.beginPath();
        fogCtx.arc(px, py, 200, 0, Math.PI * 2);
        fogCtx.fill();
      }

      fogCtx.restore();
      fogCtx.globalCompositeOperation = "source-over"; // reset composite mode

      // Sight range falloff — radial gradient in screen space; player is always at screen center
      const screenPX = canvas.width  / 2; // player is always centered
      const screenPY = canvas.height / 2;
      const sightGrad = fogCtx.createRadialGradient(screenPX, screenPY, 90 * ZOOM, screenPX, screenPY, 260 * ZOOM);
      sightGrad.addColorStop(0,   "rgba(0,0,0,0)");    // fully visible near player
      sightGrad.addColorStop(0.6, "rgba(0,0,0,0.3)");  // soft early fade
      sightGrad.addColorStop(1,   "rgba(0,0,0,0.94)"); // near-black at sight edge
      fogCtx.fillStyle = sightGrad;
      fogCtx.fillRect(0, 0, fogCanvas.width, fogCanvas.height);

      // Night-vision cone punch: when holding camera with NV on, clear extra fog inside 60° cone
      // so dark rooms become visible through the camera even though normal fog blocks them.
      if (holdingCamera && cameraNightVision) {
        _punchNVConeFog(fogCtx, canvas.width, canvas.height, ZOOM, player.x + 8, player.y + 8, playerAngle);
      }

      // Stamp the fog layer onto the main canvas
      ctx.drawImage(fogCanvas, 0, 0);
