          stamina = Math.min(STAMINA_MAX, stamina + STAMINA_RECHARGE_RATE * delta);
        }
      }
      const spd = player.speed * (isSprinting ? 1.3 : 1.0);
      if (!tarotOpen) { // block movement while tarot popup is open
        if (keys[keybinds.left]  || keys["ArrowLeft"])  dx = -spd;
        if (keys[keybinds.right] || keys["ArrowRight"]) dx =  spd;
        if (keys[keybinds.up]    || keys["ArrowUp"])    dy = -spd;
        if (keys[keybinds.down]  || keys["ArrowDown"])  dy =  spd;
      }

      // Mobile joystick: face joystick direction + walk forward in that direction.
      // Angle and magnitude are computed here so they're available for the facing update below.
      if (isMobile && mobileJoy.active) {
        const jdx = mobileJoy.curX - mobileJoy.baseX;
        const jdy = mobileJoy.curY - mobileJoy.baseY;
        const jLen = Math.hypot(jdx, jdy);
        const deadR = MOB.joy.deadR * mobJoyScale, maxR = MOB.joy.maxR * mobJoyScale;
        if (jLen > deadR) {
          mobileJoy.angle     = Math.atan2(jdy, jdx);
          mobileJoy.magnitude = Math.min((jLen - deadR) / (maxR - deadR), 1.0);
          // Smoothly rotate player to face joystick direction (25% per frame ≈ ~10 frames to full turn)
          let jAngleDiff = mobileJoy.angle - playerAngle;
          while (jAngleDiff >  Math.PI) jAngleDiff -= Math.PI * 2;
          while (jAngleDiff < -Math.PI) jAngleDiff += Math.PI * 2;
          playerAngle += jAngleDiff * 0.25;
          // Walk forward in the (now updated) facing direction
          dx = Math.cos(playerAngle) * spd * mobileJoy.magnitude;
          dy = Math.sin(playerAngle) * spd * mobileJoy.magnitude;
        } else {
          mobileJoy.magnitude = 0; // inside dead zone — no movement, no turn
        }
      }

      // ── Facing direction ──────────────────────────────────────────────────
      // Desktop: lerp toward mouse cursor each frame.
      // Mobile:  joystick block above handles facing when moving; look-drag handles it when
      //          standing still (via direct playerAngle += in touchmove). No mouse lerp on mobile
      //          — mouseX/mouseY are never updated on touch devices, which caused the spin-to-east bug.
      if (placementPreview.active) {
        const targetAngle = Math.atan2(mouseY - canvas.height / 2, mouseX - canvas.width / 2);
        playerAngle            = placementPreview.lockedPlayerAngle;
        placementPreview.angle = targetAngle;
      } else if (!isMobile) {
        const targetAngle = Math.atan2(mouseY - canvas.height / 2, mouseX - canvas.width / 2);
        let angleDiff = targetAngle - playerAngle;
        while (angleDiff >  Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        playerAngle += angleDiff * Math.min(1.0, sensitivity * 0.3);
      }

      // Move player — check walkable rects, allow wall sliding
      const nx = player.x + dx;
      const ny = player.y + dy;
      if      (canMoveTo(nx, ny))         { player.x = nx; player.y = ny; }
      else if (canMoveTo(nx, player.y))   { player.x = nx; }
      else if (canMoveTo(player.x, ny))   { player.y = ny; }
      isMoving = (dx !== 0 || dy !== 0);
      if (isMoving) walkCycle = (walkCycle + 0.12) % (Math.PI * 2);

      // Snap playerAngle to 4-directional facing for sprite selection
      {
        let a = playerAngle;
        while (a >  Math.PI) a -= Math.PI * 2;
        while (a < -Math.PI) a += Math.PI * 2;
        // Hysteresis: only switch direction when angle passes 10° beyond the boundary
        const D = 0.18; // ~10° deadzone on each boundary
        const newFacing =
          (a >= -(Math.PI/4+D) && a <  (Math.PI/4+D))  ? "right" :
          (a >=  (Math.PI/4-D) && a <  (3*Math.PI/4+D)) ? "down"  :
          (a >= -(3*Math.PI/4+D) && a < -(Math.PI/4-D)) ? "up"    : "left";
        if (newFacing !== playerFacing) {
          // Only commit the change if the new direction's core zone is clearly entered
          const core = Math.PI/4;
          const inCore =
            (newFacing === "right" && (a >= -core && a < core)) ||
            (newFacing === "down"  && (a >= core  && a < Math.PI - core)) ||
            (newFacing === "up"    && (a >= -(Math.PI - core) && a < -core)) ||
            (newFacing === "left"  && (a < -(Math.PI - core) || a >= Math.PI - core));
          if (inCore) playerFacing = newFacing;
        }
      }

      // Update rain particles (scroll down + slight right drift; wrap around)
      if (ENV[envModes[envModeIdx]].rain) {
        const camX2 = player.x - canvas.width  / 2;
        const camY2 = player.y - canvas.height / 2;
        rainDrops.forEach(d => {
          d.x += 1;
          d.y += d.speed;
          if (d.y - camY2 > canvas.height + 20) { d.y = camY2 - 10; d.x = camX2 + Math.random() * canvas.width; }
          if (d.x - camX2 > canvas.width  + 20) { d.x = camX2 - 10; }
        });
      }

      // (Round ends via van keypad "Leave Site" button — not the exit zone)
    }

    // --- HUD item icon helper ---
    // Draws a small recognizable icon for the given item at (0,0), sized to fit ~±11px.
    // Caller: translate to center, scale if needed, clip to circle first.
    function _drawHUDIcon(c, name) {
      switch (name) {
        case "Flashlight":
          c.fillStyle = "#8a7010"; c.fillRect(-9,-3,16,6);
          c.fillStyle = "#c8a820"; c.fillRect(5,-4,6,8);
          c.fillStyle = "#ffffa0"; c.beginPath(); c.arc(10,0,3,0,Math.PI*2); c.fill();
          break;
        case "UV Flashlight":
          c.fillStyle = "#5a5a20"; c.fillRect(-9,-3,16,6);
          c.fillStyle = "#a0a040"; c.fillRect(4,-5,7,10);
          c.fillStyle = "rgba(160,160,255,0.7)"; c.beginPath(); c.arc(9,0,4,0,Math.PI*2); c.fill();
          c.fillStyle = "#d0d0ff"; c.fillRect(5,-3,5,6);
          break;
        case "EMF Reader":
          c.fillStyle = "#2a5a80"; c.fillRect(-7,-5,14,10);
          c.fillStyle = "#4a8ab0"; c.fillRect(-5,-4,10,8);
          c.fillStyle = "#6aaad0"; c.fillRect(-1,-10,3,6);
          c.fillStyle = "#e84040"; c.fillRect(-4,-1,3,3);
          c.fillStyle = "#40e840"; c.fillRect(0,-1,3,3);
          break;
        case "Spirit Box":
          c.fillStyle = "#3a3020"; c.fillRect(-7,-6,14,12);
          c.fillStyle = "#5a4a30"; c.fillRect(-5,-4,10,6);
          c.fillStyle = "#1a1410";
          for (let r=0;r<2;r++) for (let cc=0;cc<3;cc++) c.fillRect(-4+cc*3,-3+r*3,2,2);
          c.fillStyle = "#e84020"; c.fillRect(-5,3,4,3);
          break;
        case "Ghost Book":
          c.fillStyle = "#e8e0c8"; c.fillRect(-8,-7,7,14);
          c.fillStyle = "#f0e8d0"; c.fillRect(-1,-7,8,14);
          c.fillStyle = "#8a6840"; c.fillRect(-2,-7,2,14);
          c.strokeStyle="rgba(100,130,200,0.4)"; c.lineWidth=0.6;
          for(let l=-5;l<=5;l+=3){c.beginPath();c.moveTo(-7,l);c.lineTo(-2,l);c.stroke();}
          break;
        case "Video Camera":
          c.fillStyle = "#1a1a1a"; c.fillRect(-8,-5,16,10);
          c.fillStyle = "#0a0a14"; c.beginPath(); c.arc(-2,0,4,0,Math.PI*2); c.fill();
          c.fillStyle = "#1a1a40"; c.beginPath(); c.arc(-2,0,2,0,Math.PI*2); c.fill();
          c.fillStyle = "#e84040"; c.fillRect(5,-4,3,3);
          break;
        case "Thermometer":
          c.fillStyle = "#909090"; c.fillRect(-1,-11,3,16);
          c.fillStyle = "#c0c0c0"; c.fillRect(-0.5,-10,2,13);
          c.fillStyle = "#e03030"; c.beginPath(); c.arc(0.5,6,3,0,Math.PI*2); c.fill();
          c.fillStyle = "#e05050"; c.beginPath(); c.arc(0,5,1.5,0,Math.PI*2); c.fill();
          break;
        case "Sound Recorder":
          c.fillStyle = "#2a2a2a"; c.fillRect(-6,-8,12,16);
          c.fillStyle = "#404040"; c.fillRect(-4,-6,8,10);
          c.fillStyle = "#1a1a1a";
          for(let r=0;r<2;r++) for(let cc=0;cc<2;cc++) c.fillRect(-3+cc*4,-5+r*4,3,3);
          c.fillStyle = "#e84040"; c.fillRect(-4,5,4,3);
          break;
        case "D.O.T.S. Projector":
          c.fillStyle = "#1a1a2a"; c.fillRect(-9,-4,18,8);
          c.fillStyle = "#e840e8";
          for(let r=0;r<2;r++) for(let cc=0;cc<4;cc++) c.fillRect(-7+cc*4,-2+r*4,2,2);
          c.fillStyle = "#6040c0"; c.fillRect(-9,4,18,3);
          break;
        case "Tripod":
          c.strokeStyle="#606050"; c.lineWidth=2;
          c.beginPath(); c.moveTo(0,8); c.lineTo(0,-8); c.stroke();
          c.beginPath(); c.moveTo(0,8); c.lineTo(-9,11); c.stroke();
          c.beginPath(); c.moveTo(0,8); c.lineTo( 9,11); c.stroke();
          c.fillStyle="#909080"; c.beginPath(); c.arc(0,-4,3,0,Math.PI*2); c.fill();
          break;
        case "Sanity Meds":
          c.fillStyle="#e8e8e0"; c.beginPath(); c.arc(0,2,7,0,Math.PI*2); c.fill();
          c.fillStyle="#e84020"; c.beginPath(); c.arc(0,-2,4.5,Math.PI,0); c.fill();
          c.fillStyle="#4080c0"; c.fillRect(-5,0,10,5);
          c.fillStyle="#fff"; c.fillRect(-1,-1,2,6); c.fillRect(-3,1,6,2);
          break;
        case "Lighter":
          c.fillStyle="#c8a020"; c.fillRect(-5,-6,10,12);
          c.fillStyle="#e0b830"; c.fillRect(-4,-5,8,10);
          c.fillStyle="#8a6e10"; c.fillRect(-5,-8,10,3);
          c.fillStyle="rgba(255,160,20,0.85)"; c.beginPath(); c.arc(0,-11,4,0,Math.PI*2); c.fill();
          c.fillStyle="rgba(255,240,80,0.8)"; c.beginPath(); c.arc(0,-13,2,0,Math.PI*2); c.fill();
          break;
        case "Firelight":
          c.fillStyle="#6a4820"; c.fillRect(-4,4,8,6);
          c.strokeStyle="#c89040"; c.lineWidth=1.2;
          c.beginPath(); c.moveTo(0,4); c.lineTo(-2,-7); c.stroke();
          c.beginPath(); c.moveTo(0,4); c.lineTo(2,-7); c.stroke();
          c.fillStyle="rgba(255,160,20,0.85)"; c.beginPath(); c.arc(0,-9,3,0,Math.PI*2); c.fill();
          break;
        case "Incense":
          c.fillStyle="#6a4828"; c.fillRect(-5,6,10,5);
          c.strokeStyle="#c89040"; c.lineWidth=1;
          c.beginPath(); c.moveTo(0,6); c.lineTo(-2,-9); c.stroke();
          c.beginPath(); c.moveTo(0,6); c.lineTo(2,-9); c.stroke();
          c.fillStyle="#e84000"; c.beginPath(); c.arc(-2,-9,1.5,0,Math.PI*2); c.fill();
          c.beginPath(); c.arc(2,-9,1.5,0,Math.PI*2); c.fill();
          break;
        case "Crucifix":
          c.fillStyle="#c89830"; c.fillRect(-2,-10,5,20); c.fillRect(-9,-2,18,5);
          c.fillStyle="#e8b840"; c.fillRect(-1,-9,3,18); c.fillRect(-8,-1,16,3);
          break;
        case "Photo Camera":
          c.fillStyle="#303030"; c.fillRect(-9,-6,18,12);
          c.fillStyle="#0a0a14"; c.beginPath(); c.arc(0,0,5,0,Math.PI*2); c.fill();
          c.fillStyle="#1a1a40"; c.beginPath(); c.arc(0,0,3,0,Math.PI*2); c.fill();
          c.fillStyle="#e84040"; c.fillRect(5,-5,3,3);
          break;
        case "Music Box":
          c.fillStyle="#6a3060"; c.fillRect(-8,-5,14,10);
          c.fillStyle="#8a4080"; c.fillRect(-7,-4,11,7);
          c.fillStyle="#c080a0"; c.fillRect(-7,-5,11,2);
          c.fillStyle="#d0a830"; c.fillRect(5,-1,4,2);
          c.fillStyle="#e8c040"; c.beginPath(); c.arc(9,0,2.5,0,Math.PI*2); c.fill();
          break;
        case "Ouija Board":
          c.fillStyle="#7a5820"; c.fillRect(-9,-6,18,12);
          c.fillStyle="#9a7030"; c.fillRect(-8,-5,16,10);
          c.strokeStyle="#c8a060"; c.lineWidth=0.6;
          c.beginPath(); c.arc(0,-1,5,Math.PI,0); c.stroke();
          c.fillStyle="#c8a060"; c.font="2.5px monospace"; c.textAlign="center";
          c.fillText("YES",-4,4); c.fillText("NO",4,4); c.textAlign="left";
          c.fillStyle="#e8c880"; c.beginPath(); c.moveTo(0,-5); c.lineTo(-2,0); c.lineTo(2,0); c.closePath(); c.fill();
          break;
        case "Voodoo Doll":
          c.fillStyle="#8a6850"; c.fillRect(-4,-10,8,16);
          c.fillStyle="#a07860"; c.fillRect(-3,-9,6,14);
          c.fillStyle="#8a6850"; c.beginPath(); c.arc(0,-12,4,0,Math.PI*2); c.fill();
          c.fillStyle="#a07860"; c.beginPath(); c.arc(0,-12,3,0,Math.PI*2); c.fill();
          c.strokeStyle="#c0c0c0"; c.lineWidth=0.8;
          c.beginPath(); c.moveTo(5,-2); c.lineTo(10,-2); c.stroke();
          c.fillStyle="#e0e0e0"; c.beginPath(); c.arc(10,-2,1.5,0,Math.PI*2); c.fill();
          break;
        case "Haunted Mirror":
          c.fillStyle="#4a5060"; c.beginPath(); c.ellipse(0,0,7,9,0,0,Math.PI*2); c.fill();
          c.fillStyle="#141218"; c.beginPath(); c.ellipse(0,0,5,7,0,0,Math.PI*2); c.fill();
          c.fillStyle="rgba(150,180,255,0.22)"; c.beginPath(); c.ellipse(-0.5,-0.5,3,5,0,0,Math.PI*2); c.fill();
          c.fillStyle="rgba(220,230,255,0.18)"; c.fillRect(-1,-6,2,12);
          break;
        case "Summoning Circle":
          c.strokeStyle="#c0b8a0"; c.lineWidth=1;
          c.beginPath(); c.arc(0,0,9,0,Math.PI*2); c.stroke();
          c.beginPath(); c.arc(0,0,6,0,Math.PI*2); c.stroke();
          c.strokeStyle="#a09080"; c.lineWidth=0.7;
          for(let p=0;p<5;p++){
            const a1=(p*2-.5)*Math.PI/2.5, a2=((p+2)*2-.5)*Math.PI/2.5;
            c.beginPath(); c.moveTo(Math.cos(a1)*6,Math.sin(a1)*6);
            c.lineTo(Math.cos(a2)*6,Math.sin(a2)*6); c.stroke();
          }
          c.fillStyle="rgba(180,20,20,0.65)"; c.beginPath(); c.arc(0,0,2,0,Math.PI*2); c.fill();
          break;
        case "Monkey Paw":
          c.fillStyle="#5a3820"; c.fillRect(-4,-6,8,12);
          c.fillStyle="#7a5030"; c.fillRect(-3,-5,6,10);
          c.strokeStyle="#5a3820"; c.lineWidth=1.8; c.lineCap="round";
          c.beginPath(); c.moveTo(-2,-5); c.quadraticCurveTo(-5,-9,-3,-11); c.stroke();
          c.beginPath(); c.moveTo(0,-5); c.quadraticCurveTo(0,-10,2,-11); c.stroke();
          c.beginPath(); c.moveTo(3,-5); c.quadraticCurveTo(6,-8,4,-11); c.stroke();
          c.lineCap="butt";
          c.fillStyle="#c0a070";
          c.beginPath(); c.arc(-3,-11,1.2,0,Math.PI*2); c.fill();
          c.beginPath(); c.arc(2,-11,1.2,0,Math.PI*2); c.fill();
          break;
        case "Tarot Cards":
          c.save(); c.rotate(-0.18);
          c.fillStyle="#2a1840"; c.fillRect(-5,-9,10,14);
          c.fillStyle="#7850a0"; c.fillRect(-4,-8,8,12);
          c.restore(); c.save(); c.rotate(0.1);
          c.fillStyle="#2a1840"; c.fillRect(-5,-9,10,14);
          c.fillStyle="#7850a0"; c.fillRect(-4,-8,8,12);
          c.fillStyle="#f0e0ff"; c.fillRect(-3,-7,6,10);
          c.fillStyle="#9060c0"; c.font="6px serif"; c.textAlign="center";
          c.fillText("★",0,1); c.textAlign="left";
          c.restore();
          break;
        default:
          c.fillStyle = itemColors[name] || "#888";
          c.beginPath(); c.arc(0,0,8,0,Math.PI*2); c.fill();
      }
    }

    // --- Draw ---
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Background (walls/void) — color depends on environment mode
      const mode = envModes[envModeIdx];
      const env  = ENV[mode];
      ctx.fillStyle = env.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Camera: offset so the player appears centered on screen
      const camX = player.x - canvas.width  / 2;
      const camY = player.y - canvas.height / 2;
      const ZOOM = gameZoom; // gameplay zoom — controlled by +/- keys

      // Everything between save/restore is drawn in world coordinates (with zoom)
      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.scale(ZOOM, ZOOM);
      ctx.translate(-(player.x + 8), -(player.y + 8));

      // Walls — drawn under rooms; mark interior wall positions
      ctx.fillStyle = "#2a1f14"; // warm charcoal-brown walls
      walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

      // Room floors
      rooms.forEach(r => {
        ctx.fillStyle = r.color;
        ctx.fillRect(r.x, r.y, r.w, r.h);
      });

      // Room light overlay — darken rooms whose light is off
      roomLights.forEach((light, i) => {
        if (!light.on) {
          ctx.fillStyle = "rgba(0,0,0,0.80)";
          ctx.fillRect(rooms[i].x, rooms[i].y, rooms[i].w, rooms[i].h);
        }
      });

      // Light switch indicators — near-flush wall plate, minimal visual footprint
      // Visual drawn +1px toward the wall vs the hitbox (light.x) so it reads as inset.
      roomLights.forEach(light => {
        // East-wall: push right so plate right-edge is flush with wall inner face
        // West-wall: keep as-is (plate left-edge already 3px from wall inner face)
        const vx = light.side === "west" ? light.x : light.x + 3;
        // Mounting plate: 4×7px, very close to wall tone
        ctx.fillStyle = "#221e16";
        ctx.fillRect(vx, light.y, 4, 7);
        // Single-pixel top-edge hint only — just enough to suggest slight thickness
        ctx.fillStyle = "#332e22";
        ctx.fillRect(vx, light.y, 4, 1);
        // Toggle indicator — 2×2px dot, centered
        ctx.fillStyle = light.on ? "#7aaa18" : "#321414";
        ctx.fillRect(vx + 1, light.y + 2, 2, 2);
      });


      // Doors — wood panel when closed, small swung stub when open
      doors.forEach(d => {
        const horiz = d.w > d.h; // horizontal wall door (wide rect) vs vertical wall door (tall rect)
        if (!d.open) {
          // Closed: full door panel in warm wood
          ctx.fillStyle = "#5a3a1a";
          ctx.fillRect(d.x, d.y, d.w, d.h);
          // Door knob hint
          ctx.fillStyle = "#8a6030";
          if (horiz) ctx.fillRect(d.x + d.w - 8, d.y + 2, 4, 4);
          else       ctx.fillRect(d.x + 2, d.y + d.h - 8, 4, 4);
        } else {
          // Open: thin panel stub swung against the wall on one side
          ctx.fillStyle = "#4a3018";
          if (horiz) ctx.fillRect(d.x, d.y - 8, 8, 10); // panel swung up
          else       ctx.fillRect(d.x - 8, d.y, 10, 8); // panel swung left
        }
      });

      // --- UV marks — fingerprint smudges; only visible when UV light overlaps them ---
      for (const m of uvMarks) {
        if (!markInUVCone(m.x, m.y)) continue;
        ctx.save();
        ctx.translate(m.x, m.y);
        // Outer glow
        const uvGlow = ctx.createRadialGradient(0, 0, 1, 0, 0, 9);
        uvGlow.addColorStop(0,   "rgba(180,80,255,0.55)");
        uvGlow.addColorStop(0.5, "rgba(140,40,220,0.25)");
        uvGlow.addColorStop(1,   "rgba(100,0,180,0)");
        ctx.fillStyle = uvGlow;
        ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI * 2); ctx.fill();
        // Fingerprint ridges (3 short arcs)
        ctx.strokeStyle = "rgba(200,120,255,0.80)";
        ctx.lineWidth = 0.8;
        for (let r = 1.5; r <= 3.5; r += 1) {
          ctx.beginPath(); ctx.arc(0, 0, r, -Math.PI * 0.6, Math.PI * 0.6); ctx.stroke();
        }
        // Palm smudge blobs
        ctx.fillStyle = "rgba(160,60,255,0.35)";
        ctx.beginPath(); ctx.ellipse(-1, 1, 2.5, 1.5, 0.4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse( 1,-1, 2.0, 1.2, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      // --- Floor textures (subtle, per room type) ---

      // Living room — faint horizontal wood strips
      ctx.fillStyle = "rgba(255,220,160,0.025)";
      for (let fy = 84; fy < 456; fy += 8) ctx.fillRect(364, fy, 192, 3);

      // Kitchen — small tile grid
      ctx.fillStyle = "rgba(180,220,200,0.04)";
      for (let fy = 244; fy < 396; fy += 10) ctx.fillRect(564, fy, 172, 1);
      for (let fx = 564; fx < 736; fx += 10) ctx.fillRect(fx, 244, 1, 152);

      // Bathrooms — tile grid (main bath + master bath)
      ctx.fillStyle = "rgba(160,200,220,0.05)";
      for (let fy = 284; fy < 376; fy += 8) ctx.fillRect(84, fy, 152, 1);
      for (let fx = 84; fx < 236; fx += 8) ctx.fillRect(fx, 284, 1, 92);
      for (let fy = 604; fy < 716; fy += 8) ctx.fillRect(84, fy, 152, 1);
      for (let fx = 84; fx < 236; fx += 8) ctx.fillRect(fx, 604, 1, 112);

      // Hallway — subtle lengthwise strips
      ctx.fillStyle = "rgba(255,255,255,0.015)";
      ctx.fillRect(308, 84, 4, 512);
      ctx.fillRect(344, 84, 4, 512);

      // --- Wall edge shading (light from NW — highlight north/west, shadow south/east) ---
      for (let i = 0; i < rooms.length - 1; i++) { // skip Yard (last room)
        const r = rooms[i];
        ctx.fillStyle = "rgba(255,255,255,0.06)"; // north highlight
        ctx.fillRect(r.x, r.y, r.w, 4);
        ctx.fillStyle = "rgba(255,255,255,0.04)"; // west highlight
        ctx.fillRect(r.x, r.y, 4, r.h);
        ctx.fillStyle = "rgba(0,0,0,0.28)"; // south shadow
        ctx.fillRect(r.x, r.y + r.h - 4, r.w, 4);
        ctx.fillStyle = "rgba(0,0,0,0.18)"; // east shadow
        ctx.fillRect(r.x + r.w - 4, r.y, 4, r.h);
      }


      // Roof + exterior walls — only visible when player is outside
      const playerOutside = player.y + 8 > 720;
      if (playerOutside) {

        // ── EXTERIOR WALL FACES (south + east — the sides facing the yard) ──────
        // South wall face (visible from yard — gives house height/depth)
        ctx.fillStyle = "#3a3028"; // stucco/siding
        ctx.fillRect(60, 720, 700, 20);
        // Brick rows on south face
        ctx.fillStyle = "#2e2418";
        for (let bx = 65; bx < 756; bx += 22) {
          ctx.fillRect(bx, 722, 19, 7);
          ctx.fillRect(bx + 11, 730, 19, 7);
        }
        // Top shadow (eave overhangs wall — casts shadow)
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(60, 720, 700, 5);
        // Bottom edge of wall face
        ctx.fillStyle = "#1c1610";
        ctx.fillRect(60, 738, 700, 2);

        // East wall face
        ctx.fillStyle = "#342e24";
        ctx.fillRect(740, 60, 20, 680);
        ctx.fillStyle = "rgba(0,0,0,0.45)"; // shadow (left side of east face)
        ctx.fillRect(740, 60, 5, 680);

        // ── ROOF BODY ────────────────────────────────────────────────────────────
        // Base fill (covers full house outer boundary)
        ctx.fillStyle = "#191510";
        ctx.fillRect(60, 60, 700, 660);

        // West residential wing — slightly warmer tone
        ctx.fillStyle = "#1f1b12";
        ctx.fillRect(60, 60, 302, 662);
        // East living/dining/kitchen wing
        ctx.fillStyle = "#1c1910";
        ctx.fillRect(360, 60, 382, 502);
        // Garage + utility section (lower, flatter)
        ctx.fillStyle = "#181410";
        ctx.fillRect(556, 496, 208, 226);
        // Foyer / south porch section
        ctx.fillStyle = "#1a1810";
        ctx.fillRect(296, 596, 268, 126);

        // South-slope tint (subtle lighter wash — south face catches ambient sky)
        ctx.fillStyle = "rgba(60,50,30,0.18)";
        ctx.fillRect(60, 390, 700, 330);

        // ── SHINGLE TEXTURE (horizontal rows) ───────────────────────────────────
        ctx.fillStyle = "rgba(0,0,0,0.16)";
        for (let sy = 62; sy < 716; sy += 6) ctx.fillRect(60,  sy, 302, 2); // west wing
        for (let sy = 62; sy < 497; sy += 6) ctx.fillRect(360, sy, 382, 2); // east wing
        for (let sy = 498; sy < 716; sy += 6) ctx.fillRect(556, sy, 208, 2); // garage
        for (let sy = 598; sy < 716; sy += 6) ctx.fillRect(296, sy, 268, 2); // foyer

        // ── RIDGE LINES (roof peak — raised, slightly brighter) ─────────────────
        // West wing: N-S ridge down center (~x:220)
        ctx.fillStyle = "#38300e";
        ctx.fillRect(216, 60, 10, 662);
        ctx.fillStyle = "rgba(255,245,200,0.1)";
        ctx.fillRect(217, 60, 3, 662);

        // East wing: E-W ridge (~y:282, center of living room height)
        ctx.fillStyle = "#363020";
        ctx.fillRect(360, 278, 382, 9);
        ctx.fillStyle = "rgba(255,245,200,0.08)";
        ctx.fillRect(360, 279, 382, 3);

        // Garage: E-W ridge
        ctx.fillStyle = "#2e2818";
        ctx.fillRect(556, 600, 208, 7);
        ctx.fillStyle = "rgba(255,245,200,0.06)";
        ctx.fillRect(556, 601, 208, 2);

        // ── ROOF VALLEYS (where sections meet — dark crease) ────────────────────
        ctx.fillStyle = "#0c0a06";
        ctx.fillRect(355, 60,  7, 502);  // west/east wing valley
        ctx.fillRect(553, 492, 7, 230);  // east-wing/garage vertical valley
        ctx.fillRect(553, 492, 215, 7);  // garage horizontal valley
        ctx.fillRect(293, 592, 7, 130);  // foyer NW valley
        ctx.fillRect(556, 592, 7, 130);  // foyer NE valley

        // ── EAVES + FASCIA (roof edge trim boards) ───────────────────────────────
        // North eave fascia
        ctx.fillStyle = "#4a4032";
        ctx.fillRect(60, 60, 700, 7);
        // West eave fascia
        ctx.fillRect(60, 60, 7, 660);
        // South eave fascia (overhangs south wall)
        ctx.fillRect(60, 714, 700, 7);
        // East eave fascia
        ctx.fillRect(734, 60, 7, 660);
        // Eave top highlights (NW light)
        ctx.fillStyle = "rgba(255,250,220,0.1)";
        ctx.fillRect(60, 60, 700, 2);
        ctx.fillRect(60, 60, 2, 660);
        // South/east eave underside shadow (dropped onto wall face)
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(60, 721, 700, 4);
        ctx.fillRect(741, 60, 4, 660);

        // ── GUTTERS (thin metal trim at eave bottoms) ────────────────────────────
        ctx.fillStyle = "#5a5040";
        ctx.fillRect(60,  60, 700, 2); // north gutter
        ctx.fillRect(60,  60, 2,  660); // west gutter
        ctx.fillRect(60, 719, 700, 2); // south gutter
        ctx.fillRect(738, 60, 2,  660); // east gutter

        // ── CHIMNEY ──────────────────────────────────────────────────────────────
        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(702, 100, 30, 26);
        // Chimney body
        ctx.fillStyle = "#4a3830";
        ctx.fillRect(698, 94, 28, 24);
        // Top face (lighter — sky-lit)
        ctx.fillStyle = "#5e4c40";
        ctx.fillRect(700, 94, 24, 16);
        // Brick mortar lines
        ctx.fillStyle = "#2e2018";
        for (let mr = 0; mr < 3; mr++) ctx.fillRect(700, 99 + mr * 5, 24, 2); // horiz
        for (let mc = 0; mc < 4; mc++) ctx.fillRect(703 + mc * 6, 94, 2, 16); // vert
        // Chimney cap (overhanging slab)
        ctx.fillStyle = "#2a2016";
        ctx.fillRect(697, 90, 30, 6);
        ctx.fillStyle = "rgba(255,255,200,0.08)";
        ctx.fillRect(697, 90, 30, 2);
      }

      // Outside zones — drawn over the Outside room rect for visual distinction
      ctx.fillStyle = "#18281a"; // grass — natural dark green
      ctx.fillRect(60, 720, 310, 160);
      ctx.fillStyle = "#18281a"; // grass right strip
      ctx.fillRect(440, 720, 120, 160);
      ctx.fillStyle = "#302e28"; // walkway — concrete gray-tan
      ctx.fillRect(370, 720, 70, 160);
      ctx.fillStyle = "#242220"; // driveway — warm asphalt
      ctx.fillRect(560, 720, 180, 160);

      // Night darkness overlay — outside feels dark; alpha depends on environment mode
      if (env.outsideAlpha > 0) {
        ctx.fillStyle = `rgba(0,0,0,${env.outsideAlpha})`;
        ctx.fillRect(60, 720, 700, 262);
      }

      // Non-directional mode tint (blood moon / rain) — outside + roof only, not interior rooms
      if (env.tint) {
        ctx.fillStyle = env.tint;
        ctx.fillRect(60, 720, 700, 262);
        if (playerOutside) ctx.fillRect(60, 60, 700, 660);
      }

      // Directional sunlight — outside wash + cone spills through open doors only
      // Closed door = zero leak; open door = radial pool fading from the threshold inward
      if (mode === "sunrise" || mode === "sunset") {
        const lightX  = mode === "sunrise" ? 740 : 60;
        const shadowX = mode === "sunrise" ? 60  : 740;
        const r = mode === "sunrise" ? "255,140,40" : "200,55,5";

        // Outside area — warm directional wash; fog blocks it from reaching interiors
        const og = ctx.createLinearGradient(lightX, 0, shadowX, 0);
        og.addColorStop(0,   `rgba(${r},0.36)`);
        og.addColorStop(0.5, `rgba(${r},0.15)`);
        og.addColorStop(1,    "rgba(0,0,0,0)");
        ctx.fillStyle = og;
        ctx.fillRect(60, 720, 700, 262);

        // Foyer — only when front door is open; radial spill from the door threshold
        const fDoor = doors.find(d => d.label === "Front Door");
        if (fDoor && fDoor.open) {
          // Gradient center = front door threshold (x:400, y:720); fades to nothing at 90px
          const fg = ctx.createRadialGradient(400, 720, 0, 400, 720, 90);
          fg.addColorStop(0,   `rgba(${r},0.12)`);
          fg.addColorStop(0.5, `rgba(${r},0.04)`);
          fg.addColorStop(1,    "rgba(0,0,0,0)");
          ctx.save();
          ctx.beginPath();
          ctx.rect(300, 600, 200, 120); // clip to foyer rect — walls block spill
          ctx.clip();
          ctx.fillStyle = fg;
          ctx.fillRect(300, 600, 200, 120);
          ctx.restore();
        }

        // Van interior — only when van back doors are open; radial spill from east opening
        if (vanDoor.open) {
          // Gradient center = van east opening (x:360, y:926); fades to nothing at 80px
          const vg = ctx.createRadialGradient(360, 926, 0, 360, 926, 80);
          vg.addColorStop(0,   `rgba(${r},0.10)`);
          vg.addColorStop(0.5, `rgba(${r},0.04)`);
          vg.addColorStop(1,    "rgba(0,0,0,0)");
          ctx.save();
          ctx.beginPath();
          ctx.rect(188, 894, 172, 64); // clip to van interior — walls block spill
          ctx.clip();
          ctx.fillStyle = vg;
          ctx.fillRect(188, 894, 172, 64);
          ctx.restore();
        }
      }

      // Front-door exterior light — small warm glow on walkway side of front door
      const fdGrad = ctx.createRadialGradient(400, 726, 2, 400, 726, 58);
      fdGrad.addColorStop(0,   "rgba(255,210,120,0.45)");
      fdGrad.addColorStop(0.5, "rgba(255,180,80,0.15)");
      fdGrad.addColorStop(1,   "rgba(255,180,80,0)");
      ctx.fillStyle = fdGrad;
      ctx.fillRect(342, 720, 116, 116);

      // Road / street — bottom strip (deepened to 100px for large van)
      ctx.fillStyle = "#181716"; // road — dark asphalt
      ctx.fillRect(60, 880, 700, 100);
      ctx.fillStyle = "#242220"; // curb line
      ctx.fillRect(60, 880, 700, 3);

      // Yellow boundary tape — wraps outside the full playable area (drawn before van so van covers it)
      ctx.fillStyle = "#c8a800";
      ctx.fillRect( 60, 720,   4, 266); // left edge  (y:720–986, outside road south strip)
      ctx.fillRect(756, 720,   4, 266); // right edge (y:720–986)
      ctx.fillRect( 60, 982, 700,   4); // bottom edge (y:982, just below road south strip)

      // Rain — drawn after road/tape so streaks appear on top of ground surfaces
      // Van body drawn immediately after covers its interior pixels
      if (env.rain) {
        ctx.save();
        ctx.beginPath();
        if (playerOutside) {
          // Roof visible from outside — rain falls on roof + yard + road
          ctx.rect(60, 60, 700, 922);
        } else {
          // Player inside — only outside area; interior rooms stay dry
          ctx.rect(60, 720, 700, 262);
        }
        ctx.clip();
        ctx.strokeStyle = "rgba(180,210,255,0.35)";
        ctx.lineWidth = 1;
        rainDrops.forEach(d => {
          ctx.beginPath();
          ctx.moveTo(d.x, d.y);
          ctx.lineTo(d.x + 2, d.y + d.len);
          ctx.stroke();
        });
        ctx.restore();
      }

      // Van — top-down investigation van; cab (west/left), back doors (east/right)
      // Drop shadow
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(184, 890, 184, 82);

      // Outer body
      ctx.fillStyle = "#1e2d3a";
      ctx.fillRect(180, 886, 180, 80);

      // Roof surface (interior floor visible through roof cutaway)
      ctx.fillStyle = "#28384a";
      ctx.fillRect(188, 894, 164, 64);

      // North side wall highlight (top edge — light hits it)
      ctx.fillStyle = "#3a5068";
      ctx.fillRect(188, 894, 164, 5);

      // South side wall shading (bottom edge — in shadow)
      ctx.fillStyle = "#141e28";
      ctx.fillRect(188, 953, 164, 5);

      // Cab bulkhead (west interior wall — dark divider)
      ctx.fillStyle = "#0e1820";
      ctx.fillRect(188, 894, 14, 64);

      // Cab window slots (small north+south portholes on cab)
      ctx.fillStyle = "#1a3040";
      ctx.fillRect(182, 896, 6, 14); // north porthole
      ctx.fillRect(182, 952, 6, 14); // south porthole

      // Monitor shelf on north interior wall (long bench, top-down)
      ctx.fillStyle = "#1a2830";
      ctx.fillRect(206, 895, 120, 10); // shelf surface
      ctx.fillStyle = "#0a1830"; // monitor screen (dark blue glow)
      ctx.fillRect(210, 896, 28, 7);
      ctx.fillStyle = "#001820";
      ctx.fillRect(242, 896, 28, 7);
      // Monitor screen glow
      ctx.fillStyle = "rgba(40,120,200,0.25)";
      ctx.fillRect(210, 896, 28, 7);
      ctx.fillRect(242, 896, 28, 7);

      // South interior wall — pegboard (long side)
      ctx.fillStyle = "#2e2214"; // pegboard board
      ctx.fillRect(206, 948, 140, 10);
      ctx.fillStyle = "#4a3820"; // peg holes
      for (let ph = 0; ph < 14; ph++) ctx.fillRect(210 + ph * 9, 951, 2, 2);
      // Hanging items (small colored stubs = equipment silhouettes)
      const pegItems = [
        { x:211, c:"#4a8ab0" }, // EMF Reader — blue
        { x:220, c:"#4a8ab0" },
        { x:232, c:"#7a5a30" }, // Spirit Box — brown
        { x:241, c:"#7a5a30" },
        { x:253, c:"#8a7a20" }, // UV Flashlight — yellow
        { x:264, c:"#4a6a30" }, // Ghost Book — green
        { x:274, c:"#6a6a6a" }, // Video Camera — gray
        { x:283, c:"#6a6a6a" },
        { x:295, c:"#8a3a3a" }, // Thermometer — red
      ];
      pegItems.forEach(p => {
        ctx.fillStyle = p.c;
        ctx.fillRect(p.x, 944, 5, 7);
      });

      // Back doors (east) — closed: dark panel; open: ramp east
      if (!vanDoor.open) {
        ctx.fillStyle = "#141e14";
        ctx.fillRect(352, 894, 8, 64);
        ctx.fillStyle = "#1e3020"; // door seam
        ctx.fillRect(355, 894, 2, 64);
      } else {
        ctx.fillStyle = "#141e14"; // ramp lying east
        ctx.fillRect(360, 900, 42, 52);
        ctx.fillStyle = "#1e3020"; // slats
        for (let ry = 904; ry < 950; ry += 7) ctx.fillRect(362, ry, 38, 3);
      }

      // Wheels — top-down ovals (north + south, front + rear)
      ctx.fillStyle = "#0a0a0a";
      ctx.fillRect(192, 883, 22, 6);  // north-front wheel
      ctx.fillRect(320, 883, 22, 6);  // north-rear wheel
      ctx.fillRect(192, 963, 22, 6);  // south-front wheel
      ctx.fillRect(320, 963, 22, 6);  // south-rear wheel
      // Wheel highlight
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(193, 884, 20, 2);
      ctx.fillRect(321, 884, 20, 2);
      ctx.fillRect(193, 964, 20, 2);
      ctx.fillRect(321, 964, 20, 2);

      // Van label
      ctx.font = "8px monospace";
      ctx.fillStyle = "#3a5878";
      ctx.textAlign = "center";
      ctx.fillText("INVESTIGATION VAN", 270, 935);
      ctx.textAlign = "left";

      // Threat monitor — north wall, west end (~x:200-226, y:893-910) [swapped from keypad]
      const tmSafe = !safeTimeOver;
      ctx.fillStyle = "#101410"; ctx.fillRect(200, 893, 26, 17); // housing
      ctx.fillStyle = "#0a0e08"; ctx.fillRect(202, 895, 22, 13); // bezel
      ctx.fillStyle = tmSafe ? "#0d1f0d" : "#1f0d0d"; ctx.fillRect(203, 896, 20, 9); // screen tint
      const tmBlink = (Date.now() % 900 < 500);
      ctx.fillStyle = tmSafe ? (tmBlink ? "#40e840" : "#103010") : (tmBlink ? "#ff4040" : "#301010");
      ctx.beginPath(); ctx.arc(221, 898, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = tmSafe ? "#3a6838" : "#683838"; ctx.font = "4px monospace";
      ctx.fillText("THR", 204, 912);

      // Van keypad device — north wall, east end (~x:332-352, y:895-909) [swapped from threat monitor]
      ctx.fillStyle = "#1e2830";
      ctx.fillRect(332, 895, 20, 14);
      ctx.strokeStyle = "#4a8ab0"; ctx.lineWidth = 1;
      ctx.strokeRect(332, 895, 20, 14);
      ctx.fillStyle = vanDoor.open ? "#40e840" : "#e84040";
      ctx.fillRect(335, 898, 4, 4);
      ctx.fillStyle = "#6aaad0"; ctx.font = "5px monospace";
      ctx.fillText("KPD", 342, 906);

      // CCTV monitor — west wall (opposite east opening), portrait-mounted (~x:188-203, y:906-946)
      const cctvHasCams = getPlacedCameras().length > 0;
      ctx.fillStyle = "#101820"; ctx.fillRect(188, 906, 15, 40); // housing (west wall face)
      ctx.fillStyle = "#0a1218"; ctx.fillRect(189, 908, 13, 36); // bezel
      ctx.fillStyle = cctvHasCams ? "#102818" : "#080e14"; ctx.fillRect(190, 909, 11, 34); // screen
      if (cctvHasCams) {
        ctx.fillStyle = "#1a3020";
        ctx.fillRect(190, 909, 4, 16); ctx.fillRect(195, 909, 4, 16);
        ctx.fillRect(190, 926, 4, 16); ctx.fillRect(195, 926, 4, 16);
        ctx.fillStyle = "#204030";
        ctx.fillRect(190, 909, 2, 6); ctx.fillRect(195, 909, 2, 6);
        ctx.fillStyle = (Date.now() % 1200 < 700) ? "#40ff80" : "#103820";
        ctx.beginPath(); ctx.arc(200, 910, 1.5, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.fillStyle = "#111820";
        for (let sy = 910; sy < 942; sy += 3) ctx.fillRect(190, sy, 11, 2);
      }
      ctx.fillStyle = "#3a6888"; ctx.font = "4px monospace";
      ctx.fillText("CAM", 205, 926);

      // Cork board — north wall, shifted left (~x:230-280, y:893-908)
      ctx.fillStyle = "#3a2a10"; ctx.fillRect(230, 893, 50, 14); // frame
      ctx.fillStyle = "#7a5c28"; ctx.fillRect(232, 895, 46, 10); // cork surface
      // Pin dots
      ctx.fillStyle = "#c89030";
      ctx.beginPath(); ctx.arc(235, 898, 1.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(252, 898, 1.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(275, 898, 1.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#4a3218"; ctx.font = "4px monospace";
      ctx.fillText("BOARD", 243, 912);

      // Four-panel monitor — north wall, right of cork board (~x:284-329, y:893-906)
      ctx.fillStyle = "#101418"; ctx.fillRect(284, 893, 45, 13); // housing
      ctx.fillStyle = "#080c10"; ctx.fillRect(286, 894, 41, 10); // bezel
      // 4 mini screen quadrants
      ctx.fillStyle = "#0a1820"; ctx.fillRect(287, 895, 18, 4); ctx.fillRect(308, 895, 18, 4);
      ctx.fillStyle = "#0a1820"; ctx.fillRect(287, 900, 18, 3); ctx.fillRect(308, 900, 18, 3);
      ctx.fillStyle = "#1a3040"; ctx.fillRect(287, 895, 6, 2); ctx.fillRect(308, 895, 6, 2);
      ctx.fillStyle = "#204050"; ctx.fillRect(287, 900, 6, 2); ctx.fillRect(308, 900, 6, 2);
      ctx.fillStyle = "#2a4860"; ctx.font = "4px monospace";
      ctx.fillText("4MNT", 292, 908);

      // --- Furniture (valid camera surfaces) ---
      // Draw before worldItems so camera placed on furniture renders on top of it (not behind it)
      // Occlusion: only draw when player is physically inside the furniture's own room — no getVisibilityData()
      // fallback (getVisibilityData falls back to rooms[0] when outside, which broke the previous check)
      for (const f of furniture) {
        const fRoom = rooms.find(r =>
          f.x >= r.x && f.x + f.w <= r.x + r.w &&
          f.y >= r.y && f.y + f.h <= r.y + r.h
        );
        const px = player.x + 8, py = player.y + 8;
        const playerInRoom = fRoom &&
          px >= fRoom.x && px < fRoom.x + fRoom.w &&
          py >= fRoom.y && py < fRoom.y + fRoom.h;
        if (!playerInRoom) continue;
        // Style palette: wood (default) | bed | counter | seat | rug | accent | shoe
        const fs = f.style || "wood";
        const [cBase, cTop, cHi, cFront, cAccent] =
          fs === "bed"     ? ["#2a2038","#3c2e50","#4e3e66","#1e1830","#6a5488"] :
          fs === "counter" ? ["#2a2826","#3c3830","#4a4440","#201e1c","#555048"] :
          fs === "seat"    ? ["#3a2a1e","#5a3e2a","#724e38","#2a1c14","#8a6248"] :
          fs === "rug"     ? ["#3a2a18","#503c28","#624e38","#2a1e10","#705640"] :
          fs === "accent"  ? ["#a07020","#c89030","#daa840","#805810","#e8c050"] : // key bowl — warm brass
          fs === "shoe"    ? ["#1e1a14","#2e2820","#3c3428","#141010","#4a4038"] : // shoes — dark
                             ["#7a5230","#9a6a40","#b07840","#5a3a18","#c8a040"]; // wood

        // ── Rug: flat floor layer — no elevation, just fill + decorative border ──
        if (fs === "rug") {
          ctx.fillStyle = cBase;  ctx.fillRect(f.x, f.y, f.w, f.h);             // outer border band
          ctx.fillStyle = cTop;   ctx.fillRect(f.x+3, f.y+3, f.w-6, f.h-6);    // main field
          ctx.strokeStyle = cHi;     ctx.lineWidth = 0.8;
          ctx.strokeRect(f.x+1.5, f.y+1.5, f.w-3, f.h-3);                      // outer decorative line
          ctx.strokeStyle = cAccent; ctx.lineWidth = 0.5;
          ctx.strokeRect(f.x+5, f.y+5, f.w-10, f.h-10);                        // inner border line
          // Center diamond motif
          const rdx = f.x + f.w/2, rdy = f.y + f.h/2, rdr = Math.min(f.w, f.h) * 0.18;
          ctx.beginPath();
          ctx.moveTo(rdx, rdy-rdr); ctx.lineTo(rdx+rdr, rdy);
          ctx.lineTo(rdx, rdy+rdr); ctx.lineTo(rdx-rdr, rdy); ctx.closePath();
          ctx.stroke();
          continue;
        }
        // ── Accent / shoe: tiny flat pieces — no 3D shadow ────────────────────
        if (fs === "accent" || fs === "shoe") {
          ctx.fillStyle = cTop;   ctx.fillRect(f.x, f.y, f.w, f.h);
          ctx.strokeStyle = cFront; ctx.lineWidth = 0.5;
          ctx.strokeRect(f.x, f.y, f.w, f.h);
          continue;
        }

        // ── Car: top-down parked sedan ─────────────────────────────────────
        if (fs === "car") {
          const cx = f.x + f.w/2, cy = f.y + f.h/2;
          const cw = f.w, ch = f.h;
          // shadow
          ctx.fillStyle = "rgba(0,0,0,0.35)"; ctx.fillRect(f.x+3, f.y+4, cw, ch);
          // body shell
          ctx.fillStyle = "#2a3a4a"; ctx.fillRect(f.x, f.y, cw, ch);
          // roof cutaway (lighter rectangle in upper centre — the cabin)
          const roofX = f.x + cw*0.22, roofY = f.y + ch*0.16;
          const roofW = cw*0.56, roofH = ch*0.68;
          ctx.fillStyle = "#1a2830"; ctx.fillRect(roofX, roofY, roofW, roofH);
          // windshield (front)
          ctx.fillStyle = "rgba(100,160,200,0.35)"; ctx.fillRect(f.x + cw*0.24, f.y + ch*0.05, cw*0.52, ch*0.14);
          // rear window
          ctx.fillStyle = "rgba(80,120,160,0.28)"; ctx.fillRect(f.x + cw*0.24, f.y + ch*0.81, cw*0.52, ch*0.12);
          // side trim lines
          ctx.strokeStyle = "#3a5060"; ctx.lineWidth = 1;
          ctx.strokeRect(f.x+1, f.y+1, cw-2, ch-2);
          // headlights
          ctx.fillStyle = "#e8e0a0"; ctx.fillRect(f.x+cw*0.26, f.y+2, cw*0.18, 4);
          ctx.fillRect(f.x+cw*0.56, f.y+2, cw*0.18, 4);
          // tail lights
          ctx.fillStyle = "#c02020"; ctx.fillRect(f.x+cw*0.26, f.y+ch-6, cw*0.18, 4);
          ctx.fillRect(f.x+cw*0.56, f.y+ch-6, cw*0.18, 4);
          // wheels (four corners)
          ctx.fillStyle = "#101010";
          [[f.x+2, f.y+4], [f.x+cw-8, f.y+4], [f.x+2, f.y+ch-8], [f.x+cw-8, f.y+ch-8]].forEach(([wx,wy]) => {
            ctx.fillRect(wx, wy, 6, 4);
            ctx.fillStyle="#282828"; ctx.fillRect(wx+1,wy+1,4,2); ctx.fillStyle="#101010";
          });
          continue;
        }

        // ── Standard elevated furniture (wood / bed / counter / seat) ─────────
        ctx.fillStyle = "rgba(0,0,0,0.28)"; ctx.fillRect(f.x + 2, f.y + 3, f.w, f.h); // drop shadow
        ctx.fillStyle = cBase;  ctx.fillRect(f.x,     f.y,     f.w,     f.h);
        ctx.fillStyle = cTop;   ctx.fillRect(f.x + 1, f.y + 1, f.w - 2, f.h - 3);
        ctx.fillStyle = cHi;    ctx.fillRect(f.x + 2, f.y + 1, f.w - 4, 3);       // top-edge highlight
        ctx.fillStyle = cFront; ctx.fillRect(f.x,     f.y + f.h - 3, f.w, 3);    // front-face shadow
        // Detail: drawer line + accent — skip on very thin counter slabs
        if (f.h >= 16 && fs !== "counter") {
          ctx.strokeStyle = cFront; ctx.lineWidth = 0.8;
          ctx.beginPath(); ctx.moveTo(f.x + 4, f.y + f.h / 2); ctx.lineTo(f.x + f.w - 4, f.y + f.h / 2); ctx.stroke();
          if (fs === "wood") { // knob only on wood storage pieces
            ctx.fillStyle = cAccent;
            ctx.beginPath(); ctx.arc(f.x + f.w / 2, f.y + f.h / 2 + 2, 2, 0, Math.PI * 2); ctx.fill();
          }
        }
      }

      // World items — dropped/placed by player
      worldItems.forEach(it => {
        const cx = it.x + 6, cy = it.y + 6;
        const f  = it.facing ?? 0;
        const on = it.active ?? false;

        // --- D.O.T.S. field drawn BEHIND the item body ---
        if (it.name === "D.O.T.S. Projector" && on) {
          ctx.fillStyle = "rgba(0,220,80,0.60)";
          for (let row = 0; row <= 6; row++) {
            for (let col = -row; col <= row; col++) {
              const dist = row * 15, spread = col * 9;
              const ddx = Math.cos(f)*dist - Math.sin(f)*spread;
              const ddy = Math.sin(f)*dist + Math.cos(f)*spread;
              ctx.beginPath(); ctx.arc(cx + ddx, cy + ddy, 1.0, 0, Math.PI*2); ctx.fill();
            }
          }
          // Ghost figure is now drawn at its real position in the ghost draw block below —
          // nothing extra needed here.
        }

        // --- Flashlight placed beam ---
        if (it.name === "Flashlight" && on) {
          const coneLen = 120, halfA = Math.PI / 9;
          // soft gradient cone
          const beamGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, coneLen);
          beamGrad.addColorStop(0, "rgba(255,250,180,0.38)");
          beamGrad.addColorStop(0.5, "rgba(255,245,160,0.18)");
          beamGrad.addColorStop(1, "rgba(255,240,120,0)");
          ctx.fillStyle = beamGrad;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + Math.cos(f - halfA)*coneLen, cy + Math.sin(f - halfA)*coneLen);
          ctx.arc(cx, cy, coneLen, f - halfA, f + halfA);
          ctx.closePath(); ctx.fill();
          // lens glow dot
          ctx.fillStyle = "rgba(255,255,200,0.55)";
          ctx.beginPath(); ctx.arc(cx + Math.cos(f)*8, cy + Math.sin(f)*8, 3, 0, Math.PI*2); ctx.fill();
        }
        // --- UV Flashlight placed beam ---
        if (it.name === "UV Flashlight" && on) {
          const coneLen = 100, halfA = Math.PI / 9;
          ctx.fillStyle = "rgba(160,60,255,0.18)";
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, coneLen, f - halfA, f + halfA);
          ctx.closePath(); ctx.fill();
          ctx.fillStyle = "rgba(200,100,255,0.45)";
          ctx.beginPath(); ctx.arc(cx + Math.cos(f)*8, cy + Math.sin(f)*8, 3, 0, Math.PI*2); ctx.fill();
        }

        // --- Sound Recorder pulse rings (two offset rings + center REC dot) ---
        if (it.name === "Sound Recorder" && on) {
          const t = Date.now();
          const p1 = (t % 1400) / 1400;
          const p2 = (t % 1400 + 700) / 1400; // second ring offset by half period
          ctx.lineWidth = 1;
          ctx.strokeStyle = `rgba(80,220,80,${0.55 - p1 * 0.50})`;
          ctx.beginPath(); ctx.arc(cx, cy, 8 + p1 * 18, 0, Math.PI*2); ctx.stroke();
          ctx.strokeStyle = `rgba(80,220,80,${0.55 - p2 * 0.50})`;
          ctx.beginPath(); ctx.arc(cx, cy, 8 + p2 * 18, 0, Math.PI*2); ctx.stroke();
          // steady REC dot
          ctx.fillStyle = "rgba(255,50,50,0.85)";
          ctx.beginPath(); ctx.arc(cx, cy - 10, 2.5, 0, Math.PI*2); ctx.fill();
        }
        // --- Video Camera placed: FOV fan + recording dot ---
        if (it.name === "Video Camera" && on) {
          const fovLen = 90, halfA = Math.PI / 7;
          ctx.fillStyle = "rgba(60,140,255,0.14)";
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, fovLen, f - halfA, f + halfA);
          ctx.closePath(); ctx.fill();
          // blinking REC dot
          const recOn = Math.floor(Date.now() / 600) % 2 === 0;
          if (recOn) {
            ctx.fillStyle = "rgba(255,30,30,0.9)";
            ctx.beginPath(); ctx.arc(cx, cy - 10, 2.5, 0, Math.PI*2); ctx.fill();
          }
        }
        // --- Incense placed: warm orange glow around burning tips ---
        if (it.name === "Incense" && on) {
          const ig = ctx.createRadialGradient(cx, cy, 2, cx, cy, 28);
          ig.addColorStop(0, "rgba(255,120,0,0.22)");
          ig.addColorStop(0.6, "rgba(255,80,0,0.08)");

          ctx.fillStyle = "#383838"; ctx.fillRect(-3, -5, 10, 10);

          ctx.restore(); // restore tripod transform before drawing camera at its own angle

          // After the inner ctx.restore() above, the outer transform is still active:
          //   translate(cx,cy) · rotate(f) · scale(0.5, 0.5)
          // So (0,0) in this context = the tripod column center in world space.
          // Do NOT use absolute (cx,cy) coords here — that would double-translate through scale(0.5).
          if (it.mountedCamera) {

        const dotsProjector = getDotsProjectorAtGhost();
        // dots_camera_only (Goryo): ghost only appears through a held camera viewfinder, not directly.
        // Check: player must hold the Video Camera AND ghost must be within the 60° camera cone.
        const cameraOnly = currentGhost.specialRules?.includes("dots_camera_only");
        let dotsVisibleHere = true;
        if (cameraOnly) {
          const holdingCam = inventory[selectedSlot] === "Video Camera";
          const gdx = ghostX - (player.x + 8), gdy = ghostY - (player.y + 8);
          const gDiff = ((Math.atan2(gdy, gdx) - playerAngle) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
          dotsVisibleHere = holdingCam && Math.hypot(gdx, gdy) < 300 && Math.abs(gDiff) <= Math.PI / 6;
        }
        if (dotsProjector && dotsVisibleHere) {
          // Fade out in the last 1.5 seconds of the disturb window
          const alpha = Math.min(1, dotsDisturbTimer / 1.5);
          // Leg/arm swing — ghost keeps moving while visible
          const gLeg = (ghostPauseTimer <= 0) ? Math.sin(ghostWalkCycle * 1.8) * 4 : 0;
          const gArm = (ghostPauseTimer <= 0) ? -Math.sin(ghostWalkCycle * 1.8) * 3 : 0;
          // Flicker on the torso — quick green pulse driven by time
          const flicker = 0.5 + 0.5 * Math.sin(Date.now() / 80);

          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(ghostX, ghostY);
          ctx.rotate(ghostMoveAngle - Math.PI / 2);

          // Shadow
          ctx.fillStyle = "rgba(0,30,0,0.20)";
          ctx.beginPath(); ctx.ellipse(1, 2, 9, 5, 0, 0, Math.PI*2); ctx.fill();

          // Legs — green-black rotted cloth
          ctx.fillStyle = "#0a1808";
          ctx.fillRect(-4, 3 + gLeg, 3, 6);
          ctx.fillRect( 1, 3 - gLeg, 3, 6);
          ctx.fillStyle = "#2a4828"; // feet
          ctx.fillRect(-4, 8 + gLeg, 3, 2);
          ctx.fillRect( 1, 8 - gLeg, 3, 2);

          // Arms — dark forest green jacket sleeves
          ctx.fillStyle = "#0a2818";
          ctx.fillRect(-8, -1 + gArm, 3, 6);
          ctx.fillRect( 5, -2 - gArm, 3, 6);
          ctx.fillStyle = "#4a7850"; // hands — muted green-grey
          ctx.fillRect(-8, 4 + gArm, 3, 2);
          ctx.fillRect( 5, 3 - gArm, 3, 2);

          // Body — dark green jacket, same shape as normal ghost
          ctx.fillStyle = "#0a2818";
          ctx.fillRect(-5, -5, 10, 9);
          ctx.fillStyle = "#071410"; ctx.fillRect(-5, -5, 10, 3); // shoulders
          ctx.fillStyle = "#040e0a"; ctx.fillRect(-1, -5,  2, 9); // stripe
          // Green pulse dot instead of rot stain — flickers with the projector
          ctx.fillStyle = `rgba(40,255,80,${flicker * 0.45})`;
          ctx.beginPath(); ctx.arc(-1, -1, 2, 0, Math.PI*2); ctx.fill();

          // Head — green-tinted corpse pallor
          ctx.fillStyle = "#7ab888";
          ctx.beginPath(); ctx.ellipse(0, -8, 4.5, 4, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#0a0c04"; // hair
          ctx.beginPath(); ctx.ellipse(0, -10, 4.5, 2.5, 0, Math.PI, 0); ctx.fill();
          ctx.fillStyle = "#5a8868"; // ears
          ctx.fillRect(-6, -9, 2, 3);
          ctx.fillRect( 4, -9, 2, 3);

          // Eye sockets — same dark hollows, but green iris glow instead of grey-white
          ctx.fillStyle = "#020808";
          ctx.beginPath(); ctx.ellipse(-1.5, -8.5, 2.0, 1.5, 0, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse( 1.5, -8.5, 2.0, 1.5, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "rgba(40,255,80,0.85)"; // bright green — the D.O.T.S. tell
          ctx.beginPath(); ctx.arc(-1.5, -8.5, 0.7, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc( 1.5, -8.5, 0.7, 0, Math.PI*2); ctx.fill();

          // Sunken cheeks + forehead mark — greenish
          ctx.fillStyle = "rgba(5,20,5,0.55)";
          ctx.fillRect(-4, -7, 2, 2);
          ctx.fillRect( 2, -7, 2, 2);
          ctx.fillStyle = "#081a08";
          ctx.fillRect(-1, -11, 2, 1);

          // D.O.T.S. scan-line shimmer — thin horizontal green lines over the body
          ctx.fillStyle = "rgba(40,255,80,0.18)";
          for (let sy = -12; sy <= 10; sy += 3) {
            ctx.fillRect(-9, sy, 18, 1);
          }

          ctx.restore();
        }
      }

      // --- Voodoo Doll ghost appearance (shoulder/hunt pins) ---
      // Gray translucent ghost visible at its current location for ghostAppearTimer seconds.
      if (currentGhost && ghostAppearTimer > 0) {
        const alpha = Math.min(1, ghostAppearTimer) * 0.65;
        const gLeg = (ghostPauseTimer <= 0) ? Math.sin(ghostWalkCycle * 1.8) * 4 : 0;
        const gArm = (ghostPauseTimer <= 0) ? -Math.sin(ghostWalkCycle * 1.8) * 3 : 0;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(ghostX, ghostY);
        ctx.rotate(ghostMoveAngle - Math.PI / 2);
        ctx.fillStyle = "rgba(180,180,180,0.12)";
        ctx.beginPath(); ctx.ellipse(1, 2, 9, 5, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#707070"; ctx.fillRect(-4, 3+gLeg, 3, 6); ctx.fillRect(1, 3-gLeg, 3, 6);
        ctx.fillStyle = "#888";    ctx.fillRect(-8, -1+gArm, 3, 6); ctx.fillRect(5, -2-gArm, 3, 6);
        ctx.fillStyle = "#999";    ctx.fillRect(-5, -5, 10, 9);
        ctx.fillStyle = "#bbb";
        ctx.beginPath(); ctx.ellipse(0, -8, 4.5, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#444";
        ctx.beginPath(); ctx.ellipse(-1.5, -8.5, 2.0, 1.5, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse( 1.5, -8.5, 2.0, 1.5, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }

      // --- Summoning Circle ghost manifestation ---
      if (currentGhost && summoningCircleTimer > 0) {
        const sc = worldItems.find(it => it.name === "Summoning Circle" && it.fixed);
        if (sc) {
          const scCX = sc.x + 6, scCY = sc.y + 6;
          // Fade in first 0.3s, hold, fade out last 0.6s
          const fadeIn  = Math.min(1, (5 - summoningCircleTimer) / 0.4);
          const fadeOut = Math.min(1, summoningCircleTimer / 0.8);
          const alpha   = Math.min(fadeIn, fadeOut);

          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(scCX, scCY);
          // Ghost faces player for dramatic effect
          const angToPlayer = Math.atan2((player.y + 8) - scCY, (player.x + 8) - scCX);
          ctx.rotate(angToPlayer + Math.PI / 2);

          // Eerie red-orange glow behind the figure (circle light)
          const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, 28);
          glow.addColorStop(0, "rgba(200,60,0,0.35)");
          glow.addColorStop(1, "rgba(150,0,0,0)");
          ctx.fillStyle = glow;
          ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI*2); ctx.fill();

          // Shadow
          ctx.fillStyle = "rgba(40,0,0,0.3)";
          ctx.beginPath(); ctx.ellipse(1, 2, 9, 5, 0, 0, Math.PI*2); ctx.fill();

          // Legs — dark rotted cloth
          ctx.fillStyle = "#1c1410";
          ctx.fillRect(-4, 3, 3, 6); ctx.fillRect(1, 3, 3, 6);
          ctx.fillStyle = "#3a2820"; // bare feet
          ctx.fillRect(-4, 8, 3, 2); ctx.fillRect(1, 8, 3, 2);

          // Arms — limp at sides
          ctx.fillStyle = "#1c1a18";
          ctx.fillRect(-8, -1, 3, 8); ctx.fillRect(5, -1, 3, 8);
          ctx.fillStyle = "#b0a898"; // pale hands
          ctx.fillRect(-8, 6, 3, 2); ctx.fillRect(5, 6, 3, 2);

          // Body — pale grey-green
          ctx.fillStyle = "#2a2820";
          ctx.fillRect(-5, -5, 10, 9);
          ctx.fillStyle = "#201e1c"; ctx.fillRect(-5, -5, 10, 3); // shoulders
          ctx.fillStyle = "#181614"; ctx.fillRect(-1, -5, 2, 9);  // stripe

          // Rot stain
          ctx.fillStyle = "rgba(80,20,0,0.5)";
          ctx.beginPath(); ctx.arc(-1, -1, 2.5, 0, Math.PI*2); ctx.fill();

          // Head — pale grey-green corpse skin
          ctx.fillStyle = "#b8c8b0";
          ctx.beginPath(); ctx.ellipse(0, -8, 4.5, 4, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#181410"; // dark hair
          ctx.beginPath(); ctx.ellipse(0, -10, 4.5, 2.5, 0, Math.PI, 0); ctx.fill();
          ctx.fillStyle = "#a0afa0"; // ears
          ctx.fillRect(-6, -9, 2, 3); ctx.fillRect(4, -9, 2, 3);

          // Eye sockets — dark hollows, grey-white iris glow
          ctx.fillStyle = "#050402";
          ctx.beginPath(); ctx.ellipse(-1.5, -8.5, 2.0, 1.5, 0, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse( 1.5, -8.5, 2.0, 1.5, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "rgba(220,210,180,0.75)"; // grey iris — not green, this is the real form
          ctx.beginPath(); ctx.arc(-1.5, -8.5, 0.7, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc( 1.5, -8.5, 0.7, 0, Math.PI*2); ctx.fill();

          // Sunken cheeks + forehead gash
          ctx.fillStyle = "rgba(20,5,0,0.55)";
          ctx.fillRect(-4, -7, 2, 2); ctx.fillRect(2, -7, 2, 2);
          ctx.fillStyle = "#5a1008";
          ctx.fillRect(-1, -11, 2, 1); // forehead gash

          ctx.restore();
        }
      }

      // DEBUG: draw walkable rects and player collision rect
      if (DEBUG_COLLISION) {
        ctx.lineWidth = 2;

        // Room walkable rects — bright green outline (3px inset from drawn room)
        ctx.strokeStyle = "#00ff00";
        rooms.forEach(r => ctx.strokeRect(r.x+3, r.y+3, r.w-6, r.h-6));

        // Connector walkable rects — bright cyan, semi-filled so they stand out
        ctx.fillStyle = "rgba(0,255,255,0.25)";
        ctx.strokeStyle = "#00ffff";
        doorways.forEach(d => {
          ctx.fillRect(d.x, d.y, d.w, d.h);
          ctx.strokeRect(d.x, d.y, d.w, d.h);
        });

        // Player collision rect — thick bright red outline
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = "#ff2222";
        ctx.strokeRect(player.x, player.y, player.width, player.height);

        // Legend — top left (screen-fixed: drawn after restore)
      }

      // Ghost Orbs — drawn in world space BEFORE restore and BEFORE fog stamp.
      // The fog stamp handles occlusion (closed doors, dark rooms).
      // A cone clip restricts orbs to the camera FOV triangle (no orbs outside the viewfinder).
      if (gameRunning && inventory[selectedSlot] === "Video Camera" && ghostOrbs.length > 0) {
        const camHalf  = Math.PI / 6; // 30° = 60° total cone
        const camRange = 300;         // world pixels, same as camera fog system
        const cpx = player.x + 8, cpy = player.y + 8;
        ctx.save();
        // Clip 1: camera cone
        ctx.beginPath();
        ctx.moveTo(cpx, cpy);
        ctx.arc(cpx, cpy, camRange, playerAngle - camHalf, playerAngle + camHalf);
        ctx.closePath();
        ctx.clip();
        // Clip 2: visible rooms only (cone ∩ visible rooms) — respects closed doors
        const { curRoom: orbCurRoom, wedges: orbWedges } = getVisibilityData();
        if (orbCurRoom || orbWedges.length > 0) {
          ctx.beginPath();
          if (orbCurRoom) ctx.rect(orbCurRoom.x, orbCurRoom.y, orbCurRoom.w, orbCurRoom.h);
          orbWedges.forEach(({ room: wr }) => ctx.rect(wr.x, wr.y, wr.w, wr.h));
          ctx.clip();
        }
        // Draw each orb (already in world-space transform from outer ctx.save)
        ghostOrbs.forEach(orb => {
          const alpha = orb.flicker;
          const grd = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, 5);
          grd.addColorStop(0,   `rgba(200,220,255,${alpha})`);
          grd.addColorStop(0.5, `rgba(160,180,255,${alpha * 0.4})`);
          grd.addColorStop(1,   "rgba(120,140,255,0)");
          ctx.fillStyle = grd;
          ctx.beginPath(); ctx.arc(orb.x, orb.y, 5, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = "#ddeeff";
          ctx.beginPath(); ctx.arc(orb.x, orb.y, 1.5, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        });
        ctx.restore();
      }

      ctx.restore(); // end world transform — HUD below is screen-fixed

      const holdingCamera = gameRunning && inventory[selectedSlot] === "Video Camera";

      // --- Fog of war (always runs — camera overlay draws on top afterwards) ---
      // Fill fog canvas with darkness
      fogCtx.clearRect(0, 0, fogCanvas.width, fogCanvas.height);
      fogCtx.fillStyle = env.fogColor;
      fogCtx.fillRect(0, 0, fogCanvas.width, fogCanvas.height);

      // Switch to destination-out: drawing here ERASES the darkness (punches holes)
      fogCtx.globalCompositeOperation = "destination-out";
      fogCtx.fillStyle = "rgba(0,0,0,1)";
      fogCtx.save();
      fogCtx.translate(canvas.width / 2, canvas.height / 2);
      fogCtx.scale(ZOOM, ZOOM);
      fogCtx.translate(-(player.x + 8), -(player.y + 8)); // work in world coordinates

      const { curRoom, wedges } = getVisibilityData();
      const px = player.x + 8, py = player.y + 8;

      // Helper: erase flashlight cone clipped to a given room rect (regular flashlight only when held)
      const flashlightHeld = inventory[selectedSlot] === "Flashlight";
      function drawFlashlightInRoom(room) {
        if (!flashlightOn || !flashlightHeld) return;
        const halfAngle = Math.PI / 9; // 20° each side = 40° total
        fogCtx.save();
        fogCtx.beginPath();
        fogCtx.rect(room.x, room.y, room.w, room.h);
        fogCtx.clip();
        fogCtx.beginPath();
        fogCtx.moveTo(px, py);
        fogCtx.arc(px, py, 300, playerAngle - halfAngle, playerAngle + halfAngle);
        fogCtx.closePath();
        fogCtx.fill();
        fogCtx.restore();
      }

      // Helper: UV flashlight — weaker (range 180, partial erasure at 60% alpha) only when held
      const uvFlashlightHeld = inventory[selectedSlot] === "UV Flashlight";
      function drawUVFlashlightInRoom(room) {
        if (!uvFlashlightOn || !uvFlashlightHeld) return;
        const halfAngle = Math.PI / 9;
        fogCtx.save();
        fogCtx.beginPath();
        fogCtx.rect(room.x, room.y, room.w, room.h);
        fogCtx.clip();
        fogCtx.fillStyle = "rgba(0,0,0,0.55)"; // partial erasure — dimmer reveal than regular flashlight
        fogCtx.beginPath();
        fogCtx.moveTo(px, py);
        fogCtx.arc(px, py, 180, playerAngle - halfAngle, playerAngle + halfAngle);
        fogCtx.closePath();
        fogCtx.fill();
        fogCtx.fillStyle = "rgba(0,0,0,1)"; // restore full opacity for other draws
        fogCtx.restore();
      }

      // Helper: lighter held + lit — small warm radial clear (r=65) only when lighter is selected
      const lighterHeldAndLit = hasLighter && (selectedSlot >= inventory.length) && lighterLit;
      if (lighterHeldAndLit) {
        const lg = fogCtx.createRadialGradient(px, py, 0, px, py, 65);
        lg.addColorStop(0,   "rgba(0,0,0,0.80)"); // clear center
        lg.addColorStop(0.55,"rgba(0,0,0,0.40)"); // soft mid
        lg.addColorStop(1,   "rgba(0,0,0,0)");    // no clear at edge
        fogCtx.fillStyle = lg;
        fogCtx.beginPath(); fogCtx.arc(px, py, 65, 0, Math.PI*2); fogCtx.fill();
        fogCtx.fillStyle = "rgba(0,0,0,1)"; // restore
      }

      // Current room — fully visible if lit; flashlight only if dark
      if (curRoom) {
        const litIdx = rooms.indexOf(curRoom);
        const curLit = litIdx < roomLights.length ? roomLights[litIdx].on : true;
        if (curLit) fogCtx.fillRect(curRoom.x, curRoom.y, curRoom.w, curRoom.h);
        drawFlashlightInRoom(curRoom);   // regular flashlight cone in current room
        drawUVFlashlightInRoom(curRoom); // UV flashlight (weaker) in current room
      }

      // Open doorway wedges — geometric cone; skip if adjacent room is unlit (dark room)
      wedges.forEach(({ room, e1, e2 }) => {
        const adjIdx = rooms.indexOf(room);
        const adjLit = adjIdx < roomLights.length ? roomLights[adjIdx].on : true;

        if (adjLit) {
          // Room is lit — show full geometric wedge
          fogCtx.save();
          fogCtx.beginPath();
          fogCtx.rect(room.x, room.y, room.w, room.h);
          fogCtx.clip();
          const dist = 2000;
          const d1 = Math.hypot(e1.x - px, e1.y - py) || 1;
          const d2 = Math.hypot(e2.x - px, e2.y - py) || 1;
          fogCtx.beginPath();
          fogCtx.moveTo(px, py);
          fogCtx.lineTo(px + (e1.x-px)/d1*dist, py + (e1.y-py)/d1*dist);
          fogCtx.lineTo(px + (e2.x-px)/d2*dist, py + (e2.y-py)/d2*dist);
          fogCtx.closePath();
          fogCtx.fill();
          fogCtx.restore();
        }

        // Flashlights shine into adjacent room through doorway regardless of its light state
        drawFlashlightInRoom(room);
        drawUVFlashlightInRoom(room);
      });

      // Outside roof-reveal: soft fade circle matching the sight falloff style
      // Only when front door is CLOSED (open door shows interior through wedge instead)
      const frontDoor = doors.find(d => d.label === "Front Door");
      if (playerOutside && frontDoor && !frontDoor.open) {
        // Radial gradient: fully clear at center → transparent at edge (same feel as sight range)
        const roofGrad = fogCtx.createRadialGradient(px, py, 60, px, py, 200);
        roofGrad.addColorStop(0,   "rgba(0,0,0,1)");   // full clear at center
        roofGrad.addColorStop(0.6, "rgba(0,0,0,0.6)"); // partial fade
        roofGrad.addColorStop(1,   "rgba(0,0,0,0)");   // no clear at edge
        fogCtx.fillStyle = roofGrad;
        fogCtx.beginPath();
        fogCtx.arc(px, py, 200, 0, Math.PI * 2);
        fogCtx.fill();
      }

      fogCtx.restore();
      fogCtx.globalCompositeOperation = "source-over"; // reset composite mode

      // Sight range falloff — radial gradient in screen space; player is always at screen center
      const screenPX = canvas.width  / 2; // player is always centered
      const screenPY = canvas.height / 2;
      const sightGrad = fogCtx.createRadialGradient(screenPX, screenPY, 90 * ZOOM, screenPX, screenPY, 260 * ZOOM);
      sightGrad.addColorStop(0,   "rgba(0,0,0,0)");    // fully visible near player
      sightGrad.addColorStop(0.6, "rgba(0,0,0,0.3)");  // soft early fade
      sightGrad.addColorStop(1,   "rgba(0,0,0,0.94)"); // near-black at sight edge
      fogCtx.fillStyle = sightGrad;
      fogCtx.fillRect(0, 0, fogCanvas.width, fogCanvas.height);

      // Night-vision cone punch: when holding camera with NV on, clear extra fog inside 60° cone
      // so dark rooms become visible through the camera even though normal fog blocks them.
      if (holdingCamera && cameraNightVision) {
        _punchNVConeFog(fogCtx, canvas.width, canvas.height, ZOOM, player.x + 8, player.y + 8, playerAngle);
      }

      // Stamp the fog layer onto the main canvas
      ctx.drawImage(fogCanvas, 0, 0);

      // Camera viewfinder overlay: cone boundary lines + NV green tint inside cone
      // ZOOM passed explicitly — it's a local const in draw(), not a global
      if (holdingCamera) {
        _drawCameraViewfinderOverlay(ZOOM);
        _drawViewfinderChrome();
      }

      // Note: blood moon and nightrain sky tints are applied in world-space (env.tint)
      // clipped to outside rect, so they don't bleed into interior rooms.

      // Flashlight warm glow overlay (screen space — skipped in handheld camera mode)
      if (flashlightOn && gameRunning && !holdingCamera) {
        const halfAngle = Math.PI / 9;
        const glowR = 220 * ZOOM;
        const beamGrad = ctx.createRadialGradient(screenPX, screenPY, 0, screenPX, screenPY, glowR);
        beamGrad.addColorStop(0, "rgba(255,245,200,0.28)");
        beamGrad.addColorStop(0.5, "rgba(255,240,180,0.12)");
        beamGrad.addColorStop(1, "rgba(255,240,180,0)");
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(screenPX, screenPY);
        ctx.arc(screenPX, screenPY, glowR, playerAngle - halfAngle, playerAngle + halfAngle);
        ctx.closePath();
        ctx.fillStyle = beamGrad;
        ctx.fill();
        ctx.restore();
      }

      // DEBUG legend — screen-fixed
      if (DEBUG_COLLISION) {
        ctx.font = "11px monospace";
        ctx.fillStyle = "#00ff00"; ctx.fillText("█ room walkable",  10, 16);
        ctx.fillStyle = "#00ffff"; ctx.fillText("█ connector",      10, 30);
        ctx.fillStyle = "#ff2222"; ctx.fillText("█ player rect",    10, 44);
      }

      // Placement preview HUD hint
      if (placementPreview.active) {
        const isJournalPrev = placementPreview.item === "Ghost Book";
        ctx.save();
        ctx.font = "bold 13px monospace";
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.beginPath(); ctx.roundRect(isJournalPrev ? 266 : 286, 268, isJournalPrev ? 268 : 228, 36, 6); ctx.fill();
        if (placementPreview.valid) {
          if (isJournalPrev) {
            ctx.fillStyle = "#80ffb0";
            ctx.fillText("release V to place ghost book open", 400, 289);
            ctx.font = "9px monospace"; ctx.fillStyle = "#5090c0";
            ctx.fillText("aim mouse to rotate", 400, 304);
          } else {
            ctx.fillStyle = "#80c8ff";
            ctx.fillText("release V to place camera", 400, 289);
            ctx.font = "9px monospace"; ctx.fillStyle = "#5090c0";
            ctx.fillText("aim mouse to rotate", 400, 304);
          }
        } else {
          ctx.fillStyle = "#ff8080";
          ctx.fillText(isJournalPrev ? "no valid surface" : "no surface — aim at furniture", 400, 289);
          ctx.font = "9px monospace"; ctx.fillStyle = "#c06060";
          ctx.fillText("release V to cancel", 400, 304);
        }
        ctx.restore();
        ctx.textAlign = "left";
      }

      // Spirit Box overlays
      if (spiritBoxListenTimer > 0) {
        // Listening — pulsing dots
        const pulse = Math.floor(Date.now() / 400) % 4;
        const dots  = ". . . ".slice(0, pulse * 2 + 1);
        ctx.save();
        ctx.font = "bold 13px monospace";
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath(); ctx.roundRect(286, 268, 228, 36, 6); ctx.fill();
        ctx.fillStyle = "#c8a060";
        ctx.fillText("◎  " + dots, 400, 289);
        ctx.font = "9px monospace";
        ctx.fillStyle = "#806040";
        ctx.fillText("listening . . .", 400, 304);
        ctx.restore();
        ctx.textAlign = "left";
      } else if (spiritBoxNoResponse) {
        // No response
        ctx.save();
        ctx.font = "bold 13px monospace";
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath(); ctx.roundRect(286, 268, 228, 36, 6); ctx.fill();
        ctx.fillStyle = "#888";
        ctx.fillText("— — —", 400, 289);
        ctx.font = "9px monospace";
        ctx.fillStyle = "#555";

            ctx.fillText("★",0,0); ctx.textAlign="left";
            ctx.restore();
          }
        } else {
          ctx.fillStyle = itemColors[heldForDisplay] || "#aaa"; ctx.fillRect(-4,-8,8,12);
        }

        ctx.restore();
      }

      // ── Sanity HUD — small indicator, top-left ─────────────────────────
      if (playerSanity < 100) {
        ctx.save();
        const sanityColor = playerSanity > 60 ? "#8ad0a0" : playerSanity > 30 ? "#e0c060" : "#e06040";
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(10, 10, 90, 14);
        ctx.fillStyle = sanityColor;
        ctx.font = "9px monospace";
        ctx.textAlign = "left";
        ctx.fillText(`Sanity: ${playerSanity}%`, 14, 21);
        ctx.restore();
      }

      // ── Music Box active overlay ───────────────────────────────────────
      if (musicBoxActive && currentGhost) {
        const W = canvas.width, H = canvas.height;
        const cx = W / 2, cy = H / 2;

        // Direction from player to ghost (screen-space via camera)
        const _camX2 = Math.round(player.x + 8 - W / (2 * gameZoom));
        const _camY2 = Math.round(player.y + 8 - H / (2 * gameZoom));
        const gScrX = (ghostX - _camX2) * gameZoom;
        const gScrY = (ghostY - _camY2) * gameZoom;
        const angleToGhost = Math.atan2(gScrY - cy, gScrX - cx);

        // Distance: world-space pixels → loudness/alpha
        const distPx   = Math.hypot(ghostX - (player.x + 8), ghostY - (player.y + 8));
        // TUNE: 40px = max loud, 400px = near-silent
        const loudness = Math.max(0, Math.min(1, 1 - (distPx - 40) / 360));

        // Pulsing ring at ghost world position — size/alpha from loudness + pulse
        ctx.save();
        ctx.translate(gScrX, gScrY);
        const ringR = 18 + 14 * Math.sin(musicBoxPulseT * Math.PI);
        ctx.globalAlpha = loudness * (0.35 + 0.35 * Math.sin(musicBoxPulseT * Math.PI));
        ctx.strokeStyle = "#e0a0ff";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, ringR, 0, Math.PI * 2); ctx.stroke();
        // "♪" singing note drifting upward
        const noteOff = -20 - 12 * musicBoxPulseT;
        ctx.globalAlpha = loudness * Math.max(0, 1 - musicBoxPulseT);
        ctx.fillStyle = "#e0a0ff";
        ctx.font = "bold 14px serif"; ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
        ctx.fillText("♪", 0, noteOff);
        ctx.restore();

        // Direction compass arrow (screen edge) — always visible regardless of distance
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angleToGhost);
        const arrowDist = Math.min(cx, cy) - 28; // keep inside canvas
        const arrowAlpha = 0.55 + 0.3 * Math.sin(musicBoxPulseT * Math.PI * 2);
        ctx.globalAlpha = arrowAlpha;
        ctx.fillStyle = "#e0a0ff";
        ctx.strokeStyle = "#7030a0";
        ctx.lineWidth = 1;
        // Arrow head pointing right (toward ghost angle)
        ctx.beginPath();
        ctx.moveTo(arrowDist + 12, 0);
        ctx.lineTo(arrowDist,  -6);
        ctx.lineTo(arrowDist + 3, 0);
        ctx.lineTo(arrowDist,   6);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        // Shaft
        ctx.globalAlpha = arrowAlpha * 0.7;
        ctx.fillRect(arrowDist - 14, -1.5, 18, 3);
        ctx.restore();

        // Loudness label bottom-center
        ctx.save();
        const bars = Math.round(loudness * 5);
        const barStr = "▮".repeat(bars) + "▯".repeat(5 - bars);
        ctx.globalAlpha = 0.85;
        ctx.font = "bold 11px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
        ctx.fillStyle = "#2a0040";
        ctx.fillText(`♫  ${barStr}  ♫`, W / 2 + 1, H - 17);
        ctx.fillStyle = "#e0a0ff";
        ctx.fillText(`♫  ${barStr}  ♫`, W / 2, H - 18);
        // Countdown bar above the loudness label
        const pct = musicBoxTimer / MUSIC_BOX_HUNT_DELAY;
        const bw = 120, bh = 5, bx2 = W / 2 - bw / 2, by2 = H - 30;
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = "#2a0040"; ctx.fillRect(bx2, by2, bw, bh);

      // ── Hunt flash overlay ─────────────────────────────────────────────

    // --- Desktop mouse wheel: pegboard scroll or inventory cycle ---

      if (menuPhase === "title") {

        } else {

              }

              }
            }
            // Row name area — select for preview
            for (const tr of _truckItemRects) {
              if (mx >= tr.x && mx <= tr.x+tr.w && my >= tr.y && my <= tr.y+tr.h) { _truckSelItem = tr.idx; return; }
            }
          }
        }
        // Portrait cycle click (page 2)
        if (_corkboardPage === 2 && _photoRect &&
            mx >= _photoRect.x && mx <= _photoRect.x + _photoRect.w &&
            my >= _photoRect.y && my <= _photoRect.y + _photoRect.h) {
          _agentPortrait = (_agentPortrait + 1) % 6; return;
        }
        // Begin investigation button (page 2)
        if (_corkboardPage === 2 && _titleBeginRect &&
            mx >= _titleBeginRect.x && mx <= _titleBeginRect.x + _titleBeginRect.w &&
            my >= _titleBeginRect.y && my <= _titleBeginRect.y + _titleBeginRect.h) {
          _startGame(); return;
        }
        return; // nothing else on corkboard to click
        } // end else (journal not open)
        // journal is open — fall through to the shared journalOpen handler below
      }


      // ── Voodoo Doll popup is open — eat all clicks (no pin selection by click) ──
      if (voodooDollOpen) { return; }
      // ── Ouija board question menu click ───────────────────────────────────
      if (ouijaBoardOpen && !ouijaBroken && ouijaSeqIdx === -1) {
        for (const entry of _ouijaMenuRects) {
          if (mx >= entry.rect.x && mx <= entry.rect.x + entry.rect.w &&

        return; // click inside popup but outside a slot — consume without world interaction
      }

      // ── Desktop: CCTV view — click anywhere closes it ──────────────────────
      if (!isMobile && cameraViewMode) { cameraViewMode = false; return; }

      if (!isMobile) {
        if (equipmentOpen  && (mx < 60  || mx > 740 || my < 35  || my > 565)) { equipmentOpen  = false; return; }
        if (keypadOpen     && (mx < 270 || mx > 530 || my < 250 || my > 390)) { keypadOpen     = false; return; }
        if (dangerTimerOpen&& (mx < 270 || mx > 530 || my < 220 || my > 390)) { dangerTimerOpen= false; return; }
        if (fourPanelOpen  && (mx < 50  || mx > 750 || my < 30  || my > 570)) { fourPanelOpen  = false; return; }
        if (corkBoardOpen  && (mx < 120 || mx > 680 || my < 80  || my > 520)) { corkBoardOpen  = false; return; }
        if (journalOpen    && (mx < 20  || mx > 756 || my < 28  || my > 548)) { journalOpen    = false; return; }

      // Pegboard pickup
      if (equipmentOpen) {
        const slotW = 160, slotH = 130, colSpacing = 200;

        const lx = 20 + spineW;   // left page x  = 44
        const lw = 358;            // left page width

        const rw = 350;            // right page width (must match drawJournal)
        const tabH = 24, tabY = jy - tabH;
        // Tab hit areas above left page
        if (my >= tabY && my <= jy) {

        if (journalTab === 0) {

        if (journalTab === 2) {

          if (_journalLogoutBtnRect) {

          const _listTop = jy + 62, _ROW_H = 26;
          _clickActions.forEach((action, i) => {
