      // ── BOTTOM RIGHT: Ghost Activity Chart ────────────────────────────────
      panel(p.br.x, p.br.y, panW, panH, "GHOST ACTIVITY");
      const ghostActivity = 0; // placeholder — no mechanic yet
      const chartX = p.br.x + 34, chartY = p.br.y + 18, chartW = panW - 48, chartH = panH - 36;
      // Chart bg + grid
      ctx.fillStyle = "#060c10"; ctx.fillRect(chartX, chartY, chartW, chartH);
      ctx.strokeStyle = "#112030"; ctx.lineWidth = 0.5;
      for (let g = 0; g <= 5; g++) {
        const gy = chartY + (chartH / 5) * g;
        ctx.beginPath(); ctx.moveTo(chartX, gy); ctx.lineTo(chartX + chartW, gy); ctx.stroke();
      }
      for (let g = 0; g <= 6; g++) {
        const gx = chartX + (chartW / 6) * g;
        ctx.beginPath(); ctx.moveTo(gx, chartY); ctx.lineTo(gx, chartY + chartH); ctx.stroke();
      }
      // Y-axis labels (0–10, bottom to top)
      ctx.fillStyle = "#3a6888"; ctx.font = "7px monospace"; ctx.textAlign = "right";
      [10,8,6,4,2,0].forEach((v, i) => {
        ctx.fillText(v, chartX - 3, chartY + (chartH/5)*i + 4);
      });
      // X-axis labels (0–60 in steps of 10)
      ctx.textAlign = "center";
      [0,10,20,30,40,50,60].forEach((v, i) => {
        ctx.fillText(v, chartX + (chartW/6)*i, chartY + chartH + 10);
      });
      // Flat activity line at 0 (bottom of chart)
      const actY = chartY + chartH; // y=0 maps to bottom
      ctx.strokeStyle = "#40c8a0"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(chartX, actY); ctx.lineTo(chartX + chartW, actY); ctx.stroke();
      // Current value dot
      ctx.fillStyle = "#40c8a0";
      ctx.beginPath(); ctx.arc(chartX + chartW, actY, 3, 0, Math.PI*2); ctx.fill();
      // Y-axis label
      ctx.save(); ctx.translate(p.br.x + 10, p.br.y + panH/2);
      ctx.rotate(-Math.PI/2); ctx.fillStyle = "#2a5870"; ctx.font = "7px monospace"; ctx.textAlign = "center";
      ctx.fillText("ACTIVITY", 0, 0); ctx.restore();

      ctx.textAlign = "left";
      ctx.font = "9px monospace"; ctx.fillStyle = "#2a4050";
      ctx.textAlign = "center";
      ctx.fillText("[ ESC ] close", px + pw/2, py + ph - 8);
      ctx.textAlign = "left";
    }

    // --- Cork Board UI ---
    function drawCorkBoard() {

      ctx.font = "9px monospace"; ctx.fillStyle = "rgba(80,50,20,0.4)";

    // --- Van Keypad UI ---
    function drawKeypad() {

      ctx.fillStyle = "rgba(0,0,0,0.78)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillText("Guess: " + playerGuess, 400, ky + 44);

      const btnColor = !vanDoor.open ? "#3a5a2a" : "#6a2020";

      ctx.fillRect(300, 298, 200, 44);
      ctx.strokeStyle = !vanDoor.open ? "#70c050" : "#e05050"; ctx.lineWidth = 1.5;
      ctx.strokeRect(300, 298, 200, 44);

      ctx.fillText(btnLabel, 400, 325);

    // --- Shared camera cone fog ---
    // --- Ghost Orb helpers ---

    // Draw orbs onto tCtx (any canvas context) in world coordinates.
    // Must be called AFTER the fog canvas is stamped so orbs appear on top.
    // Owns its own save/translate/scale/restore — safe to call from screen-space context.
    // W,H,zoom,camX,camY: the same parameters used for the world transform on this context.
    function _drawOrbsInWorldSpace(tCtx, W, H, zoom, camX, camY) {
      if (ghostOrbs.length === 0) return;
      tCtx.save();
      tCtx.translate(W / 2, H / 2);
      tCtx.scale(zoom, zoom);
      tCtx.translate(-camX, -camY);

      ghostOrbs.forEach(orb => {
        const alpha = Math.max(0.15, orb.flicker); // debug: floor at 0.15 so orbs are never invisible
        // Outer soft glow — larger radius for debug visibility
        const grd = tCtx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, 10);
        grd.addColorStop(0,   `rgba(200,220,255,${alpha})`);
        grd.addColorStop(0.5, `rgba(160,180,255,${alpha * 0.5})`);
        grd.addColorStop(1,   `rgba(120,140,255,0)`);
        tCtx.fillStyle = grd;
        tCtx.beginPath(); tCtx.arc(orb.x, orb.y, 10, 0, Math.PI * 2); tCtx.fill();
        // Bright core dot
        tCtx.globalAlpha = alpha;
        tCtx.fillStyle = "#ffffff";
        tCtx.beginPath(); tCtx.arc(orb.x, orb.y, 3, 0, Math.PI * 2); tCtx.fill();
        tCtx.globalAlpha = 1;
      });

      tCtx.restore();
    }

    // Returns true if any ghost orb falls within the 60° camera cone from (camX,camY, facing).
    // Uses the same geometry as _applyCameraConeFog (30° half-angle, 300px range).
    // Returns true only if at least one orb is genuinely visible from (camX,camY,facing):
    //   1. within the 60° cone + 300px range
    //   2. in a room the camera can actually see (camera's own room, or adjacent room through an open doorway in the cone)
    //   3. not effectively invisible due to the room being dark (light off + NV off)
    // These are the exact same checks that gate orb rendering, so the notification matches what's on screen.
    function _orbsInCameraView(camX, camY, facing) {
      if (ghostOrbs.length === 0) return false;
      const camHalf = Math.PI / 6;
      const camRange = 300;

      // Build visible room set — mirrors _applyCameraConeFog room logic exactly
      const camRoom = rooms.find(r => camX >= r.x && camX < r.x + r.w && camY >= r.y && camY < r.y + r.h);
      const visibleRooms = new Set();
      if (camRoom) {
        visibleRooms.add(camRoom);
        doorways.forEach((dw, i) => {
          if (!doors[i]?.open) return;
          if (!rectsOverlap(dw, camRoom)) return;
          const adjRoom = rooms.find(r => r !== camRoom && rectsOverlap(dw, r));
          if (!adjRoom) return;
          const dwCx = dw.x + dw.w / 2, dwCy = dw.y + dw.h / 2;
          const dx = dwCx - camX, dy = dwCy - camY;
          const diff = ((Math.atan2(dy, dx) - facing) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
          if (Math.abs(diff) < camHalf + 0.15 && Math.hypot(dx, dy) < camRange) visibleRooms.add(adjRoom);
        });
      }

      return ghostOrbs.some(orb => {
        // 1. Cone check
        const dist = Math.hypot(orb.x - camX, orb.y - camY);
        if (dist > camRange) return false;
        const diff = ((Math.atan2(orb.y - camY, orb.x - camX) - facing) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
        if (Math.abs(diff) > camHalf) return false;
        // 2. Room visibility check
        const orbRoom = rooms.find(r => orb.x >= r.x && orb.x < r.x + r.w && orb.y >= r.y && orb.y < r.y + r.h);
        if (!orbRoom || !visibleRooms.has(orbRoom)) return false;
        // 3. Light check — orbs are rendered at 0.07 alpha (invisible) when room dark + NV off
        const rIdx = rooms.indexOf(orbRoom);
        const lit = rIdx >= 0 ? (roomLights[rIdx]?.on ?? true) : true;
        if (!lit && !cameraNightVision) return false;
        return true;
      });
    }

    // Draw a subtle "ORB" indicator badge — called from viewfinder and CCTV chrome when orbs detected.
    // x,y: top-left of badge. screenCtx: the canvas 2D context to draw onto.
    function _drawOrbBadge(screenCtx, x, y) {
      screenCtx.save();
      screenCtx.fillStyle = "rgba(160,160,255,0.70)";
      screenCtx.fillRect(x, y, 38, 16);
      screenCtx.fillStyle = "#ffffff";
      screenCtx.font = "bold 8px monospace";
      screenCtx.textAlign = "left";
      screenCtx.fillText("● ORB", x + 4, y + 11);
      screenCtx.restore();
    }

    // Extra destination-out fog punch for NV handheld camera.
    // Clears fog only inside the 60° camera cone so dark rooms become visible when NV is on.
    // Does NOT fill the background — normal fog already did that.
    // zoom must be passed explicitly — ZOOM is a local const inside draw(), not a global.
    function _punchNVConeFog(fCtx, W, H, zoom, camX, camY, facing) {
      const camHalf = Math.PI / 6; // 30° = 60° FOV
      const camRange = 300;
      fCtx.globalCompositeOperation = "destination-out";
      fCtx.fillStyle = "rgba(0,0,0,1)";
      fCtx.save();
      fCtx.translate(W / 2, H / 2);
      fCtx.scale(zoom, zoom);
      fCtx.translate(-camX, -camY);
      const camRoom = rooms.find(r => camX >= r.x && camX < r.x + r.w && camY >= r.y && camY < r.y + r.h);
      if (camRoom) {
        fCtx.save();
        fCtx.beginPath(); fCtx.rect(camRoom.x, camRoom.y, camRoom.w, camRoom.h); fCtx.clip();
        fCtx.beginPath();
        fCtx.moveTo(camX, camY);
        fCtx.arc(camX, camY, camRange, facing - camHalf, facing + camHalf);
        fCtx.closePath(); fCtx.fill();
        fCtx.restore();
        // Also clear through open doorways into adjacent rooms
        doorways.forEach((dw, i) => {
          if (!doors[i]?.open) return;
          if (!rectsOverlap(dw, camRoom)) return;
          const adjRoom = rooms.find(r => r !== camRoom && rectsOverlap(dw, r));
          if (!adjRoom) return;
          const dwCx = dw.x + dw.w / 2, dwCy = dw.y + dw.h / 2;
          const dx = dwCx - camX, dy = dwCy - camY;
          const diff = ((Math.atan2(dy, dx) - facing) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
          if (Math.abs(diff) < camHalf + 0.15 && Math.hypot(dx, dy) < camRange) {
            fCtx.save();
            fCtx.beginPath(); fCtx.rect(adjRoom.x, adjRoom.y, adjRoom.w, adjRoom.h); fCtx.clip();
            fCtx.beginPath();
            fCtx.moveTo(camX, camY); fCtx.arc(camX, camY, camRange, facing - camHalf, facing + camHalf);
            fCtx.closePath(); fCtx.fill();
            fCtx.restore();
          }
        });
      }
      fCtx.restore();
      fCtx.globalCompositeOperation = "source-over";
    }

    // Camera viewfinder overlay — drawn after fog is stamped onto the main canvas.
    // Shows the 60° camera cone as a distinct visual region on top of normal world view.
    //   NV ON:  green tint fills cone + dashed boundary lines in green
    //   NV OFF: dashed boundary lines only (grey) — cone readable without green tint
    // zoom must be passed explicitly — ZOOM is a local const inside draw(), not a global.
    function _drawCameraViewfinderOverlay(zoom) {
      const W = canvas.width, H = canvas.height;
      const nv = cameraNightVision;
      const sx = W / 2, sy = H / 2;             // player is always at screen center
      const facing = playerAngle;
      const camHalf = Math.PI / 6;               // 30° half-angle = 60° cone
      const r = 300 * zoom;                      // cone range in screen pixels
      const ex1 = sx + Math.cos(facing - camHalf) * r;
      const ey1 = sy + Math.sin(facing - camHalf) * r;
      const ex2 = sx + Math.cos(facing + camHalf) * r;
      const ey2 = sy + Math.sin(facing + camHalf) * r;

      ctx.save();

      if (nv) {
        // Green fill inside cone
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.arc(sx, sy, r, facing - camHalf, facing + camHalf);
        ctx.closePath();
        ctx.fillStyle = "rgba(0,80,0,0.28)";
        ctx.fill();
        // Phosphor shimmer
        ctx.fillStyle = "rgba(40,255,80,0.04)";
        ctx.fill();
      }

      // Dashed cone boundary lines (green when NV, grey otherwise)
      const lineColor = nv ? "rgba(60,200,80,0.70)" : "rgba(160,160,160,0.50)";
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 1;
      ctx.setLineDash([6, 4]);
      // Left edge
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex1, ey1); ctx.stroke();
      // Right edge
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex2, ey2); ctx.stroke();
      // Far arc
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(sx, sy, r, facing - camHalf, facing + camHalf); ctx.stroke();

      // Short center crosshair tick
      const tickLen = r * 0.08;
      ctx.globalAlpha = nv ? 0.35 : 0.25;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + Math.cos(facing) * tickLen, sy + Math.sin(facing) * tickLen);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.setLineDash([]);

      // Corner tick marks at the arc boundary (small L-shapes at cone edge endpoints)
      const tickSz = 8;
      ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5;
      [[ex1, ey1, facing - camHalf], [ex2, ey2, facing + camHalf]].forEach(([ex, ey, a]) => {
        const perp = a + Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(ex + Math.cos(a + Math.PI) * tickSz, ey + Math.sin(a + Math.PI) * tickSz);
        ctx.lineTo(ex, ey);
        ctx.lineTo(ex + Math.cos(perp) * tickSz, ey + Math.sin(perp) * tickSz);
        ctx.stroke();
      });

      ctx.restore();
    }

    // Fills fCtx with near-black (or dark-green NV) then punches a 60° cone from (camX,camY).
    // Clipped to the camera's room; adjacent lit rooms revealed through open doorways in cone.
    // Used by both the handheld camera main-view fog and the CCTV renderCameraFeed.
    function _applyCameraConeFog(fCtx, W, H, zoom, camX, camY, facing, nightVision) {
      fCtx.clearRect(0, 0, W, H);
      fCtx.fillStyle = "#050505"; // always near-black — NV green tint applied post-fog inside cone only
      fCtx.fillRect(0, 0, W, H);

      fCtx.globalCompositeOperation = "destination-out";
      fCtx.fillStyle = "rgba(0,0,0,1)";
      fCtx.save();
      fCtx.translate(W / 2, H / 2);
      fCtx.scale(zoom, zoom);
      fCtx.translate(-camX, -camY);

      const camHalf = Math.PI / 6; // 30° half-angle = 60° total FOV
      const camRange = 300;
      const camRoom = rooms.find(r => camX >= r.x && camX < r.x + r.w && camY >= r.y && camY < r.y + r.h);
      if (camRoom) {
        fCtx.save();
        fCtx.beginPath(); fCtx.rect(camRoom.x, camRoom.y, camRoom.w, camRoom.h); fCtx.clip();
        fCtx.beginPath();
        fCtx.moveTo(camX, camY);
        fCtx.arc(camX, camY, camRange, facing - camHalf, facing + camHalf);
        fCtx.closePath(); fCtx.fill();
        fCtx.restore();
        doorways.forEach((dw, i) => {
          if (!doors[i]?.open) return;
          if (!rectsOverlap(dw, camRoom)) return;
          const adjRoom = rooms.find(r => r !== camRoom && rectsOverlap(dw, r));
          if (!adjRoom) return;
          const dwCx = dw.x + dw.w / 2, dwCy = dw.y + dw.h / 2;
          const dx = dwCx - camX, dy = dwCy - camY;
          const diff = ((Math.atan2(dy, dx) - facing) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
          if (Math.abs(diff) < camHalf + 0.15 && Math.hypot(dx, dy) < camRange) {
            fCtx.save();
            fCtx.beginPath(); fCtx.rect(adjRoom.x, adjRoom.y, adjRoom.w, adjRoom.h); fCtx.clip();
            fCtx.beginPath();
            fCtx.moveTo(camX, camY);
            fCtx.arc(camX, camY, camRange, facing - camHalf, facing + camHalf);
            fCtx.closePath(); fCtx.fill();
            fCtx.restore();
          }
        });
      }

      fCtx.restore();
      fCtx.globalCompositeOperation = "source-over";

      // Radial vignette — darkens cone edges
      const vig = fCtx.createRadialGradient(W / 2, H / 2, 80 * zoom, W / 2, H / 2, 260 * zoom);
      vig.addColorStop(0,   "rgba(0,0,0,0)");
      vig.addColorStop(0.7, "rgba(0,0,0,0.3)");
      vig.addColorStop(1,   "rgba(0,0,0,0.95)");
      fCtx.fillStyle = vig;
      fCtx.fillRect(0, 0, W, H);
    }

    // --- Shared camera feed renderer ---
    // Used by CCTV full-screen (drawCameraView). Draws its own world copy onto tCtx.
    // tCtx/tFogCtx: target context + matching fog context (any canvas size W×H).
    // zoom: scale. camX,camY: world camera position. facing: angle in radians.
    function renderCameraFeed(tCtx, tFogCtx, W, H, zoom, camX, camY, facing) {
      // --- World draw ---
      tCtx.fillStyle = "#050508";
      tCtx.fillRect(0, 0, W, H);
      tCtx.save();
      tCtx.translate(W / 2, H / 2);
      tCtx.scale(zoom, zoom);
      tCtx.translate(-camX, -camY);

      // Walls + room floors
      tCtx.fillStyle = "#2a1f14";
      walls.forEach(w => tCtx.fillRect(w.x, w.y, w.w, w.h));
      rooms.forEach(r => { tCtx.fillStyle = r.color; tCtx.fillRect(r.x, r.y, r.w, r.h); });

      // Closed doors
      doors.forEach(d => {
        if (!d.open) {
          tCtx.fillStyle = "#5a3a18"; tCtx.fillRect(d.x, d.y, d.w, d.h);
          tCtx.fillStyle = "#7a5230"; tCtx.fillRect(d.x + 1, d.y + 1, d.w - 2, d.h - 2);
        }
      });

      // Darken unlit rooms AFTER doors so closed doors are darkened too.
      // Night vision bypasses this — camera sees in the dark.
      if (!cameraNightVision) {
        roomLights.forEach((light, i) => {
          if (!light.on && rooms[i]) {
            tCtx.fillStyle = "rgba(0,0,0,0.82)";
            tCtx.fillRect(rooms[i].x, rooms[i].y, rooms[i].w, rooms[i].h);
          }
        });
      }

      // World items — colored dot + short name label
      worldItems.forEach(it => {
        const ix = it.x + 6, iy = it.y + 6;
        tCtx.fillStyle = itemColors[it.name] || "#888";
        tCtx.beginPath(); tCtx.arc(ix, iy, 4, 0, Math.PI * 2); tCtx.fill();
        tCtx.fillStyle = "#ccc"; tCtx.font = "6px monospace"; tCtx.textAlign = "center";
        tCtx.fillText(it.name.split(" ")[0], ix, iy - 7);
        tCtx.textAlign = "left";
      });

      // Player — small dot visible from camera
      tCtx.fillStyle = "rgba(200,180,140,0.7)";
      tCtx.beginPath(); tCtx.arc(player.x + 8, player.y + 8, 6, 0, Math.PI * 2); tCtx.fill();

      // Ghost Orbs — drawn in world space BEFORE restore and BEFORE fog stamp.
      // _applyCameraConeFog below handles cone clipping + door occlusion — no extra clip needed.
      // Orbs are dim when the room light is off and NV is off; fully visible with NV on.
      if (ghostOrbs.length > 0) {
        const orbRoomIdx = ghostFavRoom ? rooms.indexOf(ghostFavRoom) : -1;
        const orbRoomLit = orbRoomIdx >= 0 ? (roomLights[orbRoomIdx]?.on ?? true) : true;
        const orbDimmed  = !orbRoomLit && !cameraNightVision;
        ghostOrbs.forEach(orb => {
          const alpha = orb.flicker * (orbDimmed ? 0.07 : 1);
          const grd = tCtx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, 5);
          grd.addColorStop(0,   `rgba(200,220,255,${alpha})`);
          grd.addColorStop(0.5, `rgba(160,180,255,${alpha * 0.4})`);
          grd.addColorStop(1,   "rgba(120,140,255,0)");
          tCtx.fillStyle = grd;
          tCtx.beginPath(); tCtx.arc(orb.x, orb.y, 5, 0, Math.PI * 2); tCtx.fill();
          tCtx.globalAlpha = alpha;
          tCtx.fillStyle = "#ddeeff";
          tCtx.beginPath(); tCtx.arc(orb.x, orb.y, 1.5, 0, Math.PI * 2); tCtx.fill();
          tCtx.globalAlpha = 1;
        });
      }

      tCtx.restore();

      // Camera-cone fog — shared helper
      _applyCameraConeFog(tFogCtx, W, H, zoom, camX, camY, facing, cameraNightVision);
      tCtx.drawImage(tFogCtx.canvas, 0, 0);

      // NV green tint — clipped to the cone in screen space (not the whole canvas)
      if (cameraNightVision) {
        tCtx.save();
        const coneHalf = Math.PI / 6; // 30° each side = 60° total
        const coneRange = 300 * zoom;
        const sx = W / 2, sy = H / 2;
        tCtx.beginPath();
        tCtx.moveTo(sx, sy);
        tCtx.arc(sx, sy, coneRange, facing - coneHalf, facing + coneHalf);
        tCtx.closePath();
        tCtx.clip();
        tCtx.fillStyle = "rgba(0,50,0,0.55)";
        tCtx.fillRect(0, 0, W, H);
        // phosphor shimmer inside cone
        tCtx.fillStyle = "rgba(30,255,70,0.05)";
        tCtx.fillRect(0, 0, W, H);
        tCtx.restore();
      }
    }

    // --- CCTV Camera View ---
    // Full-canvas view from a placed camera — uses renderCameraFeed() shared core.
    function drawCameraView() {
      const cams = getPlacedCameras();
      const W = canvas.width, H = canvas.height;

      ctx.fillStyle = "#050508";
      ctx.fillRect(0, 0, W, H);

      if (cams.length === 0) {
        // No-signal screen
        ctx.fillStyle = "#0a0a12";
        ctx.fillRect(60, 60, W - 120, H - 120);
        ctx.fillStyle = "#1a1a28";
        for (let ny = 60; ny < H - 60; ny += 4) {
          ctx.globalAlpha = 0.06 + 0.06 * Math.random();
          ctx.fillRect(60, ny, W - 120, 2);
        }
        ctx.globalAlpha = 1;
        ctx.fillStyle = "#4a4a60"; ctx.font = "bold 18px monospace"; ctx.textAlign = "center";
        ctx.fillText("NO SIGNAL", W / 2, H / 2 - 12);
        ctx.fillStyle = "#2a2a40"; ctx.font = "11px monospace";
        ctx.fillText("No cameras placed", W / 2, H / 2 + 12);
        ctx.fillText("Place a Video Camera to get a feed", W / 2, H / 2 + 28);
        ctx.textAlign = "left";
        _drawCCTVChrome(0, 0);
        return;
      }

      cameraViewIndex = Math.min(cameraViewIndex, cams.length - 1);
      const cam = cams[cameraViewIndex];

      // Core feed: world + night vision + cone fog → drawn onto main ctx using main fogCanvas
      renderCameraFeed(ctx, fogCtx, W, H, gameZoom, cam.x, cam.y, cam.facing);
      _drawCCTVChrome(cameraViewIndex, cams.length, cam);
    }

    // CCTV HUD chrome: scanlines, top/bottom bars, NV badge, conditional REC dot
    // Handheld camera viewfinder overlay — drawn over the main view when holding Video Camera.
    // Shows corner brackets, NV/recording state, and a subtle vignette frame.
    // NV on  → green-tinted badge + green brackets
    // NV off → grey/white badge + grey brackets (shows it's still "camera mode", just no NV)
    function _drawViewfinderChrome() {
      const W = canvas.width, H = canvas.height;
      const nv = cameraNightVision;
      const bracketColor = nv ? "#40c050" : "#909090";
      const badgeBg      = nv ? "rgba(0,30,0,0.70)" : "rgba(10,10,10,0.65)";
      const recording    = heldItemOn && inventory[selectedSlot] === "Video Camera";

      ctx.save();

      // Corner brackets (classic viewfinder style)
      const bLen = 22, bThick = 2, margin = 14;
      ctx.strokeStyle = bracketColor; ctx.lineWidth = bThick;
      // Top-left
      ctx.beginPath(); ctx.moveTo(margin, margin + bLen); ctx.lineTo(margin, margin); ctx.lineTo(margin + bLen, margin); ctx.stroke();
      // Top-right
      ctx.beginPath(); ctx.moveTo(W - margin - bLen, margin); ctx.lineTo(W - margin, margin); ctx.lineTo(W - margin, margin + bLen); ctx.stroke();
      // Bottom-left
      ctx.beginPath(); ctx.moveTo(margin, H - margin - bLen); ctx.lineTo(margin, H - margin); ctx.lineTo(margin + bLen, H - margin); ctx.stroke();
      // Bottom-right
      ctx.beginPath(); ctx.moveTo(W - margin - bLen, H - margin); ctx.lineTo(W - margin, H - margin); ctx.lineTo(W - margin, H - margin - bLen); ctx.stroke();

      // Top-left badge strip: CAM + NV state
      ctx.fillStyle = badgeBg;
      ctx.fillRect(margin, margin, 90, 18);
      ctx.fillStyle = nv ? "#40e050" : "#888";
      ctx.font = "bold 9px monospace";
      ctx.fillText("CAM", margin + 5, margin + 13);
      ctx.fillStyle = nv ? "#60ff70" : "#555";
      ctx.fillText(nv ? "NV ON" : "NV OFF", margin + 34, margin + 13);

      // Top-right: REC indicator when recording
      if (recording) {
        ctx.fillStyle = "rgba(0,0,0,0.60)";
        ctx.fillRect(W - margin - 64, margin, 50, 18);
        if (Date.now() % 1000 < 600) {
          ctx.fillStyle = "#ff3030";
          ctx.beginPath(); ctx.arc(W - margin - 56, margin + 9, 4, 0, Math.PI * 2); ctx.fill();
        }
        ctx.fillStyle = "#ff6060"; ctx.font = "bold 9px monospace";
        ctx.fillText("REC", W - margin - 48, margin + 13);
      }

      // Orb badge — shown below CAM/NV strip when orbs are in the camera cone
      const orbsSeen = _orbsInCameraView(player.x + 8, player.y + 8, playerAngle);
      if (orbsSeen) _drawOrbBadge(ctx, margin, margin + 22);

      // Bottom hint: N = toggle NV, R = toggle REC
      ctx.fillStyle = "rgba(0,0,0,0.50)";
      ctx.fillRect(margin, H - margin - 18, 190, 16);
      ctx.fillStyle = nv ? "#306830" : "#444";
      ctx.font = "8px monospace";
      ctx.fillText("N — NV   R — " + (recording ? "stop REC" : "REC"), margin + 6, H - margin - 5);

      // Scanlines
      ctx.globalAlpha = 0.04;
      ctx.fillStyle = "#000";
      for (let sl = 0; sl < H; sl += 3) ctx.fillRect(0, sl, W, 1);
      ctx.globalAlpha = 1;

      ctx.restore();
    }

    // activeCam: the placed camera object currently displayed (or null for no-signal).
    // Used to run the orb-in-view check against the correct camera position.
    function _drawCCTVChrome(camIdx, camTotal, activeCam) {
      const W = canvas.width, H = canvas.height;
      ctx.save();
      // Scanlines
      ctx.globalAlpha = 0.07;
      ctx.fillStyle = "#000";
      for (let sy = 0; sy < H; sy += 3) ctx.fillRect(0, sy, W, 1);
      ctx.globalAlpha = 1;

      // Corner vignette
      const cv = ctx.createRadialGradient(W/2, H/2, H * 0.3, W/2, H/2, H * 0.8);
      cv.addColorStop(0, "rgba(0,0,0,0)");
      cv.addColorStop(1, "rgba(0,0,0,0.55)");
      ctx.fillStyle = cv;
      ctx.fillRect(0, 0, W, H);

      // Top bar
      ctx.fillStyle = "rgba(0,0,0,0.65)"; ctx.fillRect(0, 0, W, 28);
      ctx.fillStyle = "#60a060"; ctx.font = "bold 11px monospace";
      ctx.fillText("CCTV", 12, 18);
      // NV badge — green when on, dim grey when off
      ctx.fillStyle = cameraNightVision ? "#40c050" : "#505050";
      ctx.font = "bold 9px monospace";
      ctx.fillText(cameraNightVision ? "NV ON" : "NV OFF", 60, 18);
      if (camTotal > 0) {
        ctx.fillStyle = "#80c080"; ctx.font = "bold 11px monospace";
        ctx.fillText(`CAM ${camIdx + 1} / ${camTotal}`, W / 2 - 30, 18);
        // REC dot — only when cctvRecording
        if (cctvRecording && Date.now() % 1000 < 600) {
          ctx.fillStyle = "#ff3030";
          ctx.beginPath(); ctx.arc(W - 60, 14, 5, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = "#ff8080"; ctx.font = "9px monospace";
          ctx.fillText("REC", W - 52, 18);
        } else if (cctvRecording) {
          // REC label stays visible even when dot is off
          ctx.fillStyle = "#ff6060"; ctx.font = "9px monospace";
          ctx.fillText("● REC", W - 62, 18);
        }
      }

      // Orb badge — shown in top bar when orbs are visible in this camera's cone
      if (activeCam && _orbsInCameraView(activeCam.x, activeCam.y, activeCam.facing)) {
        _drawOrbBadge(ctx, 110, 6);
      }

      // Bottom bar
      ctx.fillStyle = "rgba(0,0,0,0.65)"; ctx.fillRect(0, H - 26, W, 26);
      ctx.fillStyle = "#406840"; ctx.font = "9px monospace";
      ctx.fillText("ESC — exit   N — NV", 12, H - 10);
      ctx.fillText(cctvRecording ? "R — stop recording" : "R — start recording", W / 2 - 70, H - 10);
      if (camTotal > 1) ctx.fillText("← → cycle", W - 88, H - 10);

      ctx.restore();
    }

    // Handheld camera PiP chrome: border frame, NV + REC badges
    // px,py: top-left corner on main canvas; pw,ph: PiP dimensions
    function _drawPiPChrome(px, py, pw, ph) {
      ctx.save();
      // Outer border
      ctx.strokeStyle = "#204820"; ctx.lineWidth = 2;
      ctx.strokeRect(px, py, pw, ph);
      // Inner border — thinner
      ctx.strokeStyle = "#102010"; ctx.lineWidth = 1;
      ctx.strokeRect(px + 3, py + 3, pw - 6, ph - 6);

      // Top-left label strip
      ctx.fillStyle = "rgba(0,0,0,0.60)";
      ctx.fillRect(px, py, pw, 18);
      ctx.fillStyle = "#60a060"; ctx.font = "bold 9px monospace";
      ctx.fillText("HANDHELD CAM", px + 6, py + 13);
      // NV badge
      ctx.fillStyle = "#40c050"; ctx.font = "bold 8px monospace";
      ctx.fillText("NV", px + pw - 22, py + 13);

      // REC indicator — only when heldItemOn (R-key toggled)
      if (heldItemOn && inventory[selectedSlot] === "Video Camera") {
        if (Date.now() % 1000 < 600) {
          ctx.fillStyle = "#ff3030";
          ctx.beginPath(); ctx.arc(px + pw - 40, py + 10, 4, 0, Math.PI * 2); ctx.fill();
        }
        ctx.fillStyle = "#ff6060"; ctx.font = "bold 8px monospace";
        ctx.fillText("REC", px + pw - 34, py + 13);
      }

      // Bottom-right hint strip
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(px, py + ph - 16, pw, 16);
      ctx.fillStyle = "#2a5028"; ctx.font = "8px monospace";
      ctx.fillText(heldItemOn ? "R — stop REC" : "R — start REC", px + 6, py + ph - 4);

      // Scanlines
      ctx.globalAlpha = 0.06;
      ctx.fillStyle = "#000";
      for (let sl = py; sl < py + ph; sl += 3) ctx.fillRect(px, sl, pw, 1);
      ctx.globalAlpha = 1;

      ctx.restore();
    }

    // --- Mobile Controls Overlay ---
    // Drawn in screen space (after ctx.restore) over the game world.
    // Only shown when isMobile is true and gameplay is active (no full-screen popup).
    function drawMobileControls() {
      if (!isMobile || !gameRunning) return;

      // During full-screen popups the existing click handlers manage touch; skip overlay.
      if (journalOpen || equipmentOpen || keypadOpen || dangerTimerOpen || fourPanelOpen || corkBoardOpen) return;

      // Camera view mode: draw CCTV button bar instead of full HUD
      if (cameraViewMode) {
        ctx.save();

        // Helper: draw a rect button with label
        function _drawCctvBtn(r, label, active) {
          ctx.globalAlpha = active ? 0.92 : 0.62;
          ctx.fillStyle   = active ? "#4af" : "rgba(0,0,0,0.7)";
          ctx.strokeStyle = active ? "#7df" : "#888";
          ctx.lineWidth   = 1.5;
          ctx.beginPath();
          ctx.roundRect(r.x, r.y, r.w, r.h, 5);
          ctx.fill();
          ctx.stroke();
          ctx.globalAlpha = 1;
          ctx.fillStyle   = active ? "#fff" : "#e8c97a";
          ctx.font        = "bold 11px monospace";
          ctx.textAlign   = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(label, r.x + r.w / 2, r.y + r.h / 2);
        }

        const _cams = getPlacedCameras();
        const hasMulti = _cams.length > 1;

        // Top-right exit button
        _drawCctvBtn(MOB_CCTV.exit, "✕ EXIT", false);

        // Bottom row: prev / next cam + NV toggle
        _drawCctvBtn(MOB_CCTV.prevCam, "◀ PREV", false);
        _drawCctvBtn(MOB_CCTV.nextCam, "NEXT ▶", false);
        _drawCctvBtn(MOB_CCTV.nv, cameraNightVision ? "NV: ON" : "NV: OFF", cameraNightVision);

        // Dim prev/next if only one camera
        if (!hasMulti) {
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = "#000";
          ctx.fillRect(MOB_CCTV.prevCam.x, MOB_CCTV.prevCam.y, MOB_CCTV.prevCam.w, MOB_CCTV.prevCam.h);
          ctx.fillRect(MOB_CCTV.nextCam.x, MOB_CCTV.nextCam.y, MOB_CCTV.nextCam.w, MOB_CCTV.nextCam.h);
        }

        ctx.restore();
        return;
      }

      ctx.save();

      // Helper: draw a single round button — radius scaled by mobBtnScale, opacity by mobOpacity
      function _drawBtn(btn, label, color, active) {
        const r = btn.r * mobBtnScale;
        const baseAlpha = active ? Math.min(1, mobOpacity * 1.4) : mobOpacity;
        ctx.globalAlpha = baseAlpha;
        ctx.fillStyle = active ? color : "rgba(0,0,0,0.6)";
        ctx.beginPath(); ctx.arc(btn.cx, btn.cy, r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = active ? 2.5 : 1.5;
        ctx.beginPath(); ctx.arc(btn.cx, btn.cy, r, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.fillStyle = active ? "#000" : color;
        const fs = Math.max(9, Math.floor(r * 0.52));
        ctx.font = `bold ${fs}px monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(label, btn.cx, btn.cy);
        ctx.textBaseline = "alphabetic";
      }

      // ── Virtual joystick (radii scaled by mobJoyScale, opacity by mobOpacity) ──
      const jb  = MOB.joy;
      const jMaxR  = jb.maxR  * mobJoyScale;
      const jDeadR = jb.deadR * mobJoyScale;
      const jKnobR = 22       * mobJoyScale;
      const baseX  = mobileJoy.active ? mobileJoy.baseX : jb.cx;
      const baseY  = mobileJoy.active ? mobileJoy.baseY : jb.cy;

      ctx.globalAlpha = (mobileJoy.active ? 0.45 : 0.25) * mobOpacity;
      ctx.strokeStyle = "#e8c97a"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(baseX, baseY, jMaxR, 0, Math.PI * 2); ctx.stroke();

      ctx.globalAlpha = 0.15 * mobOpacity;
      ctx.strokeStyle = "#e8c97a"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(baseX, baseY, jDeadR, 0, Math.PI * 2); ctx.stroke();

      let knobX = baseX, knobY = baseY;
      if (mobileJoy.active) {
        const jdx = mobileJoy.curX - mobileJoy.baseX;
        const jdy = mobileJoy.curY - mobileJoy.baseY;
        const jLen = Math.hypot(jdx, jdy);
        if (jLen > 0) {
          const clamp = Math.min(jLen, jMaxR);
          knobX = baseX + (jdx / jLen) * clamp;
          knobY = baseY + (jdy / jLen) * clamp;
        }
      }
      ctx.globalAlpha = (mobileJoy.active ? 0.75 : 0.35) * mobOpacity;
      ctx.fillStyle = "#e8c97a";
      ctx.beginPath(); ctx.arc(knobX, knobY, jKnobR, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;

      // ── Action buttons ────────────────────────────────────────────────────
      const heldName   = inventory[selectedSlot] || (hasLighter ? "Lighter" : null);
      const flashActive = (heldName === "Flashlight" && flashlightOn) || (heldName === "UV Flashlight" && uvFlashlightOn);

      _drawBtn(MOB.interact,   "E",       "#e8c97a", false);
      _drawBtn(MOB.use,        "R",       "#80c8a0", heldItemOn || heldItemUsing);
      _drawBtn(MOB.sprint,     "\u26A1",  "#ff9040", mobileSprinting);
      _drawBtn(MOB.journal,    "J",       "#a0b0e8", journalOpen);
      _drawBtn(MOB.cycleItem,  "Q",       "#d0c080", false);
      _drawBtn(MOB.flashlight, "F",       "#f0d060", flashActive);
      _drawBtn(MOB.drop,       "G",       "#c08060", false);

      if (!mobileLook.active && !mobileJoy.active) {
        ctx.globalAlpha = 0.18 * mobOpacity;
        ctx.fillStyle = "#e8c97a";
        ctx.font = "9px monospace";
        ctx.textAlign = "center";
        ctx.fillText("drag to look", canvas.width / 2, canvas.height - 6);
        ctx.textAlign = "left";
      }

      ctx.restore();
    }

    // --- Game Loop ---
    function loop() {
      if (lostRound)          drawLose();
      else if (roundOver)     drawResult();
      else if (gameRunning) {
        if (!journalOpen && !equipmentOpen && !keypadOpen && !dangerTimerOpen && !fourPanelOpen && !corkBoardOpen) update();
        if (cameraViewMode) { drawCameraView(); drawMobileControls(); }
        else {
          draw();
          if (journalOpen)      drawJournal();
          if (equipmentOpen)    drawEquipment();
          if (dangerTimerOpen)  drawDangerTimer();
          if (fourPanelOpen)    drawFourPanel();
          if (corkBoardOpen)    drawCorkBoard();
          if (keypadOpen)       drawKeypad();
          drawMobileControls(); // always last — screen-space overlay, no-op on desktop
        }
      }
      requestAnimationFrame(loop); // always keep running
    }

    // loop() is called when Start is clicked
  </script>
</body>
