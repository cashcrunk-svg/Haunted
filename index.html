<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Horror Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
      /* Prevent pull-to-refresh and overscroll on mobile */
      overscroll-behavior: none; touch-action: none; }
    canvas {
      display: block;
      background: #111;
      /* fixed keeps centering relative to the viewport, not the document body.
         On iOS this prevents the canvas from drifting behind the browser toolbar. */
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* Disable all default touch gestures on the canvas */
      touch-action: none;
      /* CSS width/height set dynamically by resizeCanvas() to fill viewport at 4:3 */
    }
    #titleScreen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* Ensure title screen is thumb-friendly on mobile */
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
               env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }
    #landscapePrompt {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.96); color: #e8c97a;
      font-family: monospace; font-size: 1.3rem; line-height: 1.8;
      align-items: center; justify-content: center;
      text-align: center; z-index: 9999; flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Portrait-mode warning (mobile only, shown by JS when portrait) -->
  <div id="landscapePrompt">
    <div>&#x1F4F1; Rotate your device<br>to landscape mode<br><span style="font-size:0.9rem;color:#aaa;">for the best experience</span></div>
  </div>

  <!-- Title Screen -->
  <div id="titleScreen" style="color:#e8c97a; text-align:center; font-family:monospace;">
    <h1 style="font-size:3rem; margin-bottom:0.5rem;">HAUNTED</h1>
    <p style="margin-bottom:0.5rem; color:#aaa;">Investigate the house. Identify the ghost.</p>
    <p style="margin-bottom:0.5rem; color:#aaa;">Identify the ghost. Escape.</p>
    <p id="titleHints" style="margin-bottom:2rem; color:#555; font-size:0.85rem;">Move: WASD or Arrow Keys &nbsp;|&nbsp; Interact: E &nbsp;|&nbsp; Quit round: ESC</p>
    <button id="startBtn" style="
      background:#1a1a2e; color:#e8c97a; border:2px solid #e8c97a;
      padding:0.75rem 2rem; font-size:1.1rem; font-family:monospace;
      cursor:pointer; letter-spacing:0.1em; min-width:160px; min-height:52px;
    ">START</button>
  </div>

  <canvas id="gameCanvas" style="display:none;"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width  = 800;
    canvas.height = 600;

    // Mobile detection — true when primary input is touch
    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    // Update mobile title hints on load
    if (isMobile) {
      const th = document.getElementById("titleHints");
      if (th) th.textContent = "Use the on-screen controls — tap START to begin";
    }

    // Scale the canvas CSS size to fill the viewport while maintaining 800×600 aspect ratio.
    // The internal resolution stays 800×600 — all game coordinates are unchanged.
    // Mouse handlers divide by this scale to map screen pixels back to logical canvas pixels.
    function resizeCanvas() {
      // On mobile, window.innerHeight shrinks when the browser address bar is visible.
      // visualViewport gives the true usable area (excludes browser chrome) when available.
      const vw = (window.visualViewport ? window.visualViewport.width  : window.innerWidth);
      const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
      const scale = Math.min(vw / 800, vh / 600);
      const cw = Math.round(800 * scale);
      const ch = Math.round(600 * scale);
      canvas.style.width  = cw + "px";
      canvas.style.height = ch + "px";

      if (isMobile) {
        // On mobile, bypass the CSS top:50%/left:50% rules and pin the canvas
        // explicitly to the center of the *visual* viewport.
        // visualViewport.offsetTop/Left gives the visual-viewport origin relative to
        // the layout viewport — accounts for keyboard, toolbar, and any scroll offset.
        const offTop  = window.visualViewport ? window.visualViewport.offsetTop  : 0;
        const offLeft = window.visualViewport ? window.visualViewport.offsetLeft : 0;
        canvas.style.top       = Math.round(offTop  + (vh - ch) / 2) + "px";
        canvas.style.left      = Math.round(offLeft + (vw - cw) / 2) + "px";
        canvas.style.transform = "none";
      }
      // (desktop keeps the CSS default: top:50%; left:50%; transform:translate(-50%,-50%))

      // Show/hide landscape prompt on mobile portrait
      const lp = document.getElementById("landscapePrompt");
      if (lp) {
        const isPortrait = vw < vh;
        lp.style.display = (isMobile && isPortrait) ? "flex" : "none";
      }
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    // visualViewport fires its own resize when mobile browser chrome shows/hides
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeCanvas);

    // ── Mobile input state ───────────────────────────────────────────────────
    // Virtual joystick (left thumb zone)
    // angle/magnitude are computed each frame in update() from curX/curY vs baseX/baseY
    const mobileJoy = {
      active: false, id: null,
      baseX: 130, baseY: 490, curX: 130, curY: 490,
      angle: 0,      // current joystick direction in radians (updated in update())
      magnitude: 0,  // 0–1 push strength (updated in update())
    };
    // Camera look / rotate (right thumb zone — horizontal drag rotates playerAngle)
    // "started" gates rotation behind a 6px threshold to prevent jitter-spin on touchdown
    const mobileLook = {
      active: false, id: null,
      startX: 0, startY: 0,  // exact touchdown coordinates
      lastX:  0, lastY:  0,  // last processed position (set after threshold crossed)
      started: false,        // true once the drag has crossed the movement threshold
    };
    // Pinch-to-zoom (two-finger gesture)
    const mobilePinch = { active: false, lastDist: 0, id0: null, id1: null };
    let mobileSprinting = false;  // true while sprint button is held on mobile
    let mobileSprintId  = null;   // touch identifier for the held sprint button

    // Mobile button layout in 800×600 logical screen space.
    // All positions are screen-fixed (drawn after ctx.restore()).
    // r = tap radius; used for both draw and hit-test.
    const MOB = {
      joy:       { cx: 120, cy: 490, deadR: 10, maxR: 58 }, // joystick base (floating)
      interact:  { cx: 726, cy: 488, r: 32 },               // E — interact / open door
      use:       { cx: 648, cy: 528, r: 24 },               // R — use / toggle item
      sprint:    { cx: 648, cy: 452, r: 24 },               // sprint (hold)
      journal:   { cx: 770, cy: 36,  r: 22 },               // J — journal
      cycleItem: { cx: 710, cy: 36,  r: 18 },               // Q — cycle inventory
      flashlight:{ cx: 655, cy: 36,  r: 18 },               // F — flashlight
      drop:      { cx: 600, cy: 36,  r: 16 },               // G — drop / place item
    };

    // ── Mobile UI settings ───────────────────────────────────────────────────
    // Scale multipliers applied to MOB base radii when drawing and hit-testing.
    // Stored separately from desktop controls so they never interfere.
    const MOBILE_STORAGE_KEY = "ghost_game_mobile_v1";
    let mobJoyScale  = 1.0;  // joystick ring+knob radius scale  (0.6 – 1.6, step 0.1)
    let mobBtnScale  = 1.0;  // action button radius scale        (0.6 – 1.6, step 0.1)
    let mobOpacity   = 0.6;  // overall control overlay opacity   (0.3 – 1.0, step 0.1)

    function saveMobileSettings() {
      if (!isMobile) return;
      localStorage.setItem(MOBILE_STORAGE_KEY, JSON.stringify({ mobJoyScale, mobBtnScale, mobOpacity }));
    }
    function loadMobileSettings() {
      if (!isMobile) return;
      try {
        const raw = localStorage.getItem(MOBILE_STORAGE_KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        if (typeof s.mobJoyScale  === "number") mobJoyScale  = Math.max(0.6, Math.min(1.6, s.mobJoyScale));
        if (typeof s.mobBtnScale  === "number") mobBtnScale  = Math.max(0.6, Math.min(1.6, s.mobBtnScale));
        if (typeof s.mobOpacity   === "number") mobOpacity   = Math.max(0.3, Math.min(1.0, s.mobOpacity));
      } catch (_) { /* corrupt — silently ignore */ }
    }
    loadMobileSettings();

    // Offscreen fog canvas — darkness layer drawn here, then composited onto main canvas
    const fogCanvas = document.createElement("canvas");
    fogCanvas.width  = canvas.width;
    fogCanvas.height = canvas.height;
    const fogCtx = fogCanvas.getContext("2d");

    // Handheld camera PiP — offscreen canvases for the viewfinder overlay (created once)
    const PIP_W = 234, PIP_H = 176, PIP_ZOOM = 1.2;
    const pipCanvas = document.createElement("canvas");
    pipCanvas.width = PIP_W; pipCanvas.height = PIP_H;
    const pipCtx = pipCanvas.getContext("2d");
    const pipFogCanvas = document.createElement("canvas");
    pipFogCanvas.width = PIP_W; pipFogCanvas.height = PIP_H;
    const pipFogCtx = pipFogCanvas.getContext("2d");

    // --- Debug ---
    const DEBUG_COLLISION = false; // set true to show collision overlay
    const DEBUG_GHOST     = false; // set true to use Ultimate Ghost (testing only — disable for normal play)

    // --- Ghost roster config ---
    const GHOST_CONFIG = {
      forceUltimateGhost:            false,  // overrides everything; uses Ultimate Ghost
      enableNormalGhostRoster:       true,   // flip to true to go live with 27-ghost roster
      normalGhostSelectionMode:      "random", // "random" | "weighted"
      removeUltimateGhostFromLiveRounds: true,
    };

    // --- Shared behavior defaults (per-ghost overrides win) ---
    const GHOST_BEHAVIOR_DEFAULTS = {
      activityRate:        1.0,   // multiplier on evidence event frequency
      roamTendency:        1.0,   // how far/often ghost wanders
      roomLoyalty:         0.5,   // 0=roams freely, 1=stays near fav room
      huntThreshold:       50,    // sanity% at which hunts begin
      huntSpeedBase:       1.4,   // px/frame during hunt (not chasing)
      huntSpeedLOS:        2.4,   // px/frame when ghost has LOS on player
      lightInteraction:    "off", // "off"|"on"|"flicker" — preferred light state
      doorInteraction:     0.5,   // 0–1 chance to interact with nearby door
      electronicsAttraction: 0.5, // 0–1 bias toward active electronics
      throwTendency:       0.3,   // 0–1 chance to throw objects during activity
      visibilityDuringHunt: "blink", // "solid"|"blink"|"stealth"
      incenseDuration:     90,    // seconds smudge keeps it pacified
      crucifixRange:       3,     // metres (game units)
      evidenceFrequency:   1.0,   // multiplier on how often evidence fires
    };

    // --- Screen state ---
    let gameRunning  = false;
    let roundOver    = false;
    let guessCorrect = false;
    let loopRunning  = false;
    let journalOpen    = false;
    let lostRound      = false;
    let equipmentOpen  = false; // van pegboard screen
    let dangerTimerOpen  = false; // van threat monitor popup
    let fourPanelOpen    = false; // van four-panel monitor popup
    let corkBoardOpen    = false; // van cork board popup
    let pegScrollX     = 0;    // horizontal scroll offset for the equipment board
    let gameZoom       = 1.8;  // main gameplay zoom (player/world view only)

    // --- Inventory ---
    let inventory    = []; // item name strings; max 3 (lighter excluded)
    let hasLighter   = false; // lighter is a free 4th slot
    let selectedSlot = 0;    // which inventory slot is active
    let worldItems   = []; // items placed/dropped in the world: [{name, x, y}, ...]
    let journalTab   = 0; // 0 = Evidence tab, 1 = Ghosts tab
    let evidenceStates = {}; // map of evidence type → "confirmed" | "crossed" (absent = neutral)
    let ghostStates  = {}; // map of ghost name → "crossed" (absent = neutral; guess tracked by playerGuess)
    let playerGuess  = "Spirit"; // ghost name string the player selected in journal
    let keypadOpen      = false; // van keypad UI open
    let cameraViewMode  = false; // CCTV station: viewing a placed camera feed
    let cameraViewIndex = 0;     // which placed camera is currently displayed
    let cctvRecording      = false; // R key toggles recording while in CCTV view
    let cameraNightVision  = false; // N key toggles night vision on the held/CCTV camera feed
    let lighterLit    = false; // lighter flame on/off while held
    let uvFlashlightOn = false; // UV flashlight on/off (separate from regular flashlight)
    let heldItemOn   = false; // generic on/off for the currently selected inventory item
    let heldItemUsing = false; // true while use key is held (e.g. Sound Recorder recording)
    // --- Ghost evidence state ---
    let ghostX = 0, ghostY = 0;        // hidden ghost world position
    let ghostTargetX = 0, ghostTargetY = 0; // current movement destination in room
    let ghostMoveAngle = 0;            // direction ghost is facing (radians)
    let ghostPauseTimer = 0;           // seconds remaining in current pause at waypoint
    let ghostWalkCycle  = 0;           // leg swing accumulator (like player walkCycle)
    let ghostFavRoom = null;           // {x,y,w,h} — ghost's favorite room
    let ghostEventTimer = 0;           // countdown (seconds) to next interaction attempt
    let emfLevel = 0; // derived each frame from emfSources; 0–5
    let emfSources = []; // [{x, y, level, timer}] — located interaction events
    let dotsDisturbTimer = 0;          // seconds remaining for D.O.T.S. ghost figure
    let spiritBoxTimer = 0;            // seconds remaining for Spirit Box response flash
    let spiritBoxListenTimer = 0;     // seconds remaining in active listening window (R-triggered)
    let spiritBoxNoResponse = false;  // true briefly after a listen with no response
    let uvMarks = [];                  // [{x,y}] — ghost fingerprints/smudges; persist; only visible under UV
    let ghostOrbs = [];               // [{x,y,vx,vy,flicker,flickerTimer}] — only visible through camera
    let thermometerReading = 20;       // displayed °C; lerps slowly toward distance-based target
    let sensitivity  = 1.0;  // movement speed multiplier (0.5–2.0)

    // ── Controls: defaults + persistence ────────────────────────────────────
    const KEYBIND_DEFAULTS = { up:"w", down:"s", left:"a", right:"d", interact:"e", flashlight:"f", journal:"j", drop:"g", inventory:"q", sprint:"shift", use:"r" };
    const CONTROLS_STORAGE_KEY = "ghost_game_controls_v1";

    function saveControls() {
      localStorage.setItem(CONTROLS_STORAGE_KEY, JSON.stringify({ keybinds, sensitivity }));
    }

    function loadControls() {
      try {
        const raw = localStorage.getItem(CONTROLS_STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        if (saved.keybinds) {
          // Only copy keys that exist in defaults — ignore stale/unknown keys
          Object.keys(KEYBIND_DEFAULTS).forEach(k => {
            if (saved.keybinds[k]) keybinds[k] = saved.keybinds[k];
          });
        }
        if (typeof saved.sensitivity === "number") {
          sensitivity = Math.max(0.5, Math.min(2.0, saved.sensitivity));
        }
      } catch (_) { /* corrupt storage — silently ignore */ }
    }

    // Authoritative runtime keybinds — starts at defaults, then loadControls() overrides from localStorage
    let keybinds = { ...KEYBIND_DEFAULTS };
    loadControls(); // load saved controls immediately before any input listeners attach

    let rebindingAction = null; // action name waiting for a new key press, or null
    // Item display colors used in HUD and player hand visual
    // ─── Master item registry ────────────────────────────────────────────────
    // Single source of truth for every item in the game.
    // name       : canonical string used throughout all game code
    // category   : "starter" | "optional" | "cursed"
    // color      : HUD / world-drop tint
    // pegQty     : starting quantity on the van pegboard (0 = stub / not yet available)
    // directional: true = placed item shows a facing arrow
    // desc       : one-line flavour text shown on the pegboard card
    //
    // Phasmophobia name notes:
    //   "Ghost Book"    = Ghost Writing Book
    //   "UV Flashlight" = UV Light
    //   "Lighter"       = Igniter
    const ITEMS = [
      // ── Starter items ──────────────────────────────────────────────────────
      { name:"Flashlight",           category:"starter",  color:"#f0d060", pegQty:2, directional:false, desc:"Standard light source — take one before entering" },
      { name:"EMF Reader",           category:"starter",  color:"#4a8ab0", pegQty:2, directional:false, desc:"Detects electromagnetic fields near ghost activity" },
      { name:"Spirit Box",           category:"starter",  color:"#8a6a40", pegQty:1, directional:false, desc:"Captures ghost voice responses at radio freq" },
      { name:"UV Flashlight",        category:"starter",  color:"#c0c0ff", pegQty:2, directional:false, desc:"Reveals fingerprints and footprints" },
      { name:"Ghost Book",           category:"starter",  color:"#d4c8a0", pegQty:3, directional:false, desc:"Left out for the ghost to write in" },
      { name:"Video Camera",         category:"starter",  color:"#484848", pegQty:2, directional:true,  desc:"Spots orbs floating in dark rooms" },
      { name:"Thermometer",          category:"starter",  color:"#c8c8c8", pegQty:1, directional:false, desc:"Freezing temps indicate ghost presence" },
      { name:"Sound Recorder",       category:"starter",  color:"#505050", pegQty:2, directional:true,  desc:"Records EVP — ghost voices on playback" },
      { name:"D.O.T.S. Projector",   category:"starter",  color:"#40c070", pegQty:2, directional:true,  desc:"Projects a field of dots — ghost disturbs them" },
      // ── Optional items ─────────────────────────────────────────────────────
      { name:"Tripod",               category:"optional", color:"#808060", pegQty:1, directional:true,  desc:"Mounts a Video Camera hands-free" },
      { name:"Sanity Meds",          category:"optional", color:"#e0e0d8", pegQty:4, directional:false, desc:"Slows sanity drain; take before entering" },
      { name:"Lighter",              category:"optional", color:"#c8a820", pegQty:2, directional:false, desc:"Lights candles and incense sticks" },
      { name:"Incense",              category:"optional", color:"#c8a060", pegQty:3, directional:false, desc:"Repels ghost temporarily when lit" },
      { name:"Crucifix",             category:"optional", color:"#d0a830", pegQty:2, directional:false, desc:"Prevents ghost from hunting nearby" },
      { name:"Firelight",            category:"optional", color:"#e08030", pegQty:0, directional:false, desc:"Deployable candle — warm close-range light" },
      { name:"Head Gear",            category:"optional", color:"#405a30", pegQty:0, directional:false, desc:"Night vision headset — see in total darkness" },
      { name:"Motion Sensor",        category:"optional", color:"#6a6a6a", pegQty:0, directional:true,  desc:"Detects movement in a monitored room" },
      { name:"Parabolic Microphone", category:"optional", color:"#707070", pegQty:0, directional:true,  desc:"Amplifies distant sounds through walls" },
      { name:"Photo Camera",         category:"optional", color:"#505050", pegQty:0, directional:true,  desc:"Captures ghost evidence photos" },
      { name:"Salt",                 category:"optional", color:"#e8e8e0", pegQty:0, directional:false, desc:"Reveals ghost footprints when walked through" },
      { name:"Sound Sensor",         category:"optional", color:"#606060", pegQty:0, directional:false, desc:"Monitors room audio level from the van" },
      // ── Cursed possessions ─────────────────────────────────────────────────
      { name:"Music Box",            category:"cursed",   color:"#8a6080", pegQty:0, directional:false, desc:"Plays a melody — attracts the ghost" },
      { name:"Ouija Board",          category:"cursed",   color:"#7a5820", pegQty:0, directional:false, desc:"Ask the ghost questions — at great risk" },
      { name:"Voodoo Doll",          category:"cursed",   color:"#9a4040", pegQty:0, directional:false, desc:"Pins cause ghost activity spikes" },
      { name:"Haunted Mirror",       category:"cursed",   color:"#607090", pegQty:0, directional:false, desc:"Shows the ghost's favourite room" },
      { name:"Summoning Circle",     category:"cursed",   color:"#702020", pegQty:0, directional:false, desc:"Summons the ghost — always triggers a hunt" },
      { name:"Monkey Paw",           category:"cursed",   color:"#6a5028", pegQty:0, directional:false, desc:"Grants wishes with dark consequences" },
      { name:"Tarot Cards",          category:"cursed",   color:"#7850a0", pegQty:0, directional:false, desc:"Draw a card — random effect" },
    ];
    // ─── Derived lookups (generated from ITEMS — do not edit manually) ───────
    const itemColors     = Object.fromEntries(ITEMS.map(it => [it.name, it.color]));
    const directionalTools = new Set(ITEMS.filter(it => it.directional).map(it => it.name));

    // --- Environment / weather mode ---
    const envModes = ["night", "nightrain", "sunrise", "sunset", "bloodmoon", "bloodmoonrain"];
    let envModeIdx = 0;
    // Each mode: bg sky, outside dark overlay alpha, fog fill color, ambient sky glow, tint, rain
    const ENV = {
      // screen lighting handled directly in draw() per mode
      night:         { bg:"#020205", outsideAlpha:0.65, fogColor:"rgba(2,2,10,0.97)",  tint:null,                    rain:false },
      nightrain:     { bg:"#030510", outsideAlpha:0.70, fogColor:"rgba(3,6,16,0.97)",  tint:"rgba(25,45,100,0.32)",  rain:true  },
      sunrise:       { bg:"#1a0a02", outsideAlpha:0.00, fogColor:"rgba(22,8,2,0.84)",  tint:null,                    rain:false },
      sunset:        { bg:"#160400", outsideAlpha:0.05, fogColor:"rgba(18,4,0,0.86)",  tint:null,                    rain:false },
      bloodmoon:     { bg:"#060002", outsideAlpha:0.50, fogColor:"rgba(16,0,4,0.97)",  tint:"rgba(160,0,16,0.55)",   rain:false },
      bloodmoonrain: { bg:"#040001", outsideAlpha:0.55, fogColor:"rgba(12,0,3,0.97)",  tint:"rgba(140,0,12,0.50)",   rain:true  },
    };
    // Rain particles (reused across modes)
    const rainDrops = Array.from({length:120}, () => ({
      x: Math.random() * 900,
      y: Math.random() * 750,
      len: 6 + Math.random() * 8,
      speed: 4 + Math.random() * 3,
    }));

    // --- Safe time ---
    const SAFE_TIME = 20; // seconds of safety at round start
    let safeTime     = SAFE_TIME;
    let safeTimeOver = false;
    let lastTime     = 0;

    // (ghost position and flash system will be added with the real hunt system)

    function showTitle() {
      gameRunning = false;
      canvas.style.display = "none";
      document.getElementById("titleScreen").style.display = "block";
      // Reset player to van
      player.x = 240;
      player.y = 918;
    }

    function showGame() {
      gameRunning = true;
      roundOver    = false;
      guessCorrect = false;
      journalOpen    = false;
      equipmentOpen  = false;
      dangerTimerOpen = false;
      fourPanelOpen   = false;
      corkBoardOpen   = false;
      lostRound      = false;
      safeTime           = SAFE_TIME;
      safeTimeOver       = false;
      lastTime           = performance.now();
      inventory    = [];
      hasLighter   = false;
      selectedSlot = 0;
      flashlightOn = false;
      worldItems      = [];
      journalTab      = 0;
      evidenceStates  = {};
      ghostStates     = {};
      playerGuess     = "Spirit";
      keypadOpen      = false;
      cameraViewMode     = false;
      cameraViewIndex    = 0;
      cctvRecording      = false;
      cameraNightVision  = false;
      rebindingAction = null;
      lighterLit      = false;
      uvFlashlightOn  = false;
      heldItemOn      = false;
      heldItemUsing   = false;
      emfLevel = 0; emfSources = []; uvMarks = []; ghostOrbs = [];
      thermometerReading = 20;
      dotsDisturbTimer = 0; spiritBoxTimer = 0; spiritBoxListenTimer = 0; spiritBoxNoResponse = false;
      ghostTargetX = 0; ghostTargetY = 0;
      ghostMoveAngle = 0; ghostPauseTimer = 0; ghostWalkCycle = 0;
      vanDoor.open    = false;
      document.getElementById("titleScreen").style.display = "none";
      canvas.style.display = "block";
    }

    // --- Start Button ---
    document.getElementById("startBtn").addEventListener("click", () => {
      envModeIdx = Math.floor(Math.random() * envModes.length); // pick random weather each round
      showGame();    // reset all state first (including ghostOrbs = [])
      pickGhost();   // then spawn ghost + orbs AFTER reset, so they survive into the round
      if (!loopRunning) { loopRunning = true; loop(); }
    });

    // --- Shared interact action — called by keyboard E and desktop mouse click ---
    // ── Keyboard E interaction path ───────────────────────────────────────────
    // Uses player-proximity (near*) functions. Click/tap does NOT call this.
    function doInteract() {
      if (!gameRunning) return;
      const pcx = player.x + player.width  / 2;
      const pcy = player.y + player.height / 2;
      const nearIdx = worldItems.findIndex(it =>
        Math.hypot(it.x + 6 - pcx, it.y + 6 - pcy) < 30
      );
      if (nearIdx >= 0) {
        const it = worldItems[nearIdx];
        if (it.name === "Tripod") {
          const heldCam = inventory[selectedSlot] === "Video Camera";
          if (heldCam && !it.mountedCamera) {
            it.mountedCamera = "Video Camera";
            inventory.splice(selectedSlot, 1);
            if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
          } else {
            const slots = 1 + (it.mountedCamera ? 1 : 0);
            if (inventory.length + slots <= 3) {
              inventory.push("Tripod");
              if (it.mountedCamera) inventory.push(it.mountedCamera);
              worldItems.splice(nearIdx, 1);
            }
          }
        } else if (it.name === "Lighter" && !hasLighter) {
          hasLighter = true;
          worldItems.splice(nearIdx, 1);
        } else if (it.name !== "Lighter" && inventory.length < 3 && !inventory.includes(it.name)) {
          inventory.push(it.name);
          worldItems.splice(nearIdx, 1);
        }
      }
      const nearD = nearDoor();
      if (nearD) {
        const playerInDoor = player.x + player.width  > nearD.x && player.x < nearD.x + nearD.w &&
                             player.y + player.height > nearD.y && player.y < nearD.y + nearD.h;
        if (nearD.open && playerInDoor) { /* blocked */ }
        else nearD.open = !nearD.open;
      }
      if (nearVanDoor())     vanDoor.open = !vanDoor.open;
      if (nearKeypad())      { keypadOpen = true; return; }
      if (nearPegboard())    { equipmentOpen = true; pegScrollX = 0; return; }
      if (nearCCTV())        {
        cameraViewMode = true;
        const cams = getPlacedCameras();
        cameraViewIndex = Math.min(cameraViewIndex, Math.max(0, cams.length - 1));
        return;
      }
      if (nearDangerTimer()) { dangerTimerOpen = true; return; }
      if (nearFourPanel())   { fourPanelOpen   = true; return; }
      if (nearCorkBoard())   { corkBoardOpen   = true; return; }
      const swIdx = nearSwitch();
      if (swIdx >= 0) roomLights[swIdx].on = !roomLights[swIdx].on;
    }

    // ── Pointer interaction path (mouse click / mobile tap) ───────────────────
    // wx, wy = world-space coordinates of the click/tap.
    // Target is selected by pointer position FIRST; player distance is a secondary gate only.
    // Each branch hard-returns so only one interaction fires per click/tap.
    function doInteractAt(wx, wy) {
      if (!gameRunning) return;
      const pcx = player.x + player.width  / 2;
      const pcy = player.y + player.height / 2;
      // _ph: pointer hits object at (ox,oy) within radius r (primary target selector)
      const _ph = (ox, oy, r) => Math.hypot(wx - ox, wy - oy) < r;
      // _pp: player is close enough to object at (ox,oy) (reach gate — prevents long-range clicks)
      const _pp = (ox, oy, r) => Math.hypot(pcx - ox, pcy - oy) < r;

      // ── Doors — expanded-rect hit test (doors are thin; center-point would miss) ──
      // Checked first so clicking a door near an item toggles the door, not the item.
      const hitDoor = doors.find(d => {
        const dcx = d.x + d.w / 2, dcy = d.y + d.h / 2;
        return wx >= d.x - 14 && wx <= d.x + d.w + 14 &&
               wy >= d.y - 14 && wy <= d.y + d.h + 14 &&
               _pp(dcx, dcy, 55);
      });
      if (hitDoor) {
        const playerInDoor = player.x + player.width  > hitDoor.x && player.x < hitDoor.x + hitDoor.w &&
                             player.y + player.height > hitDoor.y && player.y < hitDoor.y + hitDoor.h;
        if (!(hitDoor.open && playerInDoor)) hitDoor.open = !hitDoor.open;
        return;
      }

      // ── World items on the floor ──────────────────────────────────────────
      const hitItemIdx = worldItems.findIndex(it =>
        _ph(it.x + 6, it.y + 6, 26) && _pp(it.x + 6, it.y + 6, 38)
      );
      if (hitItemIdx >= 0) {
        const it = worldItems[hitItemIdx];
        if (it.name === "Tripod") {
          const heldCam = inventory[selectedSlot] === "Video Camera";
          if (heldCam && !it.mountedCamera) {
            it.mountedCamera = "Video Camera";
            inventory.splice(selectedSlot, 1);
            if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
          } else {
            const slots = 1 + (it.mountedCamera ? 1 : 0);
            if (inventory.length + slots <= 3) {
              inventory.push("Tripod");
              if (it.mountedCamera) inventory.push(it.mountedCamera);
              worldItems.splice(hitItemIdx, 1);
            }
          }
        } else if (it.name === "Lighter" && !hasLighter) {
          hasLighter = true;
          worldItems.splice(hitItemIdx, 1);
        } else if (it.name !== "Lighter" && inventory.length < 3 && !inventory.includes(it.name)) {
          inventory.push(it.name);
          worldItems.splice(hitItemIdx, 1);
        }
        return;
      }

      // ── Van rear door ─────────────────────────────────────────────────────
      if (_ph(360, 926, 44) && _pp(360, 926, 56)) { vanDoor.open = !vanDoor.open; return; }

      // ── Van fixed interactables — each uses its own hit radius ────────────
      // CCTV monitor screen (~38px radius matches its visual size)
      if (_ph(196, 926, 38) && _pp(196, 926, 42)) {
        cameraViewMode = true;
        const cams = getPlacedCameras();
        cameraViewIndex = Math.min(cameraViewIndex, Math.max(0, cams.length - 1));
        return;
      }
      // Pegboard — widest object, generous radius
      if (_ph(270, 950, 52) && _pp(270, 950, 52)) { equipmentOpen = true; pegScrollX = 0; return; }
      // Keypad — small device
      if (_ph(347, 900, 28) && _pp(347, 900, 36)) { keypadOpen = true; return; }
      // Danger timer monitor
      if (_ph(210, 900, 28) && _pp(210, 900, 36)) { dangerTimerOpen = true; return; }
      // Four-panel monitor
      if (_ph(306, 900, 28) && _pp(306, 900, 36)) { fourPanelOpen   = true; return; }
      // Cork board
      if (_ph(255, 898, 28) && _pp(255, 898, 36)) { corkBoardOpen   = true; return; }

      // ── Light switches — small precise targets ────────────────────────────
      const hitSwIdx = roomLights.findIndex(s => _ph(s.x, s.y, 20) && _pp(s.x, s.y, 34));
      if (hitSwIdx >= 0) { roomLights[hitSwIdx].on = !roomLights[hitSwIdx].on; return; }

      // No valid target hit — do nothing.
    }

    // --- Escape returns to lobby / E to interact / J for journal ---
    document.addEventListener("keydown", e => {
      // Rebind intercept — if waiting for a new key, capture it now
      if (rebindingAction !== null) {
        if (e.key !== "Escape") {
          keybinds[rebindingAction] = e.key.toLowerCase();
          saveControls(); // persist immediately after rebind
        }
        rebindingAction = null;
        e.preventDefault();
        return;
      }
      if (e.key.toLowerCase() === keybinds.journal) {
        if (gameRunning) journalOpen = !journalOpen;
      }
      if (e.key.toLowerCase() === keybinds.flashlight) {
        if (gameRunning && inventory.includes("Flashlight")) flashlightOn = !flashlightOn;
      }
      if (e.key.toLowerCase() === keybinds.inventory) {
        const total = inventory.length + (hasLighter ? 1 : 0);
        if (gameRunning && total > 0) {
          selectedSlot = (selectedSlot + 1) % total;
          heldItemOn = false; heldItemUsing = false; // reset state on slot switch
        }
      }
      if (e.key.toLowerCase() === keybinds.drop) {
        if (gameRunning && inventory[selectedSlot]) {
          const name = inventory[selectedSlot];
          if (name === "Video Camera") {
            // Video Camera uses hold-G preview system — enter preview on keydown
            placementPreview.active            = true;
            placementPreview.angle             = playerAngle; // start facing same as player
            placementPreview.lockedPlayerAngle = playerAngle; // freeze player facing
          } else {
            // All other items: instant floor placement (existing behavior)
            const px = player.x + player.width  / 2 + Math.cos(playerAngle) * 22 - 6;
            const py = player.y + player.height / 2 + Math.sin(playerAngle) * 22 - 6;
            // Capture the item's true on-state at the moment of placement.
            // Flashlight/UV use their own state vars; everything else uses heldItemOn.
            const placedActive = name === "Flashlight"    ? flashlightOn
                               : name === "UV Flashlight" ? uvFlashlightOn
                               : heldItemOn;
            const newItem = { name, x: px, y: py, facing: playerAngle, active: placedActive };
            if (name === "Ghost Book") { newItem.written = false; newItem.writeAnimTimer = 0; }
            if (name === "Tripod")     { newItem.mountedCamera = null; }
            worldItems.push(newItem);
            inventory.splice(selectedSlot, 1);
            if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
            if (name === "Flashlight")    flashlightOn   = false;
            if (name === "UV Flashlight") uvFlashlightOn = false;
            heldItemOn = false; heldItemUsing = false;
          }
        }
      }

      // R — use / toggle: held items only; placed items cannot be toggled remotely
      if (e.key.toLowerCase() === keybinds.use) {
        if (gameRunning && !journalOpen) {
          const held = inventory[selectedSlot];
          if (held === "Flashlight") {
            flashlightOn = !flashlightOn;
          } else if (held === "UV Flashlight") {
            uvFlashlightOn = !uvFlashlightOn;
          } else if (held === "Spirit Box") {
            // R key = start a new listen attempt; clear any previous result state
            heldItemOn = true;
            spiritBoxListenTimer = 2.5;
            spiritBoxNoResponse  = false;
            spiritBoxTimer       = 0; // clear old response so new attempt is fresh
          } else if (held) {
            // All other held items (implemented or stub): toggle heldItemOn
            heldItemOn = !heldItemOn;
            if (!heldItemOn) heldItemUsing = false;
          } else if (hasLighter && !held) {
            lighterLit = !lighterLit; // lighter only when no inventory item selected
          }
        }
      }

      if (cameraViewMode) {
        // Escape (primary) or Tab (backup) exit camera view
        if (e.key === "Escape" || e.key === "Tab") { cameraViewMode = false; return; }
        // N key toggles night vision (handled here so the return below doesn't swallow it)
        if (e.key.toLowerCase() === "n") { cameraNightVision = !cameraNightVision; return; }
        // R key toggles CCTV recording
        if (e.key.toLowerCase() === keybinds.use) { cctvRecording = !cctvRecording; return; }
        // Cycle between placed cameras with arrow keys or A/D
        const _cams = getPlacedCameras();
        if (_cams.length > 1) {
          if (e.key === "ArrowRight" || e.key === "d" || e.key === "D")
            cameraViewIndex = (cameraViewIndex + 1) % _cams.length;
          if (e.key === "ArrowLeft"  || e.key === "a" || e.key === "A")
            cameraViewIndex = (cameraViewIndex - 1 + _cams.length) % _cams.length;
        }
        return; // consume all other input while in camera view
      }
      // N key toggles night vision on the held camera
      if (gameRunning && e.key.toLowerCase() === "n" && inventory[selectedSlot] === "Video Camera") {
        cameraNightVision = !cameraNightVision;
      }
      if (equipmentOpen) {
        // Scroll pegboard left/right only — no zoom on pegboard
        if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") pegScrollX += 80;
        if (e.key === "ArrowLeft"  || e.key === "a" || e.key === "A") pegScrollX -= 80;
        pegScrollX = Math.max(pegScrollX, 0);
      }
      // Gameplay zoom — only during active play, not menus or pegboard
      if (gameRunning && !equipmentOpen && !journalOpen) {
        if (e.code === "Equal" || e.code === "NumpadAdd")      gameZoom = Math.min(+(gameZoom + 0.2).toFixed(1), 3.0);
        if (e.code === "Minus" || e.code === "NumpadSubtract") gameZoom = Math.max(+(gameZoom - 0.2).toFixed(1), 0.8);
      }
      if (e.key === "Escape") {
        if (keypadOpen)       { keypadOpen = false; return; }
        if (equipmentOpen)    { equipmentOpen = false; return; }
        if (dangerTimerOpen)  { dangerTimerOpen = false; return; }
        if (fourPanelOpen)    { fourPanelOpen = false; return; }
        if (corkBoardOpen)    { corkBoardOpen = false; return; }
        if (journalOpen)      { journalOpen = false; return; }
        if (gameRunning || roundOver || lostRound) {
          roundOver = false; lostRound = false; showTitle();
        }
      }
      if (e.key.toLowerCase() === keybinds.interact) {
        doInteract();
      }
      // (Guess screen is click-only now — 6 ghosts don't fit on number keys)
    });

    function getVisibilityData() {
      const cx = player.x + 8, cy = player.y + 8;

      // Find which room the player is standing in
      let curRoom = rooms.find(r => cx >= r.x && cy >= r.y && cx < r.x+r.w && cy < r.y+r.h);
      // Fallback: player is in a connector — use the first room that connector touches
      if (!curRoom) {
        const dw = doorways.find(d => cx >= d.x && cy >= d.y && cx < d.x+d.w && cy < d.y+d.h);
        curRoom = dw ? rooms.find(r => rectsOverlap(dw, r)) : rooms[0];
      }

      // For each open doorway touching the current room, build a wedge into the adjacent room
      const wedges = [];
      doorways.forEach((dw, i) => {
        if (!doors[i]?.open)           return; // closed door blocks sight
        if (!rectsOverlap(dw, curRoom)) return; // doorway not on current room's wall

        // Find the room on the other side
        const adjRoom = rooms.find(r => r !== curRoom && rectsOverlap(dw, r));
        if (!adjRoom) return;

        // Get the two edge points of the doorway opening at the wall
        const d = doors[i];
        let e1, e2;
        if (d.w > d.h) {                         // horizontal wall (door is wide)
          const wy = d.y + d.h / 2;
          e1 = { x: d.x,       y: wy };
          e2 = { x: d.x + d.w, y: wy };
        } else {                                  // vertical wall (door is tall)
          const wx = d.x + d.w / 2;
          e1 = { x: wx, y: d.y };
          e2 = { x: wx, y: d.y + d.h };

        wedges.push({ room: adjRoom, e1, e2 });
      });

      return { curRoom, wedges };

            ny + player.height > door.y && ny < door.y + door.h) return false;

      // Block van walls
      for (const wall of vanWalls) {
        if (nx + player.width > wall.x && nx < wall.x + wall.w &&
            ny + player.height > wall.y && ny < wall.y + wall.h) return false;

      // Player must be fully contained inside at least one walkable rect
      return walkable.some(r =>

        ny >= r.y &&
        nx + player.width  <= r.x + r.width &&
        ny + player.height <= r.y + r.height

    function getDotsProjectorAtGhost() {
