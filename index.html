      // Camera viewfinder overlay: cone boundary lines + NV green tint inside cone
      // ZOOM passed explicitly — it's a local const in draw(), not a global
      if (holdingCamera) {
        _drawCameraViewfinderOverlay(ZOOM);
        _drawViewfinderChrome();
      }

      // Note: blood moon and nightrain sky tints are applied in world-space (env.tint)
      // clipped to outside rect, so they don't bleed into interior rooms.

      // Flashlight warm glow overlay (screen space — skipped in handheld camera mode)
      if (flashlightOn && gameRunning && !holdingCamera) {
        const halfAngle = Math.PI / 9;
        const glowR = 220 * ZOOM;
        const beamGrad = ctx.createRadialGradient(screenPX, screenPY, 0, screenPX, screenPY, glowR);
        beamGrad.addColorStop(0, "rgba(255,245,200,0.28)");
        beamGrad.addColorStop(0.5, "rgba(255,240,180,0.12)");
        beamGrad.addColorStop(1, "rgba(255,240,180,0)");
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(screenPX, screenPY);
        ctx.arc(screenPX, screenPY, glowR, playerAngle - halfAngle, playerAngle + halfAngle);
        ctx.closePath();
        ctx.fillStyle = beamGrad;
        ctx.fill();
        ctx.restore();
      }

      // DEBUG legend — screen-fixed
      if (DEBUG_COLLISION) {
        ctx.font = "11px monospace";
        ctx.fillStyle = "#00ff00"; ctx.fillText("█ room walkable",  10, 16);
        ctx.fillStyle = "#00ffff"; ctx.fillText("█ connector",      10, 30);
        ctx.fillStyle = "#ff2222"; ctx.fillText("█ player rect",    10, 44);
      }

      // Camera placement preview HUD hint
      if (placementPreview.active) {
        ctx.save();
        ctx.font = "bold 13px monospace";
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.beginPath(); ctx.roundRect(286, 268, 228, 36, 6); ctx.fill();
        if (placementPreview.valid) {
          ctx.fillStyle = "#80c8ff";
          ctx.fillText("release G to place camera", 400, 289);
          ctx.font = "9px monospace"; ctx.fillStyle = "#5090c0";
          ctx.fillText("aim mouse to rotate", 400, 304);
        } else {
          ctx.fillStyle = "#ff8080";
          ctx.fillText("no surface — aim at furniture", 400, 289);
          ctx.font = "9px monospace"; ctx.fillStyle = "#c06060";
          ctx.fillText("release G to cancel", 400, 304);
        }
        ctx.restore();
        ctx.textAlign = "left";
      }

      // Spirit Box overlays
      if (spiritBoxListenTimer > 0) {
        // Listening — pulsing dots
        const pulse = Math.floor(Date.now() / 400) % 4;
        const dots  = ". . . ".slice(0, pulse * 2 + 1);
        ctx.save();
        ctx.font = "bold 13px monospace";
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath(); ctx.roundRect(286, 268, 228, 36, 6); ctx.fill();
        ctx.fillStyle = "#c8a060";
        ctx.fillText("◎  " + dots, 400, 289);
        ctx.font = "9px monospace";
        ctx.fillStyle = "#806040";
        ctx.fillText("listening . . .", 400, 304);
        ctx.restore();
        ctx.textAlign = "left";
      } else if (spiritBoxNoResponse) {
        // No response
        ctx.save();
        ctx.font = "bold 13px monospace";
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath(); ctx.roundRect(286, 268, 228, 36, 6); ctx.fill();
        ctx.fillStyle = "#888";
        ctx.fillText("— — —", 400, 289);
        ctx.font = "9px monospace";
        ctx.fillStyle = "#555";
        ctx.fillText("no response", 400, 304);
        ctx.restore();
        ctx.textAlign = "left";
      } else if (spiritBoxTimer > 0) {
        // Ghost responded
        const a = Math.min(1, spiritBoxTimer);
        ctx.save();
        ctx.globalAlpha = a * 0.9;
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath(); ctx.roundRect(286, 264, 228, 44, 6); ctx.fill();
        ctx.fillStyle = "#40e8e8";
        ctx.font = "bold 15px monospace";
        ctx.textAlign = "center";
        ctx.fillText("◈  . . .  ◈", 400, 285);
        ctx.globalAlpha = a * 0.7;
        ctx.font = "9px monospace";
        ctx.fillStyle = "#20c0c0";
        ctx.fillText("spirit box response", 400, 301);
        ctx.restore();
        ctx.textAlign = "left";
      }

      // Thermometer readout — shown while held
      if (inventory[selectedSlot] === "Thermometer" && gameRunning) {
        const { curRoom } = getVisibilityData();
        const temp = thermometerReading;
        const freezing = temp <= 0;
        const cold     = temp <= 10;
        const tempStr  = (temp >= 0 ? "+" : "") + temp.toFixed(1) + " °C";
        const col = freezing ? "#80ffff" : cold ? "#a0c8ff" : "#e0e0e0";
        ctx.save();
        ctx.font = "bold 18px monospace";
        ctx.textAlign = "center";
        // background pill
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.beginPath(); ctx.roundRect(286, 268, 228, 36, 6); ctx.fill();
        // temp reading
        ctx.fillStyle = col;
        ctx.fillText(tempStr, 400, 293);
        // label + room name
        ctx.font = "9px monospace";
        ctx.fillStyle = freezing ? "#50c0d0" : "#888";
        const label = freezing ? "FREEZING  —  " : cold ? "COLD  —  " : "";
        ctx.fillText(label + (curRoom ? curRoom.label : "outside"), 400, 308);
        ctx.restore();
        ctx.textAlign = "left";
      }

      ctx.font = "12px monospace";


      // Safe-time indicator — top right
      ctx.textAlign = "left";

      // Proximity prompts
      ctx.font = "13px monospace";
      // Proximity prompts — all key references read from live keybinds
      ctx.textAlign = "center";
      const ik = keybinds.interact.toUpperCase(); // live interact key label
      // World item pickup prompt
      const pcx2 = player.x + player.width / 2, pcy2 = player.y + player.height / 2;
      const nearWI = worldItems.find(it => Math.hypot(it.x + 6 - pcx2, it.y + 6 - pcy2) < 30);
      if (nearWI) {
        let promptText, promptColor;
        if (nearWI.name === "Tripod") {
          const heldCam = inventory[selectedSlot] === "Video Camera";
          const slots = 1 + (nearWI.mountedCamera ? 1 : 0);
          const canPickup = inventory.length + slots <= 3;
          if (heldCam && !nearWI.mountedCamera) {
            promptText  = `${ik} — mount camera on tripod`;
            promptColor = "#c0d8ff";
          } else if (canPickup) {
            promptText  = nearWI.mountedCamera
              ? `${ik} — pick up tripod + camera`
              : `${ik} — pick up tripod`;
            promptColor = "#e8c97a";
          } else {
            promptText  = "Tripod (inventory full)";
            promptColor = "#888";
          }
        } else {
          const canPickup = nearWI.name === "Lighter" ? !hasLighter : (inventory.length < 3 && !inventory.includes(nearWI.name));
          promptText  = canPickup ? `${ik} — pick up ` + nearWI.name : nearWI.name + " (inventory full)";
          promptColor = canPickup ? "#e8c97a" : "#888";
        }
        ctx.fillStyle = promptColor;
        ctx.fillText(promptText, 400, 540);
      }
      const nd = nearDoor();
      if (nd) {
        ctx.fillStyle = "#e8c97a";
        ctx.fillText(`Press ${ik} to ${nd.open ? "close" : "open"} door`, 400, 555);
      }
      if (nearVanDoor()) {
        ctx.fillStyle = "#e8c97a";
        ctx.fillText(`Press ${ik} to ${vanDoor.open ? "close" : "open"} the van`, 400, 555);
      }
      if (nearKeypad()) {
        ctx.fillStyle = "#e8c97a";
        ctx.fillText(`${ik} — van controls  ★ ` + playerGuess, 400, 540);
      }
      if (nearPegboard()) {
        ctx.fillStyle = "#e8c97a";
        ctx.fillText(`Press ${ik} to open equipment van`, 400, 540);
      }
      if (nearCCTV()) {
        const _nc = getPlacedCameras().length;
        ctx.fillStyle = "#e8c97a";
        ctx.fillText(_nc > 0 ? `${ik} — view cameras  (${_nc} placed)` : `${ik} — camera station  (no cameras placed)`, 400, 555);
      }
      if (nearDangerTimer()) {
        ctx.fillStyle = "#e8c97a";
        ctx.fillText(`${ik} — threat monitor`, 400, 555);
      }
      if (nearFourPanel()) {
        ctx.fillStyle = "#e8c97a";
        ctx.fillText(`${ik} — open monitor panel`, 400, 555);
      }
      if (nearCorkBoard()) {
        ctx.fillStyle = "#e8c97a";
        ctx.fillText(`${ik} — cork board`, 400, 555);
      }
      const swHud = nearSwitch();
      if (swHud >= 0) {
        ctx.fillStyle = "#e8c97a";
        ctx.fillText(`Press ${ik} to turn light ${roomLights[swHud].on ? "off" : "on"}`, 400, 555);
      }
      ctx.textAlign = "left";

      // Inventory HUD — bottom center
      ctx.font = "10px monospace";
      const slotSize = 36, slotPad = 4;
      const slotTotalW = 4 * slotSize + 3 * slotPad; // 4 slots
      const hudX = Math.floor((canvas.width - slotTotalW) / 2);
      const hudY = canvas.height - 50;
      for (let s = 0; s < 3; s++) {
        const sx = hudX + s * (slotSize + slotPad);
        const isSelected = s === selectedSlot;
        ctx.fillStyle = isSelected ? "#2a2a1a" : "#111";
        ctx.fillRect(sx, hudY, slotSize, slotSize);
        ctx.strokeStyle = isSelected ? "#e8c97a" : "#444";
        ctx.lineWidth = isSelected ? 2 : 1;
        ctx.strokeRect(sx, hudY, slotSize, slotSize);
        if (inventory[s]) {
          ctx.fillStyle = itemColors[inventory[s]] || "#aaa";
          ctx.fillRect(sx + 4, hudY + 4, slotSize - 8, slotSize - 16);
          ctx.fillStyle = isSelected ? "#e8c97a" : "#888";
          ctx.fillText(inventory[s].split(" ")[0].slice(0, 5), sx + 2, hudY + slotSize - 2);
        }
      }
      // Lighter slot (always 4th)
      const lighterSlotX = hudX + 3 * (slotSize + slotPad);
      const lighterSelected = hasLighter && selectedSlot >= inventory.length;
      ctx.fillStyle = lighterSelected ? "#2a1800" : "#111";
      ctx.fillRect(lighterSlotX, hudY, slotSize, slotSize);
      ctx.strokeStyle = lighterSelected ? "#fff" : (hasLighter ? "#e87820" : "#333");
      ctx.lineWidth = lighterSelected ? 2 : 1;
      ctx.strokeRect(lighterSlotX, hudY, slotSize, slotSize);
      if (hasLighter) {
        ctx.fillStyle = "#e87820";
        ctx.fillRect(lighterSlotX + 4, hudY + 4, slotSize - 8, slotSize - 16);
        ctx.fillStyle = "#e87820";
        ctx.fillText("Lgtr", lighterSlotX + 2, hudY + slotSize - 2);
      }

      // Stamina bar — above inventory, visible when not full
      if (stamina < STAMINA_MAX - 0.05) {
        const barW = slotTotalW, barH = 4;
        const barX = hudX, barY = hudY - 10;
        const frac = stamina / STAMINA_MAX;
        ctx.fillStyle = "#222";
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = frac > 0.4 ? "#5af" : (frac > 0.15 ? "#fa5" : "#f44");
        ctx.fillRect(barX, barY, Math.round(barW * frac), barH);
      }

      // Selected item name — centered above the loadout
      const heldLabelName = inventory[selectedSlot] || (lighterSelected ? "Lighter" : null);
      if (heldLabelName) {
        ctx.fillStyle = "#aaa";
        ctx.font = "11px monospace";
        const suffix = heldLabelName === "Flashlight"    ? (flashlightOn    ? " [ON]" : " [OFF]") :
                       heldLabelName === "UV Flashlight" ? (uvFlashlightOn  ? " [ON]" : " [OFF]") :
                       heldLabelName === "Lighter"       ? (lighterLit      ? " [LIT]" : "")      : "";
        ctx.textAlign = "center";
        ctx.fillText(heldLabelName + suffix, canvas.width / 2, hudY - 6);
        ctx.textAlign = "left";
      }

      // --- Enlarged held-item display (screen-fixed, bottom-right, no panel box) ---
      const heldForDisplay = inventory[selectedSlot] || (hasLighter ? "Lighter" : null);
      if (heldForDisplay) {
        const panelCX = 744, panelCY = 510; // center of display area (no box drawn)
        // Item name label above item
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.font = "9px monospace";
        ctx.textAlign = "center";
        ctx.fillText(heldForDisplay, panelCX + 1, panelCY - 44);
        ctx.fillStyle = "#7a6848";
        ctx.fillText(heldForDisplay, panelCX, panelCY - 45);
        ctx.textAlign = "left";

        // Draw item art centered at panelCX,panelCY, facing up (-y), at 3.5× scale
        ctx.save();
        ctx.translate(panelCX, panelCY);
        ctx.scale(3.5, 3.5);

        if (heldForDisplay === "Flashlight") {
          ctx.fillStyle = "#6a5008"; ctx.fillRect(-1.5,-5,3,8);
          ctx.fillStyle = "#c8a820"; ctx.fillRect(-2.5,-9,5,5);
          ctx.fillStyle = "#5a4008"; ctx.fillRect(-1,-5,1,8); ctx.fillRect(0.5,-5,1,8);
          ctx.fillStyle = flashlightOn ? "#ffffa0" : "#4a3808";
          ctx.beginPath(); ctx.arc(0,-10.5,2.5,0,Math.PI*2); ctx.fill();
          if (flashlightOn) {
            ctx.fillStyle = "rgba(255,255,160,0.55)"; ctx.beginPath(); ctx.arc(0,-10.5,4.5,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = "rgba(255,255,200,0.2)";  ctx.beginPath(); ctx.arc(0,-10.5,7,0,Math.PI*2);   ctx.fill();
          }
        } else if (heldForDisplay === "UV Flashlight") {
          ctx.fillStyle = "#3a1060"; ctx.fillRect(-1.5,-5,3,8);
          ctx.fillStyle = "#7030b0"; ctx.fillRect(-2.5,-9,5,5);
          ctx.fillStyle = uvFlashlightOn ? "#e0a0ff" : "#3a1860";
          ctx.beginPath(); ctx.arc(0,-10.5,2.5,0,Math.PI*2); ctx.fill();
          if (uvFlashlightOn) {
            ctx.fillStyle = "rgba(160,60,255,0.45)"; ctx.beginPath(); ctx.arc(0,-10.5,4.5,0,Math.PI*2); ctx.fill();
          }
        } else if (heldForDisplay === "Video Camera") {
          const camOn = heldItemOn; // placeholder — full video camera logic TBD
          ctx.fillStyle = "#1a1a1a"; ctx.fillRect(-3.5,-3,8,9);
          ctx.fillStyle = "#252525"; ctx.fillRect(-2.5,-8,6,6);
          ctx.fillStyle = "#303030"; ctx.fillRect(-1,-9,3,2);
          ctx.strokeStyle = "#606060"; ctx.lineWidth = 0.3;
          ctx.beginPath(); ctx.arc(0.5,-6,3.5,0,Math.PI*2); ctx.stroke();
          ctx.fillStyle = camOn ? "#60a0ff" : "#18256a";
          ctx.beginPath(); ctx.arc(0.5,-6,2.5,0,Math.PI*2); ctx.fill();
          if (camOn) { ctx.fillStyle="#ff2020"; ctx.beginPath(); ctx.arc(-2.5,3,2,0,Math.PI*2); ctx.fill(); }
        } else if (heldForDisplay === "EMF Reader") {
          ctx.fillStyle = "#2a5a80"; ctx.fillRect(-2,-9,4,13);
          ctx.fillStyle = "#4a8ab0"; ctx.fillRect(-1.5,-8,3,10);
          ctx.fillStyle = "#6aaad0"; ctx.fillRect(-0.5,-14,1,6);
          // Static indicator LEDs
          ctx.fillStyle = "#e84040"; ctx.fillRect(-1.5,-5,2,2);
          ctx.fillStyle = "#40e840"; ctx.fillRect(0,   -5,2,2);
          // EMF level bar meter — 5 bars, red at level 5
          for (let b = 0; b < 5; b++) {
            const lit = emfLevel > b;
            ctx.fillStyle = (lit && emfLevel === 5) ? "#ff2020" : lit ? "#40e840" : "#1a2a1a";
            ctx.fillRect(-4 + b * 2, 3 - b * 0.5, 1.5, 2 + b * 0.5); // rising bars
          }
        } else if (heldForDisplay === "Spirit Box") {
          ctx.fillStyle = "#3a3020"; ctx.fillRect(-5,-5,10,10);
          ctx.fillStyle = "#4a4030"; ctx.fillRect(-4,-4,8,8);
          ctx.fillStyle = "#1a1410";
          for(let gr=-1;gr<=1;gr++) for(let gc=-1;gc<=1;gc++) ctx.fillRect(gc*2.5-1,gr*2.5-1,2,2);
          ctx.fillStyle = "#6a5030"; ctx.beginPath(); ctx.arc(-3,-3,3,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = "#1a6060"; ctx.beginPath(); ctx.arc(-3,-3,1.5,0,Math.PI*2); ctx.fill();
        } else if (heldForDisplay === "Sound Recorder") {
          const recOn = heldItemOn;     // on = device running
          const recActive = heldItemUsing; // true while R is held = actively recording
          ctx.fillStyle = "#2a2a2a"; ctx.fillRect(-3,-7,7,12);
          ctx.fillStyle = "#383838"; ctx.fillRect(-2,-6,5,10);
          ctx.fillStyle = "#1a1a1a"; ctx.fillRect(-2,-6,5,4);
          ctx.fillStyle = recOn ? "#50e050" : "#2a3a2a";
          for(let dm=-1;dm<=1;dm++){ctx.beginPath();ctx.arc(0.5,dm*2-4,1.2,0,Math.PI*2);ctx.fill();}
          ctx.fillStyle = recOn ? "#ff2020" : "#3a1818";
          ctx.beginPath(); ctx.arc(-0.5,3,2,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = "#1a1a50"; ctx.fillRect(-2,1,3,2);
        } else if (heldForDisplay === "D.O.T.S. Projector") {
          const dotsOn = heldItemOn;
          ctx.fillStyle = "#1a1a2a"; ctx.fillRect(-5,-4,11,8);
          ctx.fillStyle = "#2a2a3a"; ctx.fillRect(-4,-3,9,6);
          ctx.fillStyle = "#0a0a18"; ctx.fillRect(-6,-1,3,2);
          ctx.fillStyle = dotsOn ? "#202040" : "#14121e"; ctx.fillRect(3,-3,3,6);
          ctx.fillStyle = dotsOn ? "#e840e8" : "#3a1a3a";
          for(let dr=-1;dr<=1;dr++){ctx.beginPath();ctx.arc(4.5,dr*2,1.2,0,Math.PI*2);ctx.fill();}
        } else if (heldForDisplay === "Thermometer") {
          ctx.fillStyle = "#909090"; ctx.fillRect(-1,-12,3,14);
          ctx.fillStyle = "#c0c0c0"; ctx.fillRect(-0.5,-11,2,12);
          ctx.fillStyle = "#e0e0e0"; ctx.beginPath(); ctx.arc(0.5,-12,2,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = "#40e8e0"; ctx.fillRect(-1,1,3,4);
          ctx.fillStyle = "#80ffff"; ctx.font="3px monospace"; ctx.textAlign="center";
          ctx.fillText("°C",0.5,4); ctx.textAlign="left";
        } else if (heldForDisplay === "Ghost Book") {
          ctx.fillStyle = "#e8e0c8"; ctx.fillRect(-6,-6,6,11);
          ctx.fillStyle = "#f0e8d0"; ctx.fillRect(0,-6,6,11);
          ctx.fillStyle = "#8a6840"; ctx.fillRect(-1,-6,2,11);
          ctx.strokeStyle = "rgba(100,130,200,0.4)"; ctx.lineWidth=0.5;
          for(let rl=-4;rl<=4;rl+=2){
            ctx.beginPath();ctx.moveTo(-5,rl);ctx.lineTo(-1,rl);ctx.stroke();
            ctx.beginPath();ctx.moveTo(1,rl);ctx.lineTo(5,rl);ctx.stroke();
          }
        } else if (heldForDisplay === "Incense") {
          const incenseOn = heldItemOn;
          ctx.fillStyle = "#6a4820"; ctx.fillRect(-3,2,7,5);
          ctx.strokeStyle = "#c89040"; ctx.lineWidth=1.2;
          ctx.beginPath();ctx.moveTo(0,4);ctx.lineTo(-2,-8);ctx.stroke();
          ctx.beginPath();ctx.moveTo(1.5,4);ctx.lineTo(1.5,-8);ctx.stroke();
          ctx.beginPath();ctx.moveTo(3,4);ctx.lineTo(4.5,-8);ctx.stroke();
          if (incenseOn) {
            ctx.fillStyle="#e84000";
            ctx.beginPath();ctx.arc(-2,-8,2,0,Math.PI*2);ctx.fill();
            ctx.beginPath();ctx.arc(1.5,-8,2,0,Math.PI*2);ctx.fill();
            ctx.beginPath();ctx.arc(4.5,-8,2,0,Math.PI*2);ctx.fill();
          } else {
            ctx.fillStyle="#5a3818"; ctx.fillRect(-2.5,-9,2,2); ctx.fillRect(1,-9,2,2); ctx.fillRect(3.5,-9,2,2);
          }
        } else if (heldForDisplay === "Crucifix") {
          ctx.fillStyle = "#c89830"; ctx.fillRect(-2,-9,5,18);
          ctx.fillStyle = "#e8b840"; ctx.fillRect(-1,-8,3,16);
          ctx.fillStyle = "#c89830"; ctx.fillRect(-8,-2,17,6);
          ctx.fillStyle = "#e8b840"; ctx.fillRect(-7,-1,15,4);
          ctx.fillStyle = "#fff0a0"; ctx.beginPath(); ctx.arc(0,0,2.5,0,Math.PI*2); ctx.fill();
        } else if (heldForDisplay === "Sanity Meds") {
          ctx.fillStyle = "#e8e8e0"; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = "#d0d0c8"; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = "#e84020"; ctx.beginPath(); ctx.arc(0,-4,4,Math.PI,0); ctx.fill();
          ctx.fillStyle = "#c0c0b8"; ctx.fillRect(-5,-1,10,4);
          ctx.fillStyle = "#404040"; ctx.font="4px monospace"; ctx.textAlign="center";
          ctx.fillText("Rx",0,2.5); ctx.textAlign="left";
        } else if (heldForDisplay === "Lighter") {
          ctx.fillStyle = "#c8a820"; ctx.fillRect(-2.5,-4,6,8);
          ctx.fillStyle = "#e0c040"; ctx.fillRect(-1.5,-3,4,6);
          ctx.fillStyle = "#8a7010"; ctx.fillRect(-1,-6,4,2);
          ctx.fillStyle = "#5a4808"; ctx.fillRect(0,-5,2,1);
          if (lighterLit) {
            ctx.fillStyle = "rgba(255,160,0,0.95)"; ctx.beginPath(); ctx.arc(0.5,-9,3.5,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = "rgba(255,255,80,0.9)";  ctx.beginPath(); ctx.arc(0.5,-11,1.8,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = "rgba(255,200,40,0.3)";  ctx.beginPath(); ctx.arc(0.5,-9,6,0,Math.PI*2);   ctx.fill();
          }
        } else {
          ctx.fillStyle = itemColors[heldForDisplay] || "#aaa"; ctx.fillRect(-4,-8,8,12);
        }

        ctx.restore();
      }

    }

    // --- Desktop mouse wheel: pegboard scroll or inventory cycle ---
    if (!isMobile) {
      canvas.addEventListener("wheel", e => {
        e.preventDefault();
        const dir = e.deltaY > 0 ? 1 : -1; // +1 = scroll down, -1 = scroll up

        if (equipmentOpen) {
          // Scroll the pegboard horizontally
          const virtualW = Math.ceil(equipmentList.length / 3) * 200 + 60;
          const maxScroll = Math.max(0, virtualW - 664);
          pegScrollX = Math.max(0, Math.min(maxScroll, pegScrollX + dir * 80));
          return;
        }

        if (gameRunning && !journalOpen && !keypadOpen &&
            !dangerTimerOpen && !fourPanelOpen && !corkBoardOpen && !cameraViewMode) {
          const total = inventory.length + (hasLighter ? 1 : 0);
          if (total > 0) {
            selectedSlot = ((selectedSlot + dir) % total + total) % total;
            heldItemOn = false; heldItemUsing = false;
          }
        }
      }, { passive: false });
    }

    // --- Mouse click handler ---
    canvas.addEventListener("click", e => {
      const rect = canvas.getBoundingClientRect();
      // Divide by CSS scale so click coordinates stay in the 800×600 logical space
      const mx = (e.clientX - rect.left) * (canvas.width  / rect.width);
      const my = (e.clientY - rect.top)  * (canvas.height / rect.height);

      // ── Desktop: CCTV view — click anywhere closes it ──────────────────────
      if (!isMobile && cameraViewMode) { cameraViewMode = false; return; }

      // ── Desktop: click outside open panel closes it ──────────────────────
      // Panels that don't already have dedicated outside-click handling
      if (!isMobile) {
        if (equipmentOpen  && (mx < 60  || mx > 740 || my < 35  || my > 565)) { equipmentOpen  = false; return; }
        if (keypadOpen     && (mx < 270 || mx > 530 || my < 250 || my > 390)) { keypadOpen     = false; return; }
        if (dangerTimerOpen&& (mx < 270 || mx > 530 || my < 220 || my > 390)) { dangerTimerOpen= false; return; }
        if (fourPanelOpen  && (mx < 50  || mx > 750 || my < 30  || my > 570)) { fourPanelOpen  = false; return; }
        if (corkBoardOpen  && (mx < 120 || mx > 680 || my < 80  || my > 520)) { corkBoardOpen  = false; return; }
        if (journalOpen    && (mx < 20  || mx > 756 || my < 28  || my > 548)) { journalOpen    = false; return; }
      }

      // Pegboard pickup
      if (equipmentOpen) {
        const slotW = 160, slotH = 130, colSpacing = 200;
        const bx = 68, by = 88, bw = 664, bh = 440;
        const rowEy = [8, 154, 300];
        equipmentList.forEach((item, i) => {
          const col = i % 5;
          const row = Math.floor(i / 5);
          const sx = (bx - pegScrollX) + 14 + col * colSpacing; // screen x
          const sy = by + rowEy[row];                            // screen y
          if (mx >= sx && mx <= sx + slotW && my >= sy && my <= sy + slotH) {
            if (item.qty <= 0) return; // empty slot
            if (item.name === "Lighter") {
              if (!hasLighter) { hasLighter = true; item.qty--; }
            } else {
              if (inventory.length < 3 && !inventory.includes(item.name)) {
                inventory.push(item.name);
                selectedSlot = Math.min(selectedSlot, inventory.length - 1);
                item.qty--;
              }
            }
          }
        });
        return;
      }

      // Journal tab clicks and content clicks
      if (journalOpen) {
        // Book layout constants (must match drawJournal)
        const jy = 52, spineW = 24;
        const lx = 20 + spineW;   // left page x  = 44
        const lw = 358;            // left page width
        const rx = lx + lw + 4;   // right page x = 406
        const rw = 350;            // right page width (must match drawJournal)
        const tabH = 24, tabY = jy - tabH;
        // Tab hit areas above left page
        if (my >= tabY && my <= jy) {
          if (mx >= lx + 10  && mx <= lx + 128)  { journalTab = 0; return; }
          if (mx >= lx + 140 && mx <= lx + 258)  { journalTab = 1; return; }
          if (mx >= lx + 270 && mx <= lx + 388)  { journalTab = 2; return; }
        }
        // Evidence rows (tab 0, left page) — click row to cycle state
        if (journalTab === 0) {
          evidenceTypes.forEach((ev, i) => {
            const cbx = lx + 14, cby = jy + 76 + i * 30;
            if (mx >= cbx && mx <= cbx + 220 && my >= cby && my <= cby + 22) {
              const cur = evidenceStates[ev] || "neutral";
              if (cur === "neutral")        evidenceStates[ev] = "confirmed";
              else if (cur === "confirmed") evidenceStates[ev] = "crossed";
              else                          delete evidenceStates[ev];
            }
          });
        }
        // Options tab (tab 2) — left page differs by platform; right page keybinds shared
        if (journalTab === 2) {
          if (isMobile) {
            // ── Mobile: sliders are handled via touch drag (touchmove), not click.
            // Only the Reset button uses a synthetic click.
            // Reset button bounds match drawJournal: y = jy+238, w=140, h=26
            if (mx >= lx + 14 && mx <= lx + 154 && my >= jy + 238 && my <= jy + 264) {
              mobJoyScale = 1.0; mobBtnScale = 1.0; mobOpacity = 0.6;
              saveMobileSettings();
            }
          } else {
            // ── Desktop: Sensitivity [-] [+] buttons (left page) ──
            const sbx = lx + 70, sby = jy + 106;
            if (mx >= sbx && mx <= sbx + 22 && my >= sby && my <= sby + 22) {
              sensitivity = Math.max(0.5, +(sensitivity - 0.1).toFixed(1)); saveControls();
            }
            if (mx >= sbx + 80 && mx <= sbx + 102 && my >= sby && my <= sby + 22) {
              sensitivity = Math.min(2.0, +(sensitivity + 0.1).toFixed(1)); saveControls();
            }
            // Reset to defaults button
            const resetBtnX = lx + 14, resetBtnY = jy + 260;
            if (mx >= resetBtnX && mx <= resetBtnX + 120 && my >= resetBtnY && my <= resetBtnY + 22) {
              keybinds = { ...KEYBIND_DEFAULTS };
              sensitivity = 1.0;
              saveControls();
            }
          }
          // ── Right page: keybind rows — shared for both platforms ──
          const actions = ["up","down","left","right","sprint","interact","flashlight","journal","drop","inventory","use"];
          actions.forEach((action, i) => {
            const bry = jy + 70 + i * 30;
            if (mx >= rx + 14 && mx <= rx + rw - 14 && my >= bry && my <= bry + 24) {
              rebindingAction = (rebindingAction === action) ? null : action;
            }
          });
          return;
        }
        // Ghost list (tab 1, left page) — click row to cycle state
        if (journalTab === 1) {
          const entryH = 18;
          ghosts.forEach((g, i) => {
            const gx = lx + 14, gy = jy + 58 + i * entryH;
            if (mx >= gx && mx <= lx + lw - 10 && my >= gy && my <= gy + entryH) {
              const isGuess   = playerGuess === g.name;
              const isCrossed = ghostStates[g.name] === "crossed";
              if (isCrossed) {
                delete ghostStates[g.name];
              } else if (isGuess) {
                ghostStates[g.name] = "crossed";
                playerGuess = "Spirit";
              } else {
                playerGuess = g.name;
                delete ghostStates[g.name];
              }
            }
          });
        }
        return;
      }

      // Van keypad clicks
      if (keypadOpen) {
        // Button is centered at canvas (400, 320), 200×44px
        if (mx >= 300 && mx <= 500 && my >= 298 && my <= 342) {
          if (!vanDoor.open) {
            vanDoor.open = true; // "Open Van Doors"
          } else {
            // "Leave Site" — end the round
            gameRunning = false;
            keypadOpen  = false;
            guessCorrect = (playerGuess !== null && playerGuess === currentGhost.name);
            roundOver   = true;
          }
        }
        // Close button — small X top-right of panel
        if (mx >= 530 && mx <= 550 && my >= 258 && my <= 278) keypadOpen = false;
        return;
      }
      // Threat monitor — close via ✕ (top-right of panel: tx=270, ty=220, tw=260)
      if (dangerTimerOpen) {
        if (mx >= 516 && mx <= 532 && my >= 220 && my <= 238) dangerTimerOpen = false;
        return;
      }
      // Four-panel monitor — close via ✕ (px=50, py=30, pw=700)
      if (fourPanelOpen) {
        if (mx >= 734 && mx <= 752 && my >= 30 && my <= 48) fourPanelOpen = false;
        return;
      }
      // Cork board — close via ✕ (cbx=120, cby=80, cbw=560)
      if (corkBoardOpen) {
        if (mx >= 664 && mx <= 682 && my >= 80 && my <= 98) corkBoardOpen = false;
        return;
      }

      // Desktop world interaction is keyboard-only (E key). No click-to-interact.
    });

    // --- Equipment Screen (van pegboard, view-only) ---
    // qty = how many are currently in the van; 0 = empty slot (item was used / not restocked)
    const equipmentList = [
      // Derived from the master ITEMS registry — qty starts at pegQty and decreases as items are taken
      ...ITEMS.map(it => ({ name: it.name, qty: it.pegQty, desc: it.desc })),
    ];

    function drawEquipment() {
      // Dark overlay
      ctx.fillStyle = "rgba(0,0,0,0.92)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Panel frame
      ctx.fillStyle = "#1a1410";
      ctx.fillRect(60, 35, 680, 530);
      ctx.strokeStyle = "#7a6040";
      ctx.lineWidth = 2;
      ctx.strokeRect(60, 35, 680, 530);

      // Title
      ctx.fillStyle = "#e8c97a";
      ctx.font = "bold 16px monospace";
      ctx.textAlign = "center";
      ctx.fillText("EQUIPMENT WALL", 400, 60);
      ctx.fillStyle = "#5a4828";
      ctx.fillRect(60, 70, 680, 1);

      // Scroll + zoom hint
      ctx.fillStyle = "#6a5838";
      ctx.font = "10px monospace";
      ctx.fillText("← → to scroll", 400, 82);

      // Board area — one wide continuous pegboard; virtualW grows with item count
      const bx = 68, by = 88, bw = 664, bh = 440;
      const virtualW = Math.ceil(equipmentList.length / 3) * 200 + 60;

      // Board wood background
      ctx.fillStyle = "#241808";
      ctx.fillRect(bx, by, bw, bh);
      // Subtle wood grain
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      for (let gy = 0; gy < bh; gy += 14) ctx.fillRect(bx, by + gy, bw, 1);
      // Inner bevel
      ctx.strokeStyle = "#3a2810";
      ctx.lineWidth = 1;
      ctx.strokeRect(bx + 1, by + 1, bw - 2, bh - 2);

      // Clamp scroll to board bounds
      const maxScroll = Math.max(0, virtualW - bw);
      pegScrollX = Math.min(pegScrollX, maxScroll);

      // Clip board area so scrolled content doesn't bleed outside
      ctx.save();
      ctx.beginPath();
      ctx.rect(bx, by, bw, bh);
      ctx.clip();

      // Translate so virtual (0,0) = board top-left, shifted by scroll
      ctx.translate(bx - pegScrollX, by);

      // Peg holes across the full virtual width
      ctx.fillStyle = "#160e04";
      for (let row = 0; row < 20; row++) {
        for (let col = 0; col < 64; col++) {
          ctx.fillRect(6 + col * 22, 6 + row * 22, 4, 4);
        }
      }

      // Three-row layout — columns expand automatically as ITEMS grows
      const slotW = 160, slotH = 130, colSpacing = 200;
      const rows = 3;
      const cols = Math.ceil(equipmentList.length / rows);
      const rowEy = [8, 154, 300]; // top y of each row's item card (virtual board coords)

      // Empty placeholder slots — dotted outlines across all 3 rows × 5 cols
      ctx.strokeStyle = "rgba(255,200,100,0.10)";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          ctx.strokeRect(14 + c * colSpacing, rowEy[r], slotW, slotH);
        }
      }
      ctx.setLineDash([]);

      // Items — 5 per row across 3 rows (row = Math.floor(i/5), col = i%5)
      equipmentList.forEach((item, i) => {
        const col = i % 5;
        const row = Math.floor(i / 5);
        const ex = 14 + col * colSpacing; // virtual board x
        const ey = rowEy[row];             // virtual board y for this row

        // Hanging pegs — short nubs above each card (12px shaft + cap)
        ctx.fillStyle = "#b08838";
        ctx.fillRect(ex + 38, ey - 12, 5, 14); // left peg shaft
        ctx.fillRect(ex + 112, ey - 12, 5, 14); // right peg shaft
        ctx.fillStyle = "#e0aa48";
        ctx.fillRect(ex + 36, ey - 14, 9, 5);  // left cap
        ctx.fillRect(ex + 110, ey - 14, 9, 5); // right cap
        ctx.fillStyle = "#c89830";
        ctx.fillRect(ex + 38, ey - 2, 5, 5);   // left tip
        ctx.fillRect(ex + 112, ey - 2, 5, 5);  // right tip

        if (item.qty === 0) {
          // Empty slot — dark card, no silhouette; shows the peg hook is bare
          ctx.fillStyle = "#0e0c08";
          ctx.fillRect(ex, ey, slotW, slotH);
          ctx.strokeStyle = "#3a2e18";
          ctx.lineWidth = 1;
          ctx.strokeRect(ex, ey, slotW, slotH);
          // "EMPTY" label
          ctx.fillStyle = "#3a3028";
          ctx.font = "bold 11px monospace";
          ctx.textAlign = "center";
          ctx.fillText("EMPTY", ex + 80, ey + 60);
          // Item name (dim)
          ctx.fillStyle = "#4a3e28";
          ctx.font = "bold 9px monospace";
          ctx.fillText(item.name, ex + 80, ey + 116);
          ctx.fillStyle = "#3a3020";
          ctx.font = "8px monospace";
          ctx.fillText(item.desc.length > 22 ? item.desc.slice(0,21)+"…" : item.desc, ex + 80, ey + 126);
        } else {
          // Filled slot — item card with silhouette, quantity badge, label

          // Item card — 180px wide to match silhouette offsets
          ctx.fillStyle = "#3a2812";
          ctx.fillRect(ex, ey, slotW, slotH);
          ctx.strokeStyle = "#6a4e28";
          ctx.lineWidth = 1;
          ctx.strokeRect(ex, ey, slotW, slotH);
          // Top sheen
          ctx.fillStyle = "rgba(255,220,140,0.05)";
          ctx.fillRect(ex, ey, slotW, 2);

          // Equipment silhouettes — one per item type (index matches equipmentList order)
          const shapes = [
            () => { // Flashlight — cylindrical torch
              ctx.fillStyle = "#c8a820"; ctx.fillRect(ex+70, ey+28, 22, 74); // body
              ctx.fillStyle = "#f0d060"; ctx.fillRect(ex+67, ey+24, 28, 12); // head
              ctx.fillStyle = "#ffffc0"; ctx.fillRect(ex+70, ey+26, 22, 6);  // lens glow
              ctx.fillStyle = "#8a7010"; ctx.fillRect(ex+74, ey+72, 14, 30); // grip
            },
            () => { // EMF Reader — handheld wand with antenna
              ctx.fillStyle = "#2a5a80"; ctx.fillRect(ex+76, ey+30, 34, 72); // body
              ctx.fillStyle = "#4a8ab0"; ctx.fillRect(ex+80, ey+28, 26, 40); // grip face
              ctx.fillStyle = "#6aaad0"; ctx.fillRect(ex+88, ey+10, 8, 22);  // antenna
              ctx.fillStyle = "#e84040"; ctx.fillRect(ex+82, ey+34, 5, 5);   // red LED
              ctx.fillStyle = "#40e840"; ctx.fillRect(ex+90, ey+34, 5, 5);   // green LED
              ctx.fillStyle = "#e8e840"; ctx.fillRect(ex+98, ey+34, 5, 5);   // yellow LED
            },
            () => { // Spirit Box — small radio box with speaker grill
              ctx.fillStyle = "#3a3020"; ctx.fillRect(ex+62, ey+20, 62, 76); // body
              ctx.fillStyle = "#5a4a30"; ctx.fillRect(ex+66, ey+24, 54, 44); // face panel
              ctx.fillStyle = "#1a1410"; // speaker grill dots
              for (let gr = 0; gr < 4; gr++) for (let gc = 0; gc < 6; gc++)
                ctx.fillRect(ex+70+gc*8, ey+28+gr*8, 3, 3);
              ctx.fillStyle = "#e84020"; ctx.fillRect(ex+66, ey+72, 10, 8);  // power light
              ctx.fillStyle = "#7a6040"; ctx.fillRect(ex+96, ey+22, 6, 20);  // dial
              ctx.fillStyle = "#888";    ctx.fillRect(ex+110, ey+22, 8, 4);  // antenna
            },
            () => { // UV Flashlight — long torch shape
              ctx.fillStyle = "#5a5a20"; ctx.fillRect(ex+84, ey+60, 20, 50); // handle
              ctx.fillStyle = "#7a7a30"; ctx.fillRect(ex+80, ey+40, 28, 24); // barrel
              ctx.fillStyle = "#a0a040"; ctx.fillRect(ex+78, ey+26, 32, 16); // head
              ctx.fillStyle = "rgba(160,160,255,0.5)";
              ctx.beginPath(); ctx.arc(ex+94, ey+26, 14, 0, Math.PI*2); ctx.fill();
              ctx.fillStyle = "#d0d0ff"; ctx.fillRect(ex+82, ey+18, 24, 10); // lens
            },
            () => { // Ghost Book — open notebook with spiral binding
              ctx.fillStyle = "#d4c8a0"; ctx.fillRect(ex+56, ey+18, 74, 88); // pages
              ctx.fillStyle = "#b8aa80"; ctx.fillRect(ex+56, ey+18, 36, 88); // left page
              ctx.fillStyle = "#1a1208"; ctx.fillRect(ex+91, ey+18, 3, 88);  // spine
              ctx.fillStyle = "#8a7a60";
              for (let ln = 0; ln < 7; ln++) ctx.fillRect(ex+60, ey+28+ln*10, 28, 2);
              ctx.fillStyle = "#c04020";
              for (let ln = 0; ln < 5; ln++) ctx.fillRect(ex+98, ey+30+ln*12, 24, 2);
              ctx.fillStyle = "#7a7a7a";
              for (let sp = 0; sp < 8; sp++) ctx.fillRect(ex+88, ey+24+sp*10, 7, 5);
            },
            () => { // Video Camera — boxy body + lens
              ctx.fillStyle = "#2a2a2a"; ctx.fillRect(ex+60, ey+24, 66, 46); // body
              ctx.fillStyle = "#3a3a3a"; ctx.fillRect(ex+64, ey+28, 58, 38); // face
              ctx.fillStyle = "#0a0a14";
              ctx.beginPath(); ctx.arc(ex+82, ey+47, 14, 0, Math.PI*2); ctx.fill();
              ctx.fillStyle = "#1a1a40";
              ctx.beginPath(); ctx.arc(ex+82, ey+47, 9, 0, Math.PI*2); ctx.fill();
              ctx.fillStyle = "rgba(80,80,200,0.4)";
              ctx.beginPath(); ctx.arc(ex+82, ey+47, 5, 0, Math.PI*2); ctx.fill();
              ctx.fillStyle = "#e84040"; ctx.fillRect(ex+108, ey+30, 8, 5);  // REC
              ctx.fillStyle = "#3a3a3a"; ctx.fillRect(ex+60, ey+70, 66, 10); // grip
            },
            () => { // Thermometer — long probe with bulb
              ctx.fillStyle = "#c0c0c0"; ctx.fillRect(ex+88, ey+12, 10, 80); // shaft
              ctx.fillStyle = "#e0e0e0"; ctx.fillRect(ex+90, ey+14, 6, 60);  // highlight
              ctx.fillStyle = "#e03030";
              ctx.beginPath(); ctx.arc(ex+93, ey+98, 10, 0, Math.PI*2); ctx.fill();
              ctx.fillStyle = "#e05050";
              ctx.beginPath(); ctx.arc(ex+91, ey+96, 3, 0, Math.PI*2); ctx.fill();
              ctx.fillStyle = "#808080";
              for (let tm = 0; tm < 6; tm++) ctx.fillRect(ex+98, ey+20+tm*10, 6, 2);
            },
            () => { // Sound Recorder — handled here only when qty > 0
              ctx.fillStyle = "#2a2a2a"; ctx.fillRect(ex+72, ey+16, 42, 80); // body
              ctx.fillStyle = "#404040"; ctx.fillRect(ex+76, ey+20, 34, 56); // face
              // Mic grille (dots)
              ctx.fillStyle = "#1a1a1a";
              for (let mr = 0; mr < 3; mr++) for (let mc = 0; mc < 3; mc++)
                ctx.fillRect(ex+80+mc*8, ey+24+mr*8, 4, 4);
              ctx.fillStyle = "#e84040"; ctx.fillRect(ex+76, ey+82, 8, 6);   // REC LED
              ctx.fillStyle = "#888";    ctx.fillRect(ex+90, ey+82, 18, 6);  // pause btn
              ctx.fillStyle = "#c0c0c0"; ctx.fillRect(ex+74, ey+104, 38, 4); // bottom
            },
            () => { // D.O.T.S. Projector — flat rectangular projector unit
              ctx.fillStyle = "#1a1a2a"; ctx.fillRect(ex+60, ey+40, 56, 36); // body
              ctx.fillStyle = "#2a2a3a"; ctx.fillRect(ex+62, ey+42, 52, 32); // face panel
              ctx.fillStyle = "#e840e8"; // dot grid LEDs
              for (let dr = 0; dr < 3; dr++) for (let dc = 0; dc < 5; dc++)
                ctx.fillRect(ex+66+dc*9, ey+46+dr*9, 3, 3);
              ctx.fillStyle = "#6040c0"; ctx.fillRect(ex+64, ey+80, 48, 6);  // base
              ctx.fillStyle = "#c0a0ff"; ctx.fillRect(ex+66, ey+44, 52, 2);  // top sheen
            },
            () => { // Tripod — standing three-leg camera mount
              const tx = ex + 93, ty = ey + 90; // base center point
              ctx.strokeStyle = "#606050"; ctx.lineWidth = 3;
              // Three legs
              ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx,      ty - 70); ctx.stroke(); // front leg up
              ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx - 44, ty + 18); ctx.stroke(); // rear-left
              ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx + 44, ty + 18); ctx.stroke(); // rear-right
              // Feet
              ctx.fillStyle = "#484840";
              ctx.beginPath(); ctx.arc(tx,      ty - 70, 4, 0, Math.PI*2); ctx.fill();
              ctx.beginPath(); ctx.arc(tx - 44, ty + 18, 4, 0, Math.PI*2); ctx.fill();
              ctx.beginPath(); ctx.arc(tx + 44, ty + 18, 4, 0, Math.PI*2); ctx.fill();
              // Center column
              ctx.fillStyle = "#909080"; ctx.fillRect(tx - 6, ty - 68, 12, 60);
              ctx.fillStyle = "#b0b0a0"; ctx.fillRect(tx - 4, ty - 66, 8, 56);
              // Head mount
              ctx.fillStyle = "#707060"; ctx.fillRect(tx - 12, ty - 74, 24, 10);
              ctx.fillStyle = "#909080"; ctx.fillRect(tx - 10, ty - 72, 20, 7);
            },
            () => { // Sanity Meds — pill bottle
              ctx.fillStyle = "#e8e8e0"; ctx.fillRect(ex+76, ey+30, 30, 64); // bottle
              ctx.fillStyle = "#d0d0c8"; ctx.fillRect(ex+78, ey+32, 26, 60); // face
              ctx.fillStyle = "#e84020"; ctx.fillRect(ex+74, ey+22, 34, 12); // cap
              ctx.fillStyle = "#c83010"; ctx.fillRect(ex+76, ey+24, 30, 8);  // cap side
              // Label band
              ctx.fillStyle = "#4080c0"; ctx.fillRect(ex+76, ey+48, 30, 20);
              // Pill cross symbol
              ctx.fillStyle = "#ffffff"; ctx.fillRect(ex+88, ey+52, 6, 12);
              ctx.fillStyle = "#ffffff"; ctx.fillRect(ex+84, ey+56, 14, 4);
            },
            () => { // Lighter — small flip lighter
              ctx.fillStyle = "#c8a020"; ctx.fillRect(ex+82, ey+50, 22, 44); // body
              ctx.fillStyle = "#e0b830"; ctx.fillRect(ex+84, ey+52, 18, 40); // face shine
              ctx.fillStyle = "#8a6e10"; ctx.fillRect(ex+82, ey+44, 22, 8);  // flint wheel
              // Flint ridges
              ctx.fillStyle = "#c89820";
              for (let fr = 0; fr < 4; fr++) ctx.fillRect(ex+84+fr*4, ey+45, 3, 6);
              // Flame (small when lit)
              ctx.fillStyle = "rgba(255,160,20,0.7)";
              ctx.beginPath(); ctx.arc(ex+93, ey+40, 5, 0, Math.PI*2); ctx.fill();
              ctx.fillStyle = "rgba(255,220,80,0.5)";
              ctx.beginPath(); ctx.arc(ex+93, ey+37, 3, 0, Math.PI*2); ctx.fill();
            },
            () => { // Incense — bundle of sticks in holder
              // Holder dish
              ctx.fillStyle = "#6a4828"; ctx.fillRect(ex+68, ey+104, 48, 8);
              ctx.fillStyle = "#8a5a30"; ctx.fillRect(ex+72, ey+100, 40, 6);
              // Incense sticks (3 sticks, slightly fanned)
              ctx.fillStyle = "#c8a060";
              ctx.fillRect(ex+84, ey+20, 3, 84); // left stick
              ctx.fillRect(ex+90, ey+16, 3, 88); // center stick
              ctx.fillRect(ex+96, ey+20, 3, 84); // right stick
              // Ember glow tips
              ctx.fillStyle = "#e84000";
              ctx.fillRect(ex+84, ey+18, 3, 4);
              ctx.fillRect(ex+90, ey+14, 3, 4);
              ctx.fillRect(ex+96, ey+18, 3, 4);
              // Smoke wisps
              ctx.fillStyle = "rgba(200,200,200,0.25)";
              ctx.fillRect(ex+85, ey+10, 2, 8);
              ctx.fillRect(ex+91, ey+6,  2, 8);
              ctx.fillRect(ex+97, ey+10, 2, 8);
            },
            () => { // Crucifix — latin cross
              const cx = ex + 90, cy = ey + 80;
              ctx.fillStyle = "#c89830"; // gold cross
              ctx.fillRect(cx - 5,  cy - 60, 10, 80); // vertical bar
              ctx.fillRect(cx - 26, cy - 40, 52, 10); // horizontal bar
              // Cross sheen
              ctx.fillStyle = "#e8b840";
              ctx.fillRect(cx - 3,  cy - 58, 4, 76);
              ctx.fillRect(cx - 24, cy - 38, 48, 4);
              // Base detail
              ctx.fillStyle = "#a87820";
              ctx.fillRect(cx - 6,  cy + 18, 12, 4);
            },
          ];
          // Use custom shape if defined, otherwise draw a generic placeholder card
          if (shapes[i]) {
            shapes[i]();
          } else {
            // Placeholder silhouette — shown for stub items not yet fully illustrated
            ctx.fillStyle = "#1e1e1e"; ctx.fillRect(ex+60, ey+20, 66, 86);
            ctx.strokeStyle = "#3a3a3a"; ctx.lineWidth = 1;
            ctx.strokeRect(ex+60, ey+20, 66, 86);
            ctx.fillStyle = "#3a3a3a";
            ctx.font = "bold 22px monospace"; ctx.textAlign = "center";
            ctx.fillText("?", ex + 93, ey + 72);
            // Category colour strip at bottom of card
            const cat = ITEMS[i] ? ITEMS[i].category : "optional";
            ctx.fillStyle = cat === "cursed" ? "#4a1a3a" : cat === "starter" ? "#1a3a2a" : "#2a2a1a";
            ctx.fillRect(ex+60, ey+96, 66, 10);
          }

          // Quantity badge — top-right corner of card
          ctx.fillStyle = "#1a4a1a";
          ctx.fillRect(ex + slotW - 24, ey + 4, 20, 14);
          ctx.strokeStyle = "#40a040";
          ctx.lineWidth = 1;
          ctx.strokeRect(ex + slotW - 24, ey + 4, 20, 14);
          ctx.fillStyle = "#80e080";
          ctx.font = "bold 9px monospace";
          ctx.textAlign = "center";
          ctx.fillText("×" + item.qty, ex + slotW - 14, ey + 14);

          // Item name label
          ctx.fillStyle = "#e8c97a";
          ctx.font = "bold 9px monospace";
          ctx.textAlign = "center";
          ctx.fillText(item.name, ex + 80, ey + 116);
          // Short desc
          ctx.fillStyle = "#7a6848";
          ctx.font = "8px monospace";
          ctx.fillText(item.desc.length > 22 ? item.desc.slice(0,21)+"…" : item.desc, ex + 80, ey + 126);
        }
      });

      ctx.restore(); // end board clip + translate

      // Scroll position indicator — thin bar under the board (screen space, after restore)
      const thumbW = Math.max(30, Math.floor(bw * bw / virtualW));
      const thumbX = bx + (maxScroll > 0 ? Math.floor((bw - thumbW) * pegScrollX / maxScroll) : 0);
      ctx.fillStyle = "#2a1e0a";
      ctx.fillRect(bx, by + bh + 3, bw, 4);
      ctx.fillStyle = "#7a6040";
      ctx.fillRect(thumbX, by + bh + 3, thumbW, 4);

      // Close hint
      ctx.fillStyle = "#555";
      ctx.font = "12px monospace";
      ctx.textAlign = "center";
      ctx.fillText("Click to take — Q to cycle held — ESC to close", 400, 575);
    }

    // --- Journal Screen ---
    function drawJournal() {
      // Dim the game behind the journal
      ctx.fillStyle = "rgba(0,0,0,0.72)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // ── Open-book layout constants ──────────────────────────────────────────
      const jy = 52, jh = 496;
      const spineW = 24;
      const lx = 20 + spineW;       // left page x  = 44
      const lw = 358;                // left page width
      const creaseX = lx + lw;      // center crease x = 402
      const rx = creaseX + 4;       // right page x = 406
      const rw = 350;                // right page width  (406+350=756)

      function drawPage(x, w) {
        ctx.fillStyle = "#e8dfc8"; ctx.fillRect(x, jy, w, jh);
        // Aged edges
        const ag = ctx.createLinearGradient(x, jy, x + w, jy + jh);
        ag.addColorStop(0,   "rgba(60,30,5,0.12)");
        ag.addColorStop(0.4, "rgba(0,0,0,0)");
        ag.addColorStop(0.6, "rgba(0,0,0,0)");
        ag.addColorStop(1,   "rgba(40,20,5,0.16)");
        ctx.fillStyle = ag; ctx.fillRect(x, jy, w, jh);
        const tf = ctx.createLinearGradient(x, jy, x, jy + 30);
        tf.addColorStop(0, "rgba(30,15,5,0.20)"); tf.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = tf; ctx.fillRect(x, jy, w, 30);
        const bf = ctx.createLinearGradient(x, jy + jh - 24, x, jy + jh);
        bf.addColorStop(0, "rgba(0,0,0,0)"); bf.addColorStop(1, "rgba(30,15,5,0.20)");
        ctx.fillStyle = bf; ctx.fillRect(x, jy + jh - 24, w, 24);
        // Ruled lines
        ctx.strokeStyle = "rgba(100,130,190,0.20)"; ctx.lineWidth = 1;
        for (let ry = jy + 70; ry < jy + jh - 16; ry += 22) {
          ctx.beginPath(); ctx.moveTo(x + 10, ry); ctx.lineTo(x + w - 10, ry); ctx.stroke();
        }
        // Page border
        ctx.strokeStyle = "rgba(0,0,0,0.30)"; ctx.lineWidth = 1.5;
        ctx.strokeRect(x, jy, w, jh);
      }

      // ── Tabs above left page ──────────────────────────────────────────────
      const tabLabels = ["Evidence", "Ghost Guide", "Options"];
      const tabH = 24, tabY = jy - tabH;
      tabLabels.forEach((label, ti) => {
        const tx = lx + 10 + ti * 130;
        const active = journalTab === ti;
        ctx.fillStyle = active ? "#e8dfc8" : "#b0986a";
        ctx.fillRect(tx, tabY, 118, tabH + (active ? 4 : 0));
        ctx.strokeStyle = active ? "rgba(0,0,0,0.25)" : "rgba(0,0,0,0.45)"; ctx.lineWidth = 1;
        ctx.strokeRect(tx, tabY, 118, tabH + (active ? 4 : 0));
        ctx.fillStyle = active ? "#2a1a08" : "#4a3010";
        ctx.font = active ? "bold 10px Georgia, serif" : "10px Georgia, serif";
        ctx.textAlign = "center";
        ctx.fillText(label, tx + 59, tabY + 15);
      });

      // ── Leather spine (left edge) ──────────────────────────────────────────
      ctx.fillStyle = "#2a1a0a"; ctx.fillRect(20, jy, spineW, jh);
      ctx.fillStyle = "#3e2810"; ctx.fillRect(22, jy + 8, 6, jh - 16);
      ctx.fillStyle = "#1a0e04";
      for (let sy = jy + 20; sy < jy + jh - 16; sy += 16) ctx.fillRect(30, sy, 4, 3);
      ctx.fillStyle = "rgba(0,0,0,0.35)"; ctx.fillRect(40, jy, 4, jh);

      // ── Draw both pages ───────────────────────────────────────────────────
      drawPage(lx, lw);
      drawPage(rx, rw);

      // ── Center crease ─────────────────────────────────────────────────────
      // Shadow on left side of crease
      const creaseL = ctx.createLinearGradient(creaseX - 6, jy, creaseX, jy);
      creaseL.addColorStop(0, "rgba(0,0,0,0)"); creaseL.addColorStop(1, "rgba(0,0,0,0.18)");
      ctx.fillStyle = creaseL; ctx.fillRect(creaseX - 6, jy, 6, jh);
      // Shadow on right side of crease
      const creaseR = ctx.createLinearGradient(rx, jy, rx + 8, jy);
      creaseR.addColorStop(0, "rgba(0,0,0,0.18)"); creaseR.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = creaseR; ctx.fillRect(rx, jy, 8, jh);
      // Crease gap itself (dark)
      ctx.fillStyle = "#1a1008"; ctx.fillRect(creaseX, jy, 4, jh);

      // ── Dog-ear bottom-right corner ───────────────────────────────────────
      ctx.fillStyle = "#d0c4a4";
      ctx.beginPath(); ctx.moveTo(rx + rw - 18, jy + jh); ctx.lineTo(rx + rw, jy + jh - 18); ctx.lineTo(rx + rw, jy + jh);
      ctx.closePath(); ctx.fill();

      // ── Page titles ───────────────────────────────────────────────────────
      const leftTitle  = journalTab === 0 ? "Evidence" : journalTab === 1 ? "Ghost List"
                       : (isMobile ? "Mobile Setup" : "Settings");
      const rightTitle = journalTab === 0 ? "Suspects" : journalTab === 1 ? playerGuess : "Key Bindings";
      ctx.font = "italic bold 13px Georgia, serif"; ctx.textAlign = "center";
      ctx.fillStyle = "#2a1a08";
      ctx.fillText(leftTitle,  lx + lw / 2, jy + 28);
      ctx.fillText(rightTitle, rx + rw / 2, jy + 28);
      ctx.strokeStyle = "rgba(60,30,10,0.35)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(lx + 20, jy + 34); ctx.lineTo(lx + lw - 20, jy + 34); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rx + 20, jy + 34); ctx.lineTo(rx + rw - 20, jy + 34); ctx.stroke();

      // =====================================================
      // TAB 0 — Left page: Evidence  |  Right page: Suspects
      // =====================================================
      if (journalTab === 0) {
        // Left page: evidence types
        ctx.fillStyle = "#5a3a18"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
        ctx.fillText("click to cycle: blank → ✓ confirmed → ✕ ruled out", lx + 14, jy + 48);

        evidenceTypes.forEach((ev, i) => {
          const cbx = lx + 14, cby = jy + 76 + i * 30;
          const state     = evidenceStates[ev] || "neutral";
          const confirmed = state === "confirmed";
          const crossed   = state === "crossed";

          // State box
          ctx.fillStyle = confirmed ? "#2a4a2a" : crossed ? "#4a1a1a" : "#d0c4a8";
          ctx.fillRect(cbx, cby, 14, 14);
          ctx.strokeStyle = confirmed ? "#4a8a4a" : crossed ? "#c04040" : "#8a7050"; ctx.lineWidth = 1;
          ctx.strokeRect(cbx, cby, 14, 14);
          ctx.font = "bold 10px monospace"; ctx.textAlign = "left";
          if (confirmed) { ctx.fillStyle = "#80e080"; ctx.fillText("✓", cbx + 2, cby + 11); }
          if (crossed)   { ctx.fillStyle = "#e08080"; ctx.fillText("✕", cbx + 2, cby + 11); }

          // Label
          ctx.fillStyle = crossed ? "#804040" : confirmed ? "#1a3a1a" : "#3a2810";
          ctx.font = confirmed ? "bold 12px Georgia, serif" : "12px Georgia, serif";
          ctx.textAlign = "left";
          ctx.fillText(ev, cbx + 20, cby + 11);
          if (crossed) {
            ctx.strokeStyle = "rgba(180,60,40,0.55)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(cbx + 20, cby + 6); ctx.lineTo(cbx + 20 + ctx.measureText(ev).width, cby + 6); ctx.stroke();
          }
        });

        // Right page: narrowed suspects list
        const confirmedEvs = Object.keys(evidenceStates).filter(ev => evidenceStates[ev] === "confirmed");
        const crossedEvs   = Object.keys(evidenceStates).filter(ev => evidenceStates[ev] === "crossed");
        ctx.fillStyle = "#5a3a18"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
        ctx.fillText("matching your evidence marks:", rx + 14, jy + 48);

        // 2 columns of 12 on right page
        ghosts.forEach((g, i) => {
          const possible = confirmedEvs.every(ev => g.evidence.includes(ev)) &&
                           crossedEvs.every(ev => !g.evidence.includes(ev));
          const colIdx = i < 12 ? 0 : 1;
          const gcol   = rx + 14 + colIdx * 166;
          const gy     = jy + 62 + (i % 12) * 18;

          if (possible) {
            ctx.fillStyle = "rgba(200,170,60,0.20)";
            ctx.fillRect(gcol - 2, gy - 12, 156, 14);
            ctx.fillStyle = "#1a0e04"; ctx.font = "bold 10px Georgia, serif"; ctx.textAlign = "left";
            ctx.fillText("▸ " + g.name, gcol, gy);
          } else {
            ctx.fillStyle = "#b0a080"; ctx.font = "10px Georgia, serif"; ctx.textAlign = "left";
            ctx.fillText("  " + g.name, gcol, gy);
            ctx.strokeStyle = "rgba(120,60,40,0.45)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(gcol + 10, gy - 3); ctx.lineTo(gcol + 10 + ctx.measureText(g.name).width, gy - 3); ctx.stroke();
          }
        });
      }

      // =====================================================
      // TAB 1 — Left page: Ghost list  |  Right page: Ghost details
      // =====================================================
      if (journalTab === 1) {
        const entryH = 18;
        const evAbbr = {
          "EMF Level 5":"EMF 5", "Spirit Box":"Spirit Box",
          "Freezing Temperatures":"Freezing", "Ultraviolet":"UV",
          "Ghost Writing":"G.Writing", "Ghost Orb":"G.Orb", "D.O.T.S. Projector":"D.O.T.S.",
        };

        // Left page: all ghosts in one column (from GHOST_REGISTRY)
        ctx.fillStyle = "#5a3a18"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
        ctx.fillText("click to cycle: ★ guess → ✕ ruled out → neutral", lx + 14, jy + 48);

        ghosts.forEach((g, i) => {
          const gx = lx + 14, gy = jy + 58 + i * entryH;
          const isGuess   = playerGuess === g.name;
          const isCrossed = ghostStates[g.name] === "crossed";

          // Row background
          ctx.fillStyle = isGuess   ? "rgba(200,160,40,0.22)" :
                          isCrossed ? "rgba(120,20,20,0.14)" :
                          i % 2 === 0 ? "rgba(80,50,10,0.06)" : "rgba(0,0,0,0)";
          ctx.fillRect(gx - 2, gy, lw - 24, entryH);
          if (isGuess)        { ctx.fillStyle = "#c8a020"; ctx.fillRect(gx - 2, gy, 3, entryH); }
          else if (isCrossed) { ctx.fillStyle = "#c04040"; ctx.fillRect(gx - 2, gy, 3, entryH); }

          ctx.fillStyle = isGuess ? "#7a5010" : isCrossed ? "#804040" : "#2a1204";
          ctx.font = "bold 10px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText((isGuess ? "★ " : "  ") + g.name, gx, gy + 12);
          if (isCrossed) {
            ctx.strokeStyle = "rgba(180,60,40,0.55)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(gx + 14, gy + 7); ctx.lineTo(gx + 14 + ctx.measureText(g.name).width, gy + 7); ctx.stroke();
          }
        });

        // Right page: selected ghost details
        const guessGhost = ghosts.find(g => g.name === playerGuess);
        if (guessGhost) {
          const dx = rx + 18;
          // Name
          ctx.fillStyle = "#2a1204"; ctx.font = "bold 14px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText(guessGhost.name, dx, jy + 55);
          ctx.strokeStyle = "rgba(60,30,10,0.4)"; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(dx, jy + 60); ctx.lineTo(rx + rw - 20, jy + 60); ctx.stroke();

          // Evidence pills
          ctx.fillStyle = "#3a2810"; ctx.font = "italic bold 10px Georgia, serif";
          ctx.fillText("Evidence:", dx, jy + 78);
          guessGhost.evidence.forEach((ev, ei) => {
            const ex = dx, ey = jy + 86 + ei * 18;
            ctx.fillStyle = "rgba(40,80,40,0.20)";
            ctx.fillRect(ex, ey, 120, 13);
            ctx.strokeStyle = "rgba(60,100,60,0.4)"; ctx.lineWidth = 1; ctx.strokeRect(ex, ey, 120, 13);
            ctx.fillStyle = "#1a3a1a"; ctx.font = "10px monospace"; ctx.textAlign = "left";
            ctx.fillText(evAbbr[ev] || ev, ex + 4, ey + 10);
          });

          // Notes (word-wrapped at ~32 chars per line)
          ctx.fillStyle = "#3a2810"; ctx.font = "italic bold 10px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText("Notes:", dx, jy + 152);
          ctx.fillStyle = "#4a3820"; ctx.font = "10px Georgia, serif";
          const words = guessGhost.notes.split(" ");
          let line = "", lineY = jy + 165;
          words.forEach(word => {
            const test = line ? line + " " + word : word;
            if (ctx.measureText(test).width > rw - 36) {
              ctx.fillText(line, dx, lineY); line = word; lineY += 14;
            } else { line = test; }
          });
          if (line) ctx.fillText(line, dx, lineY);

          // Clue hint
          ctx.fillStyle = "#3a2810"; ctx.font = "italic bold 10px Georgia, serif";
          ctx.fillText("Behaviour hint:", dx, jy + 320);
          ctx.fillStyle = "#4a3820"; ctx.font = "italic 10px Georgia, serif";
          ctx.fillText(guessGhost.clue, dx, jy + 334);
        }
      }

      // =====================================================
      // TAB 2 — Left page: Settings / Mobile Setup  |  Right page: Key Bindings
      // =====================================================
      if (journalTab === 2) {

        // ── Left page: MOBILE shows draggable control sliders ────────────
        if (isMobile) {
          // Slider draw helper — geometry must match JOURNAL_SLIDER constants exactly.
          // trackX=58 (lx+14), trackW=308 (lw-50), thumbR=13
          // Row track-center Y: 136, 196, 256  (jy+84, jy+144, jy+204)
          function _mobSlider(label, value, minV, maxV, labelY, trackCY) {
            const tX = lx + 14, tW = lw - 50, tR = 13;
            const frac = (value - minV) / (maxV - minV);
            const thumbX = tX + frac * tW;
            // Label (left) and live value (right)
            ctx.textAlign = "left";
            ctx.fillStyle = "#3a2810"; ctx.font = "italic bold 11px Georgia, serif";
            ctx.fillText(label, tX, labelY);
            ctx.textAlign = "right";
            ctx.fillStyle = "#6a4020"; ctx.font = "bold 11px monospace";
            ctx.fillText(value.toFixed(1), tX + tW, labelY);
            // Track background
            ctx.fillStyle = "#d0c4a8";
            ctx.beginPath(); ctx.roundRect(tX, trackCY - 5, tW, 10, 5); ctx.fill();
            ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(tX, trackCY - 5, tW, 10, 5); ctx.stroke();
            // Track fill (filled portion left of thumb)
            ctx.fillStyle = "#8a6a30";
            ctx.beginPath(); ctx.roundRect(tX, trackCY - 5, frac * tW, 10, 5); ctx.fill();
            // Thumb circle
            ctx.fillStyle = "#c8a850";
            ctx.beginPath(); ctx.arc(thumbX, trackCY, tR, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#7a5020"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(thumbX, trackCY, tR, 0, Math.PI * 2); ctx.stroke();
            // Centre dot
            ctx.fillStyle = "#7a5020";
            ctx.beginPath(); ctx.arc(thumbX, trackCY, 3, 0, Math.PI * 2); ctx.fill();
            ctx.textAlign = "left";
          }

          ctx.fillStyle = "#5a3a18"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText("Drag sliders to resize controls", lx + 14, jy + 52);

          // Row positions: labelY = jy+68/jy+128/jy+188  trackCY = jy+84/jy+144/jy+204
          _mobSlider("Joystick Size", mobJoyScale, 0.6, 1.6, jy + 68,  jy + 84);
          _mobSlider("Button Size",   mobBtnScale, 0.6, 1.6, jy + 128, jy + 144);
          _mobSlider("Opacity",       mobOpacity,  0.3, 1.0, jy + 188, jy + 204);

          // Reset mobile defaults button  (y = jy+238)
          const resetMobX = lx + 14, resetMobY = jy + 238;
          ctx.fillStyle = "#c8b890"; ctx.fillRect(resetMobX, resetMobY, 140, 26);
          ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1; ctx.strokeRect(resetMobX, resetMobY, 140, 26);
          ctx.fillStyle = "#3a1808"; ctx.font = "bold 9px Georgia, serif"; ctx.textAlign = "center";
          ctx.fillText("Reset Defaults", resetMobX + 70, resetMobY + 17);
          ctx.textAlign = "left";

          ctx.fillStyle = "#5a4020"; ctx.font = "italic 9px Georgia, serif";
          ctx.fillText("Left side = joystick", lx + 14, jy + 290);
          ctx.fillText("Right side = buttons (E R ⚡ J Q F G)", lx + 14, jy + 304);
          ctx.fillText("Drag anywhere else to rotate facing.", lx + 14, jy + 318);
          ctx.fillText("Two-finger pinch = zoom in/out.", lx + 14, jy + 332);

        } else {
          // ── Left page: DESKTOP shows flashlight sensitivity ───────────────
          ctx.fillStyle = "#3a2810"; ctx.font = "italic bold 11px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText("Flashlight Sensitivity", lx + 14, jy + 74);
          ctx.fillStyle = "#5a4020"; ctx.font = "10px Georgia, serif";
          ctx.fillText("How quickly your flashlight tracks the cursor.", lx + 14, jy + 90);

          const sbx = lx + 70, sby = jy + 106;
          ctx.fillStyle = "#c8b890"; ctx.fillRect(sbx, sby, 22, 22);
          ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1; ctx.strokeRect(sbx, sby, 22, 22);
          ctx.fillStyle = "#2a1a08"; ctx.font = "bold 14px Georgia, serif"; ctx.textAlign = "center";
          ctx.fillText("−", sbx + 11, sby + 16);

          ctx.fillStyle = "#2a1a08"; ctx.font = "bold 13px Georgia, serif";
          ctx.fillText(sensitivity.toFixed(1) + "×", sbx + 42, sby + 15);

          ctx.fillStyle = "#c8b890"; ctx.fillRect(sbx + 80, sby, 22, 22);
          ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1; ctx.strokeRect(sbx + 80, sby, 22, 22);
          ctx.fillStyle = "#2a1a08"; ctx.font = "bold 14px Georgia, serif";
          ctx.fillText("+", sbx + 91, sby + 16);

          const barX = lx + 14, barY = sby + 34, barW = lw - 40, barH = 10;
          ctx.fillStyle = "#d0c4a8"; ctx.fillRect(barX, barY, barW, barH);
          ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, barH);
          const fill = ((sensitivity - 0.5) / 1.5) * barW;
          ctx.fillStyle = "#8a6a30"; ctx.fillRect(barX, barY, fill, barH);
          ctx.fillStyle = "#5a4020"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText("sluggish", barX, barY + 22);
          ctx.textAlign = "right";
          ctx.fillText("instant", barX + barW, barY + 22);

          ctx.fillStyle = "#5a4020"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText("Low = slow, atmospheric tracking.", lx + 14, jy + 190);
          ctx.fillText("High = flashlight snaps to cursor immediately.", lx + 14, jy + 204);
          ctx.fillText("Default: 1.0", lx + 14, jy + 222);

          const resetBtnX = lx + 14, resetBtnY = jy + 260;
          ctx.fillStyle = "#c8b890"; ctx.fillRect(resetBtnX, resetBtnY, 120, 22);
          ctx.strokeStyle = "#8a7050"; ctx.lineWidth = 1; ctx.strokeRect(resetBtnX, resetBtnY, 120, 22);
          ctx.fillStyle = "#3a1808"; ctx.font = "bold 9px Georgia, serif"; ctx.textAlign = "center";
          ctx.fillText("Reset to Defaults", resetBtnX + 60, resetBtnY + 14);
          ctx.textAlign = "left";

          ctx.fillStyle = "#5a4020"; ctx.font = "italic 9px Georgia, serif";
          ctx.fillText("Arrow keys always work regardless of rebinding.", lx + 14, jy + 380);
        }

        // ── Right page: keybindings ──
        const actionDefs = [
          { key:"up",         label:"Move Up"     },
          { key:"down",       label:"Move Down"   },
          { key:"left",       label:"Move Left"   },
          { key:"right",      label:"Move Right"  },
          { key:"sprint",     label:"Sprint"      },
          { key:"interact",   label:"Interact"    },
          { key:"flashlight", label:"Flashlight"  },
          { key:"journal",    label:"Journal"     },
          { key:"drop",       label:"Drop Item"   },
          { key:"inventory",  label:"Cycle Inv."  },
          { key:"use",        label:"Use / Toggle"},
        ];
        ctx.fillStyle = "#5a3a18"; ctx.font = "italic 9px Georgia, serif"; ctx.textAlign = "left";
        ctx.fillText("click a row to rebind — then press any key", rx + 14, jy + 48);

        actionDefs.forEach((a, i) => {
          const bry = jy + 70 + i * 30;
          const isRebinding = rebindingAction === a.key;
          ctx.fillStyle = isRebinding ? "rgba(200,160,40,0.25)" : (i % 2 === 0 ? "rgba(80,50,10,0.07)" : "rgba(0,0,0,0)");
          ctx.fillRect(rx + 14, bry, rw - 28, 24);
          if (isRebinding) { ctx.fillStyle = "#c8a020"; ctx.fillRect(rx + 14, bry, 3, 24); }
          ctx.fillStyle = isRebinding ? "#7a5010" : "#3a2810";
          ctx.font = "11px Georgia, serif"; ctx.textAlign = "left";
          ctx.fillText(a.label, rx + 22, bry + 15);
          const keyStr = isRebinding ? "press any key..." : "[" + keybinds[a.key] + "]";
          ctx.fillStyle = isRebinding ? "#c8a020" : "#5a7a5a";
          ctx.font = isRebinding ? "italic 10px Georgia, serif" : "bold 10px monospace";
          ctx.textAlign = "right";
          ctx.fillText(keyStr, rx + rw - 20, bry + 15);
        });
      }

      // ── Bottom hints ──────────────────────────────────────────────────────
      ctx.textAlign = "center"; ctx.font = "italic 10px Georgia, serif"; ctx.fillStyle = "#8a7050";
      ctx.fillText("[ J ] close", lx + lw / 2, jy + jh - 10);
      ctx.textAlign = "left";
    }

    // --- Lose Screen ---
    function drawLose() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = "center";
      ctx.fillStyle = "#e57373";
      ctx.font = "bold 28px monospace";
      ctx.fillText("Time's up. You didn't make it out.", 400, 220);

      ctx.font = "18px monospace";
      ctx.fillStyle = "#aaa";
      ctx.fillText("The ghost was a " + currentGhost.name + ".", 400, 275);

      ctx.font = "13px monospace";
      ctx.fillStyle = "#555";
      ctx.fillText("Press ESC to return to the lobby and try again", 400, 340);

      ctx.textAlign = "left";
    }

    // --- Result Screen ---
    function drawResult() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = "center";

      // Outcome headline
      const noGuess = playerGuess === null;
      ctx.fillStyle = noGuess ? "#e8c97a" : (guessCorrect ? "#c8e6c9" : "#e57373");
      ctx.font = "bold 26px monospace";
      ctx.fillText(
        noGuess      ? "You left without a guess." :
        guessCorrect ? "Correct! Good work." :
                       "Wrong. Better luck next time.",
        400, 190
      );

      // Guess vs actual
      ctx.font = "15px monospace";
      ctx.fillStyle = "#888";
      ctx.fillText("Your guess:", 400, 240);
      ctx.fillStyle = noGuess ? "#555" : (guessCorrect ? "#c8e6c9" : "#e57373");
      ctx.font = "bold 18px monospace";
      ctx.fillText(noGuess ? "— none —" : playerGuess, 400, 264);

      ctx.font = "15px monospace";
      ctx.fillStyle = "#888";
      ctx.fillText("The ghost was:", 400, 308);
      ctx.fillStyle = "#e8c97a";
      ctx.font = "bold 18px monospace";
      ctx.fillText(currentGhost.name, 400, 332);

      ctx.font = "11px monospace";
      ctx.fillStyle = "#555";
      ctx.fillText("ESC — return to lobby", 400, 400);

      ctx.textAlign = "left";
    }

    // --- Van Threat Monitor UI ---
    function drawDangerTimer() {
      // Backdrop
      ctx.fillStyle = "rgba(0,0,0,0.78)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Panel
      const tx = 270, ty = 220, tw = 260, th = 170;
      ctx.fillStyle = "#10140e";
      ctx.fillRect(tx, ty, tw, th);
      ctx.strokeStyle = safeTimeOver ? "#7a3030" : "#3a6030"; ctx.lineWidth = 2;
      ctx.strokeRect(tx, ty, tw, th);

      // Title bar
      ctx.fillStyle = safeTimeOver ? "#3a1010" : "#101e10";
      ctx.fillRect(tx, ty, tw, 26);
      ctx.fillStyle = safeTimeOver ? "#e57373" : "#81c784";
      ctx.font = "bold 11px monospace"; ctx.textAlign = "center";
      ctx.fillText("THREAT MONITOR", tx + tw / 2, ty + 17);

      // Close button
      ctx.fillStyle = "#555"; ctx.font = "11px monospace";
      ctx.fillText("✕", tx + tw - 12, ty + 18);

      // Status line
      ctx.font = "bold 22px monospace";
      ctx.fillStyle = safeTimeOver ? "#e57373" : "#81c784";
      const statusText = safeTimeOver ? "DANGER" : "SAFE";
      ctx.fillText(statusText, tx + tw / 2, ty + 72);

      // Timer display
      ctx.font = "13px monospace";
      if (!safeTimeOver) {
        ctx.fillStyle = "#a0c8a0";
        ctx.fillText("Safe window: " + Math.ceil(safeTime) + "s remaining", tx + tw / 2, ty + 98);
      } else {
        ctx.fillStyle = "#c8a0a0";
        ctx.fillText("Safe window expired", tx + tw / 2, ty + 98);
      }

      // Blinking activity indicator
      const blink = (Date.now() % 900 < 500);
      ctx.fillStyle = safeTimeOver
        ? (blink ? "#e57373" : "#3a1010")
        : (blink ? "#81c784" : "#101e10");
      ctx.beginPath(); ctx.arc(tx + tw / 2, ty + 122, 5, 0, Math.PI * 2); ctx.fill();

      // Hint
      ctx.fillStyle = "#505850"; ctx.font = "9px monospace";
      ctx.fillText("[ ESC ] close", tx + tw / 2, ty + th - 12);

      ctx.textAlign = "left";
    }

    // --- Four-Panel Monitor UI ---
    function drawFourPanel() {
      const px = 50, py = 30, pw = 700, ph = 540;
      const panW = (pw - 30) / 2, panH = (ph - 50) / 2; // ~335 × 245
      const p = { tl: {x: px+10, y: py+30}, tr: {x: px+20+panW, y: py+30},
                  bl: {x: px+10, y: py+40+panH}, br: {x: px+20+panW, y: py+40+panH} };

      // Backdrop + panel housing
      ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0c1018"; ctx.fillRect(px, py, pw, ph);
      ctx.strokeStyle = "#2a4060"; ctx.lineWidth = 2; ctx.strokeRect(px, py, pw, ph);

      // Title bar
      ctx.fillStyle = "#0a1828"; ctx.fillRect(px, py, pw, 26);
      ctx.fillStyle = "#7ab8d8"; ctx.font = "bold 11px monospace"; ctx.textAlign = "center";
      ctx.fillText("FIELD MONITOR STATION", px + pw/2, py + 17);
      ctx.fillStyle = "#555"; ctx.font = "11px monospace";
      ctx.fillText("✕", px + pw - 12, py + 18);

      // Panel helper — draw a labelled bezel
      function panel(x, y, w, h, label) {
        ctx.fillStyle = "#080d12"; ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = "#1e3448"; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = "#1a3050"; ctx.fillRect(x, y, w, 14);
        ctx.fillStyle = "#6a9ab8"; ctx.font = "bold 8px monospace"; ctx.textAlign = "left";
        ctx.fillText(label, x + 5, y + 10);
      }

      // ── TOP LEFT: House Overview ──────────────────────────────────────────
      // Derived entirely from the live rooms[], doors[], and furniture[] arrays.
      // When those arrays change, the minimap updates automatically — no separate layout.
      panel(p.tl.x, p.tl.y, panW, panH, "HOUSE OVERVIEW");
      const worldX0=60, worldY0=60, worldW=680, worldH=660;
      const scaleX = (panW-20)/worldW, scaleY = (panH-28)/worldH;
      const offX = p.tl.x+10, offY = p.tl.y+18;
      // World→minimap coordinate helpers
      const toMX = wx => offX + (wx - worldX0) * scaleX;
      const toMY = wy => offY + (wy - worldY0) * scaleY;
      const toMW = ww => Math.max(0.8, ww * scaleX);
      const toMH = wh => Math.max(0.8, wh * scaleY);

      // Room fill — color-coded by type so rooms have visual identity on the map
      const _roomFill = lbl =>
        lbl.includes("Bed")     ? "#221d2c" :  // bedrooms — purple-grey
        lbl.includes("Bath")    ? "#1a1e2a" :  // bathrooms — cool slate
        lbl.includes("Kitchen") ? "#181e19" :  // kitchen — cool stone
        lbl.includes("Dining")  ? "#1f1c13" :  // dining — warm oak
        lbl.includes("Living")  ? "#1e190e" :  // living — warm brown
        lbl.includes("Foyer")   ? "#1d1b11" :  // foyer — warm tan
        lbl.includes("Hallway") ? "#161412" :  // hallway — dark corridor
        lbl.includes("Garage")  ? "#131313" :  // garage — concrete
        lbl.includes("Utility") ? "#141813" :  // utility — muted
        lbl.includes("Study")   ? "#15181d" :  // study — dark blue
        lbl.includes("Walk")    ? "#171513" :  // walk-in — neutral
        lbl.includes("Closet")  ? "#15130e" :  // closet — dark
        lbl.includes("Yard")    ? "#121a10" :  // outside — dark green
                                   "#141418";

      // 1 — Room fills
      rooms.forEach(r => {
        ctx.fillStyle = _roomFill(r.label || "");
        ctx.fillRect(toMX(r.x), toMY(r.y), toMW(r.w), toMH(r.h));
      });

      // 2 — Door openings: draw each door rect in a slightly lighter passage tone
      //     so wall junctions show a hint of the opening
      ctx.fillStyle = "#1e3040";
      doors.forEach(d => {
        ctx.fillRect(toMX(d.x), toMY(d.y), toMW(d.w), toMH(d.h));
      });

      // 3 — Room outlines (drawn after door fills so the wall grid is clear)
      ctx.strokeStyle = "#28485e"; ctx.lineWidth = 0.5;
      rooms.forEach(r => {
        ctx.strokeRect(toMX(r.x), toMY(r.y), toMW(r.w), toMH(r.h));
      });

      // 4 — Major furniture blocks — read directly from the furniture[] array
      //     so any future add/remove/move also updates this map automatically
      const _furnitureFill = style =>
        style === "bed"     ? "#352d48" :  // bed — soft purple
        style === "counter" ? "#2d3130" :  // counter/appliance — cool stone
        style === "seat"    ? "#3d2f1e" :  // seating — warm fabric
                              "#483820";   // wood storage (default)
      furniture.forEach(f => {
        ctx.fillStyle = _furnitureFill(f.style);
        ctx.fillRect(toMX(f.x), toMY(f.y), toMW(f.w), toMH(f.h));
      });

      // 5 — Room labels — small text centered in each room, skipped if too narrow
      ctx.save();
      ctx.font = "5px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(90,130,160,0.75)";
      rooms.forEach(r => {
        if (!r.label || r.label === "Yard") return;
        if (toMW(r.w) < 22 || toMH(r.h) < 9) return; // too small to label
        ctx.fillText(r.label, toMX(r.x + r.w / 2), toMY(r.y + r.h / 2));
      });
      ctx.restore();

      // 6 — Player blip (on top of everything)
      ctx.fillStyle = "#40c8ff";
      ctx.beginPath(); ctx.arc(toMX(player.x+8), toMY(player.y+8), 2.5, 0, Math.PI*2); ctx.fill();

      // ── TOP RIGHT: Microphone Input ───────────────────────────────────────
      panel(p.tr.x, p.tr.y, panW, panH, "AUDIO MONITOR");
      ctx.fillStyle = "#1a1a1a"; ctx.fillRect(p.tr.x+1, p.tr.y+15, panW-2, panH-16);
      // Flat inactive waveform line
      const midY = p.tr.y + 15 + (panH-15)/2;
      ctx.strokeStyle = "#1e3828"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(p.tr.x+10, midY); ctx.lineTo(p.tr.x+panW-10, midY); ctx.stroke();
      // dB scale (vertical, left side)
      ctx.fillStyle = "#2a4030"; ctx.font = "7px monospace"; ctx.textAlign = "right";
      ["+6","  0","-6","-∞"].forEach((lbl, i) => {
        const ly = p.tr.y + 20 + i * ((panH-25)/3);
        ctx.fillText(lbl, p.tr.x + 26, ly + 4);
        ctx.strokeStyle = "#1e2a20"; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(p.tr.x+28, ly); ctx.lineTo(p.tr.x+panW-10, ly); ctx.stroke();
      });
      ctx.fillStyle = "#2a4030"; ctx.font = "bold 9px monospace"; ctx.textAlign = "center";
      ctx.fillText("NO MICROPHONE PLACED", p.tr.x + panW/2, midY - 10);
      ctx.fillStyle = "#1e3020"; ctx.font = "8px monospace";
      ctx.fillText("place a mic to begin monitoring", p.tr.x + panW/2, midY + 14);

      // ── BOTTOM LEFT: Sanity Panel ─────────────────────────────────────────
      panel(p.bl.x, p.bl.y, panW, panH, "SANITY MONITOR");
      const sanity = 100; // placeholder — no mechanic yet
      const sanColor = sanity > 60 ? "#40d878" : sanity > 30 ? "#d8c040" : "#d84040";
      // Large readout
      ctx.fillStyle = sanColor; ctx.font = "bold 44px monospace"; ctx.textAlign = "center";
      ctx.fillText(sanity + "%", p.bl.x + panW/2, p.bl.y + panH/2 + 8);
      ctx.fillStyle = "#3a6850"; ctx.font = "8px monospace";
      ctx.fillText("TEAM AVERAGE SANITY", p.bl.x + panW/2, p.bl.y + panH/2 + 26);
      // Bar gauge at bottom of panel
      const barX = p.bl.x + 16, barY = p.bl.y + panH - 28, barW = panW - 32, barH = 10;
      ctx.fillStyle = "#101810"; ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = sanColor; ctx.fillRect(barX, barY, barW * (sanity/100), barH);
      ctx.strokeStyle = "#2a4030"; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, barH);
      // Tick marks at 25/50/75
      [0.25, 0.5, 0.75].forEach(t => {
        ctx.strokeStyle = "#1e3828"; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(barX + barW*t, barY); ctx.lineTo(barX + barW*t, barY+barH); ctx.stroke();
      });
