<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Horror Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
      /* Prevent pull-to-refresh and overscroll on mobile */
      overscroll-behavior: none; touch-action: none; }
    canvas {
      display: block;
      background: #111;
      /* fixed keeps centering relative to the viewport, not the document body.
         On iOS this prevents the canvas from drifting behind the browser toolbar. */
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* Disable all default touch gestures on the canvas */
      touch-action: none;
      /* CSS width/height set dynamically by resizeCanvas() to fill viewport at 4:3 */
    }
    #titleScreen { display: none; }
    #landscapePrompt {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.96); color: #e8c97a;
      font-family: monospace; font-size: 1.3rem; line-height: 1.8;
      align-items: center; justify-content: center;
      text-align: center; z-index: 9999; flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Portrait-mode warning (mobile only, shown by JS when portrait) -->
  <div id="landscapePrompt">
    <div>&#x1F4F1; Rotate your device<br>to landscape mode<br><span style="font-size:0.9rem;color:#aaa;">for the best experience</span></div>
  </div>

  <!-- Title screen replaced by canvas-drawn corkboard — see drawTitleScreen() -->
  <div id="titleScreen"></div>

  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width  = 800;
    canvas.height = 600;

    // Mobile detection — true when primary input is touch
    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    // isMobile is used by drawTitleScreen() to show appropriate hint text

    // Scale the canvas CSS size to fill the viewport while maintaining 800×600 aspect ratio.
    // The internal resolution stays 800×600 — all game coordinates are unchanged.
    // Mouse handlers divide by this scale to map screen pixels back to logical canvas pixels.
    function resizeCanvas() {
      // On mobile, window.innerHeight shrinks when the browser address bar is visible.
      // visualViewport gives the true usable area (excludes browser chrome) when available.
      const vw = (window.visualViewport ? window.visualViewport.width  : window.innerWidth);
      const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
      const scale = Math.min(vw / 800, vh / 600);
      const cw = Math.round(800 * scale);
      const ch = Math.round(600 * scale);
      canvas.style.width  = cw + "px";
      canvas.style.height = ch + "px";

      if (isMobile) {
        // On mobile, bypass the CSS top:50%/left:50% rules and pin the canvas
        // explicitly to the center of the *visual* viewport.
        // visualViewport.offsetTop/Left gives the visual-viewport origin relative to
        // the layout viewport — accounts for keyboard, toolbar, and any scroll offset.
        const offTop  = window.visualViewport ? window.visualViewport.offsetTop  : 0;
        const offLeft = window.visualViewport ? window.visualViewport.offsetLeft : 0;
        canvas.style.top       = Math.round(offTop  + (vh - ch) / 2) + "px";
        canvas.style.left      = Math.round(offLeft + (vw - cw) / 2) + "px";
        canvas.style.transform = "none";
      }
      // (desktop keeps the CSS default: top:50%; left:50%; transform:translate(-50%,-50%))

      // Show/hide landscape prompt on mobile portrait
      const lp = document.getElementById("landscapePrompt");
      if (lp) {
        const isPortrait = vw < vh;
        lp.style.display = (isMobile && isPortrait) ? "flex" : "none";
      }
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    // visualViewport fires its own resize when mobile browser chrome shows/hides
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeCanvas);

    // ── Mobile input state ───────────────────────────────────────────────────
    // Virtual joystick (left thumb zone)
    // angle/magnitude are computed each frame in update() from curX/curY vs baseX/baseY
    const mobileJoy = {
      active: false, id: null,
      baseX: 130, baseY: 490, curX: 130, curY: 490,
      angle: 0,      // current joystick direction in radians (updated in update())
      magnitude: 0,  // 0–1 push strength (updated in update())
    };
    // Camera look / rotate (right thumb zone — horizontal drag rotates playerAngle)
    // "started" gates rotation behind a 6px threshold to prevent jitter-spin on touchdown
    const mobileLook = {
      active: false, id: null,
      startX: 0, startY: 0,  // exact touchdown coordinates
      lastX:  0, lastY:  0,  // last processed position (set after threshold crossed)
      started: false,        // true once the drag has crossed the movement threshold
    };
    // Pinch-to-zoom (two-finger gesture)
    const mobilePinch = { active: false, lastDist: 0, id0: null, id1: null };
    let mobileSprinting = false;  // true while sprint button is held on mobile
    let mobileSprintId  = null;   // touch identifier for the held sprint button

    // Mobile button layout in 800×600 logical screen space.
    // All positions are screen-fixed (drawn after ctx.restore()).
    // r = tap radius; used for both draw and hit-test.
    const MOB = {
      joy:       { cx: 120, cy: 490, deadR: 10, maxR: 58 }, // joystick base (floating)
      interact:  { cx: 726, cy: 488, r: 32 },               // E — interact / open door
      use:       { cx: 648, cy: 528, r: 24 },               // R — use / toggle item
      sprint:    { cx: 648, cy: 452, r: 24 },               // sprint (hold)
      journal:   { cx: 770, cy: 36,  r: 22 },               // J — journal
      cycleItem: { cx: 710, cy: 36,  r: 18 },               // Q — cycle inventory
      flashlight:{ cx: 655, cy: 36,  r: 18 },               // F — flashlight
      drop:      { cx: 600, cy: 36,  r: 16 },               // G — drop / place item
    };

    // ── Mobile UI settings ───────────────────────────────────────────────────
    // Scale multipliers applied to MOB base radii when drawing and hit-testing.
    // Stored separately from desktop controls so they never interfere.
    const MOBILE_STORAGE_KEY = "ghost_game_mobile_v1";
    let mobJoyScale  = 1.0;  // joystick ring+knob radius scale  (0.6 – 1.6, step 0.1)
    let mobBtnScale  = 1.0;  // action button radius scale        (0.6 – 1.6, step 0.1)
    let mobOpacity   = 0.6;  // overall control overlay opacity   (0.3 – 1.0, step 0.1)

    function saveMobileSettings() {
      if (!isMobile) return;
      localStorage.setItem(MOBILE_STORAGE_KEY, JSON.stringify({ mobJoyScale, mobBtnScale, mobOpacity }));
    }
    function loadMobileSettings() {
      if (!isMobile) return;
      try {
        const raw = localStorage.getItem(MOBILE_STORAGE_KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        if (typeof s.mobJoyScale  === "number") mobJoyScale  = Math.max(0.6, Math.min(1.6, s.mobJoyScale));
        if (typeof s.mobBtnScale  === "number") mobBtnScale  = Math.max(0.6, Math.min(1.6, s.mobBtnScale));
        if (typeof s.mobOpacity   === "number") mobOpacity   = Math.max(0.3, Math.min(1.0, s.mobOpacity));
      } catch (_) { /* corrupt — silently ignore */ }
    }
    loadMobileSettings();

    // Offscreen fog canvas — darkness layer drawn here, then composited onto main canvas
    const fogCanvas = document.createElement("canvas");
    fogCanvas.width  = canvas.width;
    fogCanvas.height = canvas.height;
    const fogCtx = fogCanvas.getContext("2d");

    // Handheld camera PiP — offscreen canvases for the viewfinder overlay (created once)
    const PIP_W = 234, PIP_H = 176, PIP_ZOOM = 1.2;
    const pipCanvas = document.createElement("canvas");
    pipCanvas.width = PIP_W; pipCanvas.height = PIP_H;
    const pipCtx = pipCanvas.getContext("2d");
    const pipFogCanvas = document.createElement("canvas");
    pipFogCanvas.width = PIP_W; pipFogCanvas.height = PIP_H;
    const pipFogCtx = pipFogCanvas.getContext("2d");

    // --- Debug ---
    const DEBUG_COLLISION = false; // set true to show collision overlay
    const DEBUG_GHOST     = false; // set true to use Ultimate Ghost (testing only — disable for normal play)

    // --- Ghost roster config ---
    const GHOST_CONFIG = {
      forceUltimateGhost:            true,   // overrides everything; uses Ultimate Ghost
      enableNormalGhostRoster:       true,   // flip to true to go live with 27-ghost roster
      normalGhostSelectionMode:      "random", // "random" | "weighted"
      removeUltimateGhostFromLiveRounds: true,
    };

    // --- Shared behavior defaults (per-ghost overrides win) ---
    const GHOST_BEHAVIOR_DEFAULTS = {
      activityRate:        1.0,   // multiplier on evidence event frequency
      roamTendency:        1.0,   // how far/often ghost wanders
      roomLoyalty:         0.5,   // 0=roams freely, 1=stays near fav room
      huntThreshold:       50,    // sanity% at which hunts begin
      huntSpeedBase:       1.4,   // px/frame during hunt (not chasing)
      huntSpeedLOS:        2.4,   // px/frame when ghost has LOS on player
      lightInteraction:    "off", // "off"|"on"|"flicker" — preferred light state
      doorInteraction:     0.5,   // 0–1 chance to interact with nearby door
      electronicsAttraction: 0.5, // 0–1 bias toward active electronics
      throwTendency:       0.3,   // 0–1 chance to throw objects during activity
      visibilityDuringHunt: "blink", // "solid"|"blink"|"stealth"
      incenseDuration:     90,    // seconds smudge keeps it pacified
      crucifixRange:       3,     // metres (game units)
      evidenceFrequency:   1.0,   // multiplier on how often evidence fires
    };

    // --- Screen state ---
    // menuPhase: "intro" = opening sequence | "title" = haunted identity screen | "corkboard" = setup menu | null = in-game
    let menuPhase      = "intro"; // starts with intro sequence; routes to profile or title after

    // Intro sequence state
    let _introPhase    = 0;      // 0="Haunted" fade-in, 1=hold, 2=fade-out, 3="Ryan's" fade-in, 4=hold, 5=fade-out, 6=done
    let _introT        = 0;      // seconds elapsed in current phase
    let _introAlpha    = 0;      // current text opacity 0..1
    let _introPostAuth = null;   // set by IIFE: "title" if logged in, "profile" if not
    // Phase durations in seconds: [fade-in, HOLD, fade-out, fade-in, HOLD, fade-out]
    const INTRO_DUR = [1.0, 2.4, 0.8, 0.8, 2.2, 0.7];
    let titleScreenActive = true;   // convenience alias: true when menuPhase !== null
    let _corkboardPage = 0;         // active board index: 0=Map 1=Loadout 2=Investigator
    const CORKBOARD_PAGES = 3;
    let _selectedMapId    = 0;      // which map is highlighted (0 = The Farmhouse)
    let _titleMx = 0, _titleMy = 0; // canvas-space mouse position for hover states
    let _titleStartRect   = null;   // start button rect (title screen), set each frame
    let _titleBeginRect   = null;   // "begin investigation" rect (corkboard page 2)
    let _photoRect        = null;   // ID card photo clickable rect (corkboard page 2)
    let _agentPortrait    = 0;      // 0–5: which of the 6 portraits is shown
    let _titleMapRects    = [];     // [{id, x, y, w, h}], set each frame
    let _titleNavLeft     = null;   // left arrow rect
    let _titleNavRight    = null;   // right arrow rect
    let _corkJournalBtnRect = null; // journal button in corkboard top bar
    let _truckTab         = "shop"; // active truck monitor subpage: "shop"|"truck"|"layout"|"character"
    let _truckNavRects    = [];     // [{tab, x, y, w, h}], set each frame by _drawPageShop
    let _shopSelectedItem = 0;       // index into SHOP_CATALOG
    let _shopScrollOffset = 0;       // first visible row index
    let _shopItemRects    = [];      // [{idx, x, y, w, h}], set each frame
    let _shopLevel        = 1;       // active level tab in shop preview: 1, 2, or 3
    let _shopLevelRects   = [];      // [{lvl, x, y, w, h}], set each frame
    let _truckSelItem     = 0;        // selected index in TRUCK_CATALOG
    let _truckListScroll  = 0;        // scroll offset for truck item list
    let _truckItemRects   = [];       // [{idx, x, y, w, h}], set each frame
    // Round loadout: array of { name, qty, level } — source of truth for in-game equipment
    let _roundLoadout     = [];       // items chosen for the next round
    let _truckAddBtnRect  = null;     // unused legacy; kept so old click handler refs don't throw
    let _truckQtyDecRect  = null;     // unused legacy
    let _truckQtyIncRect  = null;     // unused legacy
    // Per-row interactive rects for the new truck tab layout
    // Each entry: { idx, type: "row"|"minus"|"plus"|"lvl", x,y,w,h, [lvl] }
    let _truckRowRects    = [];
    let _layoutSelItem    = 0;        // selected item index in the Layout item list
    let _layoutListScroll = 0;        // scroll offset for layout item list
    // Layout preset state
    let _layoutSlot       = 0;        // active preset slot: 0, 1, 2
    let _layoutActive     = -1;       // which slot is "active" (will seed next round): -1 = none
    // 3 preset slots, each stores array of { name, qty, level } or null if empty
    let _layoutPresets    = [null, null, null];
    // Per-row rects for the Layout item list (same structure as _truckRowRects)
    let _layoutRowRects   = [];
    // Action button rects for the Layout right panel
    let _layoutSaveBtnRect    = null;
    let _layoutActiveBtnRect  = null;
    let _layoutSlotRects      = [];
    let _layoutItemRects  = [];       // [{idx, x, y, w, h}], set each frame
    let _journalLogoutBtnRect  = null;
    let _journalLogoutConfirm  = false;
    let _journalLogoutYesRect  = null;
    let _journalLogoutNoRect   = null;
    let gameRunning  = false;
    let roundOver    = false;
    let guessCorrect = false;
    let loopRunning  = false;
    let journalOpen    = false;
    let lostRound      = false;
    let equipmentOpen  = false; // van pegboard screen
    let dangerTimerOpen  = false; // van threat monitor popup
    let hauntedMirrorOpen  = false; // haunted mirror vision overlay
    let ouijaBoardOpen     = false; // ouija board interaction popup
    let ouijaQuestionsAsked = 0;   // how many questions used this round (max 3)
    let ouijaBroken        = false; // true after the 3rd question shatters the board
    let ouijaPX = 350, ouijaPY = 155; // planchette position, board-local (offset from bx,by)
    let ouijaTX = 350, ouijaTY = 155; // planchette lerp target, board-local
    let ouijaSeq = [];             // current answer token sequence e.g. ['Y','E','S'] or ['YES']
    let ouijaSeqIdx = -1;          // index into ouijaSeq currently being dwelt on (-1 = idle)
    let ouijaSeqNextTime = 0;      // Date.now() when to advance to next token
    let ouijaPendingBreak = false; // call _breakOuijaBoard() when this sequence finishes
    let ouijaLastAnswer = "";      // text of last answer (for secondary display)
    let ouijaCurrentQ = "";        // text of the question currently being answered
    let ouijaAskedQIds = new Set();// IDs of questions already asked this round
    let _ouijaMenuRects = [];      // [{id, rect}] rebuilt each draw frame for click hit-test

    // ── Voodoo Doll state ─────────────────────────────────────────────────
    // ── Voodoo Doll — 5 named pins, each used once ───────────────────────
    // px/py: doll-local offset from doll pivot (waist) used for popup pin spot positions
    const VOODOO_PINS = [
      { id:0, name:"Head",           effect:"sanity",   px:  0, py:-55 },
      { id:1, name:"Heart",          effect:"hunt",     px:  0, py: -8 },
      { id:2, name:"Left Shoulder",  effect:"appear",   px:-36, py:-21 },
      { id:3, name:"Right Shoulder", effect:"appear",   px: 36, py:-21 },
      { id:4, name:"Body",           effect:"evidence", px:  0, py: 20 },
    ];
    let voodooPinUsed    = [false,false,false,false,false]; // which pins are spent
    let voodooDollOpen   = false;   // popup open/closed
    let voodooAnimPinId  = -1;      // pin currently animating (-1 = none)
    let voodooAnimT      = 0;       // 0→1 plunge progress over 0.6s
    let voodooEffectFired = false;  // true once effect fired for current anim
    let voodooPostT      = 0;       // countdown after effect before popup closes
    let voodooSpent      = false;   // all 5 pins used
    let ghostAppearTimer = 0;       // > 0: show ghost in gray translucent form in world
    let ghostHuntFlash   = 0;       // > 0: red hunt-flash screen overlay fading from 1.5→0
    let playerSanity     = 100;     // 0–100; head pin reduces by 25
    let playerMoney      = 0;        // earned from completed investigations; spent in shop
    let playerLevel      = 1;        // player level (future XP progression)
    let playerXP         = 40;       // current XP within current level
    let playerXPNext     = 500;      // XP needed for next level

    // ── Active profile ───────────────────────────────────────────────────────────────
    let activeProfile    = null;
    let _profPhase       = "login";   // "login" | "create"
    let _profUser        = "";
    let _profPass        = "";
    let _profConfirm     = "";
    let _profFocus       = "user";    // "user" | "pass" | "confirm"
    let _profError       = "";
    let _profBtnRects    = [];
    let _voodooPinRects  = [];      // rebuilt each frame for click detection
    // ── Music Box state ───────────────────────────────────────────────────
    const MUSIC_BOX_HUNT_DELAY = 1.5; // seconds until hunt triggers after activation
    let musicBoxActive  = false; // true while melody is playing
    let musicBoxTimer   = 0;     // seconds elapsed since activation
    let musicBoxBroken  = false; // spent after hunt fires — cannot reuse this round
    let musicBoxPulseT  = 0;     // 0→1 repeating pulse for visual ring animation

    // ── Tarot Cards state ─────────────────────────────────────────────────
    const TAROT_DECK_SIZE = 10; // total cards per round
    // Card definitions: id, effect key, art theme tag (art drawn procedurally by id)
    const TAROT_CARDS = [
      { id:0, name:"The Spire",    effect:"activity"  },
      { id:1, name:"Fate's Turn",  effect:"fate"      },
      { id:2, name:"The Trickster",effect:"trickster" },
      { id:3, name:"The Fiend",    effect:"event"     },
      { id:4, name:"The Reaper",   effect:"hunt"      },
      { id:5, name:"The Watcher",  effect:"watcher"   },
      { id:6, name:"The Dawn",     effect:"dawn"      },
      { id:7, name:"The Eclipse",  effect:"eclipse"   },
      { id:8, name:"The Saint",    effect:"saint"     },
      { id:9, name:"The Noose",    effect:"death"     },
    ];
    let tarotOpen       = false;  // popup open/closed
    let tarotDeck       = [];     // remaining card ids (shuffled at round start)
    let tarotDrawnCard  = null;   // card object currently shown (null = none)
    let tarotRevealT    = 0;      // 0→1 flip-reveal animation
    let tarotBurnT      = 0;      // 0→1 disintegration animation (starts after reveal)
    let tarotBurning    = false;  // true once burning starts
    let tarotEffectFired= false;  // true once effect applied for current card
    let tarotSpent      = false;  // true when all 10 cards used

    let mirrorActiveTimer  = 0;    // countdown while mirror is in active use
    let mirrorBroken       = false; // true once mirror shatters
    let _mirrorCanvas = null, _mirrorFogCanvas = null; // offscreen render targets for ghost-POV feed
    let _mirrorRenderMode = false; // true only during mirror's renderCameraFeed call — suppresses orbs + green NV
    let fourPanelOpen    = false; // van four-panel monitor popup
    let corkBoardOpen    = false; // van cork board popup
    let pegScrollX     = 0;    // horizontal scroll offset for the equipment board
    let gameZoom       = 1.8;  // main gameplay zoom (player/world view only)

    // --- Inventory ---
    let inventory    = []; // item name strings; max 3 (lighter excluded)
    let hasLighter   = false; // lighter is a free 4th slot
    let selectedSlot = 0;    // which inventory slot is active
    let worldItems   = []; // items placed/dropped in the world: [{name, x, y}, ...]
    let journalTab   = 0; // 0 = Evidence tab, 1 = Ghosts tab
    let evidenceStates = {}; // map of evidence type → "confirmed" | "crossed" (absent = neutral)
    let ghostStates  = {}; // map of ghost name → "crossed" (absent = neutral; guess tracked by playerGuess)
    let playerGuess  = "Spirit"; // ghost name string the player selected in journal
    let keypadOpen      = false; // van keypad UI open
    let cameraViewMode  = false; // CCTV station: viewing a placed camera feed
    let cameraViewIndex = 0;     // which placed camera is currently displayed
    let cctvRecording      = false; // R key toggles recording while in CCTV view
    let cameraNightVision  = false; // N key toggles night vision on the held/CCTV camera feed
    let lighterLit    = false; // lighter flame on/off while held
    let uvFlashlightOn = false; // UV flashlight on/off (separate from regular flashlight)
    let heldItemOn   = false; // generic on/off for the currently selected inventory item
    let heldItemUsing = false; // true while use key is held (e.g. Sound Recorder recording)
    // --- Ghost evidence state ---
    let ghostX = 0, ghostY = 0;        // hidden ghost world position
    let ghostTargetX = 0, ghostTargetY = 0; // current movement destination in room
    let ghostMoveAngle = 0;            // direction ghost is facing (radians)
    let ghostPauseTimer = 0;           // seconds remaining in current pause at waypoint
    let ghostWalkCycle  = 0;           // leg swing accumulator (like player walkCycle)
    let ghostFavRoom = null;           // {x,y,w,h} — ghost's favorite room
    let ghostEventTimer = 0;           // countdown (seconds) to next interaction attempt
    let emfLevel = 0; // derived each frame from emfSources; 0–5
    let emfSources = []; // [{x, y, level, timer}] — located interaction events
    let dotsDisturbTimer = 0;          // seconds remaining for D.O.T.S. ghost figure
    let summoningCircleTimer = 0;      // seconds remaining for summoning circle ghost manifestation
    let spiritBoxTimer = 0;            // seconds remaining for Spirit Box response flash
    let spiritBoxListenTimer = 0;     // seconds remaining in active listening window (R-triggered)
    let spiritBoxNoResponse = false;  // true briefly after a listen with no response
    let uvMarks = [];                  // [{x,y}] — ghost fingerprints/smudges; persist; only visible under UV
    let ghostOrbs = [];               // [{x,y,vx,vy,flicker,flickerTimer}] — only visible through camera
    let thermometerReading = 20;       // displayed °C; lerps slowly toward distance-based target
    let sensitivity  = 1.0;  // movement speed multiplier (0.5–2.0)

    // ── Controls: defaults + persistence ────────────────────────────────────
    const KEYBIND_DEFAULTS = { up:"w", down:"s", left:"a", right:"d", interact:"e", flashlight:"f", journal:"j", drop:"g", place:"v", inventory:"q", sprint:"shift", use:"r" };
    const CONTROLS_STORAGE_KEY = "ghost_game_controls_v1";

    function saveControls() {
      localStorage.setItem(CONTROLS_STORAGE_KEY, JSON.stringify({ keybinds, sensitivity }));
    }

    function loadControls() {
      try {
        const raw = localStorage.getItem(CONTROLS_STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        if (saved.keybinds) {
          // Only copy keys that exist in defaults — ignore stale/unknown keys
          Object.keys(KEYBIND_DEFAULTS).forEach(k => {
            if (saved.keybinds[k]) keybinds[k] = saved.keybinds[k];
          });
        }
        if (typeof saved.sensitivity === "number") {
          sensitivity = Math.max(0.5, Math.min(2.0, saved.sensitivity));
        }
      } catch (_) { /* corrupt storage — silently ignore */ }
    }

    // Authoritative runtime keybinds — starts at defaults, then loadControls() overrides from localStorage
    let keybinds = { ...KEYBIND_DEFAULTS };
    loadControls(); // load saved controls immediately before any input listeners attach

    let rebindingAction = null; // action name waiting for a new key press, or null
    let journalKeybindScrollY = 0; // scroll offset for keybind list on Options tab
    // Item display colors used in HUD and player hand visual
    // ─── Master item registry ────────────────────────────────────────────────
    // Single source of truth for every item in the game.
    // name       : canonical string used throughout all game code
    // category   : "starter" | "optional" | "cursed"
    // color      : HUD / world-drop tint
    // pegQty     : starting quantity on the van pegboard (0 = stub / not yet available)
    // directional: true = placed item shows a facing arrow
    // desc       : one-line flavour text shown on the pegboard card
    //
    // Phasmophobia name notes:
    //   "Ghost Book"    = Ghost Writing Book
    //   "UV Flashlight" = UV Light
    //   "Lighter"       = Igniter
    const ITEMS = [
      // ── Wall order: column-first, top→bottom then right to next column ──────
      // Col 1
      { name:"Video Camera",         category:"starter",  color:"#484848", pegQty:2, directional:true,  desc:"Spots orbs floating in dark rooms" },
      { name:"Tripod",               category:"optional", color:"#808060", pegQty:1, directional:true,  desc:"Mounts a Video Camera hands-free" },
      { name:"Photo Camera",         category:"optional", color:"#505050", pegQty:0, directional:true,  desc:"Captures ghost evidence photos" },

    // --- Shared interact action — called by keyboard E and desktop mouse click ---
    // ── Shared interaction facing helper ─────────────────────────────────────
    // Returns true if the target (tx, ty) is:
    //   1. within `dist` px of the player center, AND
    //   2. within INTERACT_HALF_ANGLE radians of playerAngle (player is facing it)
    // Half-angle of ~50° means the target must sit inside a ~100° forward cone.
    const INTERACT_HALF_ANGLE = 0.875; // ~50 degrees
    function _isFacing(tx, ty, dist) {
      const pcx = player.x + player.width  / 2;
      const pcy = player.y + player.height / 2;
      if (Math.hypot(tx - pcx, ty - pcy) > dist) return false;
      const angleToTarget = Math.atan2(ty - pcy, tx - pcx);
      let diff = angleToTarget - playerAngle;
      // Normalise to [-π, π]
      while (diff >  Math.PI) diff -= 2 * Math.PI;
      while (diff < -Math.PI) diff += 2 * Math.PI;
      return Math.abs(diff) <= INTERACT_HALF_ANGLE;
    }

    // ── Keyboard E interaction path ───────────────────────────────────────────

    function doInteract() {

          // Compute world position of each of the 5 star-point candles (R2=36, same formula as draw)
          for (let ci = 0; ci < 5; ci++) {
            const a = ci * Math.PI * 2 / 5 - Math.PI / 2;
            const candleWX = scCX + Math.cos(a) * 36;
            const candleWY = scCY + Math.sin(a) * 36;
            if (_isFacing(candleWX, candleWY, 44)) {
              // Player is close enough and facing this specific candle
              const lighterSelected = hasLighter && selectedSlot >= inventory.length;
              if (!sc.spent && lighterSelected && lighterLit && !((sc.candlesMask ?? 0) & (1 << ci))) {
                sc.candlesMask = (sc.candlesMask ?? 0) | (1 << ci);

                  summoningCircleTimer = 5;
                }
              }
              return; // consumed — even if lighter not ready
            }
          }
        }
      }

      // World items — must be within 30px AND in front of the player
      const nearIdx = worldItems.findIndex(it =>
        _isFacing(it.x + 6, it.y + 6, 30)
      );
      if (nearIdx >= 0) {
        const it = worldItems[nearIdx];
        if (it.fixed) { /* fixed env object — not pickupable */ } else
        if (it.name === "Tripod") {
          const heldCam = inventory[selectedSlot] === "Video Camera";
          if (heldCam && !it.mountedCamera) {
            it.mountedCamera = "Video Camera";
            inventory.splice(selectedSlot, 1);
            if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
          } else {
            const slots = 1 + (it.mountedCamera ? 1 : 0);
            if (inventory.length + slots <= 3) {
              inventory.push("Tripod");
              if (it.mountedCamera) inventory.push(it.mountedCamera);
              worldItems.splice(nearIdx, 1);
            }
          }
        } else if (it.name === "Lighter" && !hasLighter) {
          hasLighter = true;
          worldItems.splice(nearIdx, 1);
        } else if (it.name !== "Lighter" && inventory.length < 3 && !inventory.includes(it.name)) {
          inventory.push(it.name);
          worldItems.splice(nearIdx, 1);
        }
      }

      // Doors — within 40px AND facing
      const nearD = doors.find(d => _isFacing(d.x + d.w / 2, d.y + d.h / 2, 40));

        const playerInDoor = player.x + player.width  > nearD.x && player.x < nearD.x + nearD.w &&

        if (nearD.open && playerInDoor) { /* blocked */ }
        else nearD.open = !nearD.open;
      }

      // Van door — within 44px AND facing (allowed in lobby too — van is open/enterable)

      if (_isFacing(347, 900, 28)) { keypadOpen = true; return; }

    // ── Pointer interaction path (mouse click / mobile tap) ───────────────────
    // wx, wy = world-space coordinates of the click/tap.
    // Target is selected by pointer position FIRST; player distance is a secondary gate only.
    // Each branch hard-returns so only one interaction fires per click/tap.
    function doInteractAt(wx, wy) {
      if (!gameRunning) return;
      const pcx = player.x + player.width  / 2;
      const pcy = player.y + player.height / 2;
      // _ph: pointer hits object at (ox,oy) within radius r (primary target selector)
      const _ph = (ox, oy, r) => Math.hypot(wx - ox, wy - oy) < r;
      // _pp: player is close enough to object at (ox,oy) (reach gate — prevents long-range clicks)
      const _pp = (ox, oy, r) => Math.hypot(pcx - ox, pcy - oy) < r;
      // _pf: player is actually facing object at (ox,oy) — uses same helper as keyboard path
      const _pf = (ox, oy, dist) => _isFacing(ox, oy, dist);

      // ── Doors — expanded-rect hit test + facing ───────────────────────────
      const hitDoor = doors.find(d => {

               wy >= d.y - 14 && wy <= d.y + d.h + 14 &&
               _pp(dcx, dcy, 55) && _pf(dcx, dcy, 55);
      });
      if (hitDoor) {
        const playerInDoor = player.x + player.width  > hitDoor.x && player.x < hitDoor.x + hitDoor.w &&
                             player.y + player.height > hitDoor.y && player.y < hitDoor.y + hitDoor.h;
        if (!(hitDoor.open && playerInDoor)) hitDoor.open = !hitDoor.open;
        return;
      }

      // ── World items on the floor — pointer hit + reach + facing ──────────
      const hitItemIdx = worldItems.findIndex(it =>
        _ph(it.x + 6, it.y + 6, 26) && _pp(it.x + 6, it.y + 6, 38) && _pf(it.x + 6, it.y + 6, 38)
      );
      if (hitItemIdx >= 0) {

        if (it.name === "Tripod") {
          const heldCam = inventory[selectedSlot] === "Video Camera";
          if (heldCam && !it.mountedCamera) {
            it.mountedCamera = "Video Camera";
            inventory.splice(selectedSlot, 1);
            if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
          } else {
            const slots = 1 + (it.mountedCamera ? 1 : 0);
            if (inventory.length + slots <= 3) {
              inventory.push("Tripod");
              if (it.mountedCamera) inventory.push(it.mountedCamera);
              worldItems.splice(hitItemIdx, 1);
            }

          inventory.push(it.name);
          worldItems.splice(hitItemIdx, 1);
        }
        return;
      }

      // ── Van rear door — pointer hit + reach + facing ──────────────────────
      if (_ph(360, 926, 44) && _pp(360, 926, 56) && _pf(360, 926, 56)) { vanDoor.open = !vanDoor.open; return; }

      // ── Van fixed interactables ──────────────────────────────────────────

        const cams = getPlacedCameras();
        cameraViewIndex = Math.min(cameraViewIndex, Math.max(0, cams.length - 1));

      if (_ph(347, 900, 28) && _pp(347, 900, 36) && _pf(347, 900, 36)) { keypadOpen = true; return; }
      if (_ph(210, 900, 28) && _pp(210, 900, 36) && _pf(210, 900, 36)) { dangerTimerOpen = true; return; }
      if (_ph(306, 900, 28) && _pp(306, 900, 36) && _pf(306, 900, 36)) { fourPanelOpen   = true; return; }
      if (_ph(255, 898, 28) && _pp(255, 898, 36) && _pf(255, 898, 36)) { corkBoardOpen   = true; return; }

      // ── Light switches — pointer hit + reach + facing ─────────────────────
      const hitSwIdx = roomLights.findIndex(s => _ph(s.x, s.y, 20) && _pp(s.x, s.y, 34) && _pf(s.x, s.y, 34));
      if (hitSwIdx >= 0) { roomLights[hitSwIdx].on = !roomLights[hitSwIdx].on; return; }

        const total = inventory.length + (hasLighter ? 1 : 0);

        if (gameRunning && inventory[selectedSlot]) {
          const name = inventory[selectedSlot];
          // G = instant drop. Ghost Book drops closed/inactive. Camera drops at feet.
          // Intentional placement is V (keybinds.place).
          const px = player.x + player.width  / 2 + Math.cos(playerAngle) * 22 - 6;
          const py = player.y + player.height / 2 + Math.sin(playerAngle) * 22 - 6;
          const placedActive = name === "Flashlight"    ? flashlightOn
                             : name === "UV Flashlight" ? uvFlashlightOn
                             : name === "Ghost Book"    ? false   // drop = always closed/inactive
                             : heldItemOn;

          if (name === "Tarot Cards" && tarotSpent) {
            inventory.splice(selectedSlot, 1);
            if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
            heldItemOn = false; heldItemUsing = false;
            return;
          }
          const newItem = { name, x: px, y: py, facing: playerAngle, active: placedActive };

          if (name === "Tripod") { newItem.mountedCamera = null; }

          inventory.splice(selectedSlot, 1);

            placementPreview.active            = true;

    function rectsOverlap(a, b) {
      // a and b both have x, y, w, h
      return a.x < b.x + b.w && a.x + a.w > b.x &&
             a.y < b.y + b.h && a.y + a.h > b.y;

    function getVisibilityData() {
      const cx = player.x + 8, cy = player.y + 8;

      // Find which room the player is standing in
      let curRoom = rooms.find(r => cx >= r.x && cy >= r.y && cx < r.x+r.w && cy < r.y+r.h);
      // Fallback: player is in a connector — use the first room that connector touches
      if (!curRoom) {
        const dw = doorways.find(d => cx >= d.x && cy >= d.y && cx < d.x+d.w && cy < d.y+d.h);
        curRoom = dw ? rooms.find(r => rectsOverlap(dw, r)) : rooms[0];
      }

      // For each open doorway touching the current room, build a wedge into the adjacent room
      const wedges = [];
      doorways.forEach((dw, i) => {
        if (!doors[i]?.open)           return; // closed door blocks sight
        if (!rectsOverlap(dw, curRoom)) return; // doorway not on current room's wall

        // Find the room on the other side
        const adjRoom = rooms.find(r => r !== curRoom && rectsOverlap(dw, r));
        if (!adjRoom) return;

        // Get the two edge points of the doorway opening at the wall
        const d = doors[i];
        let e1, e2;
        if (d.w > d.h) {                         // horizontal wall (door is wide)
          const wy = d.y + d.h / 2;
          e1 = { x: d.x,       y: wy };
          e2 = { x: d.x + d.w, y: wy };
        } else {                                  // vertical wall (door is tall)
          const wx = d.x + d.w / 2;
          e1 = { x: wx, y: d.y };
          e2 = { x: wx, y: d.y + d.h };

        wedges.push({ room: adjRoom, e1, e2 });
      });

      return { curRoom, wedges };

      return walkable.some(r =>

        const orbCount = 4;
        // Bias spawn toward the center of the room so orbs start in a clearly visible area
        const cx = ghostFavRoom.x + ghostFavRoom.w / 2;
        const cy = ghostFavRoom.y + ghostFavRoom.h / 2;
        const spread = Math.min(ghostFavRoom.w, ghostFavRoom.h) * 0.25; // 25% of smaller dim
        for (let i = 0; i < orbCount; i++) {
          ghostOrbs.push({
            x: cx + (Math.random() - 0.5) * spread * 2,
            y: cy + (Math.random() - 0.5) * spread * 2,
            vx: (Math.random() - 0.5) * 0.15,
            vy: (Math.random() - 0.5) * 0.15,
            flicker: 0.9,            // start fully bright
            flickerTarget: 0.9,      // initialise target so lerp works from frame 1
            flickerTimer: 0.5 + Math.random() * 1.5,
          });
        }
        console.log(`[ORBS] Spawned ${orbCount} orbs in ${ghostFavRoom.label || "room"} at (${Math.round(cx)},${Math.round(cy)})`);
      } else {
        console.log(`[ORBS] No orbs — hasOrb=${hasOrb}, ghostFavRoom=${!!ghostFavRoom}, evidence=${currentGhost.evidence.join(",")}`);
      }

      setupGhostSpecialState(currentGhost);
    }

    // --- Notebook ---

    // --- Input ---
    const keys = {};
    document.addEventListener("keydown", e => {
      const moveKeys = ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight", keybinds.up, keybinds.down, keybinds.left, keybinds.right];
      if (moveKeys.includes(e.key)) e.preventDefault(); // stop page scroll/default
      keys[e.key] = true;
      keys[e.key.toLowerCase()] = true; // lowercase alias so "Shift" → keys["shift"]
    });
    document.addEventListener("keyup", e => {
      keys[e.key] = false;
      keys[e.key.toLowerCase()] = false;
      // G released while Video Camera preview active — commit or cancel
      if (e.key.toLowerCase() === keybinds.place && placementPreview.active) {
        if (placementPreview.valid && inventory[selectedSlot] === "Video Camera") {
          const snap = placementPreview.snapTarget;
          if (snap && snap.type === "tripod") {
            // Attach to tripod — no new worldItem; update tripod's mountedCamera slot
            snap.ref.mountedCamera       = "Video Camera";
            snap.ref.cameraFacing        = placementPreview.angle;
          } else {
            // Place on furniture surface — centered on the surface
            const newItem = { name: "Video Camera",
                              x: placementPreview.x - 6, y: placementPreview.y - 6,
                              facing: placementPreview.angle, active: false,
                              placedOn: "furniture" };
            worldItems.push(newItem);
          }
          inventory.splice(selectedSlot, 1);
          if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
          heldItemOn = false; heldItemUsing = false;
        } else if (placementPreview.valid && inventory[selectedSlot] === "Ghost Book") {
          // Place open/active — ghost can write in it.
          const bookName = inventory[selectedSlot];
          const newItem = { name: bookName,
                            x: placementPreview.x - 6, y: placementPreview.y - 6,
                            facing: placementPreview.angle,
                            active: true, written: false, writeAnimTimer: 0 };
          worldItems.push(newItem);
          inventory.splice(selectedSlot, 1);
          if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
          heldItemOn = false; heldItemUsing = false;
          journalOpen = false;
        }
        placementPreview.active    = false;
        placementPreview.item      = null;
        placementPreview.snapTarget = null;
      }
    });
    canvas.addEventListener("mousemove", e => {
      const rect = canvas.getBoundingClientRect();
      // Divide by CSS scale so coordinates stay in the 800×600 logical space
      mouseX = (e.clientX - rect.left) * (canvas.width  / rect.width);
      mouseY = (e.clientY - rect.top)  * (canvas.height / rect.height);
      // Also track for title screen hover states
      _titleMx = mouseX; _titleMy = mouseY;
    });

    // ── Mobile touch handlers ────────────────────────────────────────────────
    // These map touch gestures onto the same game actions as keyboard/mouse.
    // Desktop keyboard/mouse paths are NOT modified — both run side-by-side.
    if (isMobile) {
      // Convert a Touch to logical 800×600 canvas coordinates
      function _tc(touch) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (touch.clientX - rect.left) * (canvas.width  / rect.width),
          y: (touch.clientY - rect.top)  * (canvas.height / rect.height),
        };
      }

      // Hit-test uses the same scale as draw so tap targets match visuals
      function _hitBtn(tx, ty, btn) { return Math.hypot(tx - btn.cx, ty - btn.cy) <= btn.r * mobBtnScale; }
      // Rect hit-test (no scaling needed — these are fixed overlay elements)
      function _hitRect(tx, ty, r) { return tx >= r.x && tx <= r.x + r.w && ty >= r.y && ty <= r.y + r.h; }

      // Dispatch a real keydown+keyup so all existing keyboard logic runs unchanged
      function _fireKey(key) {
        document.dispatchEvent(new KeyboardEvent('keydown', { key, bubbles: true }));
        setTimeout(() => document.dispatchEvent(new KeyboardEvent('keyup', { key, bubbles: true })), 60);
      }

      // Pixels a look-drag must move before we start rotating (prevents touchdown jitter)
      const LOOK_THRESHOLD = 6;

      // ── CCTV button rects (screen-fixed, drawn + hit-tested during cameraViewMode) ──
      const MOB_CCTV = {
        exit:    { x: 748, y:   8, w: 44, h: 26 },
        prevCam: { x:   8, y: 558, w: 88, h: 30 },
        nextCam: { x: 104, y: 558, w: 88, h: 30 },
        nv:      { x: 632, y: 558, w: 120, h: 30 },
      };

      // ── Pegboard swipe state (tracks horizontal drag inside the pegboard panel) ──
      const mobPegSwipe = { active: false, id: null, startX: 0, startScrollX: 0, moved: false };
      function _resetPegSwipe() { mobPegSwipe.active = false; mobPegSwipe.id = null; mobPegSwipe.moved = false; }

      // ── Journal slider drag state ────────────────────────────────────────────
      // Geometry constants must exactly match the drawJournal mobile tab-2 layout.
      //   jy=52, lx=44, lw=358  →  trackX=58, trackW=308
      //   Row track-center Y values (absolute):  136, 196, 256
      const JOURNAL_SLIDER = {
        trackX: 58, trackW: 308, thumbR: 13,
        rows: [
          { cy:136, min:0.6, max:1.6,
            get: ()=> mobJoyScale,
            set: v => { mobJoyScale = +Math.max(0.6,Math.min(1.6,v)).toFixed(2); saveMobileSettings(); } },
          { cy:196, min:0.6, max:1.6,
            get: ()=> mobBtnScale,
            set: v => { mobBtnScale = +Math.max(0.6,Math.min(1.6,v)).toFixed(2); saveMobileSettings(); } },
          { cy:256, min:0.3, max:1.0,
            get: ()=> mobOpacity,
            set: v => { mobOpacity  = +Math.max(0.3,Math.min(1.0,v)).toFixed(2); saveMobileSettings(); } },
        ],
      };
      let mobSliderDrag = null; // { id, row } while a slider is being dragged
      function _resetSliderDrag() { mobSliderDrag = null; }

      // ── Overlay panel bounds used for tap-outside-to-close ──
      // These match the constants in each drawX() function exactly.
      const MOB_PANELS = {
        equipment:   { x:  60, y:  35, w: 680, h: 530 },
        keypad:      { x: 270, y: 250, w: 260, h: 140 },
        dangerTimer: { x: 270, y: 220, w: 260, h: 170 },
        fourPanel:   { x:  50, y:  30, w: 700, h: 540 },
        corkBoard:   { x: 120, y:  80, w: 560, h: 440 },
        // Journal spans x:20–756, y:28–548 (includes tab strip above pages)
        journal:     { x:  20, y:  28, w: 736, h: 520 },
      };

      function _resetLook() {
        mobileLook.active  = false; mobileLook.id = null;
        mobileLook.started = false;
      }
      function _resetJoy() {
        mobileJoy.active    = false; mobileJoy.id = null;
        mobileJoy.magnitude = 0;
      }
      function _resetPinch() {
        mobilePinch.active = false; mobilePinch.id0 = null; mobilePinch.id1 = null;
      }

      canvas.addEventListener("touchstart", e => {
        e.preventDefault();

        // ── Two-finger pinch: takes over from any active single-touch gestures ──
        if (e.touches.length >= 2) {
          _resetJoy(); _resetLook();
          const c0 = _tc(e.touches[0]);
          const c1 = _tc(e.touches[1]);
          const dist = Math.hypot(c1.x - c0.x, c1.y - c0.y);
          mobilePinch.active   = true;
          mobilePinch.lastDist = dist;
          mobilePinch.id0      = e.touches[0].identifier;
          mobilePinch.id1      = e.touches[1].identifier;
          return; // do not process individual new touches as buttons/joy/look
        }

        for (const t of e.changedTouches) {
          const { x, y } = _tc(t);

          // ── CCTV view mode — button-driven controls ──
          if (cameraViewMode) {
            if (_hitRect(x, y, MOB_CCTV.exit))    { cameraViewMode = false; continue; }
            if (_hitRect(x, y, MOB_CCTV.nv))      { cameraNightVision = !cameraNightVision; continue; }
            const _cams = getPlacedCameras();
            if (_hitRect(x, y, MOB_CCTV.prevCam) && _cams.length > 1) {
              cameraViewIndex = (cameraViewIndex - 1 + _cams.length) % _cams.length; continue;
            }
            if (_hitRect(x, y, MOB_CCTV.nextCam) && _cams.length > 1) {
              cameraViewIndex = (cameraViewIndex + 1) % _cams.length; continue;
            }
            // Tap anywhere else in CCTV view → no action (avoids accidental exits)
            continue;
          }

          // ── Popup open ──
          if (journalOpen || equipmentOpen || keypadOpen || dangerTimerOpen || fourPanelOpen || corkBoardOpen) {
            // Determine which panel is active and get its bounds
            const panel = journalOpen     ? MOB_PANELS.journal
                        : equipmentOpen   ? MOB_PANELS.equipment
                        : keypadOpen      ? MOB_PANELS.keypad
                        : dangerTimerOpen ? MOB_PANELS.dangerTimer
                        : fourPanelOpen   ? MOB_PANELS.fourPanel
                        :                   MOB_PANELS.corkBoard;

            // Tap OUTSIDE panel → close it immediately
            if (!_hitRect(x, y, panel)) {
              journalOpen     = journalOpen     && false; // only the active one closes
              equipmentOpen   = equipmentOpen   && !equipmentOpen;
              keypadOpen      = keypadOpen      && !keypadOpen;
              dangerTimerOpen = dangerTimerOpen && !dangerTimerOpen;
              fourPanelOpen   = fourPanelOpen   && !fourPanelOpen;
              corkBoardOpen   = corkBoardOpen   && !corkBoardOpen;
              if (journalOpen     && panel === MOB_PANELS.journal)     journalOpen     = false;
              if (equipmentOpen   && panel === MOB_PANELS.equipment)   equipmentOpen   = false;
              if (keypadOpen      && panel === MOB_PANELS.keypad)      keypadOpen      = false;
              if (dangerTimerOpen && panel === MOB_PANELS.dangerTimer) dangerTimerOpen = false;
              if (fourPanelOpen   && panel === MOB_PANELS.fourPanel)   fourPanelOpen   = false;
              if (corkBoardOpen   && panel === MOB_PANELS.corkBoard)   corkBoardOpen   = false;
              // Simpler: just close whatever is open
              journalOpen = false; equipmentOpen = false; keypadOpen = false;
              dangerTimerOpen = false; fourPanelOpen = false; corkBoardOpen = false; hauntedMirrorOpen = false;
              continue;
            }

            // Tap INSIDE pegboard panel — distinguish swipe from tap
            if (equipmentOpen) {
              const bx = 68, by = 88, bw = 664, bh = 440;
              if (x >= bx && x <= bx + bw && y >= by && y <= by + bh && !mobPegSwipe.active) {
                // Start tracking a potential swipe over the board area
                mobPegSwipe.active      = true;
                mobPegSwipe.id          = t.identifier;
                mobPegSwipe.startX      = x;
                mobPegSwipe.startScrollX = pegScrollX;
                mobPegSwipe.moved       = false;
                continue; // don't fire click yet — wait for touchend to decide tap vs swipe
              }
            }

            // Journal mobile sliders (tab 2): intercept track touches before synthetic click
            if (journalOpen && journalTab === 2) {
              const { trackX, trackW, thumbR, rows } = JOURNAL_SLIDER;
              let hitSlider = false;
              for (const row of rows) {
                if (y >= row.cy - thumbR - 6 && y <= row.cy + thumbR + 6 &&
                    x >= trackX - thumbR      && x <= trackX + trackW + thumbR) {
                  // Start drag and apply value immediately at tap position
                  mobSliderDrag = { id: t.identifier, row };
                  const frac = Math.max(0, Math.min(1, (x - trackX) / trackW));
                  row.set(row.min + frac * (row.max - row.min));
                  hitSlider = true;
                  break;
                }
              }
              if (hitSlider) continue; // slider consumed touch — skip synthetic click
            }

            // Tap inside any other panel → route as synthetic click for existing handlers
            canvas.dispatchEvent(new MouseEvent('click', {
              bubbles: true, cancelable: true,
              clientX: t.clientX, clientY: t.clientY,
            }));
            continue;
          }

          // ── Action buttons ──
          if (_hitBtn(x, y, MOB.interact))    { _fireKey(keybinds.interact);  continue; }
          if (_hitBtn(x, y, MOB.use))         { _fireKey(keybinds.use);       continue; }
          if (_hitBtn(x, y, MOB.journal))     { _fireKey(keybinds.journal);   continue; }
          if (_hitBtn(x, y, MOB.cycleItem))   { _fireKey(keybinds.inventory); continue; }
          if (_hitBtn(x, y, MOB.flashlight))  { _fireKey(keybinds.flashlight);continue; }
          if (_hitBtn(x, y, MOB.drop))        { _fireKey(keybinds.drop);      continue; }

          // ── Sprint button (hold) ──
          if (_hitBtn(x, y, MOB.sprint)) {
            mobileSprinting = true; mobileSprintId = t.identifier; continue;
          }

          // ── Joystick (left half, lower) — capture zone scales with mobJoyScale ──
          if (x < 350 && y > 280 && !mobileJoy.active) {
            mobileJoy.active    = true;
            mobileJoy.id        = t.identifier;
            mobileJoy.baseX     = x; mobileJoy.baseY = y;
            mobileJoy.curX      = x; mobileJoy.curY  = y;
            mobileJoy.magnitude = 0;
            continue;
          }

          // ── Look drag (right side / upper area — gated behind threshold) ──
          if (!mobileLook.active) {
            mobileLook.active  = true;
            mobileLook.id      = t.identifier;
            mobileLook.startX  = x; mobileLook.startY = y;
            mobileLook.lastX   = x; mobileLook.lastY  = y;
            mobileLook.started = false; // rotation blocked until threshold crossed
          }
        }
      }, { passive: false });

      canvas.addEventListener("touchmove", e => {
        e.preventDefault();

        // ── Pinch zoom ──
        if (mobilePinch.active && e.touches.length >= 2) {
          const t0 = Array.from(e.touches).find(t => t.identifier === mobilePinch.id0);
          const t1 = Array.from(e.touches).find(t => t.identifier === mobilePinch.id1);
          if (t0 && t1) {
            const c0 = _tc(t0), c1 = _tc(t1);
            const newDist = Math.hypot(c1.x - c0.x, c1.y - c0.y);
            if (mobilePinch.lastDist > 0) {
              const ratio = newDist / mobilePinch.lastDist;
              // Apply zoom — same 0.8–3.0 range as keyboard +/-
              gameZoom = Math.max(0.8, Math.min(3.0, gameZoom * ratio));
            }
            mobilePinch.lastDist = newDist;
          }
          return;
        }

        for (const t of e.changedTouches) {
          const { x, y } = _tc(t);

          // ── Journal slider drag ──
          if (mobSliderDrag && t.identifier === mobSliderDrag.id) {
            const { trackX, trackW } = JOURNAL_SLIDER;
            const { row } = mobSliderDrag;
            const frac = Math.max(0, Math.min(1, (x - trackX) / trackW));
            row.set(row.min + frac * (row.max - row.min));
            continue; // consumed
          }

          // ── Pegboard swipe (only active when equipmentOpen) ──
          if (t.identifier === mobPegSwipe.id && mobPegSwipe.active) {
            const dx = mobPegSwipe.startX - x; // drag left = scroll right (positive pegScrollX)
            if (Math.abs(dx) > 8) mobPegSwipe.moved = true;
            const virtualW = Math.ceil(equipmentList.length / 3) * 200 + 60;
            const maxScroll = Math.max(0, virtualW - 664); // bw=664
            pegScrollX = Math.max(0, Math.min(maxScroll, mobPegSwipe.startScrollX + dx));
          }

          // Update joystick knob position
          if (t.identifier === mobileJoy.id) {
            mobileJoy.curX = x; mobileJoy.curY = y;
          }

          // Update look drag — only apply rotation after threshold to prevent jitter
          if (t.identifier === mobileLook.id) {
            if (!mobileLook.started) {
              const totalDrag = Math.hypot(x - mobileLook.startX, y - mobileLook.startY);
              if (totalDrag >= LOOK_THRESHOLD) {
                mobileLook.started = true;
                mobileLook.lastX = x; mobileLook.lastY = y;
              }
            } else {
              const ddx = x - mobileLook.lastX;
              mobileLook.lastX = x; mobileLook.lastY = y;
              playerAngle += ddx * 0.007;
            }
          }
        }
      }, { passive: false });

      // ── Tap-to-interact helpers ──────────────────────────────────────────────
      // World-space radius (px) around an interactable that counts as "tapped on it".
      // At default zoom 1.8, TAP_R=60 world px ≈ 108 screen px — generous but not accidental.
      const TAP_R = 60;

      // Returns true when the tapped world point (wx,wy) is near any interactable
      // that the player is currently close enough to use.
      // All nearX() calls are the same proximity gates the keyboard E handler uses —
      // so the same distance restrictions apply. No fake logic, just a world-space tap check.
      function _tapNearInteractable(wx, wy) {
        // Doors
        const nd = nearDoor();
        if (nd && Math.hypot(wx - (nd.x + nd.w / 2), wy - (nd.y + nd.h / 2)) < TAP_R) return true;
        // World items on the floor (pick-up / toggle placed tool)
        const pcx = player.x + 8, pcy = player.y + 8;
        const nearWI = worldItems.find(it => Math.hypot((it.x + 6) - pcx, (it.y + 6) - pcy) < 30);
        if (nearWI && Math.hypot(wx - (nearWI.x + 6), wy - (nearWI.y + 6)) < TAP_R) return true;
        // Van rear door
        if (nearVanDoor()     && Math.hypot(wx - 360, wy - 926) < TAP_R) return true;
        // Van devices (world centres match nearX() target coordinates)
        if (nearKeypad()      && Math.hypot(wx - 347, wy - 900) < TAP_R) return true;
        if (nearPegboard()    && Math.hypot(wx - 270, wy - 950) < TAP_R) return true;
        if (nearCCTV()        && Math.hypot(wx - 196, wy - 926) < TAP_R) return true;
        if (nearDangerTimer() && Math.hypot(wx - 210, wy - 900) < TAP_R) return true;
        if (nearFourPanel()   && Math.hypot(wx - 306, wy - 900) < TAP_R) return true;
        if (nearCorkBoard()   && Math.hypot(wx - 255, wy - 898) < TAP_R) return true;
        // Light switches
        const swIdx = nearSwitch();
        if (swIdx >= 0) {
          const sw = roomLights[swIdx];
          if (Math.hypot(wx - sw.x, wy - sw.y) < TAP_R) return true;
        }
        return false;
      }

      function _touchEnd(e) {
        e.preventDefault();
        for (const t of e.changedTouches) {
          if (t.identifier === mobileJoy.id) _resetJoy();

          if (t.identifier === mobileLook.id) {
            // Tap: look touch ended with barely any movement = intentional tap.
            if (!mobileLook.started && gameRunning) {
              const sx = mobileLook.startX, sy = mobileLook.startY;

              // ── Close open panel/overlay if tap landed outside its content rect ──
              // Checks run in priority order; after closing we skip world interaction.
              const _out = (x,y, x1,y1,x2,y2) => x < x1 || x > x2 || y < y1 || y > y2;
              if (cameraViewMode)                               { cameraViewMode   = false; _resetLook(); continue; }
              if (journalOpen     && _out(sx,sy, 20,28,756,548))  { journalOpen     = false; _resetLook(); continue; }
              if (equipmentOpen   && _out(sx,sy, 60,35,740,565))  { equipmentOpen   = false; _resetLook(); continue; }
              if (keypadOpen      && _out(sx,sy,270,250,530,390)) { keypadOpen      = false; _resetLook(); continue; }
              if (dangerTimerOpen && _out(sx,sy,270,220,530,390)) { dangerTimerOpen = false; _resetLook(); continue; }
              if (fourPanelOpen   && _out(sx,sy, 50, 30,750,570)) { fourPanelOpen   = false; _resetLook(); continue; }
              if (corkBoardOpen   && _out(sx,sy,120, 80,680,520)) { corkBoardOpen   = false; _resetLook(); continue; }

              // ── World interact: no panel open, tap must be near the object ──
              if (!journalOpen && !equipmentOpen && !keypadOpen &&
                  !dangerTimerOpen && !fourPanelOpen && !corkBoardOpen && !cameraViewMode) {
                const camX = player.x + 8, camY = player.y + 8;
                const wx = (sx - canvas.width  / 2) / gameZoom + camX;
                const wy = (sy - canvas.height / 2) / gameZoom + camY;
                doInteractAt(wx, wy); // pointer-targeted: selects by tap position, not player-nearest
              }
            }
            _resetLook();
          }

          if (mobSliderDrag && t.identifier === mobSliderDrag.id) {
            _resetSliderDrag();
          }

          if (t.identifier === mobPegSwipe.id) {
            if (!mobPegSwipe.moved && equipmentOpen) {
              // Was a tap, not a scroll — fire synthetic click so item selection still works
              const { clientX, clientY } = t;
              canvas.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true, clientX, clientY }));
            }
            _resetPegSwipe();
          }

          if (t.identifier === mobileSprintId)  { mobileSprinting = false; mobileSprintId = null; }
          if (t.identifier === mobilePinch.id0 ||
              t.identifier === mobilePinch.id1)   _resetPinch();
        }
      }
      canvas.addEventListener("touchend",    _touchEnd, { passive: false });
      canvas.addEventListener("touchcancel", e => {
        _resetJoy(); _resetLook(); _resetPinch(); _resetSliderDrag(); _resetPegSwipe();
        mobileSprinting = false; mobileSprintId = null;
      }, { passive: false });

      // ── Out-of-canvas tap-to-close ─────────────────────────────────────────
      // When letterbox bars exist (black area around the canvas) a touch there
      // hits the document body, never reaching the canvas touchstart handler.
      // This catches those touches and closes any open overlay panel.
      document.addEventListener("touchstart", e => {
        if (e.target === canvas) return; // canvas handles its own panel logic
        if (!gameRunning) return;
        if (journalOpen || equipmentOpen || keypadOpen ||
            dangerTimerOpen || fourPanelOpen || corkBoardOpen || voodooDollOpen) {
          journalOpen = false; equipmentOpen = false; keypadOpen = false;
          dangerTimerOpen = false; fourPanelOpen = false; corkBoardOpen = false;
          hauntedMirrorOpen = false; voodooDollOpen = false; tarotOpen = false;
        }
      }, { passive: true });

    } // end if (isMobile)

    // --- Update ---
    function update() {
      // Timer
      const now = performance.now();
      const delta = (now - lastTime) / 1000;
      lastTime = now;
      if (!safeTimeOver) {
        safeTime -= delta;
        if (safeTime <= 0) {
          safeTime     = 0;
          safeTimeOver = true;
        }
      }

      // Haunted mirror countdown — only ticks while mirror is actively open
      if (!mirrorBroken && hauntedMirrorOpen && mirrorActiveTimer > 0) {
        mirrorActiveTimer -= delta;
        if (mirrorActiveTimer <= 0) {
          mirrorActiveTimer = 0;
          mirrorBroken = true;
        }
      }

      // Voodoo Doll animation + timers
      if (voodooAnimPinId >= 0) {
        if (!voodooEffectFired) {
          voodooAnimT = Math.min(1, voodooAnimT + delta / 0.6); // 0.6s plunge
          if (voodooAnimT >= 1) {
            _fireVoodooPinEffect(voodooAnimPinId);
            voodooEffectFired = true;
            voodooPostT = 0.9; // show effect label for 0.9s then close
          }
        } else {
          voodooPostT -= delta;
          if (voodooPostT <= 0) {
            voodooDollOpen  = false;
            voodooAnimPinId = -1;
            voodooAnimT     = 0;
            voodooEffectFired = false;
          }
        }
      }
      if (ghostAppearTimer > 0) ghostAppearTimer -= delta;
      if (ghostHuntFlash   > 0) ghostHuntFlash   -= delta;

      // ── Tarot Cards update ──────────────────────────────────────────────
      if (tarotDrawnCard !== null) {
        if (!tarotBurning) {
          tarotRevealT = Math.min(1, tarotRevealT + delta / 0.5); // 0.5s flip
          if (tarotRevealT >= 1 && !tarotEffectFired) {
            _applyTarotEffect(tarotDrawnCard.effect);
            tarotEffectFired = true;
            tarotBurning = true; // start burn after effect fires
          }
        } else {
          tarotBurnT = Math.min(1, tarotBurnT + delta / 1.2); // 1.2s burn
          if (tarotBurnT >= 1) {
            tarotDrawnCard = null; // card consumed, ready for next draw
            tarotBurnT = 0;
            if (tarotDeck.length === 0) {
              tarotOpen = false; // auto-close
              // Remove Tarot Cards from inventory — deck is fully spent, no floor drop
              const tidx = inventory.indexOf("Tarot Cards");
              if (tidx >= 0) {
                inventory.splice(tidx, 1);
                if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
              }
            }
          }
        }
      }

      // ── Music Box update ────────────────────────────────────────────────
      if (musicBoxActive) {
        musicBoxTimer  += delta;
        musicBoxPulseT  = (musicBoxPulseT + delta * 2.5) % 1; // pulse speed: 2.5 cycles/sec
        if (musicBoxTimer >= MUSIC_BOX_HUNT_DELAY) {
          // Trigger hunt and shatter the box
          _breakMusicBox();
          ghostHuntFlash  = 1.5;
          ghostAppearTimer = 3.0;
          // Move ghost toward player room for the hunt
          const pRoom = _roomAtPoint(player.x + 8, player.y + 8);
          if (pRoom && currentGhost) {
            ghostX = pRoom.x + pRoom.w * 0.5 + (Math.random() - 0.5) * pRoom.w * 0.4;
            ghostY = pRoom.y + pRoom.h * 0.5 + (Math.random() - 0.5) * pRoom.h * 0.4;
          }
          emfSources.push({ x: ghostX, y: ghostY, level: 5, timer: 16 });
        }
      }


      let dx = 0, dy = 0;

      // --- Ghost evidence interactions (after safe time; debug ghost skips safe-time wait) ---
      if (safeTimeOver && currentGhost) {
        // Decay EMF sources; derive emfLevel from nearest source within 100px of player
        for (let i = emfSources.length - 1; i >= 0; i--) {
          emfSources[i].timer -= delta;
          if (emfSources[i].timer <= 0) emfSources.splice(i, 1);
        }
        {
          const px = player.x + 8, py = player.y + 8;
          const holdingEMF = inventory[selectedSlot] === "EMF Reader";
          let best = 0;
          if (holdingEMF) {
            for (const src of emfSources) {
              if (Math.hypot(px - src.x, py - src.y) < 100 && src.level > best) best = src.level;
            }
          }
          emfLevel = best;
        }
        if (dotsDisturbTimer > 0) dotsDisturbTimer -= delta;
        if (spiritBoxTimer   > 0) spiritBoxTimer   -= delta;
        if (summoningCircleTimer > 0) {
          summoningCircleTimer -= delta;
          if (summoningCircleTimer <= 0) {
            summoningCircleTimer = 0;
            // Extinguish candles and mark circle as spent (one-time use)
            const scSpent = worldItems.find(it => it.name === "Summoning Circle" && it.fixed);
            if (scSpent) { scSpent.candlesMask = 0; scSpent.active = false; scSpent.spent = true; }
          }
        }
        for (const it of worldItems) {
          if (it.name === "Ghost Book" && it.writeAnimTimer > 0) it.writeAnimTimer -= delta;
        }

        // Thermometer — distance-based target; slow mercury-style lerp
        {
          const hasFreezing = currentGhost.evidence.includes("Freezing Temperatures");
          const coldFloor   = hasFreezing ? -2 : 5;  // coldest possible
          const NEAR = 60, FAR = 320;                // distance range (px)
          const dist = Math.hypot(player.x + 8 - ghostX, player.y + 8 - ghostY);
          const t    = Math.max(0, Math.min(1, (dist - NEAR) / (FAR - NEAR))); // 0=close, 1=far
          const target = coldFloor + t * (20 - coldFloor); // lerp coldFloor→20 across distance
          const lerpRate = 1.2; // °C/s — slow mercury movement
          if (thermometerReading > target) {
            thermometerReading = Math.max(target, thermometerReading - lerpRate * delta);
          } else {
            thermometerReading = Math.min(target, thermometerReading + lerpRate * delta);
          }
        }

        // Ghost movement — smooth waypoint walking with collision + optional room confinement
        // Ghost behavior pulled from current ghost type + defaults
        const beh = getGhostBehavior(currentGhost);
        const GHOST_SPEED = beh.huntSpeedBase; // default 1.4; ghosts with overrides differ
        // Goryo (no_room_migration) stays in its favorite room; others roam freely
        const ghostConfine = currentGhost?.specialRules?.includes("no_room_migration") ? ghostFavRoom : null;

        // Helper: pick a new walkable waypoint inside the room
        function pickGhostTarget() {
          const margin = GHOST_SIZE; // keep well clear of walls
          ghostTargetX = ghostFavRoom.x + margin + Math.random() * (ghostFavRoom.w - margin * 2);
          ghostTargetY = ghostFavRoom.y + margin + Math.random() * (ghostFavRoom.h - margin * 2);
          // If the picked spot is itself invalid, fall back to room center
          if (!canGhostMoveTo(ghostTargetX, ghostTargetY, ghostConfine)) {
            ghostTargetX = ghostFavRoom.x + ghostFavRoom.w / 2;
            ghostTargetY = ghostFavRoom.y + ghostFavRoom.h / 2;
          }
        }

        if (ghostPauseTimer > 0) {
          ghostPauseTimer -= delta; // standing still at waypoint
        } else {
          const dx = ghostTargetX - ghostX;
          const dy = ghostTargetY - ghostY;
          const dist = Math.hypot(dx, dy);
          if (dist < 3) {
            // Reached waypoint — pause then pick next target
            ghostPauseTimer = 0.6 + Math.random() * 1.6;
            pickGhostTarget();
          } else {
            // Step toward target with wall-sliding (same pattern as player movement)
            const step = Math.min(GHOST_SPEED, dist);
            const nx = ghostX + (dx / dist) * step;
            const ny = ghostY + (dy / dist) * step;
            ghostMoveAngle = Math.atan2(dy, dx); // face direction of travel
            if      (canGhostMoveTo(nx,     ny,     ghostConfine)) { ghostX = nx; ghostY = ny; }
            else if (canGhostMoveTo(nx,     ghostY, ghostConfine)) { ghostX = nx; }
            else if (canGhostMoveTo(ghostX, ny,     ghostConfine)) { ghostY = ny; }
            else {
              // Fully blocked — give up on this target and pick a new one
              ghostPauseTimer = 0.3;
              pickGhostTarget();
            }
            ghostWalkCycle += 0.12;
          }
        }

        // Periodic interaction check
        ghostEventTimer -= delta;
        if (ghostEventTimer <= 0) {
          // Ultimate test ghost: fire every 2s guaranteed; normal: 7–16s at 70%/25%
          if (GHOST_CONFIG.forceUltimateGhost) {
            ghostEventTimer = 2;
          } else {
            ghostEventTimer = (7 + Math.random() * 9) / beh.activityRate;
          }
          const inFav = (ghostX > ghostFavRoom.x && ghostX < ghostFavRoom.x + ghostFavRoom.w &&
                         ghostY > ghostFavRoom.y && ghostY < ghostFavRoom.y + ghostFavRoom.h);
          // Ultimate test ghost always fires; normal: roamTendency scales out-of-room chance
          if (GHOST_CONFIG.forceUltimateGhost || Math.random() < (inFav ? 0.70 : 0.25 * beh.roamTendency)) {
            const ev = currentGhost.evidence;

            // EMF — ghost interaction leaves a located source near ghost position
            // Any ghost can trigger EMF 2–4; EMF Level 5 evidence adds a chance of level 5
            {
              const hasEmf5 = ev.includes("EMF Level 5");
              const roll = Math.random();
              const lvl = hasEmf5 && roll < 0.30 ? 5 : (2 + Math.floor(Math.random() * 3)); // 2,3,4
              const jitter = 20;
              emfSources.push({
                x: ghostX + (Math.random() - 0.5) * jitter,
                y: ghostY + (Math.random() - 0.5) * jitter,
                level: lvl,
                timer: 8 + Math.random() * 6  // lasts 8–14s
              });
              // cap total sources so old events clean up if ghost fires fast
              if (emfSources.length > 6) emfSources.shift();
            }

            // D.O.T.S. Projector — needs an active placed projector within 150px of ghost
            if (ev.includes("D.O.T.S. Projector")) {
              const nearDots = worldItems.find(it =>
                it.name === "D.O.T.S. Projector" && it.active &&
                Math.hypot(it.x + 6 - ghostX, it.y + 6 - ghostY) < 150
              );
              if (nearDots) dotsDisturbTimer = 5;
            }

            // Ultraviolet — ghost leaves fingerprint smudge on a door near its position
            // Targets: any door within 80px of ghost; cap at 8 total marks per round
            if (ev.includes("Ultraviolet") && uvMarks.length < 8) {
              const nearDoor = doors.find(d =>
                Math.hypot((d.x + d.w / 2) - ghostX, (d.y + d.h / 2) - ghostY) < 80
              );
              if (nearDoor) {
                // Place mark at the knob side of the door (where a hand would touch)
                const horiz = nearDoor.w > nearDoor.h;
                const mx = horiz ? nearDoor.x + nearDoor.w - 6 : nearDoor.x + 3;
                const my = horiz ? nearDoor.y + 3             : nearDoor.y + nearDoor.h - 6;
                // Only add if not already very close to an existing mark (no duplicates)
                const alreadyThere = uvMarks.some(m => Math.hypot(m.x - mx, m.y - my) < 12);
                if (!alreadyThere) uvMarks.push({ x: mx, y: my });
              }
            }

            // Ghost Writing — active unwritten Ghost Book OR open placed Journal within 120px
            if (ev.includes("Ghost Writing")) {
              const book = worldItems.find(it =>
                it.name === "Ghost Book" &&
                it.active && !it.written &&
                Math.hypot(it.x + 6 - ghostX, it.y + 6 - ghostY) < 120
              );
              if (book) {
                book.written = true;
                book.writeAnimTimer = 1.8; // scribble animation lasts 1.8s
                // EMF event at book location (writing is a ghost interaction)
                emfSources.push({ x: book.x + 6, y: book.y + 6, level: 2 + Math.floor(Math.random() * 2), timer: 10 });
                if (emfSources.length > 6) emfSources.shift();
              }
            }
          }
        }
      }

      // Spirit Box — active listen window (started by R key)
      if (spiritBoxListenTimer > 0 && currentGhost) {
        spiritBoxListenTimer -= delta;
        if (spiritBoxListenTimer <= 0) {
          // Listen window ended — evaluate conditions for a response
          heldItemOn = false;
          const holdingBox   = inventory[selectedSlot] === "Spirit Box";
          const hasEvidence  = currentGhost.evidence.includes("Spirit Box");
          const dist         = Math.hypot(player.x + 8 - ghostX, player.y + 8 - ghostY);
          const withinRange  = dist < 180;
          const { curRoom }  = getVisibilityData();
          const ghostRoom    = curRoom && (ghostX > curRoom.x && ghostX < curRoom.x + curRoom.w &&
                                           ghostY > curRoom.y && ghostY < curRoom.y + curRoom.h);
          const roomIdx      = curRoom ? rooms.indexOf(curRoom) : -1;
          const lightsOff    = roomIdx < 0 || !roomLights[roomIdx]?.on;
          // Ultimate test ghost: bypass lights-off requirement; room + range still apply
          const conditionsMet = holdingBox && hasEvidence && withinRange && ghostRoom &&
                                (lightsOff || GHOST_CONFIG.forceUltimateGhost);
          const responseChance = 0.65;
          if (conditionsMet && Math.random() < responseChance) {
            spiritBoxTimer      = 3.5;
            spiritBoxNoResponse = false;
          } else {
            spiritBoxNoResponse = true;
            setTimeout(() => { spiritBoxNoResponse = false; }, 2000);
          }
        }
      }

      // Ghost Orbs — drift, soft bounce inside ghost's room, independent flicker
      if (ghostOrbs.length > 0 && ghostFavRoom) {
        const room = ghostFavRoom;
        ghostOrbs.forEach(orb => {
          // Smooth drift
          orb.x += orb.vx;
          orb.y += orb.vy;
          // Soft bounce off room walls (inset 8px so orbs don't sit on the edge)
          if (orb.x < room.x + 8)            { orb.x = room.x + 8;            orb.vx =  Math.abs(orb.vx); }
          if (orb.x > room.x + room.w - 8)   { orb.x = room.x + room.w - 8;   orb.vx = -Math.abs(orb.vx); }
          if (orb.y < room.y + 8)            { orb.y = room.y + 8;            orb.vy =  Math.abs(orb.vy); }
          if (orb.y > room.y + room.h - 8)   { orb.y = room.y + room.h - 8;   orb.vy = -Math.abs(orb.vy); }
          // Cap speed so they stay slow after repeated bounces
          const maxSpd = 0.22;
          orb.vx = Math.max(-maxSpd, Math.min(maxSpd, orb.vx));
          orb.vy = Math.max(-maxSpd, Math.min(maxSpd, orb.vy));
          // Add tiny random drift nudge so they don't travel in straight lines forever
          orb.vx += (Math.random() - 0.5) * 0.02;
          orb.vy += (Math.random() - 0.5) * 0.02;
          // Flicker — lerp alpha toward a target, pick new target when timer expires
          orb.flickerTimer -= delta;
          if (orb.flickerTimer <= 0) {
            orb.flickerTarget = 0.3 + Math.random() * 0.7; // new alpha target 0.3–1.0
            orb.flickerTimer  = 0.4 + Math.random() * 1.2; // 0.4–1.6s until next change
          }
          if (orb.flickerTarget !== undefined) {
            orb.flicker += (orb.flickerTarget - orb.flicker) * Math.min(1, delta * 2);
          }
        });
      }

      // Placement preview — snap position to surface, angle set by mouse
      // Used by: Video Camera (furniture/tripod only), Journal (furniture OR floor)
      if (placementPreview.active) {
        const cx = player.x + 8, cy = player.y + 8;
        const probeX = cx + Math.cos(placementPreview.lockedPlayerAngle) * 30;
        const probeY = cy + Math.sin(placementPreview.lockedPlayerAngle) * 30;
        const isJournal = placementPreview.item === "Ghost Book";

        // Check furniture surfaces — snap to center of matched rect
        const hitFurniture = furniture.find(f =>
          probeX >= f.x && probeX <= f.x + f.w &&
          probeY >= f.y && probeY <= f.y + f.h
        );
        // Check tripod mounts — tripod without a camera already (camera only)
        const hitTripod = !isJournal && worldItems.find(it =>
          it.name === "Tripod" && !it.mountedCamera &&
          Math.hypot(probeX - (it.x + 6), probeY - (it.y + 6)) < 18
        );
        // Journal also accepts floor: player is standing in a room or doorway
        const hitFloor = isJournal && (
          rooms.some(r    => cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) ||
          doorways.some(d => cx >= d.x && cx <= d.x + d.w && cy >= d.y && cy <= d.y + d.h)
        );

        if (hitFurniture) {
          // Use the probe's actual position clamped to the furniture surface (not center-snap)
          // Inset by 4px on sides so the item body doesn't hang off the edge
          placementPreview.x          = Math.max(hitFurniture.x + 4, Math.min(hitFurniture.x + hitFurniture.w - 4, probeX));
          placementPreview.y          = Math.max(hitFurniture.y + 2, Math.min(hitFurniture.y + hitFurniture.h - 2, probeY));
          placementPreview.valid      = true;
          placementPreview.snapTarget = { type: "furniture", ref: hitFurniture };
        } else if (hitTripod) {
          // Snap to tripod mount head center (camera only)
          placementPreview.x          = hitTripod.x + 6;
          placementPreview.y          = hitTripod.y + 6;
          placementPreview.valid      = true;
          placementPreview.snapTarget = { type: "tripod", ref: hitTripod };
        } else if (hitFloor) {
          // Journal on floor — place at player's feet
          placementPreview.x          = cx;
          placementPreview.y          = cy;
          placementPreview.valid      = true;
          placementPreview.snapTarget = null;
        } else {
          placementPreview.x          = probeX;
          placementPreview.y          = probeY;
          placementPreview.valid      = false;
          placementPreview.snapTarget = null;
        }
        // angle updated by the mouse-tracking block above (placementPreview.angle = targetAngle)
      }

      // Hold-to-use: R held while Sound Recorder is on = actively recording
      if (inventory[selectedSlot] === "Sound Recorder" && heldItemOn) {
        heldItemUsing = !!(keys[keybinds.use]);
      } else if (!heldItemOn) {
        heldItemUsing = false;
      }

      const wantsSprint = keys[keybinds.sprint] || mobileSprinting;
      const isSprinting = wantsSprint && stamina > 0.01;
      if (isSprinting) {
        stamina = Math.max(0, stamina - STAMINA_DRAIN_RATE * delta);
        staminaRestTimer = 0;
      } else {
        staminaRestTimer += delta;
        if (staminaRestTimer >= STAMINA_RECHARGE_DELAY) {
