    // --- Van Threat Monitor UI ---
    // Returns board-local {x,y} (offset from bx,by) for a given answer token.
    // Single char = letter/digit; "YES"/"NO"/"GOODBYE" = special board zones.
    // Board is BW=700. Arc geometry: large circle below board creates upward-curving arcs.
    function _ouijaTokenPos(token) {
      const t = (token || "").toUpperCase();
      const L1 = "ABCDEFGHIJKLM", L2 = "NOPQRSTUVWXYZ", NR = "1234567890";
      // Arc centers placed far below the board so letters curve gently upward.
      const R1 = 760, CY1 = 800, AHALF = 0.28; // A-M arc
      const R2 = 690, CY2 = 800;               // N-Z arc (tighter = lower on board)
      const i1 = L1.indexOf(t);
      if (i1 >= 0) {
        const a = -AHALF + (i1 / 12) * AHALF * 2;
        return { x: 350 + R1 * Math.sin(a), y: CY1 - R1 * Math.cos(a) };
      }
      const i2 = L2.indexOf(t);
      if (i2 >= 0) {
        const a = -AHALF + (i2 / 12) * AHALF * 2;
        return { x: 350 + R2 * Math.sin(a), y: CY2 - R2 * Math.cos(a) };
      }
      const iN = NR.indexOf(t);
      if (iN >= 0) {
        const numW = 38, numCount = 10;
        const sx = (700 - numCount * numW) / 2;
        return { x: sx + iN * numW + numW / 2, y: 200 };
      }
      if (t === "YES")     return { x:  80, y:  50 };
      if (t === "NO")      return { x: 620, y:  50 };
      if (t === "GOODBYE") return { x: 350, y: 295 };
      return { x: 350, y: 155 };
    }

    // Common American first names for ghost identity answer.
    const OUIJA_NAMES = [
      "JAMES","JOHN","ROBERT","MICHAEL","WILLIAM","DAVID","RICHARD","THOMAS",
      "MARY","PATRICIA","JENNIFER","LINDA","BARBARA","SUSAN","JESSICA","SARAH",
    ];

    // Helper: find which room a world point (wx, wy) is inside.
    function _roomAtPoint(wx, wy) {
      return rooms.find(r => wx >= r.x && wy >= r.y && wx < r.x + r.w && wy < r.y + r.h) || null;
    }

    // Pool of 5 Ouija questions — each has a stable id and an answerFn that returns a token array.
    const OUIJA_Q_POOL = [
      { id: 0, text: "Where are you?",
        answerFn: () => {
          // Ghost's current room at time of asking — fall back to favorite room label.
          const gRoom = _roomAtPoint(ghostX, ghostY) || ghostFavRoom;
          if (gRoom && gRoom.label) {
            const clean = gRoom.label.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
            if (clean.length > 0) return clean.split('');
          }
          return "HERE".split('');
        }},
      { id: 1, text: "How old are you?",
        answerFn: () => {
          // Pick a believable human age (seeded from ghost type so it's stable per round).
          const seed = currentGhost ? currentGhost.name.charCodeAt(0) : 42;
          const age = 18 + ((seed * 17 + 31) % 62); // 18–79
          return String(age).split('');
        }},
      { id: 2, text: "What is your name?",
        answerFn: () => {
          // Pick a common American name seeded by ghost type so it's stable per round.
          const seed = currentGhost ? currentGhost.name.charCodeAt(1) || 0 : 0;
          const name = OUIJA_NAMES[(seed * 3 + 7) % OUIJA_NAMES.length];
          return name.split('');
        }},
      { id: 3, text: "Are you friendly?",
        answerFn: () => {
          // Friendly ghost types give YES; all others NO.
          const friendlyTypes = ["Spirit", "Wraith", "Goryo", "Myling"];
          const friendly = currentGhost && friendlyTypes.includes(currentGhost.name);
          return [friendly ? "YES" : "NO"];
        }},
      { id: 4, text: "Are you here?",
        answerFn: () => {
          // YES if ghost and player are in the same room right now.
          const pRoom = _roomAtPoint(player.x + 8, player.y + 8);
          const gRoom = _roomAtPoint(ghostX, ghostY);
          const sameRoom = pRoom && gRoom && pRoom === gRoom;
          return [sameRoom ? "YES" : "NO"];
        }},
    ];

    // Ask a question from the pool — starts the answer animation, tracks spend state.
    function _ouijaAskQuestion(q) {
      if (ouijaBroken || ouijaSeqIdx >= 0 || ouijaAskedQIds.has(q.id)) return;
      ouijaAskedQIds.add(q.id);
      ouijaQuestionsAsked++;
      ouijaCurrentQ = q.text;
      const seq = q.answerFn();
      _ouijaStartAnswer(seq, ouijaQuestionsAsked >= 3);
    }

    // Kicks off the planchette animation for an answer sequence.
    // If pendingBreak is true, _breakOuijaBoard() fires when the sequence finishes.
    function _ouijaStartAnswer(seq, pendingBreak) {
      ouijaSeq          = seq;
      ouijaSeqIdx       = 0;
      ouijaPendingBreak = pendingBreak;
      ouijaLastAnswer   = seq.join('');
      const pos = _ouijaTokenPos(seq[0]);
      ouijaTX = pos.x; ouijaTY = pos.y;
      ouijaSeqNextTime  = Date.now() + 950; // ms to dwell on each token
    }

    // ── Voodoo Doll popup ─────────────────────────────────────────────────
    function drawVoodooDoll() {
      const W = canvas.width, H = canvas.height;
      const BW = 310, BH = 370;
      const bx = (W - BW) / 2, by = (H - BH) / 2;

      // ── Doll body ─────────────────────────────────────────────────────
      const dollCX = bx + BW/2;
      const dollCY = by + 158; // pivot = waist

      // Shadow ellipse
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.beginPath(); ctx.ellipse(dollCX+3, dollCY+48, 30, 13, 0, 0, Math.PI*2); ctx.fill();

      // Legs
      ctx.fillStyle = "#7a5a3a";
      ctx.fillRect(dollCX-20, dollCY+8, 17, 40);
      ctx.fillRect(dollCX+3, dollCY+8, 17, 40);
      ctx.fillStyle = "#5a3a20"; // feet
      ctx.fillRect(dollCX-22, dollCY+44, 19, 7);
      ctx.fillRect(dollCX+3, dollCY+44, 19, 7);

      // Left arm
      ctx.fillStyle = "#8a6040";
      ctx.fillRect(dollCX-48, dollCY-32, 32, 15);
      ctx.fillStyle = "#c8a070"; // hand
      ctx.beginPath(); ctx.ellipse(dollCX-48, dollCY-25, 6, 8, 0, 0, Math.PI*2); ctx.fill();

      // Right arm
      ctx.fillStyle = "#8a6040";
      ctx.fillRect(dollCX+16, dollCY-32, 32, 15);
      ctx.fillStyle = "#c8a070";
      ctx.beginPath(); ctx.ellipse(dollCX+48, dollCY-25, 6, 8, 0, 0, Math.PI*2); ctx.fill();

      // Torso
      ctx.fillStyle = "#8a6040";
      ctx.fillRect(dollCX-18, dollCY-32, 36, 42);
      // Burlap stitching seams
      ctx.strokeStyle = "#5a3820"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(dollCX-18, dollCY-10); ctx.lineTo(dollCX+18, dollCY-10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(dollCX, dollCY-32); ctx.lineTo(dollCX, dollCY+10); ctx.stroke();

      // Neck
      ctx.fillStyle = "#9a7050";
      ctx.fillRect(dollCX-7, dollCY-48, 14, 18);

      // Head
      ctx.fillStyle = "#c8a070";
      ctx.beginPath(); ctx.ellipse(dollCX, dollCY-58, 22, 20, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = "#7a5030"; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.ellipse(dollCX, dollCY-58, 22, 20, 0, 0, Math.PI*2); ctx.stroke();
      // X eyes
      ctx.strokeStyle = "#3a1808"; ctx.lineWidth = 1.5;
      const ex1 = dollCX-9, ex2 = dollCX+9, ey = dollCY-61;
      ctx.beginPath(); ctx.moveTo(ex1-3,ey-3); ctx.lineTo(ex1+3,ey+3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex1+3,ey-3); ctx.lineTo(ex1-3,ey+3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex2-3,ey-3); ctx.lineTo(ex2+3,ey+3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex2+3,ey-3); ctx.lineTo(ex2-3,ey+3); ctx.stroke();
      // Stitched mouth
      ctx.strokeStyle = "#3a1808"; ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(dollCX-8, dollCY-48);
      for (let mi = 0; mi <= 4; mi++) ctx.lineTo(dollCX-8+mi*4, dollCY-48+(mi%2)*4);
      ctx.stroke();

      // ── Pin spot markers & doll body part labels ──────────────────────
      // PIN_SPOTS: screen-space positions matched to VOODOO_PINS[].px/py offsets
      const PIN_SPOTS = VOODOO_PINS.map(p => ({ x: dollCX + p.px, y: dollCY + p.py }));
      _voodooPinRects = [];

      // Heart marking on chest (matches pin 1 spot)
      ctx.font = "18px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = voodooPinUsed[1] ? "#2a0808" : (voodooAnimPinId === 1 ? "#ff4040" : "rgba(180,30,30,0.8)");
      ctx.fillText("♥", PIN_SPOTS[1].x, PIN_SPOTS[1].y);
      ctx.textBaseline = "alphabetic";

      VOODOO_PINS.forEach((pin, i) => {
        const sp = PIN_SPOTS[i];
        const used = voodooPinUsed[i];
        const animating = voodooAnimPinId === i;

        if (used && !animating) {
          // Spent: show used pin embedded
          ctx.strokeStyle = "rgba(150,120,60,0.5)"; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(sp.x, sp.y, 8, 0, Math.PI*2); ctx.stroke();
          ctx.strokeStyle = "#b0b0b0"; ctx.lineWidth = 1.8;
          ctx.beginPath(); ctx.moveTo(sp.x, sp.y - 16); ctx.lineTo(sp.x, sp.y); ctx.stroke();
          ctx.fillStyle = "#c84040";
          ctx.beginPath(); ctx.arc(sp.x, sp.y - 16, 4, 0, Math.PI*2); ctx.fill();
        } else if (!animating) {
          // Available: pulsing ring + clickable
          const pulse = 0.55 + 0.45 * Math.sin(Date.now() / 350 + i * 1.1);
          ctx.strokeStyle = `rgba(220,160,50,${pulse})`; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.arc(sp.x, sp.y, 9, 0, Math.PI*2); ctx.stroke();
          ctx.fillStyle = `rgba(220,160,50,${pulse*0.18})`;
          ctx.beginPath(); ctx.arc(sp.x, sp.y, 9, 0, Math.PI*2); ctx.fill();
          // Doll spot is clickable
          _voodooPinRects.push({ id: i, cx: sp.x, cy: sp.y, r: 15 });
        }
      });

      // ── Pin push-in animation ─────────────────────────────────────────
      if (voodooAnimPinId >= 0) {
        const sp = PIN_SPOTS[voodooAnimPinId];
        const t = voodooAnimT;
        // Pin plunges from 30px above target to target
        const needleEndY = sp.y;
        const needleStartY = sp.y - 30;
        const needleCurY = needleStartY + (needleEndY - needleStartY) * Math.min(1, t * 1.5);
        const headY = needleCurY - 18;

        // Needle shaft
        ctx.strokeStyle = "#d8d8d8"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(sp.x, headY); ctx.lineTo(sp.x, needleCurY); ctx.stroke();
        // Pin head — red disc
        const headGrad = ctx.createRadialGradient(sp.x-2, headY-2, 1, sp.x, headY, 6);
        headGrad.addColorStop(0, "#ff8080"); headGrad.addColorStop(1, "#c01818");
        ctx.fillStyle = headGrad;
        ctx.beginPath(); ctx.arc(sp.x, headY, 6, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#ff4040"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(sp.x, headY, 6, 0, Math.PI*2); ctx.stroke();

        // Effect label after pin is embedded
        if (t > 0.7 || voodooEffectFired) {
          const labelAlpha = Math.min(1, (t - 0.7) / 0.3);
          const pin = VOODOO_PINS[voodooAnimPinId];
          const effectLabels = {
            sanity:   "SANITY −25%",
            hunt:     "HUNT!",
            appear:   "GHOST APPEARS",
            evidence: "GHOST ACTIVITY",
          };
          const lbl = effectLabels[pin.effect] || pin.effect.toUpperCase();
          ctx.globalAlpha = Math.max(0, labelAlpha);
          ctx.fillStyle = pin.effect === 'hunt' ? "#ff5050" : "#ffe060";
          ctx.font = `bold ${pin.effect === 'hunt' ? 20 : 15}px serif`;
          ctx.textAlign = "center";
          ctx.fillText(lbl, W/2, by + 222);
          ctx.globalAlpha = 1;
        }
      }

      // ── Separator ─────────────────────────────────────────────────────
      const sepY = by + 232;
      ctx.strokeStyle = "rgba(100,60,20,0.5)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(bx+24, sepY); ctx.lineTo(bx+BW-24, sepY); ctx.stroke();

      // ── Pins remaining / spent indicator (below separator) ────────────────
      {
        const avail = VOODOO_PINS.filter((p, i) => !voodooPinUsed[i]);
        const infoY = sepY + 22;
        ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
        if (voodooAnimPinId >= 0) {
          ctx.fillStyle = "#e8c060"; ctx.font = "italic 13px serif";
          ctx.fillText("...", W/2, infoY);
        } else if (avail.length === 0) {
          ctx.fillStyle = "#806040"; ctx.font = "italic 12px serif";
          ctx.fillText("All pins are spent.", W/2, infoY);
        } else {
          ctx.fillStyle = "#b89050"; ctx.font = "12px serif";
          ctx.fillText(`${avail.length} pin${avail.length !== 1 ? "s" : ""} remaining`, W/2, infoY);
        }
        ctx.textAlign = "left";
      }

      // ── Footer ─────────────────────────────────────────────────────────
      ctx.fillStyle = "rgba(30,14,4,0.88)";
      ctx.beginPath(); ctx.roundRect(bx, by+BH-24, BW, 24, [0,0,10,10]); ctx.fill();
      ctx.fillStyle = "#b89040"; ctx.font = "10px monospace";
      ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
      ctx.fillText(
        voodooAnimPinId >= 0 ? "..." : "[E] push random pin   [R] put down",
        W/2, by+BH-7
      );
      ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
      ctx.restore();
    }

    // ── Voodoo Doll — start a pin's plunge animation ─────────────────────
    function _startVoodooPinAnim(pinId) {
      if (voodooAnimPinId >= 0 || voodooPinUsed[pinId]) return;
      voodooAnimPinId   = pinId;
      voodooAnimT       = 0;
      voodooEffectFired = false;
    }

    // ── Voodoo Doll — fire the effect for the given pin ───────────────────
    function _fireVoodooPinEffect(pinId) {
      const pin = VOODOO_PINS[pinId];
      if (!pin) return;
      voodooPinUsed[pinId] = true;
      if (voodooPinUsed.every(u => u)) voodooSpent = true;

      if (pin.effect === 'sanity') {
        // Head pin: drain 25% sanity
        playerSanity = Math.max(0, playerSanity - 25);

      } else if (pin.effect === 'hunt') {
        // Heart pin: hunt trigger — red flash, ghost teleports to player's room, appears
        ghostHuntFlash  = 1.5;
        ghostAppearTimer = 3.0;
        const pRoom = _roomAtPoint(player.x + 8, player.y + 8);
        if (pRoom && currentGhost) {
          ghostX = Math.min(Math.max(player.x + 55, pRoom.x + 12), pRoom.x + pRoom.w - 12);
          ghostY = Math.min(Math.max(player.y + 55, pRoom.y + 12), pRoom.y + pRoom.h - 12);
          ghostTargetX = ghostX; ghostTargetY = ghostY;
        }
        ghostEventTimer = 0.3;
        emfSources.push({ x: ghostX, y: ghostY, level: 5, timer: 16 });
        if (emfSources.length > 6) emfSources.shift();

      } else if (pin.effect === 'appear') {
        // Shoulder pins: ghost appears in gray translucent form for 1.5s
        ghostAppearTimer = 1.5;

      } else if (pin.effect === 'evidence') {
        // Body pin: one evidence-style ghost response
        ghostEventTimer = 0.8 + Math.random() * 0.5;
        const hasEmf5 = currentGhost?.evidence.includes("EMF Level 5");
        emfSources.push({
          x: ghostX + (Math.random() - 0.5) * 20,
          y: ghostY + (Math.random() - 0.5) * 20,
          level: hasEmf5 ? 5 : 3,
          timer: 12,
        });
        if (emfSources.length > 6) emfSources.shift();
        if (currentGhost?.evidence.includes("D.O.T.S. Projector"))
          dotsDisturbTimer = Math.max(dotsDisturbTimer, 5);
      }
    }

    // ── Tarot Cards — apply a drawn card's effect ──────────────────────────
    function _applyTarotEffect(effect) {
      switch (effect) {
        case "activity":
          // The Spire — boost ghost event rate temporarily
          ghostEventTimer = Math.min(ghostEventTimer, 0.4);
          dotsDisturbTimer = Math.max(dotsDisturbTimer, 6);
          emfSources.push({ x: ghostX, y: ghostY, level: 4, timer: 14 });
          break;
        case "fate":
          // Fate's Turn — randomly raise or lower sanity by 25
          if (Math.random() < 0.5) playerSanity = Math.min(100, playerSanity + 25);
          else                     playerSanity = Math.max(0,   playerSanity - 25);
          break;
        case "trickster":
          // The Trickster — fake flash, no real effect
          ghostHuntFlash = 0.4; // brief red flash, no actual hunt
          ghostAppearTimer = 0.6;
          break;
        case "event":
          // The Fiend — trigger a ghost event (EMF spike + ghost appears)
          ghostEventTimer = 0.1;
          ghostAppearTimer = 2.5;
          emfSources.push({ x: ghostX, y: ghostY, level: 5, timer: 12 });
          if (currentGhost?.evidence.includes("D.O.T.S. Projector"))
            dotsDisturbTimer = Math.max(dotsDisturbTimer, 4);
          break;
        case "hunt":
          // The Reaper — cursed hunt
          ghostHuntFlash = 1.5;
          ghostAppearTimer = 3.0;
          emfSources.push({ x: ghostX, y: ghostY, level: 5, timer: 16 });
          break;
        case "watcher":
          // The Watcher — ghost locked to favourite room briefly (use ghostFavRoom)
          if (ghostFavRoom) {
            ghostX = ghostFavRoom.x + ghostFavRoom.w * 0.5;
            ghostY = ghostFavRoom.y + ghostFavRoom.h * 0.5;
          }
          ghostEventTimer = Math.max(ghostEventTimer, 6); // suppresses events briefly
          break;
        case "dawn":
          // The Dawn — full sanity restore
          playerSanity = 100;
          break;
        case "eclipse":
          // The Eclipse — sanity drops to zero
          playerSanity = 0;
          break;
        case "saint":
          // The Saint — restore sanity by 50 (revival effect, partial if death implemented later)
          playerSanity = Math.min(100, playerSanity + 50);
          break;
        case "death":
          // The Noose — instant lose condition (trigger hunt immediately and max flash)
          ghostHuntFlash = 1.5;
          ghostAppearTimer = 3.5;
          playerSanity = 0;
          emfSources.push({ x: ghostX, y: ghostY, level: 5, timer: 18 });
          break;
      }
    }

    // ── Tarot Cards — draw the popup ──────────────────────────────────────
    function drawTarotCards() {
      const W = canvas.width, H = canvas.height;
      const BW = 340, BH = 500;
      const bx = (W - BW) / 2, by = (H - BH) / 2;

      // Vignette
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.72)";
      ctx.fillRect(0, 0, W, H);

      // Panel background — aged dark parchment
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.beginPath(); ctx.roundRect(bx+4, by+4, BW, BH, 10); ctx.fill();
      ctx.fillStyle = "#1a0e08";
      ctx.beginPath(); ctx.roundRect(bx, by, BW, BH, 10); ctx.fill();
      ctx.strokeStyle = "#5a3a18"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(bx, by, BW, BH, 10); ctx.stroke();

      const cx2 = bx + BW / 2, cy2 = by + BH / 2;

      // ── Deck stack (when no card drawn) ──────────────────────────────────
      if (tarotDrawnCard === null) {
        const remaining = tarotDeck.length;
        const stackX = cx2 - 60, stackY = by + 80;
        const CW = 120, CH = 180;
        // Stack shadow layers
        for (let i = Math.min(remaining - 1, 5); i >= 0; i--) {
          const ox = i * 2, oy = i * 2;
          ctx.fillStyle = `rgba(${20+i*8},${10+i*4},${5+i*2},0.9)`;
          ctx.beginPath(); ctx.roundRect(stackX - ox, stackY - oy, CW, CH, 6); ctx.fill();
          ctx.strokeStyle = "rgba(100,70,30,0.5)"; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.roundRect(stackX - ox, stackY - oy, CW, CH, 6); ctx.stroke();
        }
        // Top card back face
        if (remaining > 0) {
          ctx.fillStyle = "#2a1408";
          ctx.beginPath(); ctx.roundRect(stackX, stackY, CW, CH, 6); ctx.fill();
          // Back design — ornate cross-hatch border
          ctx.strokeStyle = "#8a5020"; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.roundRect(stackX+6, stackY+6, CW-12, CH-12, 4); ctx.stroke();
          ctx.strokeStyle = "#6a3818"; ctx.lineWidth = 0.8;
          ctx.beginPath(); ctx.roundRect(stackX+10, stackY+10, CW-20, CH-20, 3); ctx.stroke();
          // Back ornament — eye in center
          ctx.strokeStyle = "#8a5020"; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.ellipse(stackX+CW/2, stackY+CH/2, 22, 14, 0, 0, Math.PI*2); ctx.stroke();
          ctx.fillStyle = "#c07030";
          ctx.beginPath(); ctx.arc(stackX+CW/2, stackY+CH/2, 6, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#1a0808";
          ctx.beginPath(); ctx.arc(stackX+CW/2, stackY+CH/2, 3, 0, Math.PI*2); ctx.fill();
          // Corner diamond marks
          [[12,12],[CW-12,12],[12,CH-12],[CW-12,CH-12]].forEach(([dx,dy]) => {
            ctx.fillStyle = "#8a5020";
            ctx.save(); ctx.translate(stackX+dx, stackY+dy); ctx.rotate(Math.PI/4);
            ctx.fillRect(-3,-3,6,6); ctx.restore();
          });
        }

        // Remaining count
        ctx.fillStyle = "#c8a060"; ctx.font = "bold 13px serif";
        ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
        ctx.fillText(`${remaining} card${remaining !== 1 ? "s" : ""} remaining`, cx2, stackY + CH + 22);

        // Footer hint
        ctx.fillStyle = "rgba(30,14,4,0.88)";
        ctx.beginPath(); ctx.roundRect(bx, by+BH-28, BW, 28, [0,0,10,10]); ctx.fill();
        ctx.fillStyle = remaining > 0 ? "#b89040" : "#605030";
        ctx.font = "10px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
        ctx.fillText(remaining > 0 ? "[E] draw a card   [R] put down" : "deck spent", cx2, by+BH-10);
        ctx.textAlign = "left";
        ctx.restore();
        return;
      }

      // ── Card flip reveal animation ────────────────────────────────────────
      const card = tarotDrawnCard;
      const CW = 130, CH = 200;
      const cardX = cx2 - CW / 2, cardY = by + 60;

      if (!tarotBurning) {
        // Flip: squash card width from 0→full using tarotRevealT
        const flipProgress = Math.min(1, tarotRevealT * 2);
        const showFace     = tarotRevealT >= 0.5;
        const scaleX       = showFace ? (flipProgress - 1) * -1 + 1 : 1 - flipProgress;
        ctx.save();
        ctx.translate(cx2, cardY + CH / 2);
        ctx.scale(Math.max(0.01, scaleX), 1);
        ctx.translate(-CW / 2, -CH / 2);

        if (!showFace) {
          // Card back during first half of flip
          ctx.fillStyle = "#2a1408";
          ctx.beginPath(); ctx.roundRect(0, 0, CW, CH, 6); ctx.fill();
          ctx.strokeStyle = "#8a5020"; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.roundRect(6, 6, CW-12, CH-12, 4); ctx.stroke();
          ctx.strokeStyle = "rgba(100,70,30,0.6)"; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.roundRect(0, 0, CW, CH, 6); ctx.stroke();
        } else {
          // Card face — art only, no text
          _drawTarotCardFace(ctx, card.effect, 0, 0, CW, CH);
        }
        ctx.restore();
      } else {
        // ── Burn / disintegration ─────────────────────────────────────────
        // Card fades + breaks apart in ember particles
        const bt = tarotBurnT;
        const alpha = Math.max(0, 1 - bt * 1.4);
        ctx.save();
        ctx.translate(cx2, cardY + CH / 2);
        ctx.globalAlpha = alpha;
        // Card face dissolves upward
        ctx.translate(0, -bt * 30);
        ctx.scale(1 - bt * 0.3, 1 - bt * 0.2);
        ctx.translate(-CW / 2, -CH / 2);
        _drawTarotCardFace(ctx, card.effect, 0, 0, CW, CH);
        ctx.restore();

        // Ember particles — deterministic from burnT
        const particleCount = 18;
        for (let i = 0; i < particleCount; i++) {
          const seed = i * 137.5;
          const life = Math.max(0, bt - (i / particleCount) * 0.5);
          if (life <= 0) continue;
          const pAlpha = Math.max(0, 1 - life * 1.8);
          const px3 = cx2 + Math.sin(seed) * (CW * 0.6) * bt * 2 + Math.cos(seed * 0.7) * 20;
          const py3 = (cardY + CH * 0.5) - life * (60 + Math.sin(seed * 2) * 30);
          const pr  = Math.max(0.5, 2.5 * (1 - life));
          ctx.save();
          ctx.globalAlpha = pAlpha;
          ctx.fillStyle = i % 3 === 0 ? "#ff8020" : i % 3 === 1 ? "#ffcc40" : "#cc4010";
          ctx.beginPath(); ctx.arc(px3, py3, pr, 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }
      }

      // ── Card name label under the card ────────────────────────────────────
      {
        const nameAlpha = tarotBurning
          ? Math.max(0, 1 - tarotBurnT * 2)   // fades out with the burn
          : Math.max(0, (tarotRevealT - 0.5) * 2); // fades in once face shows
        if (nameAlpha > 0) {
          ctx.save();
          ctx.globalAlpha = nameAlpha;
          ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
          // Soft shadow
          ctx.fillStyle = "rgba(0,0,0,0.6)";
          ctx.font = "bold 15px Georgia, serif";
          ctx.fillText(card.name, cx2 + 1, cardY + CH + 23);
          // Main text — warm gold
          ctx.fillStyle = "#e8c870";
          ctx.fillText(card.name, cx2, cardY + CH + 22);
          ctx.restore();
        }
      }

      // Footer — no hint while card is showing
      ctx.fillStyle = "rgba(30,14,4,0.88)";
      ctx.beginPath(); ctx.roundRect(bx, by+BH-28, BW, 28, [0,0,10,10]); ctx.fill();
      ctx.fillStyle = "#605030"; ctx.font = "10px monospace";
      ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
      ctx.fillText("...", cx2, by+BH-10);
      ctx.textAlign = "left";
      ctx.restore();
    }

    // ── Tarot card face art (art-only, no text) ────────────────────────────
    function _drawTarotCardFace(ctx, effect, x, y, w, h) {
      // Card base
      ctx.fillStyle = "#f0e8d0";
      ctx.beginPath(); ctx.roundRect(x, y, w, h, 6); ctx.fill();
      // Ornate border
      ctx.strokeStyle = "#8a6020"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(x+3, y+3, w-6, h-6, 4); ctx.stroke();
      ctx.strokeStyle = "rgba(120,80,20,0.4)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(x+7, y+7, w-14, h-14, 3); ctx.stroke();

      const mx = x + w / 2, my = y + h / 2;

      ctx.save();
      ctx.beginPath(); ctx.rect(x+8, y+8, w-16, h-16); ctx.clip(); // clip art to inner frame

      switch (effect) {
        case "activity": { // The Spire — tall dark tower against red sky
          // Sky gradient
          const skG = ctx.createLinearGradient(x, y+8, x, my);
          skG.addColorStop(0, "#8b0000"); skG.addColorStop(1, "#2a0808");
          ctx.fillStyle = skG; ctx.fillRect(x+8, y+8, w-16, h/2);
          // Ground
          ctx.fillStyle = "#1a1008"; ctx.fillRect(x+8, my, w-16, h/2-8);
          // Tower — thin tall spire
          ctx.fillStyle = "#0d0d0d";
          ctx.fillRect(mx-8, y+20, 16, h*0.6);
          ctx.fillRect(mx-14, my-20, 28, 40); // base widening
          // Spire tip
          ctx.beginPath(); ctx.moveTo(mx, y+14); ctx.lineTo(mx-8, y+24); ctx.lineTo(mx+8, y+24); ctx.closePath(); ctx.fill();
          // Lit windows
          ctx.fillStyle = "#ff8c00";
          for (let r=0; r<4; r++) ctx.fillRect(mx-3, y+30+r*14, 6, 7);
          // Lightning crack in sky
          ctx.strokeStyle = "#ffee88"; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(mx+25, y+15); ctx.lineTo(mx+18, y+30); ctx.lineTo(mx+22, y+38); ctx.lineTo(mx+12, y+52); ctx.stroke();
          break; }

        case "fate": { // Fate's Turn — split wheel, light half / dark half
          // Background
          ctx.fillStyle = "#1a1020"; ctx.fillRect(x+8, y+8, w-16, h-16);
          // Wheel
          const wR = Math.min(w,h)*0.3;
          ctx.fillStyle = "#f5f0e0";
          ctx.beginPath(); ctx.arc(mx, my, wR, -Math.PI/2, Math.PI/2); ctx.fill();
          ctx.fillStyle = "#1a0828";
          ctx.beginPath(); ctx.arc(mx, my, wR, Math.PI/2, 3*Math.PI/2); ctx.fill();
          ctx.strokeStyle = "#c8a040"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(mx, my, wR, 0, Math.PI*2); ctx.stroke();
          // Spokes
          ctx.strokeStyle = "#c8a040"; ctx.lineWidth = 1;
          for (let s=0; s<8; s++) {
            const a = s * Math.PI/4;
            ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(mx+Math.cos(a)*wR, my+Math.sin(a)*wR); ctx.stroke();
          }
          ctx.fillStyle = "#c8a040"; ctx.beginPath(); ctx.arc(mx, my, 5, 0, Math.PI*2); ctx.fill();
          // Dividing line
          ctx.strokeStyle = "#c8a040"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(mx, my-wR-8); ctx.lineTo(mx, my+wR+8); ctx.stroke();
          break; }

        case "trickster": { // The Trickster — jester mask, split face
          ctx.fillStyle = "#e8d880"; ctx.fillRect(x+8, y+8, w-16, h-16);
          // Jester hat
          ctx.fillStyle = "#cc2020";
          ctx.beginPath(); ctx.moveTo(mx-22, my-10); ctx.lineTo(mx-32, y+22); ctx.lineTo(mx-8, my-8); ctx.closePath(); ctx.fill();
          ctx.fillStyle = "#2020cc";
          ctx.beginPath(); ctx.moveTo(mx+22, my-10); ctx.lineTo(mx+32, y+22); ctx.lineTo(mx+8, my-8); ctx.closePath(); ctx.fill();
          // Bells
          ctx.fillStyle = "#f0c030"; ctx.beginPath(); ctx.arc(mx-32, y+22, 6, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#f0c030"; ctx.beginPath(); ctx.arc(mx+32, y+22, 6, 0, Math.PI*2); ctx.fill();
          // Split face: smile left / frown right
          ctx.strokeStyle = "#2a1808"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(mx-14, my+8, 10, 0, Math.PI); ctx.stroke(); // smile left
          ctx.beginPath(); ctx.arc(mx+14, my+8, 10, Math.PI, 0); ctx.stroke(); // frown right
          // Eyes
          ctx.fillStyle = "#2a1808";
          ctx.beginPath(); ctx.arc(mx-14, my-4, 4, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(mx+14, my-4, 4, 0, Math.PI*2); ctx.fill();
          // Center divider
          ctx.strokeStyle = "#2a1808"; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(mx, y+30); ctx.lineTo(mx, y+h-20); ctx.stroke();
          break; }

        case "event": { // The Fiend — demonic horned face in red mist
          const bg2 = ctx.createRadialGradient(mx, my, 10, mx, my, w*0.6);
          bg2.addColorStop(0, "#5a0808"); bg2.addColorStop(1, "#0a0004");
          ctx.fillStyle = bg2; ctx.fillRect(x+8, y+8, w-16, h-16);
          // Horns
          ctx.fillStyle = "#8a0010";
          ctx.beginPath(); ctx.moveTo(mx-18, my-18); ctx.lineTo(mx-30, y+20); ctx.lineTo(mx-6, my-12); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.moveTo(mx+18, my-18); ctx.lineTo(mx+30, y+20); ctx.lineTo(mx+6, my-12); ctx.closePath(); ctx.fill();
          // Face outline
          ctx.fillStyle = "#3a0808";
          ctx.beginPath(); ctx.ellipse(mx, my, 26, 30, 0, 0, Math.PI*2); ctx.fill();
          // Glowing eyes
          ctx.fillStyle = "#ff3300";
          ctx.beginPath(); ctx.ellipse(mx-10, my-8, 7, 5, 0, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(mx+10, my-8, 7, 5, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#ff8844"; ctx.beginPath(); ctx.arc(mx-10, my-8, 3, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#ff8844"; ctx.beginPath(); ctx.arc(mx+10, my-8, 3, 0, Math.PI*2); ctx.fill();
          // Jagged mouth
          ctx.strokeStyle = "#ff4400"; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(mx-12, my+10);
          for (let t=-12; t<=12; t+=4) ctx.lineTo(mx+t, my+10+(t%8===0?6:0));
          ctx.stroke();
          break; }

        case "hunt": { // The Reaper — cloaked figure with scythe
          ctx.fillStyle = "#0a0808"; ctx.fillRect(x+8, y+8, w-16, h-16);
          // Moon
          ctx.fillStyle = "#e8e0c8"; ctx.beginPath(); ctx.arc(mx+18, y+28, 18, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#0a0808"; ctx.beginPath(); ctx.arc(mx+24, y+25, 15, 0, Math.PI*2); ctx.fill();
          // Reaper cloak
          ctx.fillStyle = "#1a1010";
          ctx.beginPath(); ctx.moveTo(mx, y+40); ctx.lineTo(mx-22, y+h-20); ctx.lineTo(mx+22, y+h-20); ctx.closePath(); ctx.fill();
          // Hood
          ctx.fillStyle = "#111"; ctx.beginPath(); ctx.arc(mx, y+44, 14, Math.PI, 0); ctx.fill();
          ctx.fillStyle = "#050505"; ctx.beginPath(); ctx.arc(mx, y+48, 10, 0, Math.PI*2); ctx.fill();
          // Scythe
          ctx.strokeStyle = "#c0c0c0"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(mx+18, y+30); ctx.lineTo(mx-10, y+h-20); ctx.stroke();
          ctx.fillStyle = "#b8b8b8";
          ctx.beginPath(); ctx.moveTo(mx+18, y+30); ctx.quadraticCurveTo(mx+36, y+50, mx+20, y+65);
          ctx.lineTo(mx+14, y+62); ctx.quadraticCurveTo(mx+30, y+50, mx+12, y+32); ctx.closePath(); ctx.fill();
          break; }

        case "watcher": { // The Watcher — single giant eye in a keyhole
          ctx.fillStyle = "#0c0c18"; ctx.fillRect(x+8, y+8, w-16, h-16);
          // Stone arch / keyhole shape
          ctx.fillStyle = "#1c1c28";
          ctx.beginPath(); ctx.arc(mx, my-10, 30, Math.PI, 0); ctx.lineTo(mx+20, my+30); ctx.lineTo(mx-20, my+30); ctx.closePath(); ctx.fill();
          ctx.strokeStyle = "#5050a0"; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.arc(mx, my-10, 30, Math.PI, 0); ctx.lineTo(mx+20, my+30); ctx.lineTo(mx-20, my+30); ctx.closePath(); ctx.stroke();
          // Pupil-less eye
          ctx.fillStyle = "#c8f0e8";
          ctx.beginPath(); ctx.ellipse(mx, my-10, 20, 12, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#1a5050";
          ctx.beginPath(); ctx.arc(mx, my-10, 8, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#040810";
          ctx.beginPath(); ctx.arc(mx, my-10, 4, 0, Math.PI*2); ctx.fill();
          // Eye-shine
          ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.beginPath(); ctx.arc(mx+4, my-14, 2, 0, Math.PI*2); ctx.fill();
          break; }

        case "dawn": { // The Dawn — sunrise rays, warm horizon
          const dawnG = ctx.createLinearGradient(x, y+8, x, y+h-8);
          dawnG.addColorStop(0, "#1a2040"); dawnG.addColorStop(0.5, "#e87040"); dawnG.addColorStop(1, "#f0c870");
          ctx.fillStyle = dawnG; ctx.fillRect(x+8, y+8, w-16, h-16);
          // Sun half-circle at horizon
          const horY = my + 20;
          ctx.fillStyle = "#fff0a0"; ctx.beginPath(); ctx.arc(mx, horY, 28, Math.PI, 0); ctx.fill();
          // Rays
          ctx.strokeStyle = "rgba(255,230,120,0.6)"; ctx.lineWidth = 1.5;
          for (let r=0; r<8; r++) {
            const ra = -Math.PI + r*(Math.PI/7);
            ctx.beginPath(); ctx.moveTo(mx+Math.cos(ra)*30, horY+Math.sin(ra)*30);
            ctx.lineTo(mx+Math.cos(ra)*58, horY+Math.sin(ra)*58); ctx.stroke();
          }
          // Ground line
          ctx.strokeStyle = "#8a6020"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(x+8, horY); ctx.lineTo(x+w-8, horY); ctx.stroke();
          break; }

        case "eclipse": { // The Eclipse — total eclipse, black circle
          ctx.fillStyle = "#080808"; ctx.fillRect(x+8, y+8, w-16, h-16);
          // Corona
          const corG = ctx.createRadialGradient(mx, my, 30, mx, my, 60);
          corG.addColorStop(0, "transparent"); corG.addColorStop(0.5, "rgba(180,120,20,0.5)"); corG.addColorStop(1, "transparent");
          ctx.fillStyle = corG; ctx.beginPath(); ctx.arc(mx, my, 60, 0, Math.PI*2); ctx.fill();
          // Corona streamers
          ctx.strokeStyle = "rgba(200,140,30,0.4)"; ctx.lineWidth = 1;
          for (let r=0; r<12; r++) {
            const a = r*(Math.PI/6);
            const len = 28 + Math.sin(r*137)*12;
            ctx.beginPath(); ctx.moveTo(mx+Math.cos(a)*32, my+Math.sin(a)*32);
            ctx.lineTo(mx+Math.cos(a)*(32+len), my+Math.sin(a)*(32+len)); ctx.stroke();
          }
          // Black moon disc
          ctx.fillStyle = "#030305"; ctx.beginPath(); ctx.arc(mx, my, 30, 0, Math.PI*2); ctx.fill();
          ctx.strokeStyle = "#1a0808"; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(mx, my, 30, 0, Math.PI*2); ctx.stroke();
          break; }

        case "saint": { // The Saint — radiant cross with warm glow
          const saintG = ctx.createRadialGradient(mx, my, 5, mx, my, 60);
          saintG.addColorStop(0, "#fff8e0"); saintG.addColorStop(0.5, "#e0c860"); saintG.addColorStop(1, "#2a1808");
          ctx.fillStyle = saintG; ctx.fillRect(x+8, y+8, w-16, h-16);
          // Cross
          ctx.fillStyle = "#f0e0a0";
          ctx.fillRect(mx-6, my-38, 12, 72); // vertical
          ctx.fillRect(mx-28, my-16, 56, 12); // horizontal
          // Glow rings
          for (let r=1; r<=3; r++) {
            ctx.strokeStyle = `rgba(255,240,160,${0.4-r*0.1})`; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(mx, my, r*14, 0, Math.PI*2); ctx.stroke();
          }
          // Center gem
          ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(mx, my, 5, 0, Math.PI*2); ctx.fill();
          break; }

        case "death": { // The Noose — rope and noose against void
          ctx.fillStyle = "#060606"; ctx.fillRect(x+8, y+8, w-16, h-16);
          // Gallows beam
          ctx.fillStyle = "#2a1808";
          ctx.fillRect(mx-30, y+18, 60, 8);  // horizontal beam
          ctx.fillRect(mx-4, y+18, 8, h*0.25); // vertical post hint
          // Rope from beam down
          ctx.strokeStyle = "#8a6030"; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.moveTo(mx+12, y+26); ctx.lineTo(mx+12, my-18); ctx.stroke();
          // Noose loop
          ctx.strokeStyle = "#a07040"; ctx.lineWidth = 2.5;
          ctx.beginPath(); ctx.arc(mx+12, my-6, 12, 0, Math.PI*2); ctx.stroke();
          // Noose knot
          ctx.fillStyle = "#a07040"; ctx.beginPath(); ctx.arc(mx+12, my-18, 5, 0, Math.PI*2); ctx.fill();
          // Crow perched on beam
          ctx.fillStyle = "#1a1010";
          ctx.beginPath(); ctx.ellipse(mx-18, y+16, 8, 5, -0.3, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(mx-12, y+12, 4, 0, Math.PI*2); ctx.fill();
          // Crow eye
          ctx.fillStyle = "#ff2020"; ctx.beginPath(); ctx.arc(mx-10, y+11, 1.5, 0, Math.PI*2); ctx.fill();
          break; }
      }

      ctx.restore(); // end clip
    }

    function _breakMusicBox() {
      musicBoxBroken = true;
      musicBoxActive = false;

      // Remove Music Box from inventory; fix selected slot if needed
      const idx = inventory.indexOf("Music Box");
      if (idx >= 0) {
        inventory.splice(idx, 1);
        if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
      }

      // Spawn 2 broken pieces near the player — fixed (not pickupable), no label
      const scatter = [
        { dx: -10, dy:  -6, rot: -0.5 },
        { dx:   9, dy:   8, rot:  0.9 },
      ];
      scatter.forEach((s, i) => {
        worldItems.push({
          name:          "",                // empty → no label drawn
          x:             player.x + s.dx,
          y:             player.y + s.dy,
          facing:        s.rot,
          active:        false,
          written:       false,
          writeAnimTimer: 0,
          fixed:         true,             // blocks all pickup paths
          noLabel:       true,             // suppresses pickup prompt
          style:         "music_box_shard",
          shardIndex:    i,
        });
      });
    }

    function _breakOuijaBoard() {
      ouijaBroken      = true;
      ouijaBoardOpen   = false; // kick player out of popup immediately

      // Remove Ouija Board from inventory; clear selection if it was selected
      const idx = inventory.indexOf("Ouija Board");
      if (idx >= 0) {
        inventory.splice(idx, 1);
        if (selectedSlot >= inventory.length) selectedSlot = Math.max(0, inventory.length - 1);
      }

      // Spawn 3 broken shard pieces near the player — fixed (not pickupable), no label
      const scatter = [
        { dx: -14, dy:  -8, rot: -0.4 },
        { dx:   8, dy:  -4, rot:  0.6 },
        { dx:  -4, dy:  14, rot:  1.2 },
      ];
      scatter.forEach((s, i) => {
        worldItems.push({
          name:       "",           // empty name → no label drawn
          x:          player.x + s.dx,
          y:          player.y + s.dy,
          facing:     s.rot,
          active:     false,
          written:    false,
          writeAnimTimer: 0,
          fixed:      true,         // blocks all pickup paths
          noLabel:    true,         // suppresses pickup prompt
          style:      "ouija_shard",
          shardIndex: i,
        });
      });
    }

    function drawOuijaBoard() {
      const W = canvas.width, H = canvas.height;
      const BW = 700, BH = 440; // board popup dimensions
      const bx = (W - BW) / 2, by = (H - BH) / 2; // centered

      // Dark semi-transparent world vignette
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.68)";
      ctx.fillRect(0, 0, W, H);
      ctx.restore();

      ctx.save();

      // ── Board body ────────────────────────────────────────────────────────
      // Drop shadow
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.beginPath(); ctx.roundRect(bx + 8, by + 10, BW, BH, 12); ctx.fill();

      // Board surface — aged mahogany gradient
      const woodGrad = ctx.createLinearGradient(bx, by, bx + BW * 0.6, by + BH);
      woodGrad.addColorStop(0,    "#3d1a0a");
      woodGrad.addColorStop(0.3,  "#5c2710");
      woodGrad.addColorStop(0.55, "#4a1f0c");
      woodGrad.addColorStop(0.8,  "#3a1608");
      woodGrad.addColorStop(1,    "#2e1005");
      ctx.fillStyle = woodGrad;
      ctx.beginPath(); ctx.roundRect(bx, by, BW, BH, 12); ctx.fill();

      // Wood grain — diagonal streaks
      ctx.save();
      ctx.beginPath(); ctx.roundRect(bx, by, BW, BH, 12); ctx.clip();
      ctx.strokeStyle = "rgba(255,160,80,0.04)"; ctx.lineWidth = 1.5;
      for (let g = -BH; g < BW + BH; g += 22) {
        ctx.beginPath();
        ctx.moveTo(bx + g, by);
        ctx.lineTo(bx + g + BH * 0.6, by + BH);
        ctx.stroke();
      }
      ctx.restore();

      // Outer ornate border — triple line
      ctx.strokeStyle = "#7a4010"; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.roundRect(bx + 3,  by + 3,  BW - 6,  BH - 6,  10); ctx.stroke();
      ctx.strokeStyle = "#c88030"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(bx + 8,  by + 8,  BW - 16, BH - 16, 8);  ctx.stroke();
      ctx.strokeStyle = "#5a2a08"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(bx + 11, by + 11, BW - 22, BH - 22, 6);  ctx.stroke();

      // ── Animation update ──────────────────────────────────────────────────
      const _now = Date.now();
      ouijaPX += (ouijaTX - ouijaPX) * 0.08;
      ouijaPY += (ouijaTY - ouijaPY) * 0.08;
      if (ouijaSeqIdx >= 0 && _now >= ouijaSeqNextTime) {
        ouijaSeqIdx++;
        if (ouijaSeqIdx >= ouijaSeq.length) {
          ouijaSeqIdx = -1;
          ouijaTX = 350; ouijaTY = 155;
          if (ouijaPendingBreak) _breakOuijaBoard();
        } else {
          const _tp = _ouijaTokenPos(ouijaSeq[ouijaSeqIdx]);
          ouijaTX = _tp.x; ouijaTY = _tp.y;
          ouijaSeqNextTime = _now + 1100;
        }
      }
      const _activeTok = (ouijaSeqIdx >= 0 && ouijaSeq.length > 0) ? ouijaSeq[ouijaSeqIdx] : null;

      // ── YES (upper-left) and NO (upper-right) ─────────────────────────────
      const yesActive = _activeTok === "YES", noActive = _activeTok === "NO";
      ctx.font = "bold italic 26px serif"; ctx.textAlign = "center";
      if (yesActive) {
        const yg = ctx.createRadialGradient(bx+80, by+50, 0, bx+80, by+50, 40);
        yg.addColorStop(0, "rgba(255,230,60,0.35)"); yg.addColorStop(1, "rgba(255,230,60,0)");
        ctx.fillStyle = yg; ctx.fillRect(bx+40, by+28, 80, 36);
      }
      ctx.fillStyle = yesActive ? "#fff470" : "#d4a840";
      ctx.fillText("YES", bx + 80, by + 55);
      if (noActive) {
        const ng = ctx.createRadialGradient(bx+BW-80, by+50, 0, bx+BW-80, by+50, 40);
        ng.addColorStop(0, "rgba(255,230,60,0.35)"); ng.addColorStop(1, "rgba(255,230,60,0)");
        ctx.fillStyle = ng; ctx.fillRect(bx+BW-120, by+28, 80, 36);
      }
      ctx.fillStyle = noActive ? "#fff470" : "#d4a840";
      ctx.fillText("NO", bx + BW - 80, by + 55);

      // ── "OUIJA" title (center top) ────────────────────────────────────────
      if (ouijaSeqIdx >= 0) {
        const tg = ctx.createRadialGradient(W/2, by+48, 0, W/2, by+48, 80);
        tg.addColorStop(0, "rgba(200,140,30,0.22)"); tg.addColorStop(1, "rgba(200,140,30,0)");
        ctx.fillStyle = tg; ctx.fillRect(W/2-80, by+20, 160, 56);
      }
      ctx.font = "bold 34px serif"; ctx.textAlign = "center";
      ctx.fillStyle = "#e8c050";
      ctx.shadowColor = "rgba(200,140,20,0.6)"; ctx.shadowBlur = 8;
      ctx.fillText("OUIJA", W / 2, by + 58);
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#a07828";
      ctx.beginPath(); ctx.arc(W/2 - 96, by + 51, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(W/2 + 96, by + 51, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.font = "20px serif"; ctx.fillStyle = "#b87820";
      ctx.textAlign = "left";  ctx.fillText("✦", bx + 18, by + 38);
      ctx.textAlign = "right"; ctx.fillText("✦", bx + BW - 18, by + 38);

      // Thin divider under header
      ctx.strokeStyle = "rgba(180,120,30,0.4)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(bx + 30, by + 70); ctx.lineTo(bx + BW - 30, by + 70); ctx.stroke();

      // ── Arc letter rows ───────────────────────────────────────────────────
      const R1 = 760, R2 = 690, ARC_CY = 800, AHALF = 0.28;
      const L1 = "ABCDEFGHIJKLM".split("");
      const L2 = "NOPQRSTUVWXYZ".split("");

      function _drawArcLetters(letters, R) {
        letters.forEach((ch, i) => {
          const a = -AHALF + (i / (letters.length - 1)) * AHALF * 2;
          const lx = bx + 350 + R * Math.sin(a);
          const ly = by + ARC_CY - R * Math.cos(a);
          const isActive = _activeTok === ch;
          ctx.save();
          ctx.translate(lx, ly);
          ctx.rotate(a);
          if (isActive) {
            ctx.fillStyle = "rgba(255,230,60,0.32)";
            ctx.fillRect(-11, -17, 22, 22);
          }
          ctx.fillStyle = isActive ? "#fff470" : "#e8d090";
          ctx.font = isActive ? "bold 16px serif" : "bold 14px serif";
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText(ch, 0, 0);
          ctx.restore();
        });
      }
      _drawArcLetters(L1, R1);
      _drawArcLetters(L2, R2);

      // ── Numbers row ───────────────────────────────────────────────────────
      const nums = "1234567890".split("");
      const numW = 38, numStartX = bx + (BW - nums.length * numW) / 2;
      const numY = by + 200;
      nums.forEach((n, i) => {
        const isActive = _activeTok === n;
        const nx = numStartX + i * numW + numW / 2;
        if (isActive) {
          ctx.fillStyle = "rgba(255,230,60,0.28)";
          ctx.fillRect(nx - 13, numY - 14, 26, 18);
        }
        ctx.fillStyle = isActive ? "#fff470" : "#c8b060";
        ctx.font = isActive ? "bold 14px serif" : "13px serif";
        ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
        ctx.fillText(n, nx, numY);
      });

      // ── GOODBYE (bottom center) ───────────────────────────────────────────
      const gbActive = _activeTok === "GOODBYE";
      if (gbActive) {
        const gg = ctx.createRadialGradient(W/2, by+295, 0, W/2, by+295, 55);
        gg.addColorStop(0, "rgba(255,230,60,0.32)"); gg.addColorStop(1, "rgba(255,230,60,0)");
        ctx.fillStyle = gg; ctx.fillRect(W/2-55, by+273, 110, 32);
      }
      ctx.font = "bold italic 20px serif"; ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
      ctx.fillStyle = gbActive ? "#fff470" : "#b88828";
      ctx.fillText("GOOD BYE", W / 2, by + 300);

      // Decorative separator
      ctx.strokeStyle = "rgba(150,90,20,0.5)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(bx + 40, by + 312); ctx.lineTo(bx + BW - 40, by + 312); ctx.stroke();

      // ── Question zone ─────────────────────────────────────────────────────
      const _menuTop = by + 318;
      if (ouijaSeqIdx >= 0) {
        if (ouijaCurrentQ) {
          ctx.fillStyle = "#c8a060"; ctx.font = "italic 12px serif"; ctx.textAlign = "center";
          ctx.fillText(`"${ouijaCurrentQ}"`, W / 2, _menuTop + 14);
        }
        if (ouijaLastAnswer) {
          ctx.fillStyle = "#d4a040"; ctx.font = "bold 12px monospace"; ctx.textAlign = "center";
          ctx.fillText(ouijaLastAnswer, W / 2, _menuTop + 30);
        }
      } else {
        _ouijaMenuRects = [];
        const _avail = OUIJA_Q_POOL.filter(q => !ouijaAskedQIds.has(q.id));
        const _rowH = 19, _padX = 28;
        _avail.forEach((q, i) => {
          const ry = _menuTop + i * _rowH;
          ctx.fillStyle = "rgba(60,30,8,0.55)";
          ctx.fillRect(bx + _padX, ry, BW - _padX * 2, _rowH - 2);
          ctx.fillStyle = "#e8c060"; ctx.font = "bold 11px monospace"; ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
          ctx.fillText(`${i + 1}`, bx + _padX + 6, ry + 13);
          ctx.fillStyle = "#d4b870"; ctx.font = "11px serif";
          ctx.fillText(q.text, bx + _padX + 22, ry + 13);
          _ouijaMenuRects.push({ id: q.id, rect: { x: bx + _padX, y: ry, w: BW - _padX * 2, h: _rowH - 2 } });
        });
        if (_avail.length === 0) {
          ctx.fillStyle = "#806040"; ctx.font = "italic 12px serif"; ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
          ctx.fillText("The board is spent.", W / 2, _menuTop + 14);
        }
      }

      // ── Planchette ────────────────────────────────────────────────────────
      const _pt = _now / 1100;
      const px = bx + ouijaPX + (ouijaSeqIdx === -1 ? Math.sin(_pt * 0.6) * 7 : 0);
      const py = by + ouijaPY + (ouijaSeqIdx === -1 ? Math.cos(_pt * 0.4) * 4 : 0);
      const PW = 26, PH = 34; // half-width, half-height

      // Shadow
      ctx.fillStyle = "rgba(0,0,0,0.45)";
      ctx.beginPath();
      ctx.ellipse(px + 4, py + 5, PW * 0.85, PH * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();

      // Body gradient — warm reddish-brown wood, amber when active
      const pBodyGrad = ctx.createRadialGradient(px - PW * 0.35, py - PH * 0.3, 2, px, py, PW * 1.4);
      if (ouijaSeqIdx >= 0) {
        pBodyGrad.addColorStop(0,   "#ffe8a0");
        pBodyGrad.addColorStop(0.5, "#c87820");
        pBodyGrad.addColorStop(1,   "#6a3808");
      } else {
        pBodyGrad.addColorStop(0,   "#d4a060");
        pBodyGrad.addColorStop(0.5, "#8a4818");
        pBodyGrad.addColorStop(1,   "#4a2008");
      }
      ctx.fillStyle = pBodyGrad;

      // Teardrop path: wide at top, tapered point at bottom
      ctx.beginPath();
      ctx.moveTo(px, py + PH);
      ctx.bezierCurveTo(px - PW * 0.55, py + PH * 0.3,  px - PW, py - PH * 0.15, px - PW * 0.7, py - PH * 0.7);
      ctx.bezierCurveTo(px - PW * 0.4,  py - PH,        px + PW * 0.4, py - PH,  px + PW * 0.7, py - PH * 0.7);
      ctx.bezierCurveTo(px + PW,        py - PH * 0.15, px + PW * 0.55, py + PH * 0.3, px, py + PH);
      ctx.closePath();
      ctx.fill();

      // Body stroke
      ctx.strokeStyle = ouijaSeqIdx >= 0 ? "#ffcc40" : "#a86020";
      ctx.lineWidth = ouijaSeqIdx >= 0 ? 1.8 : 1.2;
      ctx.beginPath();
      ctx.moveTo(px, py + PH);
      ctx.bezierCurveTo(px - PW * 0.55, py + PH * 0.3,  px - PW, py - PH * 0.15, px - PW * 0.7, py - PH * 0.7);
      ctx.bezierCurveTo(px - PW * 0.4,  py - PH,        px + PW * 0.4, py - PH,  px + PW * 0.7, py - PH * 0.7);
      ctx.bezierCurveTo(px + PW,        py - PH * 0.15, px + PW * 0.55, py + PH * 0.3, px, py + PH);
      ctx.closePath();
      ctx.stroke();

      // Wood grain lines on body
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(px, py + PH);
      ctx.bezierCurveTo(px - PW * 0.55, py + PH * 0.3,  px - PW, py - PH * 0.15, px - PW * 0.7, py - PH * 0.7);
      ctx.bezierCurveTo(px - PW * 0.4,  py - PH,        px + PW * 0.4, py - PH,  px + PW * 0.7, py - PH * 0.7);
      ctx.bezierCurveTo(px + PW,        py - PH * 0.15, px + PW * 0.55, py + PH * 0.3, px, py + PH);
      ctx.closePath();
      ctx.clip();
      ctx.strokeStyle = "rgba(255,180,80,0.08)"; ctx.lineWidth = 1;
      for (let g = -PH; g < PH; g += 8) {
        ctx.beginPath(); ctx.moveTo(px - PW - 5, py + g); ctx.lineTo(px + PW + 5, py + g + 3); ctx.stroke();
      }
      ctx.restore();

      // Three felt feet (small filled circles)
      const feetPos = [
        { fx: px - PW * 0.45, fy: py - PH * 0.5 },
        { fx: px + PW * 0.45, fy: py - PH * 0.5 },
        { fx: px,             fy: py + PH * 0.55 },
      ];
      feetPos.forEach(f => {
        ctx.fillStyle = "rgba(20,10,5,0.7)";
        ctx.beginPath(); ctx.ellipse(f.fx, f.fy, 4, 3, 0, 0, Math.PI*2); ctx.fill();
      });

      // Viewing hole — circular glass lens near upper center
      const hx = px, hy = py - PH * 0.2;
      const holeR = 9;
      ctx.fillStyle = "rgba(5,3,2,0.9)";
      ctx.beginPath(); ctx.arc(hx, hy, holeR, 0, Math.PI * 2); ctx.fill();
      // Active letter inside hole
      if (_activeTok && _activeTok.length <= 2) {
        ctx.fillStyle = ouijaSeqIdx >= 0 ? "#ffee80" : "#c8a040";
        ctx.font = `bold ${_activeTok.length === 1 ? 11 : 8}px serif`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        if (ouijaSeqIdx >= 0) { ctx.shadowColor = "rgba(255,220,50,0.9)"; ctx.shadowBlur = 5; }
        ctx.fillText(_activeTok, hx, hy);
        ctx.shadowBlur = 0;
      }
      // Hole rim
      ctx.strokeStyle = ouijaSeqIdx >= 0 ? "#ffcc40" : "#806020"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(hx, hy, holeR, 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = "rgba(255,200,100,0.3)"; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.arc(hx - 2, hy - 2, holeR - 2, 0, Math.PI * 2); ctx.stroke();

      // ── Footer ────────────────────────────────────────────────────────────
      ctx.fillStyle = "rgba(40,18,5,0.85)";
      ctx.beginPath(); ctx.roundRect(bx, by + BH - 24, BW, 24, [0, 0, 12, 12]); ctx.fill();
      ctx.fillStyle = "#b89040"; ctx.font = "11px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
      const _used = ouijaQuestionsAsked, _lim = 3;
      ctx.fillText(
        ouijaSeqIdx >= 0
          ? "... the board speaks ..."
          : `[1–5] choose question   [R] put down   ${_used}/${_lim} asked`,
        W / 2, by + BH - 7
      );

      ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
      ctx.restore();
    }

    function drawHauntedMirror() {
      const W = canvas.width, H = canvas.height;
      const cx = W / 2, cy = H / 2 - 20;
      const rx = 210, ry = 260; // oval half-widths

      // Soft dark vignette outside the oval — world stays visible, just dimmed
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, W, H);
      // Cut out the oval via destination-out
      ctx.globalCompositeOperation = "destination-out";
      ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // Mirror interior — clipped to oval; branches on broken state
      ctx.save();
      ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.clip();

      if (mirrorBroken) {
        // ── Broken mirror: black void with purple cracks ──────────────────
        ctx.fillStyle = "#050005"; ctx.fillRect(cx - rx, cy - ry, rx * 2, ry * 2);

        // Faint deep-purple glow at center (residual energy)
        const brokenGlow = ctx.createRadialGradient(cx, cy, 5, cx, cy, 120);
        brokenGlow.addColorStop(0, "rgba(80,0,120,0.22)");
        brokenGlow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = brokenGlow; ctx.fillRect(cx - rx, cy - ry, rx * 2, ry * 2);

        // Purple crack lines radiating from a central impact point
        const impactX = cx + 18, impactY = cy - 25;
        const crackAngles = [0, 0.42, 0.95, 1.55, 2.1, 2.65, 3.3, 3.9, 4.6, 5.2];
        ctx.strokeStyle = "#7030a0"; ctx.lineWidth = 1.5; ctx.lineCap = "round";
        crackAngles.forEach((a, i) => {
          const len = 60 + (i % 3) * 55;
          const jog = (i % 2 === 0) ? 0.18 : -0.14; // slight direction change mid-crack
          const mx1 = impactX + Math.cos(a) * len * 0.45;
          const my1 = impactY + Math.sin(a) * len * 0.45;
          ctx.beginPath();
          ctx.moveTo(impactX, impactY);
          ctx.lineTo(mx1, my1);
          ctx.lineTo(impactX + Math.cos(a + jog) * len, impactY + Math.sin(a + jog) * len);
          ctx.stroke();
        });
        // Thin secondary cracks branching off some main ones
        ctx.lineWidth = 0.7; ctx.strokeStyle = "#5020708";
        ctx.strokeStyle = "#501870";
        [[1.2, 80, 1.6, 40], [3.0, 95, 3.5, 35], [4.9, 70, 5.3, 28]].forEach(([a, l, a2, l2]) => {
          const bx = impactX + Math.cos(a) * l * 0.6, by = impactY + Math.sin(a) * l * 0.6;
          ctx.beginPath(); ctx.moveTo(bx, by);
          ctx.lineTo(bx + Math.cos(a2) * l2, by + Math.sin(a2) * l2);
          ctx.stroke();
        });
        // Impact glint
        ctx.fillStyle = "rgba(180,80,255,0.35)";
        ctx.beginPath(); ctx.arc(impactX, impactY, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "rgba(255,200,255,0.6)";
        ctx.beginPath(); ctx.arc(impactX, impactY, 1.5, 0, Math.PI * 2); ctx.fill();

      } else {
        // ── Working mirror: ghost-POV feed ────────────────────────────────
        // Tunable parameters
        const MIRROR_ZOOM        = 2.7;   // ~1.7× prior zoom — tighter framing around ghost
        const MIRROR_DRIFT_AMP   = 1.2;   // px — subtle camera float (less jitter at lower zoom)
        const MIRROR_VIGNETTE_A  = 0.35;  // softer edge darkening so room layout stays visible

        // Offscreen canvas matches the oval bounding box exactly (MW × MH).
        // renderCameraFeed places the ghost at the canvas center (MW/2, MH/2),
        // so the cone fans out in all directions — no dead-zone crop issue.
        const MW = rx * 2, MH = ry * 2;
        if (!_mirrorCanvas || _mirrorCanvas.width !== MW || _mirrorCanvas.height !== MH) {
          _mirrorCanvas    = document.createElement("canvas");
          _mirrorCanvas.width = MW; _mirrorCanvas.height = MH;
          _mirrorFogCanvas = document.createElement("canvas");
          _mirrorFogCanvas.width = MW; _mirrorFogCanvas.height = MH;
        }
        const mCtx = _mirrorCanvas.getContext("2d");
        const mFog = _mirrorFogCanvas.getContext("2d");

        if (currentGhost) {
          // ── TESTING MODE: full 360° overhead view centered on ghost ──────
          // Bypasses renderCameraFeed (which applies narrow 60° cone fog).
          // Renders world directly, ghost visible at center, full surroundings.
          const sx = MW / 2, sy = MH / 2; // canvas center = ghost world position

          mCtx.fillStyle = "#050508";
          mCtx.fillRect(0, 0, MW, MH);
          mCtx.save();
          mCtx.translate(sx, sy);
          mCtx.scale(MIRROR_ZOOM, MIRROR_ZOOM);
          mCtx.translate(-ghostX, -ghostY);

          // Walls + room floors
          mCtx.fillStyle = "#2a1f14";
          walls.forEach(w => mCtx.fillRect(w.x, w.y, w.w, w.h));
          rooms.forEach(r => { mCtx.fillStyle = r.color; mCtx.fillRect(r.x, r.y, r.w, r.h); });

          // Doors (closed = solid block)
          doors.forEach(d => {
            if (!d.open) {
              mCtx.fillStyle = "#5a3a18"; mCtx.fillRect(d.x, d.y, d.w, d.h);
              mCtx.fillStyle = "#7a5230"; mCtx.fillRect(d.x+1, d.y+1, d.w-2, d.h-2);
            }
          });

          // World items — dot + name
          worldItems.forEach(it => {
            const ix = it.x + 6, iy = it.y + 6;
            mCtx.fillStyle = itemColors[it.name] || "#888";
            mCtx.beginPath(); mCtx.arc(ix, iy, 4, 0, Math.PI * 2); mCtx.fill();
          });

          // Player — small warm dot
          mCtx.fillStyle = "rgba(220,180,120,0.8)";
          mCtx.beginPath(); mCtx.arc(player.x + 8, player.y + 8, 6, 0, Math.PI * 2); mCtx.fill();

          // Ghost — bright centered marker so it is unmistakeable
          // Body: glowing white circle
          const gGlow = mCtx.createRadialGradient(ghostX, ghostY, 0, ghostX, ghostY, 22);
          gGlow.addColorStop(0,   "rgba(255,255,255,0.95)");
          gGlow.addColorStop(0.4, "rgba(200,230,255,0.7)");
          gGlow.addColorStop(1,   "rgba(160,200,255,0)");
          mCtx.fillStyle = gGlow;
          mCtx.beginPath(); mCtx.arc(ghostX, ghostY, 22, 0, Math.PI * 2); mCtx.fill();
          // Solid core
          mCtx.fillStyle = "rgba(230,240,255,0.95)";
          mCtx.beginPath(); mCtx.arc(ghostX, ghostY, 9, 0, Math.PI * 2); mCtx.fill();

          mCtx.restore();

          // 360° radial fog — fully clear in center, fades at oval edge
          mFog.clearRect(0, 0, MW, MH);
          const radFog = mFog.createRadialGradient(sx, sy, rx * 0.55, sx, sy, Math.max(rx, ry) * 1.1);
          radFog.addColorStop(0,   "rgba(0,0,0,0)");
          radFog.addColorStop(0.7, "rgba(0,0,0,0.25)");
          radFog.addColorStop(1,   "rgba(0,0,0,0.88)");
          mFog.fillStyle = radFog;
          mFog.fillRect(0, 0, MW, MH);
          mCtx.drawImage(mFog.canvas, 0, 0);

          // Stamp into mirror oval with grayscale infrared filter
          ctx.filter = 'grayscale(1) brightness(1.6) contrast(1.15) sepia(1) hue-rotate(240deg) saturate(2.5)';
          ctx.drawImage(_mirrorCanvas, cx - rx, cy - ry);
          ctx.filter = 'none';

          // Subtle pulsing vignette at oval edge
          const flicker = 0.08 * Math.sin(Date.now() / 130);
          const vig = ctx.createRadialGradient(cx, cy, 40, cx, cy, Math.max(rx, ry) * 1.05);
          vig.addColorStop(0,   "rgba(0,0,0,0)");
          vig.addColorStop(0.75, "rgba(0,0,0,0.05)");
          vig.addColorStop(1,   `rgba(5,0,10,${MIRROR_VIGNETTE_A + flicker})`);
          ctx.fillStyle = vig; ctx.fillRect(cx - rx, cy - ry, MW, MH);

        } else {
          // Ghost not yet spawned — dark purple void
          ctx.fillStyle = "#0a0015"; ctx.fillRect(cx - rx, cy - ry, rx * 2, ry * 2);
        }
      }

      ctx.restore();

      // Oval frame — ornate dark silver border
      ctx.save();
      ctx.strokeStyle = "#2a1840"; ctx.lineWidth = 14;
      ctx.beginPath(); ctx.ellipse(cx, cy, rx + 7, ry + 7, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = "#5a3880"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.ellipse(cx, cy, rx + 7, ry + 7, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = "#8050b0"; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.ellipse(cx, cy, rx + 2, ry + 2, 0, 0, Math.PI * 2); ctx.stroke();
      // Inner edge glow
      ctx.strokeStyle = "rgba(180,80,255,0.25)"; ctx.lineWidth = 8;
      ctx.beginPath(); ctx.ellipse(cx, cy, rx - 4, ry - 4, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();

      // Close hint
      ctx.save();
      ctx.fillStyle = mirrorBroken ? "rgba(40,0,60,0.8)" : "rgba(100,50,150,0.7)";
      ctx.fillRect(cx - 66, cy + ry + 10, 132, 20);
      ctx.fillStyle = mirrorBroken ? "#a060c0" : "#c0a0e0";
      ctx.font = "10px monospace"; ctx.textAlign = "center";
      ctx.fillText(mirrorBroken ? "[ MIRROR BROKEN ] — ESC" : "[ ESC ] close", cx, cy + ry + 24);
      ctx.textAlign = "left";
      ctx.restore();
    }

    function drawDangerTimer() {
      // Backdrop
      ctx.fillStyle = "rgba(0,0,0,0.78)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Panel
      const tx = 270, ty = 220, tw = 260, th = 170;
      ctx.fillStyle = "#10140e";
      ctx.fillRect(tx, ty, tw, th);
      ctx.strokeStyle = safeTimeOver ? "#7a3030" : "#3a6030"; ctx.lineWidth = 2;
      ctx.strokeRect(tx, ty, tw, th);

      // Title bar
      ctx.fillStyle = safeTimeOver ? "#3a1010" : "#101e10";
      ctx.fillRect(tx, ty, tw, 26);
      ctx.fillStyle = safeTimeOver ? "#e57373" : "#81c784";
      ctx.font = "bold 11px monospace"; ctx.textAlign = "center";
      ctx.fillText("THREAT MONITOR", tx + tw / 2, ty + 17);

      // Close button
      ctx.fillStyle = "#555"; ctx.font = "11px monospace";
      ctx.fillText("✕", tx + tw - 12, ty + 18);

      // Status line
      ctx.font = "bold 22px monospace";
      ctx.fillStyle = safeTimeOver ? "#e57373" : "#81c784";
      const statusText = safeTimeOver ? "DANGER" : "SAFE";
      ctx.fillText(statusText, tx + tw / 2, ty + 72);

      // Timer display
      ctx.font = "13px monospace";
      if (!safeTimeOver) {
        ctx.fillStyle = "#a0c8a0";
        ctx.fillText("Safe window: " + Math.ceil(safeTime) + "s remaining", tx + tw / 2, ty + 98);
      } else {
        ctx.fillStyle = "#c8a0a0";
        ctx.fillText("Safe window expired", tx + tw / 2, ty + 98);
      }

      // Blinking activity indicator
      const blink = (Date.now() % 900 < 500);
      ctx.fillStyle = safeTimeOver
        ? (blink ? "#e57373" : "#3a1010")
        : (blink ? "#81c784" : "#101e10");
      ctx.beginPath(); ctx.arc(tx + tw / 2, ty + 122, 5, 0, Math.PI * 2); ctx.fill();

      // Hint
      ctx.fillStyle = "#505850"; ctx.font = "9px monospace";
      ctx.fillText("[ ESC ] close", tx + tw / 2, ty + th - 12);

      ctx.textAlign = "left";
    }

    // --- Four-Panel Monitor UI ---
    function drawFourPanel() {
      const px = 50, py = 30, pw = 700, ph = 540;
      const panW = (pw - 30) / 2, panH = (ph - 50) / 2; // ~335 × 245
      const p = { tl: {x: px+10, y: py+30}, tr: {x: px+20+panW, y: py+30},
                  bl: {x: px+10, y: py+40+panH}, br: {x: px+20+panW, y: py+40+panH} };

      // Backdrop + panel housing
      ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0c1018"; ctx.fillRect(px, py, pw, ph);
      ctx.strokeStyle = "#2a4060"; ctx.lineWidth = 2; ctx.strokeRect(px, py, pw, ph);

      // Title bar
      ctx.fillStyle = "#0a1828"; ctx.fillRect(px, py, pw, 26);
      ctx.fillStyle = "#7ab8d8"; ctx.font = "bold 11px monospace"; ctx.textAlign = "center";
      ctx.fillText("FIELD MONITOR STATION", px + pw/2, py + 17);
      ctx.fillStyle = "#555"; ctx.font = "11px monospace";
      ctx.fillText("✕", px + pw - 12, py + 18);

      // Panel helper — draw a labelled bezel
      function panel(x, y, w, h, label) {
        ctx.fillStyle = "#080d12"; ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = "#1e3448"; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = "#1a3050"; ctx.fillRect(x, y, w, 14);
        ctx.fillStyle = "#6a9ab8"; ctx.font = "bold 8px monospace"; ctx.textAlign = "left";
        ctx.fillText(label, x + 5, y + 10);
      }

      // ── TOP LEFT: House Overview ──────────────────────────────────────────
      // Derived entirely from the live rooms[], doors[], and furniture[] arrays.
      // When those arrays change, the minimap updates automatically — no separate layout.
      panel(p.tl.x, p.tl.y, panW, panH, "HOUSE OVERVIEW");
      const worldX0=60, worldY0=60, worldW=680, worldH=660;
      const scaleX = (panW-20)/worldW, scaleY = (panH-28)/worldH;
      const offX = p.tl.x+10, offY = p.tl.y+18;
      // World→minimap coordinate helpers
      const toMX = wx => offX + (wx - worldX0) * scaleX;
      const toMY = wy => offY + (wy - worldY0) * scaleY;
      const toMW = ww => Math.max(0.8, ww * scaleX);
      const toMH = wh => Math.max(0.8, wh * scaleY);

      // Room fill — color-coded by type so rooms have visual identity on the map
      const _roomFill = lbl =>
        lbl.includes("Bed")     ? "#221d2c" :  // bedrooms — purple-grey
        lbl.includes("Bath")    ? "#1a1e2a" :  // bathrooms — cool slate
        lbl.includes("Kitchen") ? "#181e19" :  // kitchen — cool stone
        lbl.includes("Dining")  ? "#1f1c13" :  // dining — warm oak
        lbl.includes("Living")  ? "#1e190e" :  // living — warm brown
        lbl.includes("Foyer")   ? "#1d1b11" :  // foyer — warm tan
        lbl.includes("Hallway") ? "#161412" :  // hallway — dark corridor
        lbl.includes("Garage")  ? "#131313" :  // garage — concrete
        lbl.includes("Utility") ? "#141813" :  // utility — muted
        lbl.includes("Study")   ? "#15181d" :  // study — dark blue
        lbl.includes("Walk")    ? "#171513" :  // walk-in — neutral
        lbl.includes("Closet")  ? "#15130e" :  // closet — dark
        lbl.includes("Yard")    ? "#121a10" :  // outside — dark green
                                   "#141418";

      // 1 — Room fills
      rooms.forEach(r => {
        ctx.fillStyle = _roomFill(r.label || "");
        ctx.fillRect(toMX(r.x), toMY(r.y), toMW(r.w), toMH(r.h));
      });

      // 2 — Door openings: draw each door rect in a slightly lighter passage tone
      //     so wall junctions show a hint of the opening
      ctx.fillStyle = "#1e3040";
      doors.forEach(d => {
        ctx.fillRect(toMX(d.x), toMY(d.y), toMW(d.w), toMH(d.h));
      });

      // 3 — Room outlines (drawn after door fills so the wall grid is clear)
      ctx.strokeStyle = "#28485e"; ctx.lineWidth = 0.5;
      rooms.forEach(r => {
        ctx.strokeRect(toMX(r.x), toMY(r.y), toMW(r.w), toMH(r.h));
      });

      // 4 — Major furniture blocks — read directly from the furniture[] array
      //     so any future add/remove/move also updates this map automatically
      const _furnitureFill = style =>
        style === "bed"     ? "#352d48" :  // bed — soft purple
        style === "counter" ? "#2d3130" :  // counter/appliance — cool stone
        style === "seat"    ? "#3d2f1e" :  // seating — warm fabric
        style === "car"     ? "#1e2c38" :  // car — dark steel blue
                              "#483820";   // wood storage (default)
      furniture.forEach(f => {
        ctx.fillStyle = _furnitureFill(f.style);
        ctx.fillRect(toMX(f.x), toMY(f.y), toMW(f.w), toMH(f.h));
      });

      // 5 — Room labels — small text centered in each room, skipped if too narrow
      ctx.save();
      ctx.font = "5px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(90,130,160,0.75)";
      rooms.forEach(r => {
        if (!r.label || r.label === "Yard") return;
        if (toMW(r.w) < 22 || toMH(r.h) < 9) return; // too small to label
        ctx.fillText(r.label, toMX(r.x + r.w / 2), toMY(r.y + r.h / 2));
      });
      ctx.restore();

      // 6 — Player blip (on top of everything)
      ctx.fillStyle = "#40c8ff";
      ctx.beginPath(); ctx.arc(toMX(player.x+8), toMY(player.y+8), 2.5, 0, Math.PI*2); ctx.fill();

      // ── TOP RIGHT: Microphone Input ───────────────────────────────────────
      panel(p.tr.x, p.tr.y, panW, panH, "AUDIO MONITOR");
      ctx.fillStyle = "#1a1a1a"; ctx.fillRect(p.tr.x+1, p.tr.y+15, panW-2, panH-16);
      // Flat inactive waveform line
      const midY = p.tr.y + 15 + (panH-15)/2;
      ctx.strokeStyle = "#1e3828"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(p.tr.x+10, midY); ctx.lineTo(p.tr.x+panW-10, midY); ctx.stroke();
      // dB scale (vertical, left side)
      ctx.fillStyle = "#2a4030"; ctx.font = "7px monospace"; ctx.textAlign = "right";
      ["+6","  0","-6","-∞"].forEach((lbl, i) => {
        const ly = p.tr.y + 20 + i * ((panH-25)/3);
        ctx.fillText(lbl, p.tr.x + 26, ly + 4);
        ctx.strokeStyle = "#1e2a20"; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(p.tr.x+28, ly); ctx.lineTo(p.tr.x+panW-10, ly); ctx.stroke();
      });
      ctx.fillStyle = "#2a4030"; ctx.font = "bold 9px monospace"; ctx.textAlign = "center";
      ctx.fillText("NO MICROPHONE PLACED", p.tr.x + panW/2, midY - 10);
      ctx.fillStyle = "#1e3020"; ctx.font = "8px monospace";
      ctx.fillText("place a mic to begin monitoring", p.tr.x + panW/2, midY + 14);

      // ── BOTTOM LEFT: Sanity Panel ─────────────────────────────────────────
      panel(p.bl.x, p.bl.y, panW, panH, "SANITY MONITOR");
      const sanity = 100; // placeholder — no mechanic yet
      const sanColor = sanity > 60 ? "#40d878" : sanity > 30 ? "#d8c040" : "#d84040";
      // Large readout
      ctx.fillStyle = sanColor; ctx.font = "bold 44px monospace"; ctx.textAlign = "center";
      ctx.fillText(sanity + "%", p.bl.x + panW/2, p.bl.y + panH/2 + 8);
      ctx.fillStyle = "#3a6850"; ctx.font = "8px monospace";
      ctx.fillText("TEAM AVERAGE SANITY", p.bl.x + panW/2, p.bl.y + panH/2 + 26);
      // Bar gauge at bottom of panel
      const barX = p.bl.x + 16, barY = p.bl.y + panH - 28, barW = panW - 32, barH = 10;
      ctx.fillStyle = "#101810"; ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = sanColor; ctx.fillRect(barX, barY, barW * (sanity/100), barH);
      ctx.strokeStyle = "#2a4030"; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, barH);
      // Tick marks at 25/50/75
      [0.25, 0.5, 0.75].forEach(t => {
        ctx.strokeStyle = "#1e3828"; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(barX + barW*t, barY); ctx.lineTo(barX + barW*t, barY+barH); ctx.stroke();
      });

      // ── BOTTOM RIGHT: Ghost Activity Chart ────────────────────────────────
      panel(p.br.x, p.br.y, panW, panH, "GHOST ACTIVITY");
      const ghostActivity = 0; // placeholder — no mechanic yet
      const chartX = p.br.x + 34, chartY = p.br.y + 18, chartW = panW - 48, chartH = panH - 36;
      // Chart bg + grid
      ctx.fillStyle = "#060c10"; ctx.fillRect(chartX, chartY, chartW, chartH);
      ctx.strokeStyle = "#112030"; ctx.lineWidth = 0.5;
      for (let g = 0; g <= 5; g++) {
        const gy = chartY + (chartH / 5) * g;
        ctx.beginPath(); ctx.moveTo(chartX, gy); ctx.lineTo(chartX + chartW, gy); ctx.stroke();
      }
      for (let g = 0; g <= 6; g++) {
        const gx = chartX + (chartW / 6) * g;
        ctx.beginPath(); ctx.moveTo(gx, chartY); ctx.lineTo(gx, chartY + chartH); ctx.stroke();
      }
      // Y-axis labels (0–10, bottom to top)
      ctx.fillStyle = "#3a6888"; ctx.font = "7px monospace"; ctx.textAlign = "right";
      [10,8,6,4,2,0].forEach((v, i) => {
        ctx.fillText(v, chartX - 3, chartY + (chartH/5)*i + 4);
      });
      // X-axis labels (0–60 in steps of 10)
      ctx.textAlign = "center";
      [0,10,20,30,40,50,60].forEach((v, i) => {
        ctx.fillText(v, chartX + (chartW/6)*i, chartY + chartH + 10);
      });
      // Flat activity line at 0 (bottom of chart)
      const actY = chartY + chartH; // y=0 maps to bottom
      ctx.strokeStyle = "#40c8a0"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(chartX, actY); ctx.lineTo(chartX + chartW, actY); ctx.stroke();
      // Current value dot
      ctx.fillStyle = "#40c8a0";
      ctx.beginPath(); ctx.arc(chartX + chartW, actY, 3, 0, Math.PI*2); ctx.fill();
      // Y-axis label
      ctx.save(); ctx.translate(p.br.x + 10, p.br.y + panH/2);
      ctx.rotate(-Math.PI/2); ctx.fillStyle = "#2a5870"; ctx.font = "7px monospace"; ctx.textAlign = "center";
      ctx.fillText("ACTIVITY", 0, 0); ctx.restore();

      ctx.textAlign = "left";
      ctx.font = "9px monospace"; ctx.fillStyle = "#2a4050";
      ctx.textAlign = "center";
      ctx.fillText("[ ESC ] close", px + pw/2, py + ph - 8);
      ctx.textAlign = "left";
    }
